<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">

<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .detail-page-wrapper { background-color: #F8F9FA; min-height: 100vh; padding-bottom: 150px; }
        .detail-container { max-width: 750px; margin: 0 auto; }
        
        /* 타임라인 카드 디자인 */
        .status-timeline-card {
            background: white; border-radius: 28px; padding: 40px 20px;
            margin-bottom: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            position: relative;
        }
        
        .timeline-base-line {
            position: absolute; top: 22px; left: 12%; width: 76%; height: 6px;
            background: #F1F3F5; z-index: 1; border-radius: 10px;
        }

        .timeline-active-line {
            position: absolute; top: 22px; left: 12%; height: 6px;
            background: var(--mo-orange); 
            z-index: 2; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%; border-radius: 10px;
        }

        .status-timeline { display: flex; justify-content: space-between; position: relative; z-index: 5; }
        .status-step { text-align: center; width: 25%; position: relative; }

        .step-dot {
            width: 48px; height: 48px; border-radius: 50%; background: white;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #E9ECEF; transition: 0.4s; font-size: 1.3rem; color: #ADB5BD;
        }
        .step-label { font-size: 0.9rem; font-weight: 500; color: #ADB5BD; transition: 0.3s; }

        /* [신호등 컬러 로직 반영] */
        .status-step.active#step1 .step-dot { background: var(--mo-orange); color: white; border-color: var(--mo-orange); } /* 결제완료 */
        .status-step.active#step2 .step-dot { background: var(--mo-navy); color: white; border-color: var(--mo-navy); }   /* 조리중 */
        .status-step.active#step3 .step-dot { background: #28A745; color: white; border-color: #28A745; }             /* 배달중 */
        .status-step.active#step4 .step-dot { background: #ADB5BD; color: white; border-color: #ADB5BD; }             /* 배달완료 */
        
        .status-step.active .step-label { color: var(--mo-navy); font-weight: 800; }
        .status-step.completed .step-dot { background: #EAF7ED; color: #28A745; border-color: #28A745; }

        /* 플로팅 액션 바 */
        .fixed-action-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 750px; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 20px 30px; border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 1000; display: flex; gap: 15px;
        }

        .btn-reject {
            flex: 1; background: #FFF0F0; color: #FF4D4D; border: 1px solid #FFDADA;
            border-radius: 18px; font-weight: 700; padding: 18px 0; transition: 0.2s;
        }
        .btn-reject:hover { background: #FF4D4D; color: white; }

        .btn-main-action {
            flex: 2; background: var(--mo-orange); color: white; border: none;
            border-radius: 18px; font-weight: 700; padding: 18px 0;
            box-shadow: 0 8px 20px rgba(255, 128, 0, 0.2); transition: 0.3s;
        }
    </style>
</th:block>

<div layout:fragment="content" class="detail-page-wrapper">
    <div class="container py-4 detail-container">
        
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <a th:href="@{/owner/dashboard}" class="text-decoration-none text-muted fw-bold">
                <i class="bi bi-chevron-left me-1"></i> 대시보드로 돌아가기
            </a>
            <span class="badge bg-white text-dark border rounded-pill px-3 py-2">주문번호 #20260323</span>
        </div>

        <div class="status-timeline-card">
            <div class="timeline-base-line"></div>
            <div class="timeline-active-line" id="progressLine"></div>
            
            <div class="status-timeline">
                <div class="status-step active" id="step1">
                    <div class="step-dot"><i class="bi bi-receipt"></i></div>
                    <div class="step-label">결제완료</div>
                </div>
                <div class="status-step" id="step2">
                    <div class="step-dot"><i class="bi bi-fire"></i></div>
                    <div class="step-label">조리중</div>
                </div>
                <div class="status-step" id="step3">
                    <div class="step-dot"><i class="bi bi-bicycle"></i></div>
                    <div class="step-label">배달중</div>
                </div>
                <div class="status-step" id="step4">
                    <div class="step-dot"><i class="bi bi-check-circle-fill"></i></div>
                    <div class="step-label">배달완료</div>
                </div>
            </div>
        </div>

        <div class="soft-card border-0 shadow-sm mb-4">
             <h5 class="fw-bold mb-3">📦 주문 내역</h5>
             <div class="d-flex justify-content-between border-bottom pb-2 mb-2">
                 <span>훈제치킨(한마리) x 1</span>
                 <span class="fw-bold">18,500원</span>
             </div>
             <div class="d-flex justify-content-between">
                 <span>배달비</span>
                 <span class="fw-bold">3,000원</span>
             </div>
             <hr>
             <div class="d-flex justify-content-between">
                 <span class="fw-bold">총 결제금액</span>
                 <span class="text-orange fw-bold fs-5">21,500원</span>
             </div>
        </div>

    </div>

    <div class="fixed-action-bar">
        <button class="btn-reject" id="rejectBtn" onclick="handleReject()">주문 거절</button>
        <button class="btn-main-action" id="statusBtn" onclick="handleStatusChange()">
            주문 접수 (조리 시작)
        </button>
    </div>
</div>

<th:block layout:fragment="script">
    <script>
        let currentState = 1;

        function handleStatusChange() {
            // 4단계(배달완료) 상태에서 버튼을 한 번 더 누르면 리다이렉트
            if (currentState === 4) {
                completeOrderAction();
                return;
            }

            currentState++;
            updateUI();
        }

        function updateUI() {
            const progressLine = document.getElementById('progressLine');
            const statusBtn = document.getElementById('statusBtn');
            const rejectBtn = document.getElementById('rejectBtn');

            // 1. 프로그레스 바 너비 및 색상 업데이트
            const widths = [0, 0, 25.5, 51, 76];
            progressLine.style.width = widths[currentState] + "%";

            // 2. 타임라인 스텝 상태 업데이트
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById('step' + i);
                step.classList.remove('active', 'completed');
                if (i < currentState) step.classList.add('completed');
                else if (i === currentState) step.classList.add('active');
            }

            // 3. 버튼 텍스트 및 [신호등 컬러] & 리다이렉트 준비
            if (currentState === 2) {
                statusBtn.innerText = "조리 완료 (배달 요청)";
                statusBtn.style.backgroundColor = "var(--mo-navy)"; 
                progressLine.style.background = "var(--mo-navy)";
                rejectBtn.style.display = "none"; // 조리 시작 후에는 거절 불가
            } else if (currentState === 3) {
                statusBtn.innerText = "배달 완료 확인";
                statusBtn.style.backgroundColor = "#28A745"; 
                progressLine.style.background = "#28A745";
            } else if (currentState === 4) {
                statusBtn.innerText = "주문 종료 (대시보드로)";
                statusBtn.style.backgroundColor = "#ADB5BD"; 
                progressLine.style.background = "#ADB5BD";
            }
        }

        // 최종 주문 종료 처리 및 리다이렉트
        function completeOrderAction() {
            if(confirm("모든 배달이 완료되었습니다. 주문을 종료하고 대시보드로 돌아갈까요?")) {
                // 실제 서비스라면 여기서 서버에 '주문 완료(Finish)' API를 호출합니다.
                alert("정상적으로 처리되었습니다. 정산 내역에서 확인 가능합니다.");
                window.location.href = "/owner/dashboard"; // 대시보드로 리다이렉트
            }
        }

        function handleReject() {
            if(confirm("정말로 주문을 거절하시겠습니까?")) {
                alert("주문이 취소되었습니다.");
                window.location.href = "/owner/dashboard";
            }
        }
    </script>
</th:block>
</html>
