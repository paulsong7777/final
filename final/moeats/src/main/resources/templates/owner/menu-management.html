<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mo-Eats | 메뉴 관리 (사장님)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* [1. 디자인 토큰 및 베이스] */
        :root {
            --mo-orange: #FF8000;
            --mo-navy: #252D59;
            --mo-gray: #ADB5BD;
            --mo-bg: #F8F9FA;
            --mo-white: #FFFFFF;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--mo-bg); 
            color: var(--mo-navy); 
            letter-spacing: -0.5px;
        }
        
        /* [2. 레이아웃] */
        .mgmt-wrapper { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }

        /* [3. 헤더 디자인] */
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 45px; }
        .header-title h2 { font-weight: 800; font-size: 2.2rem; margin-bottom: 8px; }
        .header-title p { color: #6c757d; font-weight: 500; font-size: 1.05rem; }

        /* [4. 공통 버튼 스타일 (MacBook 감성)] */
        .btn-mo-white {
            background: var(--mo-white); border: 1px solid #E9ECEF; padding: 12px 26px;
            border-radius: 16px; font-weight: 600; color: var(--mo-navy);
            transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .btn-mo-white:hover { border-color: var(--mo-orange); color: var(--mo-orange); transform: translateY(-2px); }

        /* [5. 메뉴 카드 그리드 및 카드 디자인] */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 30px; }
        
        .menu-card {
            background: var(--mo-white); border-radius: 30px; border: none; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .menu-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px rgba(0,0,0,0.09); }

        /* 이미지 영역 */
        .menu-img-wrapper { width: 100%; height: 210px; position: relative; overflow: hidden; background: #eee; }
        .menu-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .menu-card:hover .menu-img { transform: scale(1.08); }

        /* 카드 바디 */
        .menu-body { padding: 28px; }
        .menu-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .menu-name { font-size: 1.35rem; font-weight: 800; margin-bottom: 0; }
        .menu-price { font-size: 1.5rem; font-weight: 800; color: var(--mo-orange); margin-bottom: 15px; }
        .menu-desc { font-size: 0.95rem; color: #6c757d; line-height: 1.6; height: 46px; overflow: hidden; margin-bottom: 25px; }

        /* [6. 품절 토글 스위치 커스텀] */
        .form-switch .form-check-input { width: 3.4em; height: 1.7em; cursor: pointer; border-color: #dee2e6; transition: 0.3s; }
        .form-check-input:checked { background-color: var(--mo-orange); border-color: var(--mo-orange); }
        
        /* 품절 상태 스타일 (흑백 & 반투명) */
        .menu-card.is-sold-out {
            filter: grayscale(1);
            opacity: 0.65;
            transition: 0.4s ease;
        }

        /* 품절 배지 (is-sold-out 클래스가 있을 때만 표시) */
        .sold-out-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1); backdrop-filter: blur(2px);
            z-index: 5; display: none; align-items: center; justify-content: center;
            pointer-events: none; /* 스위치 클릭을 방해하지 않음 */
        }
        .menu-card.is-sold-out .sold-out-overlay { display: flex; }
        .badge-sold-out { background: #343a40; color: white; padding: 12px 30px; border-radius: 50px; font-weight: 800; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* [7. 카드 하단 버튼 그룹] */
        .card-actions { display: flex; gap: 12px; border-top: 1px solid #F1F3F5; padding-top: 22px; }
        .btn-action-edit { background: #F1F3F5; color: var(--mo-navy); border: none; flex: 1; padding: 14px; border-radius: 14px; font-weight: 700; transition: 0.2s; text-decoration: none; text-align: center; }
        .btn-action-del { background: #FFF0F0; color: #FF4D4D; border: none; flex: 1; padding: 14px; border-radius: 14px; font-weight: 700; transition: 0.2s; }
        .btn-action-edit:hover { background: var(--mo-navy); color: white; }
        .btn-action-del:hover { background: #FF4D4D; color: white; }

        /* [8. 하단 플로팅 등록 버튼 (+)] */
        .btn-floating-add {
            position: fixed; bottom: 50px; right: 50px; width: 75px; height: 75px;
            background: var(--mo-orange); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
            box-shadow: 0 10px 35px rgba(255, 128, 0, 0.4); text-decoration: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        .btn-floating-add:hover { transform: scale(1.1) rotate(90deg); color: white; }
    </style>
</head>
<body>

<div class="mgmt-wrapper">
    <header class="page-header">
        <div class="header-title">
            <h2>메뉴 관리</h2>
            <p>익주 사장님, 오늘 판매하실 메뉴를 확인해 주세요.</p>
        </div>
        <a href="/owner/category/setting" class="btn-mo-white">
            <i class="bi bi-grid-fill me-2 text-orange"></i> 카테고리 설정
        </a>
    </header>

    <div class="menu-grid">
        
        <div class="menu-card" id="card-1">
            <div class="sold-out-overlay"><span class="badge-sold-out">품절됨</span></div>
            
            <div class="menu-img-wrapper">
                <img src="https://images.unsplash.com/photo-1562967914-608f82629710?w=500" class="menu-img" alt="메뉴">
            </div>
            
            <div class="menu-body">
                <div class="menu-name-row">
                    <h5 class="menu-name">훈제치킨 (한마리)</h5>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" checked onchange="toggleSoldOut(1)">
                    </div>
                </div>
                <div class="menu-price">18,500원</div>
                <p class="menu-desc">참나무 향이 가득 배어있는 촉촉하고 쫄깃한 베스트 메뉴입니다.</p>
                
                <div class="card-actions">
                    <a href="/owner/menu/edit/1" class="btn-action-edit">수정</a>
                    <button class="btn-action-del" onclick="deleteMenu(1)">삭제</button>
                </div>
            </div>
        </div>

        <div class="menu-card is-sold-out" id="card-2">
            <div class="sold-out-overlay"><span class="badge-sold-out">품절됨</span></div>
            
            <div class="menu-img-wrapper">
                <img src="https://images.unsplash.com/photo-1585032226651-759b368d7246?w=500" class="menu-img" alt="메뉴">
            </div>
            
            <div class="menu-body">
                <div class="menu-name-row">
                    <h5 class="menu-name">불맛 볶음면</h5>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" onchange="toggleSoldOut(2)">
                    </div>
                </div>
                <div class="menu-price">9,500원</div>
                <p class="menu-desc">강한 불로 볶아내어 불향이 살아있는 매콤한 면 요리입니다.</p>
                
                <div class="card-actions">
                    <a href="#" class="btn-action-edit">수정</a>
                    <button class="btn-action-del">삭제</button>
                </div>
            </div>
        </div>

    </div>
</div>

<a href="/owner/menu/register" class="btn-floating-add">
    <i class="bi bi-plus-lg"></i>
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 1. 품절 토글 (무한 반복 가능)
    function toggleSoldOut(id) {
        const card = document.getElementById('card-' + id);
        card.classList.toggle('is-sold-out');
        
        const isSoldOut = card.classList.contains('is-sold-out');
        console.log(`[메뉴 ${id}] 상태 변경: ${isSoldOut ? '품절' : '판매중'}`);
    }

    // 2. 삭제 확인 및 애니메이션
    function deleteMenu(id) {
        if(confirm("이 메뉴를 정말로 삭제하시겠습니까?\n삭제된 메뉴는 고객님들에게 더 이상 보이지 않습니다.")) {
            const card = document.getElementById('card-' + id);
            card.style.transition = "0.4s ease";
            card.style.transform = "scale(0.8) translateY(30px)";
            card.style.opacity = "0";
            
            setTimeout(() => {
                card.remove();
                alert("삭제되었습니다.");
            }, 400);
        }
    }
</script>

</body>
</html>
