<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>내 주문 내역 - Mo-Eats</title>
    
    <link rel="stylesheet" th:href="@{/css/foundation/reset.css}">
    <link rel="stylesheet" th:href="@{/css/foundation/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/foundation/typography.css}">
    <link rel="stylesheet" th:href="@{/css/layout/layout.css}">
    <link rel="stylesheet" th:href="@{/css/layout/header.css}">
    <link rel="stylesheet" th:href="@{/css/layout/footer.css}">
    <link rel="stylesheet" th:href="@{/css/components/cards.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/status.css}">
    <link rel="stylesheet" th:href="@{/css/responsive/common-responsive.css}">
</head>
<body class="mo-page">

    <header class="mo-header">
        <div class="mo-content-wrap mo-header__inner">
            <a href="/" class="mo-header__logo">Mo-Eats</a>
            <nav class="mo-header__nav">
                <a href="#" class="mo-header__link active">주문 내역</a>
                <a href="#" class="mo-header__link">내 주변 모집</a>
            </nav>
        </div>
    </header>

    <main class="mo-page-body">
        <div class="mo-content-wrap">
            <h1 class="mo-heading-1">내 주문 내역</h1>

            <div class="mo-order-grid mt-5"> 
                <article class="mo-card" th:each="order : ${orders}">
                    <div class="mo-card__thumb-wrap">
                        <img th:src="${order.shopImg}" alt="가게">
                    </div>
                    <div class="mo-card__body">
                        <span class="mo-status mo-status--success" th:text="${order.statusName}">완료</span>
                        <h3 class="mo-heading-3 mt-2" th:text="${order.shopName}">가게 이름</h3>
                        <p class="mo-body-sm mo-text-muted" th:text="${order.menuSummary}">주문 메뉴 요약</p>
                        
                        <div class="mo-card__actions">
                            <button class="mo-btn mo-btn-primary mo-btn-sm w-100">재주문하기</button>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <footer class="mo-footer">
        <div class="mo-content-wrap">
            <div class="mo-footer__top">
                <span class="mo-footer__brand">Mo-Eats</span>
                <div class="mo-footer__links">
                    <a href="#">고객센터</a>
                    <a href="#">이용약관</a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
