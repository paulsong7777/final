<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layouts/main_layout}">

<div layout:fragment="content">

    <h2>주문방 참여</h2>
    <p>방장에게 받은 코드 또는 링크로 참여하세요.</p>

    <!-- ================================
    [실전 폼] 백엔드 연동 완료 후 주석 해제
    목적     : 방 코드로 주문방에 참여 요청
    method   : POST
    action   : /rooms/{code}/join  ({code}는 JS에서 입력값으로 동적 교체)
    전송 파라미터:
        - roomCode (text input) : 참여할 방의 코드
    세션 의존 : session.loginMember.memberIdx → 참여자 식별자로 서버에서 직접 사용
    성공 리다이렉트 : /rooms/{roomIdx} (room-detail.html)

    <form th:action="@{/rooms/{code}/join(code=${roomCode})}" method="post" id="roomJoinForm">

        목적: 서버에서 URL 파라미터로 내려준 roomCode를 input에 미리 채움
              (링크 공유로 직접 접근 시 자동 입력)
        <input type="text"
               id="roomCodeInput"
               name="roomCode"
               th:value="${roomCode}"
               placeholder="예) A7B2X9"
               maxlength="10"
               required>

        목적: 링크로 들어왔을 때 자동 입력된 코드를 사용자에게 안내
        <span th:if="${roomCode != null}">
            자동 입력된 코드: <strong th:text="${roomCode}"></strong>
        </span>

        <button type="submit" id="btnJoinRoom">참여하기</button>
    </form>
    ================================ -->

    <!-- ================================ -->
    <!-- [더미 데이터] 실전 폼 대체 표시   -->
    <!-- ================================ -->
    <section>
        <h3>방 코드로 참여 (더미)</h3>
        <!--
        실전: form action="/rooms/{code}/join" POST
        서버 요청 파라미터: roomCode
        -->
        <label for="roomCodeInput_dummy">주문방 코드 입력</label>
        <br>
        <input type="text"
               id="roomCodeInput_dummy"
               placeholder="예) A7B2X9"
               maxlength="10"
               value="A7B2X9">
        <br>
        <button type="button" id="btnTestJoin">참여하기 (더미)</button>
    </section>

    <hr>

    <!--
    ================================
    [실전] 방 정보 미리보기 - 백엔드 연동 후 주석 해제
    목적     : 입력한 roomCode로 조회한 방 정보를 사전 표시
    서버 제공 model 변수:
        - room.storeName         : 가게명
        - room.leaderName        : 방장 이름
        - room.paymentMode       : REPRESENTATIVE | INDIVIDUAL
        - room.currentParticipants : 현재 참여 인원 수
        - room.roomStatus        : OPEN | SELECTING | PAYMENT_PENDING | ORDER_CONFIRMED

    <section th:if="${room != null}">
        <h3>참여할 주문방 정보</h3>
        <table border="1">
            <tr><th>가게명</th>          <td th:text="${room.storeName}">가게 이름</td></tr>
            <tr><th>방장</th>            <td th:text="${room.leaderName}">방장 이름</td></tr>
            <tr><th>결제 방식</th>
                <td th:text="${room.paymentMode == 'REPRESENTATIVE'} ? '대표결제' : '각자결제'">각자결제</td></tr>
            <tr><th>현재 참여 인원</th>  <td th:text="${room.currentParticipants} + '명'">0명</td></tr>
            <tr><th>방 상태</th>         <td th:text="${room.roomStatus}">OPEN</td></tr>
        </table>
    </section>

    목적: 이미 참여 중인 방이 있을 때 분기 표시
    서버 제공 model 변수: alreadyJoined(boolean), currentRoomCode(String)
    <section th:if="${alreadyJoined}">
        <p>이미 참여 중인 주문방이 있습니다.</p>
        <a th:href="@{/rooms/{code}(code=${currentRoomCode})}">현재 참여 중인 방으로 이동</a>
    </section>

    목적: 방 상태가 OPEN이 아닐 때(잠금·완료 등) 참여 불가 안내
    서버 제공 model 변수: roomClosed(boolean)
    <section th:if="${roomClosed}">
        <p>이 주문방은 현재 참여가 불가능한 상태입니다.</p>
        <p th:text="'방 상태: ' + ${room?.roomStatus}"></p>
        <a th:href="@{/}">홈으로 돌아가기</a>
    </section>
    ================================ -->

    <!-- [더미] 방 정보 미리보기 -->
    <section>
        <h3>참여할 주문방 정보 (더미)</h3>
        <table border="1">
            <tr><th>가게명</th>          <td>테스트 가게</td></tr>
            <tr><th>방장</th>            <td>김방장</td></tr>
            <tr><th>결제 방식</th>       <td>각자결제</td></tr>
            <tr><th>현재 참여 인원</th>  <td>2명</td></tr>
            <tr><th>방 상태</th>         <td>OPEN</td></tr>
        </table>
    </section>

    <hr>

    <!-- ================================ -->
    <!-- [테스트 이동 버튼]                -->
    <!-- ================================ -->
    <section id="testNav">
        <p><strong>[테스트] 화면 이동 확인용</strong></p>
        <!--
        실전: POST /rooms/{code}/join 후 서버가 redirect → room-detail
        아래 버튼은 서버 없이 직접 이동 (더미 roomIdx = 1 사용)
        -->
        <button type="button" id="btnTestGoDetail">
            → 주문방 협업화면으로 이동 (더미 참여자 시나리오)
        </button>
        <button type="button" id="btnTestGoCreate">
            → 주문방 생성화면으로 이동
        </button>
    </section>

    <script src="/js/jquery-3.7.1.min.js"></script>
    <!--
    실전용: <script src="/js/room-join.js"></script>
    -->
    <script src="/js/test/room-join.test.js"></script>

</div>

</html>
