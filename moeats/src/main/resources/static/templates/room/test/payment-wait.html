<!DOCTYPE html>
<html>

<head>
<!--
실전: 단독파일이 아니라 컨텐츠 fragments일 수 있으므로 기재해둠
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layouts/main_layout}"]
      
      <div layout:fragment="content"></div>

payment-wait.html

결제창 -> payment_complete -> order_wait 이 구조로 간다

payment_complete 페이지 생성
order_wait 페이지 생성

order-complete.html 주문완료페이지 생성
order-list 전체주문내역 생성 혹은 complete 페이지에 삽입

api명세서상 expire하면 redirect:/orders/{order_idx}/status 이므로 
경고문만 띄우고 room-detail.html로 보내면 될 것 같다. 이때 파라미터 분석은 별도로 기재한다

* 각자결제 기준 타임아웃 여부를 표시하는 테스트 기능 추가 필요. 타이머 기능 자체는 js파일에 주석으로 있다

-->
<meta charset="UTF-8">

</head>

<body>

<!--
실전: th:replace로 공통 헤더 삽입
<header th:replace="~{fragments/header :: header}"></header>
-->
<header>
    <nav>[더미 헤더] <a href="/">홈</a> | <a href="/room/create">주문방 생성</a> | <a href="/room/join">주문방 참여</a></nav>
    <hr>
</header>

<main>
    <h2>결제 대기실</h2>
    <p>나의 결제가 완료되었습니다. 다른 팀원들의 결제를 기다리고 있습니다.</p>

    <!-- ================================
    ① [실전] 결제 대기실 및 결제 진행 현황
    서버 제공 model 변수:
        - order.storeName       : 가게명
        - order.deliveryAddress : 배송지 주소
        - order.paymentMode     : REPRESENTATIVE | INDIVIDUAL
        - order.grandTotal      : 최종 결제 금액
        - order.orderIdx        : 주문 식별자 (form action에 사용)
        - order.roomIdx         : 방 식별자 (취소 링크에 사용)
        - order.paymentStartedAt: 결제 시작 시각 (5분 타이머 기준점)
        - orderItems (List)
            - item.memberName : 참여자 이름
            - item.menuName   : 메뉴명
            - item.quantity   : 수량
            - item.subtotal   : 소계

    <section id="orderSummary">
    	<div th:unless="${groupOrder.paymentMode == 'REPRESENTATIVE'}">
	        <table border="1">
	            <tr><th>가게명</th>   <td th:text="${order.storeName}">가게 이름</td></tr>
	            <tr><th>배송지</th>   <td th:text="${order.deliveryAddress}">주소</td></tr>
	            <tr><th>결제 방식</th><td th:text="${order.paymentMode == 'REPRESENTATIVE'} ? '대표결제' : '각자결제'">각자결제</td></tr>
	        </table>
	        <table border="1">
	            <thead><tr><th>참여자</th><th>메뉴명</th><th>수량</th><th>금액</th></tr></thead>
	            <tbody>
	                <tr th:each="item : ${orderItems}">
	                    <td th:text="${item.memberName}">홍길동</td>
	                    <td th:text="${item.menuName}">메뉴명</td>
	                    <td th:text="${item.quantity}">1</td>
	                    <td th:text="${#numbers.formatInteger(item.subtotal, 1, 'COMMA')} + '원'">0원</td>
	                </tr>
	            </tbody>
	            <tfoot>
	                <tr>
	                    <td colspan="3"><strong>최종 합계</strong></td>
	                    <td><strong th:text="${#numbers.formatInteger(order.grandTotal ?: 0, 1, 'COMMA')} + '원'">0원</strong></td>
	                </tr>
	            </tfoot>
	        </table>
        </div>
        
        
        <div th:if="${groupOrder.paymentMode == 'REPRESENTATIVE'}">
		    <div th:if="${myRole != 'LEADER'}" class="bg-blue-50 text-blue-700 p-4 rounded-lg text-center font-bold mt-4">
		        💸 방장님이 대표로 결제합니다. (내 결제 예정 금액: 0원)
		    </div>
		</div>        
        
    </section>
    
    ================================ -->

    <!-- [더미] 주문 요약 -->
     <section id="dummyWaitSection">
        <h3>결제 진행 현황 (더미)</h3>
        <p>결제 완료 인원: <span id="dummyPaidCount">2</span> / <span id="dummyTotalCount">4</span></p>
        <table border="1" style="width:100%; text-align:center; margin-bottom: 10px;">
            <thead>
                <tr>
                    <th>참여자</th>
                    <th>금액</th>
                    <th>상태</th>
                </tr>
            </thead>
            <tbody id="dummyStatusTable">
                <tr>
                    <td>김방장</td>
                    <td>10,000원</td>
                    <td style="color: blue; font-weight: bold;">[완료]</td>
                </tr>
                <tr>
                    <td>나(본인)</td>
                    <td>21,000원</td>
                    <td style="color: blue; font-weight: bold;">[완료]</td>
                </tr>
                <tr class="pending-row">
                    <td>이팀원</td>
                    <td>5,000원</td>
                    <td style="color: red;">[미결제]</td>
                </tr>
                <tr class="pending-row">
                    <td>박신입</td>
                    <td>4,000원</td>
                    <td style="color: red;">[미결제]</td>
                </tr>
            </tbody>
        </table>
        
        <button type="button" id="btnTestSimulatePay" style="padding: 8px 12px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px;">
            🔄 [테스트] 다른 팀원 1명 결제 완료 시뮬레이션
        </button>
    </section>

    <hr>

    <hr>

    <!-- ================================
    ③ [실전] 결제 실행
    [대표결제 - 방장 전용]
    노출 조건: order.paymentMode == 'REPRESENTATIVE' AND myRole == 'LEADER'
    목적    : 전체 금액 일괄 결제 요청
    method  : POST
    action  : /orders/{orderIdx}/payment/complete
    전송 파라미터:
        - paymentMode   = REPRESENTATIVE
        - paymentMethod = CARD | TRANSFER | DEMO

    [각자결제 - 본인 미결제 시]
    노출 조건: order.paymentMode == 'INDIVIDUAL' AND myPaymentStatus != 'PAID'
    서버 제공 model 변수: myPaymentStatus(String), myPaymentAmount(int)
    목적    : 본인 금액만 결제 요청
    method  : POST
    action  : /orders/{orderIdx}/payment/complete
    전송 파라미터:
        - paymentMode   = INDIVIDUAL
        - paymentMethod = CARD | TRANSFER | DEMO

    성공 리다이렉트 (두 경우 모두): /orders/{orderIdx}/complete

    <section id="paymentAction">
        <div th:if="${order.paymentMode == 'REPRESENTATIVE' and myRole == 'LEADER'}">
            <form th:action="@{/orders/{oIdx}/payment/complete(oIdx=${order.orderIdx})}" method="post" id="formPayLeader">
                <input type="hidden" name="paymentMode" value="REPRESENTATIVE">
                <select name="paymentMethod">...</select>
                <button type="submit" id="btnPayLeader">전체 결제하기</button>
            </form>
        </div>
        <div th:if="${order.paymentMode == 'REPRESENTATIVE' and myRole != 'LEADER'}">
            <p>방장이 결제를 진행 중입니다.</p>
        </div>
        <div th:if="${order.paymentMode == 'INDIVIDUAL' and myPaymentStatus != 'PAID'}">
            <form th:action="@{/orders/{oIdx}/payment/complete(oIdx=${order.orderIdx})}" method="post" id="formPayIndividual">
                <input type="hidden" name="paymentMode" value="INDIVIDUAL">
                <select name="paymentMethod">...</select>
                <button type="submit" id="btnPayIndividual">내 금액 결제하기</button>
            </form>
        </div>
        <div th:if="${order.paymentMode == 'INDIVIDUAL' and myPaymentStatus == 'PAID'}">
            <p>결제 완료. 다른 참여자 대기 중.</p>
        </div>
    </section>
    ================================ -->


    <hr>

    <!-- ================================
    ④ [실전] 결제 취소
    목적    : 결제 취소 요청 → 주문 전체 취소 처리
    method  : GET (취소 확인 화면으로 이동)
    action  : /rooms/{roomIdx}/cancelled

    <form th:action="@{/rooms/{rIdx}/cancelled(rIdx=${groupOrder.roomIdx})}" method="get" id="formCancelPayment">
	    <button type="submit" 
	            onclick="return confirm('결제를 취소하시겠습니까? 주문방으로 돌아가며 모든 팀원의 결제 대기도 취소됩니다.');"
	            class="w-full py-3 bg-white text-red-500 border border-red-500 rounded-lg font-bold mt-2">
	        결제 취소하고 주문방으로 돌아가기
	    </button>
	</form>
    
     혹은
     
     <div th:if="${myRole == 'LEADER'}">
	    <form th:action="@{/rooms/code/{code}/revert(code=${roomCode})}" method="post">
	        <button type="submit" id="btnRevertToSelect" 
	        		onclick="return confirm('결제를 중단하고 메뉴를 다시 고르시겠습니까?');">
	            결제 중단 및 메뉴 다시 고르기
	        </button>
	    </form>
	</div>
		
    ================================ -->

    <!-- [더미] 결제 취소 -->
    <section id="cancelSection">
        <button type="button" id="btnTestCancel">
            결제 취소 (더미)
        </button>
        <!-- 실전: GET /rooms/{roomIdx}/cancelled -->
    </section>

    <hr>

    <!-- ================================ -->
    <!-- [테스트 이동 버튼]                -->
    <!-- ================================ -->
    <section id="testNav">
        <p><strong>[테스트] 화면 이동 확인용</strong></p>
        <button type="button" id="btnTestGoComplete">
            → 주문 완료 화면으로 이동 (결제 성공)(아직페이지없음)
        </button>
        <button type="button" id="btnTestGoCancelled">
            → 자동 취소 화면으로 이동 (타임아웃)(아직페이지없음)
        </button>
        <button type="button" id="btnTestGoDetail">
            ← 주문방 협업화면으로 돌아가기
        </button>
        <button type="button" id="btnTestGoPayRepr">
            ← 모아결제 화면(임시)으로 복귀
        </button>
        <button type="button" id="btnTestGoPayIndi">
            ← 각자결제 화면(임시)으로 복귀
        </button>
    </section>

</main>

실전: th:replace로 공통 푸터 삽입
<footer th:replace="~{fragments/footer :: footer}"></footer>
-->
<footer>
    <hr><p>[더미 푸터] Mo-Eats 테스트</p>
</footer>

<!--
실전: 아래 hidden input들은 Thymeleaf가 서버 값으로 채워서 JS에 전달
roomCode 추가: payment.js 가 읽어 GET /rooms/code/{roomCode}/sse 에 연결
               → SSEService.join(roomIdx) 호출 → 결제 현황 실시간 수신

SSE 연결 흐름:
    payment.js → EventSource('/rooms/code/' + roomCode + '/sse')
    → SSEService.join(roomIdx) 등록
    → 누군가 결제 완료 시 서버가 SSEService.send(roomIdx, "paymentUpdate") 브로드캐스트
    → payment.js의 addEventListener('paymentUpdate') 가 결제 현황 테이블 DOM 갱신
    → 전원 완료 시 SSEService.send(roomIdx, "paymentCompleted") → /orders/{orderIdx}/complete 이동
    → 타임아웃/취소 시 SSEService.send(roomIdx, "paymentCancelled") → 방으로 복귀

수신 이벤트 (이벤트명 오타 주의: "connnect" n 3개, 서버 SSEService 원본과 동일하게):
    "connect"         - 연결 확인
    "paymentUpdate"    - 결제 현황 변경
    "paymentCompleted" - 전원 결제 완료
    "paymentCancelled" - 타임아웃 또는 취소

<input type="hidden" id="orderIdx"         th:value="${order.orderIdx}">
<input type="hidden" id="paymentMode"      th:value="${order.paymentMode}">
<input type="hidden" id="paymentStartedAt" th:value="${order.paymentStartedAt}">
<input type="hidden" id="roomCode"         th:value="${order.roomCode}">
-->

<!-- [더미] JS에 값을 전달하는 hidden input -->
<input type="hidden" id="orderIdx"         value="1">
<input type="hidden" id="paymentMode"      value="INDIVIDUAL">
<input type="hidden" id="paymentStartedAt" value="">
<!-- paymentStartedAt 비워두면 test.js에서 Date.now()로 대체 -->

<script src="/js/jquery-3.7.1.min.js"></script>
<!--
실전용: <script th:src="@{/js/payment.js}"></script>
-->
<script src="/js/test/payment-wait.js"></script>

</body>
</html>
