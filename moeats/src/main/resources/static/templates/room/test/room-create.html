<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layouts/main_layout}">

<div layout:fragment="content">

    <h2>주문방 생성</h2>
    <p>가게를 선택하고 주문방 설정을 완료하세요.</p>

    <!--
    ================================
    [실전 폼] 아래 form 전체는 백엔드 연동 완료 후 주석 해제
    목적     : 주문방 생성 요청
    method   : POST
    action   : /room/detailForm
    전송 파라미터:
        - storeIdx          (hidden)  : 가게 식별자. 가게 상세 페이지에서 넘어올 때 자동 세팅
        - deliveryAddressIdx(select)  : 선택한 배송지 식별자
        - paymentMode       (radio)   : REPRESENTATIVE(대표결제) | INDIVIDUAL(각자결제)
        - maxParticipants   (number)  : 최대 참여 인원 (선택값, 미입력 시 제한 없음)
    세션 의존 : session.loginMember.memberIdx → 방장 식별자로 서버에서 직접 사용
    성공 리다이렉트 : /room/detailForm (room-detail.html)
    ================================

    <form th:action="@{/room/detailForm}" method="post" id="roomCreateForm">

        목적: 가게 상세에서 넘어온 storeIdx를 서버로 전달
        <input type="hidden" th:name="storeIdx" th:value="${store?.storeIdx}" id="storeIdx">

        <section>
            <h3>선택된 가게</h3>
            목적: 서버 model의 store 객체에서 가게명 표시
            <p>가게명: <strong th:text="${store?.storeName}">테스트 가게</strong></p>

            목적: 서버 model의 store 객체에서 최소주문금액 표시
            <p>최소 주문 금액:
                <span th:text="${#numbers.formatInteger(store?.minimumOrderAmount ?: 0, 1, 'COMMA')}">0</span>원
            </p>

            목적: store가 null일 때(테스트 환경)만 표시되는 직접 입력 필드
            <div th:if="${store == null}">
                <label for="storeIdxInput">가게 번호 직접 입력 (테스트용)</label>
                <input type="number" id="storeIdxInput" name="storeIdxDirect" placeholder="가게 IDX">
            </div>
        </section>

        <section>
            <h3>배송지 선택</h3>
            목적: 컨트롤러가 model에 addressList로 넘겨준 배송지 목록을 반복 출력
            요청 파라미터: deliveryAddressIdx → 선택된 배송지 식별자
            <select name="deliveryAddressIdx" id="deliveryAddressIdx" required>
                <option value="">-- 배송지를 선택하세요 --</option>
                <option th:each="addr : ${addressList}"
                        th:value="${addr.deliveryAddressIdx}"
                        th:text="${addr.addressLabel}">배송지 예시</option>
            </select>
            <br>
            목적: 배송지가 없을 때 새 배송지 추가 페이지로 이동. session의 memberIdx를 path에 포함
            <a th:href="@{/members/{idx}/addresses/new(idx=${session.loginMember?.memberIdx})}">
                + 새 배송지 추가
            </a>
        </section>

        <section>
            <h3>결제 방식</h3>
            요청 파라미터: paymentMode = REPRESENTATIVE | INDIVIDUAL
            <label>
                <input type="radio" name="paymentMode" value="REPRESENTATIVE" id="payRepresentative" checked required>
                대표결제 (방장이 전체 금액을 일괄 결제합니다)
            </label>
            <br>
            <label>
                <input type="radio" name="paymentMode" value="INDIVIDUAL" id="payIndividual">
                각자결제 (참여자 각자가 본인의 금액을 결제합니다 / 결제 제한시간 5분)
            </label>
        </section>

        <section>
            <h3>인원 설정 (선택)</h3>
            요청 파라미터: maxParticipants = 2~20 정수 (선택)
            <label for="maxParticipants">최대 참여 인원</label>
            <input type="number" id="maxParticipants" name="maxParticipants" min="2" max="20" placeholder="제한 없음">
        </section>

        <section>
            실전 제출 버튼 → POST /room/detailForm
            <button type="submit" id="btnCreateRoom">주문방 생성하기</button>
            <button type="button" id="btnCancelCreate" onclick="history.back()">취소</button>
        </section>

    </form>
    -->

    <!-- ================================ -->
    <!-- [더미 데이터] 실전 form 대체 표시  -->
    <!-- ================================ -->

    <section>
        <h3>선택된 가게 (더미)</h3>
        <p>가게명: <strong>테스트 가게</strong></p>
        <p>최소 주문 금액: 12,000원</p>
    </section>

    <section>
        <h3>배송지 선택 (더미)</h3>
        <!--
        실전: th:each로 addressList 반복 출력
        서버 요청 파라미터: deliveryAddressIdx
        -->
        <select id="deliveryAddressIdx_dummy">
            <option value="">-- 배송지를 선택하세요 --</option>
            <option value="1" selected>집 - 서울시 강남구 테헤란로 1</option>
            <option value="2">회사 - 서울시 중구 을지로 2</option>
        </select>
        <br>
        <a href="#">+ 새 배송지 추가 (더미 링크: 개인정보폼)</a>
    </section>

    <section>
        <h3>결제 방식 (더미)</h3>
        <!--
        실전: name="paymentMode" value="REPRESENTATIVE|INDIVIDUAL"
        서버 요청 파라미터: paymentMode
        -->
        <label>
            <input type="radio" name="paymentMode_dummy" value="REPRESENTATIVE" id="payRepresentative_dummy" checked>
            대표결제 (방장이 전체 금액을 일괄 결제합니다)
        </label>
        <br>
        <label>
            <input type="radio" name="paymentMode_dummy" value="INDIVIDUAL" id="payIndividual_dummy">
            각자결제 (참여자 각자가 본인의 금액을 결제합니다 / 결제 제한시간 5분)
        </label>
    </section>

    <section>
        <h3>인원 설정 (선택, 더미)</h3>
        <!--
        실전: name="maxParticipants"
        서버 요청 파라미터: maxParticipants (선택값)
        -->
        <label for="maxParticipants_dummy">최대 참여 인원</label>
        <input type="number" id="maxParticipants_dummy" min="2" max="20" placeholder="제한 없음" value="4">
    </section>

    <hr>

    <!-- ================================ -->
    <!-- [테스트 이동 버튼]                
    	 생성완료화면 별도 생성할 필요성?2티어?    
    	 그냥 만들어도 될것같기도. 간단한데? 
    	 css만 추출할까?					  -->
    <!-- ================================ -->
    <section id="testNav">
        <p><strong>[테스트] 화면 이동 확인용</strong></p>
        <!--
        실전: POST /room/detailForm 후 서버가 redirect → room-detail
        아래 버튼은 서버 없이 직접 이동 (더미 roomIdx = 1 사용)
        -->
        <button type="button" id="btnTestGoDetail">
            → 주문방 협업화면으로 이동 (방장 직행 시나리오)
        </button>
        
        <button type="button" id="btnTestGoCfinish">
            → 주문방 생성완료화면(디자인테스트)으로 이동
        </button>
        
        <button type="button" id="btnTestGoJoin">
            → 주문방 참여화면으로 이동
        </button>
    </section>

    <script src="/js/jquery-3.7.1.min.js"></script>
    <!--
    실전용: <script src="/js/room-create.js"></script>
    -->
    <script src="/js/test/room-create.test.js"></script>

</div>

</html>
