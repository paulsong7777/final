<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layouts/main_layout}">

<div layout:fragment="content">

    <h2>주문방 생성</h2>
    <p>가게를 선택하고 주문방 설정을 완료하세요.</p>

    <!--
    ================================
    [실전] 백엔드 연동 완료 후 아래 더미 섹션들을 제거하고 이 주석 블록을 활성화
    목적      : 주문방 생성 요청
    전송 방식 : form submit 불가 (Controller가 @RequestBody로 JSON만 수신)
                → room-create.js 의 AJAX POST 가 대신 처리
    전송 URL  : POST /rooms
    전송 형식 : Content-Type: application/json
    전송 데이터:
        - storeIdx           (int)     : 가게 식별자. 가게 상세에서 hidden으로 넘어옴
        - deliveryAddressIdx (int)     : 선택한 배송지 식별자
        - paymentMode        (String)  : REPRESENTATIVE | INDIVIDUAL
        - maxParticipants    (Integer) : 최대 인원 (선택값, null 가능)
    세션 의존  : session의 member → leaderMemberIdx로 서버에서 직접 설정
    성공 후    : Controller가 redirect:/rooms/code/{roomCode} 응답
                JS가 Location 헤더를 읽어 해당 URL로 이동

    <section>
        <h3>선택된 가게</h3>
        목적: 가게 상세에서 넘어온 storeIdx를 JS가 읽어 AJAX 전송에 포함
        <input type="hidden" th:name="storeIdx" th:value="${store?.storeIdx}" id="storeIdx">
        <p>가게명: <strong th:text="${store?.storeName}">테스트 가게</strong></p>
        <p>최소 주문 금액:
            <span th:text="${#numbers.formatInteger(store?.minimumOrderAmount ?: 0, 1, 'COMMA')}">0</span>원
        </p>
        <div th:if="${store == null}">
            <label for="storeIdxInput">가게 번호 직접 입력 (테스트용)</label>
            <input type="number" id="storeIdxInput" name="storeIdxDirect" placeholder="가게 IDX">
        </div>
    </section>

    <section>
        <h3>배송지 선택</h3>
        목적: model의 addressList를 반복 출력. JS가 선택값을 읽어 AJAX 전송에 포함
        <select name="deliveryAddressIdx" id="deliveryAddressIdx" required>
            <option value="">-- 배송지를 선택하세요 --</option>
            <option th:each="addr : ${addressList}"
                    th:value="${addr.deliveryAddressIdx}"
                    th:text="${addr.addressLabel}">배송지 예시</option>
        </select>
        <br>
        <a th:href="@{/members/{idx}/addresses/new(idx=${session.loginMember?.memberIdx})}">
            + 새 배송지 추가
        </a>
    </section>

    <section>
        <h3>결제 방식</h3>
        목적: JS가 체크된 radio 값을 읽어 AJAX 전송에 포함
        <label>
            <input type="radio" name="paymentMode" value="REPRESENTATIVE" id="payRepresentative" checked required>
            대표결제 (방장이 전체 금액을 일괄 결제합니다)
        </label>
        <br>
        <label>
            <input type="radio" name="paymentMode" value="INDIVIDUAL" id="payIndividual">
            각자결제 (참여자 각자가 본인의 금액을 결제합니다 / 결제 제한시간 5분)
        </label>
    </section>

    <section>
        <h3>인원 설정 (선택)</h3>
        <label for="maxParticipants">최대 참여 인원</label>
        <input type="number" id="maxParticipants" name="maxParticipants" min="2" max="20" placeholder="제한 없음">
    </section>

    <section>
        실전 제출 버튼 → room-create.js 의 AJAX POST /rooms 호출
        <button type="button" id="btnCreateRoom">주문방 생성하기</button>
        <button type="button" id="btnCancelCreate">취소</button>
    </section>
    ================================ -->

    <!-- ================================ -->
    <!-- [더미 데이터] 실전 연동 전 표시용  -->
    <!-- ================================ -->

    <!-- 실전 전환 시 이 hidden input을 실전 섹션으로 이동 -->
    <input type="hidden" id="storeIdx" value="1">

    <section>
        <h3>선택된 가게 (더미)</h3>
        <p>가게명: <strong>테스트 가게</strong></p>
        <p>최소 주문 금액: 12,000원</p>
        <div>
            <label for="storeIdxInput">가게 번호 직접 입력 (테스트용)</label>
            <input type="number" id="storeIdxInput" placeholder="가게 IDX" value="1">
        </div>
    </section>

    <section>
        <h3>배송지 선택 (더미)</h3>
        <!--
        실전: th:each로 addressList 반복 출력, id="deliveryAddressIdx"
        -->
        <select id="deliveryAddressIdx">
            <option value="">-- 배송지를 선택하세요 --</option>
            <option value="1" selected>집 - 서울시 강남구 테헤란로 1</option>
            <option value="2">회사 - 서울시 중구 을지로 2</option>
        </select>
        <br>
        <a href="#">+ 새 배송지 추가 (더미 링크)</a>
    </section>

    <section>
        <h3>결제 방식 (더미)</h3>
        <label>
            <input type="radio" name="paymentMode" value="REPRESENTATIVE" id="payRepresentative" checked>
            대표결제 (방장이 전체 금액을 일괄 결제합니다)
        </label>
        <br>
        <label>
            <input type="radio" name="paymentMode" value="INDIVIDUAL" id="payIndividual">
            각자결제 (참여자 각자가 본인의 금액을 결제합니다 / 결제 제한시간 5분)
        </label>
    </section>

    <section>
        <h3>인원 설정 (선택, 더미)</h3>
        <label for="maxParticipants">최대 참여 인원</label>
        <input type="number" id="maxParticipants" min="2" max="20" placeholder="제한 없음" value="4">
    </section>

    <section>
        <!--
        실전: room-create.js의 #btnCreateRoom 클릭 → AJAX POST /rooms
        -->
        <button type="button" id="btnCreateRoom">주문방 생성하기</button>
        <button type="button" id="btnCancelCreate" onclick="history.back()">취소</button>
    </section>

    <hr>

    <!-- ================================ -->
    <!-- [테스트 이동 버튼]                -->
    <!-- ================================ -->
    <section id="testNav">
        <p><strong>[테스트] 화면 이동 확인용</strong></p>
        <button type="button" id="btnTestGoDetail">
            → 주문방 협업화면으로 이동 (방장 직행 시나리오)
        </button>
        <button type="button" id="btnTestGoCfinish">
            → 주문방 생성완료화면(디자인테스트)으로 이동
        </button>
        <button type="button" id="btnTestGoJoin">
            → 주문방 참여화면으로 이동
        </button>
    </section>

    <script src="/js/jquery-3.7.1.min.js"></script>
    <!--
    실전: <script src="/js/room-create.js"></script>
    -->    
    <script src="/js/test/room-create.test.js"></script>

</div>

</html>
