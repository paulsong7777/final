<!--
실전: 아래 hidden input들은 Thymeleaf가 서버 값으로 채워서 JS에 전달
roomCode 추가: payment.js 가 읽어 GET /rooms/code/{roomCode}/sse 에 연결
               → SSEService.join(roomIdx) 호출 → 결제 현황 실시간 수신

SSE 연결 흐름:
    payment.js → EventSource('/rooms/code/' + roomCode + '/sse')
    → SSEService.join(roomIdx) 등록
    → 누군가 결제 완료 시 서버가 SSEService.send(roomIdx, "paymentUpdate") 브로드캐스트
    → payment.js의 addEventListener('paymentUpdate') 가 결제 현황 테이블 DOM 갱신
    → 전원 완료 시 SSEService.send(roomIdx, "paymentCompleted") → /orders/{orderIdx}/complete 이동
    → 타임아웃/취소 시 SSEService.send(roomIdx, "paymentCancelled") → 방으로 복귀

수신 이벤트 (이벤트명 오타 주의: "connnect" n 3개, 서버 SSEService 원본과 동일하게):
    "connect"         - 연결 확인
    "paymentUpdate"    - 결제 현황 변경
    "paymentCompleted" - 전원 결제 완료
    "paymentCancelled" - 타임아웃 또는 취소

<input type="hidden" id="orderIdx"         th:value="${order.orderIdx}">
<input type="hidden" id="paymentMode"      th:value="${order.paymentMode}">
<input type="hidden" id="paymentStartedAt" th:value="${order.paymentStartedAt}">
<input type="hidden" id="roomCode"         th:value="${order.roomCode}">
-->
