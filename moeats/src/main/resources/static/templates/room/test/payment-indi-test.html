<!-- ================================
    ② [실전] 결제 현황 (각자결제 전용)
    노출 조건: order.paymentMode == 'INDIVIDUAL'
    서버 제공 model 변수:
        - paymentShares (List)
            - share.memberName : 참여자 이름
            - share.amount     : 해당 참여자 결제 금액
            - share.status     : PAID | PENDING
        - paidCount  : 결제 완료 인원 수
        - totalCount : 전체 참여 인원 수

    타이머:
        - id="countdown" 엘리먼트에 JS로 카운트다운 표시
        - order.paymentStartedAt 기준으로 남은 5분 계산

    <section id="paymentStatus" th:if="${order.paymentMode == 'INDIVIDUAL'}">
        <div id="timerSection">
            <p>남은 시간: <strong id="countdown">05:00</strong></p>
        </div>
        <table border="1">
            <tr th:each="share : ${paymentShares}">
                <td th:text="${share.memberName}">홍길동</td>
                <td th:text="${#numbers.formatInteger(share.amount, 1, 'COMMA')} + '원'">0원</td>
                <td>
                    <span th:if="${share.status == 'PAID'}">[완료]</span>
                    <span th:unless="${share.status == 'PAID'}">[미결제]</span>
                </td>
            </tr>
        </table>
        <p>완료: <span th:text="${paidCount ?: 0}">0</span>명 / 전체: <span th:text="${totalCount ?: 0}">0</span>명</p>
    </section>
    ================================ -->

<html> <!-- 임시용 -->

<!-- <div layout:fragment="content"> -->
<div class="content">
    <h2>각자 결제 (개인 결제)</h2>
    
    <div id="timerContainer" style="background: #fff3f3; padding: 10px; border-radius: 8px; margin-bottom: 20px;">
        <p style="margin: 0; color: #e74c3c; font-weight: bold;">
            ⏱️ 결제 제한 시간: <span id="countdown">05:00</span>
        </p>
    </div>

    <section id="dummyIndividualSection">
        <div style="border: 1px solid #ccc; padding: 15px; margin-bottom: 20px;">
            <h3 style="margin-top: 0;">내 주문 목록 (더미)</h3>
            <ul id="dummyCartList">
                <li>후라이드 치킨 x 1 (18,000원)</li>
                <li>콜라 1.25L x 1 (3,000원)</li>
            </ul>
            <p style="text-align: right; border-top: 1px solid #eee; padding-top: 10px;">
                내 결제 예정 금액: <strong style="color: #964900; font-size: 1.2em;">21,000원</strong>
            </p>
        </div>

<!-- ================================
    ③ [실전] 결제 실행

    [각자결제 - 본인 미결제 시]
    노출 조건: order.paymentMode == 'INDIVIDUAL' AND myPaymentStatus != 'PAID'
    서버 제공 model 변수: myPaymentStatus(String), myPaymentAmount(int)
    목적    : 본인 금액만 결제 요청
    method  : POST
    action  : /orders/{orderIdx}/payment/complete
    전송 파라미터:
        - paymentMode   = INDIVIDUAL
        - paymentMethod = CARD | TRANSFER | DEMO

    성공 리다이렉트 (두 경우 모두): /orders/{orderIdx}/complete

    <section id="paymentAction">
        <div th:if="${order.paymentMode == 'REPRESENTATIVE' and myRole == 'LEADER'}">
            <form th:action="@{/orders/{oIdx}/payment/complete(oIdx=${order.orderIdx})}" method="post" id="formPayLeader">
                <input type="hidden" name="paymentMode" value="REPRESENTATIVE">
                <select name="paymentMethod">...</select>
                <button type="submit" id="btnPayLeader">전체 결제하기</button>
            </form>
        </div>
        <div th:if="${order.paymentMode == 'REPRESENTATIVE' and myRole != 'LEADER'}">
            <p>방장이 결제를 진행 중입니다.</p>
        </div>
        <div th:if="${order.paymentMode == 'INDIVIDUAL' and myPaymentStatus != 'PAID'}">
            <form th:action="@{/orders/{oIdx}/payment/complete(oIdx=${order.orderIdx})}" method="post" id="formPayIndividual">
                <input type="hidden" name="paymentMode" value="INDIVIDUAL">
                <select name="paymentMethod">...</select>
                <button type="submit" id="btnPayIndividual">내 금액 결제하기</button>
            </form>
        </div>
        <div th:if="${order.paymentMode == 'INDIVIDUAL' and myPaymentStatus == 'PAID'}">
            <p>결제 완료. 다른 참여자 대기 중.</p>
        </div>
    </section>
    ================================ -->

        <h3>결제 수단 선택</h3>
        <div style="margin-bottom: 20px;">
            <label><input type="radio" name="dummyMethod" value="CARD" checked> 신용/체크카드</label><br>
            <label><input type="radio" name="dummyMethod" value="KAKAOPAY"> 카카오페이</label>
        </div>

        <button type="button" id="btnTestSubmitIndividual" style="width: 100%; padding: 15px; background: #964900; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
            21,000원 결제하기 (테스트)
        </button>
    </section>
    
    <hr>

    <!-- ================================
    ④ [실전] 결제 취소
    목적    : 결제 취소 요청 → 주문 전체 취소 처리
    method  : GET (취소 확인 화면으로 이동)
    action  : /rooms/{roomIdx}/cancelled
    
    각자결제는 메뉴 다 안 고르면 못 넘어가고 어차피 돌아가는 기능은 안 만들거지만 혹시나 해서 여기다가 적어놓음 

    <section id="cancelSection">
        <form th:action="@{/rooms/{rIdx}/cancelled(rIdx=${order.roomIdx})}" method="get">
            <button type="submit" onclick="return confirm('결제를 취소하시겠습니까?')">결제 취소</button>
        </form>
    </section>
    
    혹은 아래와 같이 메뉴다시고르기에 결제완료시 복귀불가 방어요소를 넣는다
    
    <button type="submit" 
        th:disabled="${!#lists.isEmpty(paidMembers)}"
        th:classappend="${!#lists.isEmpty(paidMembers)} ? 'opacity-50 cursor-not-allowed' : ''">
	    메뉴 다시 고르기
	</button>
	<p th:if="${!#lists.isEmpty(paidMembers)}" class="text-xs text-gray-500">
	    이미 결제를 완료한 인원이 있어 메뉴를 수정할 수 없습니다.
	</p>
    ================================ -->

    <!-- [더미] 결제 취소 -->
    <section id="cancelSection">
        <button type="button" id="btnTestCancel">
            결제 취소 (더미)

        <!-- 실전: GET /rooms/{roomIdx}/cancelled -->
    </section>

    <hr>

    <section id="testNav">
        <p><strong>[테스트] 화면 이동 확인용</strong></p>
        <button type="button" id="btnTestGoComp">
            → 결제 완료창 이동
        </button>
        <button type="button" id="btnTestGoBack">
            ← 주문방 상세로 돌아가기

<footer>

<input type="hidden" id="paymentStartedAt" value="">
<!-- paymentStartedAt 비워두면 test.js에서 Date.now()로 대체 -->

<!--
실전: 아래 hidden input들은 Thymeleaf가 서버 값으로 채워서 JS에 전달
roomCode 추가: payment.js 가 읽어 GET /rooms/code/{roomCode}/sse 에 연결
               → SSEService.join(roomIdx) 호출 → 결제 현황 실시간 수신

SSE 연결 흐름:
    payment.js → EventSource('/rooms/code/' + roomCode + '/sse')
    → SSEService.join(roomIdx) 등록
    → 누군가 결제 완료 시 서버가 SSEService.send(roomIdx, "paymentUpdate") 브로드캐스트
    → payment.js의 addEventListener('paymentUpdate') 가 결제 현황 테이블 DOM 갱신
    → 전원 완료 시 SSEService.send(roomIdx, "paymentCompleted") → /orders/{orderIdx}/complete 이동
    → 타임아웃/취소 시 SSEService.send(roomIdx, "paymentCancelled") → 방으로 복귀

수신 이벤트 (이벤트명 오타 주의: "connnect" n 3개, 서버 SSEService 원본과 동일하게):
    "connect"         - 연결 확인
    "paymentUpdate"    - 결제 현황 변경
    "paymentCompleted" - 전원 결제 완료
    "paymentCancelled" - 타임아웃 또는 취소

<input type="hidden" id="orderIdx"         th:value="${order.orderIdx}">
<input type="hidden" id="paymentMode"      th:value="${order.paymentMode}">
<input type="hidden" id="paymentStartedAt" th:value="${order.paymentStartedAt}">
<input type="hidden" id="roomCode"         th:value="${order.roomCode}">
-->
