<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 승인 완료</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; color: #1f2937; margin: 0; }
        .wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 60px; }
        .card { background: #ffffff; border-radius: 18px; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); padding: 28px; }
        h1 { margin: 0 0 14px; color: #252D59; }
        .done { color: #0f766e; font-weight: 700; margin-bottom: 18px; }
        .row { padding: 12px 0; border-bottom: 1px solid #e5e7eb; }
        .label { font-weight: 700; color: #334155; display: inline-block; width: 160px; }
        a { display: inline-block; margin-top: 24px; color: #FF8000; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>결제가 정상 승인되었습니다.</h1>
        <p class="done">샌드박스 승인까지 완료된 상태입니다. 내부 상태 동기화 로직도 함께 수행됩니다.</p>

        <div class="row"><span class="label">paymentKey</span><span th:text="${paymentKey}">-</span></div>
        <div class="row"><span class="label">orderId</span><span th:text="${orderId}">-</span></div>
        <div class="row"><span class="label">결제수단</span><span th:text="${method}">-</span></div>
        <div class="row"><span class="label">거래상태</span><span th:text="${status}">-</span></div>
        <div class="row"><span class="label">승인금액</span><span th:text="${amount}">-</span></div>

        <a th:href="@{/sandbox/toss}">테스트 페이지로 돌아가기</a>
    </div>
</div>
</body>
</html>
