<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/owner-layout}">
<head><title>새 카테고리 등록 - MoEats</title></head>
<body>
<main layout:fragment="content" class="py-4">
    <div class="mb-4 pb-3 border-bottom border-2">
        <h3 class="fw-bold mb-1 text-navy">
            <i class="bi bi-plus-circle me-2 text-orange"></i>메뉴 카테고리 신규 등록
        </h3>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <div class="mb-4">
                <label for="categoryName" class="form-label small fw-bold text-secondary">카테고리 명칭</label>
                <input type="text" id="categoryName" class="form-control form-control-lg border-2 shadow-none" 
                       placeholder="예: 메인메뉴, 사이드, 음료" maxlength="20">
            </div>
            
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-orange btn-lg w-100 fw-bold" onclick="submitCategory()">
                    <i class="bi bi-check-lg me-2"></i>등록 완료
                </button>
                <a th:href="@{/owners/store-menu-category}" class="btn btn-light btn-lg w-100 fw-bold">취소</a>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/
    async function submitCategory() {
        const nameInput = document.getElementById('categoryName');
        const categoryName = nameInput.value.trim();
        
        if (!categoryName) {
            alert("카테고리 명칭을 입력해주세요.");
            nameInput.focus();
            return;
        }

        // [핵심] 백엔드가 POST로 받을 수 있게 파라미터 구성
        const params = new URLSearchParams();
        params.append('categoryName', categoryName);

        try {
            const response = await fetch('/owners/store-menu-category/write', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]')?.content 
                },
                body: params
            });

            if (response.ok) {
                alert("성공적으로 등록되었습니다.");
                location.href = "/owners/store-menu-category";
            } else {
                const status = response.status;
                if (status === 405) {
                    alert("에러 405: 백엔드에서 POST를 허용하지 않습니다. 컨트롤러 확인이 필요합니다.");
                } else {
                    alert("에러 발생: " + status);
                }
            }
        } catch (error) {
            console.error('Network Error:', error);
            alert("서버 연결에 실패했습니다. (콘솔 확인)");
        }
    }
/*]]>*/
</script>
</th:block>
</body>
</html>
