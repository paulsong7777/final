<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layout/default}">
<head>
    <meta charset="UTF-8">
    <title>새 카테고리 등록 - Mo-Eats</title>
</head>
<body>
<section layout:fragment="pageContent">
    <div class="mo-page-container container" style="max-width: 540px; margin: 0 auto; padding-top: 40px;">
        
        <div class="mo-section" style="text-align: center; margin-bottom: 32px;">
            <span class="mo-section-label">CATEGORY</span>
            <h2 class="mo-section-title">새 카테고리 등록</h2>
            <p class="mo-store-card__desc mt-2">메뉴를 깔끔하게 분류할 새로운 카테고리를 추가합니다.</p>
        </div>

        <div class="mo-surface-card" style="padding: 40px 32px;">
            
            <div class="mb-5">
                <label for="categoryName" class="mo-form-label">
                    카테고리 명칭 <span style="color: var(--mo-primary);">*</span>
                </label>
                <input type="text" 
                       id="categoryName" 
                       class="form-control mo-form-control fw-bold" 
                       placeholder="예: 메인메뉴, 사이드, 음료" 
                       maxlength="20"
                       autocomplete="off">
                <p class="mo-helper-text mt-2"><i class="bi bi-info-circle me-1"></i>최대 20자까지 입력 가능합니다.</p>
            </div>
            
            <div class="d-flex gap-3 mt-4 pt-2" style="border-top: 1px solid var(--mo-line);">
                <a th:href="@{/owners/store-menu-category}" class="mo-btn mo-btn-outline w-100 text-center" style="min-height: 52px; font-size: 15px;">
                    취소
                </a>
                <button type="button" class="mo-btn mo-btn-primary w-100" style="min-height: 52px; font-size: 15px;" onclick="submitCategory()">
                    <i class="bi bi-check-lg me-1"></i> 등록 완료
                </button>
            </div>

        </div>
    </div>
</section>

<th:block layout:fragment="pageScripts">
<script th:inline="javascript">
/*<![CDATA[*/
    async function submitCategory() {
        const nameInput = document.getElementById('categoryName');
        const categoryName = nameInput.value.trim();
        
        if (!categoryName) {
            alert("카테고리 명칭을 입력해주세요.");
            nameInput.focus();
            return;
        }

        // 1. [보안 강화] 레이아웃에 선언된 meta 태그에서 토큰 추출
        const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
        const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');

        // 2. 데이터 구성 (객체가 아닌 URLSearchParams 표준 방식 사용)
        const params = new URLSearchParams();
        params.append('categoryName', categoryName);

        // 3. [경로 고정] 백엔드 StoreMenuCategoryController의 주소와 100% 일치
        const postUrl = /*[[@{/owners/store-menu-category/write}]]*/ '/owners/store-menu-category/write';
        const listUrl = /*[[@{/owners/store-menu-category}]]*/ '/owners/store-menu-category';

        try {
            // 헤더 객체 생성 (보안 토큰이 있을 경우에만 추가되도록 안전하게 처리)
            const fetchHeaders = {
                'Content-Type': 'application/x-www-form-urlencoded'
            };
            if (header && token) {
                fetchHeaders[header] = token;
            }

            // 4. fetch 요청 (네트워크 에러 방지용 설정 포함)
            const response = await fetch(postUrl, {
                method: 'POST',
                headers: fetchHeaders,
                body: params
            });

            // 5. 서버 응답 처리
            if (response.ok) {
                // 성공 시 서버에서 응답을 성공적으로 받았으므로 리다이렉트
                alert("성공적으로 등록되었습니다.");
                location.href = listUrl;
            } else {
                // 403(보안거부), 404(주소오류), 500(서버내부오류) 처리
                alert("등록 실패 (오류 코드: " + response.status + ")");
            }
        } catch (error) {
            // 통신 자체가 차단되었을 때 (CORS나 잘못된 포트 등)
            console.error('연결 실패 상세:', error);
            alert("서버 연결에 실패했습니다. 페이지를 새로고침(F5) 후 다시 시도해 주세요.");
        }
    }
/*]]>*/
</script>
</th:block>
</body>
</html>
