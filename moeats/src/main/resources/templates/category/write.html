<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/owner-layout}">
<head>
    <meta charset="UTF-8">
    <title>새 카테고리 등록 - MoEats</title>
</head>
<body>
<main layout:fragment="content" class="py-4">
    <div class="mb-4 pb-3 border-bottom border-2">
        <h3 class="fw-bold mb-1 text-navy">
            <i class="bi bi-plus-circle me-2 text-orange"></i>메뉴 카테고리 신규 등록
        </h3>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <div class="mb-4">
                <label for="categoryName" class="form-label small fw-bold text-secondary">카테고리 명칭</label>
                <input type="text" id="categoryName" class="form-control form-control-lg border-2 shadow-none" 
                       placeholder="예: 메인메뉴, 사이드, 음료" maxlength="20">
            </div>
            
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-warning text-white btn-lg w-100 fw-bold" onclick="submitCategory()">
                    <i class="bi bi-check-lg me-2"></i>등록 완료
                </button>
                <a th:href="@{/owners/store-menu-category}" class="btn btn-light btn-lg w-100 fw-bold">취소</a>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/
    async function submitCategory() {
        const nameInput = document.getElementById('categoryName');
        const categoryName = nameInput.value.trim();
        
        if (!categoryName) {
            alert("카테고리 명칭을 입력해주세요.");
            nameInput.focus();
            return;
        }

        // 1. [보안 강화] 레이아웃에 선언된 meta 태그에서 토큰 추출
        const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
        const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');

        // 2. 데이터 구성 (객체가 아닌 URLSearchParams 표준 방식 사용)
        const params = new URLSearchParams();
        params.append('categoryName', categoryName);

        // 3. [경로 고정] 백엔드 StoreMenuCategoryController의 주소와 100% 일치
        const postUrl = /*[[@{/owners/store-menu-category/write}]]*/ '/owners/store-menu-category/write';
        const listUrl = /*[[@{/owners/store-menu-category}]]*/ '/owners/store-menu-category';

        try {
            // 4. fetch 요청 (네트워크 에러 방지용 설정 포함)
            const response = await fetch(postUrl, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [header]: token // 보안 토큰 헤더 주입
                },
                body: params
            });

            // 5. 서버 응답 처리
            if (response.ok) {
                // 성공 시 서버에서 응답을 성공적으로 받았으므로 리다이렉트
                alert("성공적으로 등록되었습니다.");
                location.href = listUrl;
            } else {
                // 403(보안거부), 404(주소오류), 500(서버내부오류) 처리
                alert("등록 실패 (오류 코드: " + response.status + ")");
            }
        } catch (error) {
            // 통신 자체가 차단되었을 때 (CORS나 잘못된 포트 등)
            console.error('연결 실패 상세:', error);
            alert("서버 연결에 실패했습니다. 페이지를 새로고침(F5) 후 다시 시도해 주세요.");
        }
    }
/*]]>*/
</script>
</th:block>
</body>
</html>
