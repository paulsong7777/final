<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/owner-layout}">
<head><title>카테고리 수정 - MoEats</title></head>
<body>
<main layout:fragment="content" class="py-4">
    <div class="mb-4 pb-3 border-bottom border-2">
        <h3 class="fw-bold mb-1 text-navy">
            <i class="bi bi-pencil-square me-2 text-orange"></i>카테고리 명칭 수정
        </h3>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <input type="hidden" id="categoryIdx" th:value="${category['categoryIdx']}">
            
            <div class="mb-4">
                <label for="categoryName" class="form-label small fw-bold text-secondary">카테고리 명칭</label>
                <input type="text" id="categoryName" class="form-control form-control-lg border-2 shadow-none" 
                       th:value="${category['categoryName']}" placeholder="수정할 명칭을 입력하세요">
            </div>

            <div class="d-flex gap-2">
                <button type="button" class="btn btn-orange btn-lg w-100 fw-bold" onclick="updateCategory()">수정 완료</button>
                <button type="button" class="btn btn-light btn-lg w-100 fw-bold" onclick="history.back()">취소</button>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
<script th:inline="javascript">
    async function updateCategory() {
        const idx = document.getElementById('categoryIdx').value;
        const name = document.getElementById('categoryName').value.trim();
        
        if (!name) return alert("수정할 이름을 입력해주세요.");

        try {
            const response = await fetch('/owners/store-menu-category/edit_proc', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]')?.content 
                },
                body: new URLSearchParams({ 
                    categoryIdx: idx,
                    categoryName: name 
                })
            });

            if (response.ok) {
                alert("수정되었습니다.");
                // 수정 완료 후 다시 상세 페이지로 이동
                location.href = "/owners/store-menu-category/detail?categoryIdx=" + idx;
            } else {
                alert("수정 실패!");
            }
        } catch (e) { console.error(e); }
    }
</script>
</th:block>
</body>
</html>
