<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE | Mo-Eats">Mo-Eats</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/moeats-layout.css}">
    <th:block layout:fragment="pageStyles"></th:block>
    
  <style>
	    .mo-floating-order-status {
	        position: relative;
	        z-index: 1030;
	    }
	
	    .mo-floating-order-status__inner {
	        display: block;
	    }
	
	    .mo-order-status-fab {
	        position: fixed;
	        left: 20px;
	        top: 94px;
	        z-index: 1030;
	        display: flex;
	        align-items: center;
	        gap: 12px;
	        min-width: 240px;
	        min-height: 60px;
	        padding: 12px 16px 12px 14px;
	        border-radius: 18px;
	        background: rgba(255, 255, 255, 0.96);
	        border: 1px solid rgba(42, 54, 89, 0.08);
	        color: var(--mo-navy-strong, #252D59);
	        text-decoration: none;
	        box-shadow:
	            0 18px 36px rgba(37, 45, 89, 0.10),
	            0 6px 14px rgba(255, 128, 0, 0.08);
	        backdrop-filter: blur(12px);
	        transition:
	            transform 0.15s ease,
	            box-shadow 0.15s ease,
	            border-color 0.15s ease;
	    }
	
	    .mo-order-status-fab:hover {
	        color: var(--mo-navy-strong, #252D59);
	        transform: translateY(-2px);
	        border-color: rgba(255, 128, 0, 0.22);
	        box-shadow:
	            0 22px 44px rgba(37, 45, 89, 0.14),
	            0 8px 18px rgba(255, 128, 0, 0.12);
	    }
	
	    .mo-order-status-fab__icon {
	        width: 36px;
	        height: 36px;
	        border-radius: 12px;
	        display: inline-flex;
	        align-items: center;
	        justify-content: center;
	        flex-shrink: 0;
	        background: linear-gradient(135deg, var(--mo-primary, #FF8000), #F85E28);
	        color: #fff;
	        font-size: 15px;
	        font-weight: 900;
	        box-shadow: 0 8px 16px rgba(255, 128, 0, 0.22);
	    }
	
	    .mo-order-status-fab__content {
	        display: flex;
	        flex-direction: column;
	        min-width: 0;
	        gap: 2px;
	    }
	
	    .mo-order-status-fab__eyebrow {
	        color: var(--mo-text-soft, #6B7280);
	        font-size: 11px;
	        font-weight: 800;
	        letter-spacing: 0.04em;
	        text-transform: uppercase;
	        line-height: 1;
	    }
	
	    .mo-order-status-fab__label {
	        color: var(--mo-navy-strong, #252D59);
	        font-size: 15px;
	        font-weight: 800;
	        line-height: 1.2;
	    }
	
	    .mo-order-status-fab__arrow {
	        margin-left: auto;
	        color: var(--mo-primary, #FF8000);
	        font-size: 18px;
	        line-height: 1;
	        font-weight: 800;
	        flex-shrink: 0;
	    }
	
	    @media (max-width: 767.98px) {
	        .mo-floating-order-status {
	            position: sticky;
	            top: 68px;
	            margin-top: -1px;
	            z-index: 1030;
	            padding: 0;
	            background: rgba(255, 255, 255, 0.96);
	            border-bottom: 1px solid rgba(42, 54, 89, 0.08);
	            box-shadow: 0 4px 10px rgba(37, 45, 89, 0.03);
	        }
	
	        .mo-floating-order-status__inner {
	            padding: 0 16px;
	        }
	
	        .mo-order-status-fab {
	            position: static;
	            left: auto;
	            top: auto;
	            bottom: auto;
	            width: 100%;
	            min-width: 0;
	            min-height: 46px;
	            margin: 0;
	            padding: 0;
	            border-radius: 0;
	            background: transparent;
	            border: 0;
	            box-shadow: none;
	            backdrop-filter: none;
	            justify-content: space-between;
	            gap: 10px;
	        }
	
	        .mo-order-status-fab:hover {
	            transform: none;
	            box-shadow: none;
	            border-color: transparent;
	        }
	
	        .mo-order-status-fab__icon {
	            width: 28px;
	            height: 28px;
	            border-radius: 10px;
	            font-size: 13px;
	            box-shadow: none;
	        }
	
	        .mo-order-status-fab__eyebrow {
	            display: none;
	        }
	
	        .mo-order-status-fab__label {
	            font-size: 13px;
	            color: var(--mo-text-soft, #6B7280);
	        }
	
	        .mo-order-status-fab__arrow {
	            font-size: 15px;
	        }
	    }
	</style>
    
</head>
<body class="mo-body">
	<div class="mo-app-shell d-flex flex-column min-vh-100">
	    <th:block th:replace="~{fragments/header :: siteHeader}"></th:block>
	
	    <div class="container mo-floating-order-status"
		     th:if="${session.member != null
		             and session.member.memberRoleType == 'USER'
		             and headerHasTrackableOrder
		             and (hideFloatingOrderStatusButton == null or !hideFloatingOrderStatusButton)}">
		    <div class="mo-floating-order-status__inner">
		        <button type="button"
		                class="mo-order-status-fab"
		                th:attr="data-order-idx=${headerTrackableOrderIdx}"
		                data-mo-open-order-summary>
		            주문 현황 보기
		        </button>
		    </div>
		</div>
	
	    <main class="mo-page-main flex-grow-1">
	        <div class="container mo-page-container">
	            <th:block layout:fragment="pageTop"></th:block>
	            <th:block layout:fragment="pageContent"></th:block>
	        </div>
	    </main>
	
	    <th:block th:replace="~{fragments/footer :: siteFooter}"></th:block>
	</div>
	
	<div class="modal fade" id="moOrderSummaryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 24px;">
            <div class="modal-header border-bottom-0 pb-0">
                <div>
                    <div style="font-size: 12px; font-weight: 800; color: var(--mo-text-soft); letter-spacing: 0.04em;">
                        ORDER SUMMARY
                    </div>
                    <h5 class="fw-bold m-0 mt-1" style="color: var(--mo-navy-strong);">주문 현황</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>

            <div class="modal-body pt-3">
                <div id="moOrderSummaryLoading" class="text-center py-4">
                    <div class="spinner-border" role="status" style="color: var(--mo-primary);"></div>
                </div>

                <div id="moOrderSummaryContent" class="d-none">
                    <div class="d-grid gap-3">
                        <div class="p-3 rounded-4 border bg-white">
                            <div class="text-secondary small fw-bold mb-1">현재 진행 단계</div>
                            <div id="moOrderSummaryStep" class="fw-bold" style="font-size: 18px; color: var(--mo-navy-strong);">
                                결제 완료
                            </div>
                        </div>

                        <div class="p-3 rounded-4 border bg-white">
                            <div class="text-secondary small fw-bold mb-1">주문번호</div>
                            <div id="moOrderSummaryNumber" class="fw-bold" style="font-size: 18px; color: var(--mo-navy-strong);">
                                000000
                            </div>
                        </div>

                        <div class="p-3 rounded-4 border bg-white">
                            <div class="text-secondary small fw-bold mb-1">주문금액</div>
                            <div id="moOrderSummaryAmount" class="fw-bold" style="font-size: 18px; color: var(--mo-primary);">
                                0원
                            </div>
                        </div>

                        <div class="p-3 rounded-4 border bg-white">
                            <div class="text-secondary small fw-bold mb-1">배송지 주소</div>
                            <div id="moOrderSummaryAddress" class="fw-bold" style="font-size: 15px; color: var(--mo-navy-strong); line-height: 1.5;">
                                주소 정보 없음
                            </div>
                        </div>
                    </div>
                </div>

                <div id="moOrderSummaryError" class="d-none text-center py-4 text-danger">
                    주문 정보를 불러오지 못했습니다.
                </div>
            </div>
        </div>
    </div>
</div>
	
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<script th:if="${error != null}" th:inline="javascript">
    alert([[${error}]]);
</script>

<script th:if="${message != null}" th:inline="javascript">
    alert([[${message}]]);
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const trigger = document.querySelector('[data-mo-open-order-summary]');
    const modalElement = document.getElementById('moOrderSummaryModal');

    if (!trigger || !modalElement) {
        return;
    }

    const modal = new bootstrap.Modal(modalElement);
    const loadingEl = document.getElementById('moOrderSummaryLoading');
    const contentEl = document.getElementById('moOrderSummaryContent');
    const errorEl = document.getElementById('moOrderSummaryError');

    const stepEl = document.getElementById('moOrderSummaryStep');
    const numberEl = document.getElementById('moOrderSummaryNumber');
    const amountEl = document.getElementById('moOrderSummaryAmount');
    const addressEl = document.getElementById('moOrderSummaryAddress');

    function resetModalState() {
        loadingEl.classList.remove('d-none');
        contentEl.classList.add('d-none');
        errorEl.classList.add('d-none');
    }

    trigger.addEventListener('click', async function () {
        const orderIdx = this.getAttribute('data-order-idx');
        if (!orderIdx) {
            return;
        }

        resetModalState();
        modal.show();

        try {
            const response = await fetch(`/orders/${orderIdx}/summary`);
            if (!response.ok) {
                throw new Error('summary fetch failed');
            }

            const data = await response.json();

            stepEl.textContent = data.currentStep ?? '-';
            numberEl.textContent = data.orderNumber ?? '-';
            amountEl.textContent = `${Number(data.orderAmount || 0).toLocaleString()}원`;
            addressEl.textContent = data.deliveryAddress ?? '주소 정보 없음';

            loadingEl.classList.add('d-none');
            contentEl.classList.remove('d-none');
        } catch (e) {
            loadingEl.classList.add('d-none');
            errorEl.classList.remove('d-none');
        }
    });
});
</script>
<script th:src="@{/js/moeats-layout.js}"></script>
<th:block layout:fragment="pageScripts"></th:block>
</body>
</html>
