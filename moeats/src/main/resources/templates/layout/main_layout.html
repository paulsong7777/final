<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mo-Eats | 실시간 그룹 주문</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <h1 class="main-title">지금 가장 빠르게 함께 주문하세요!</h1>
            <div class="btn-group">
                <button class="btn btn-orange shadow">대표결제 시작</button>
                <button class="btn btn-outline-navy">각자결제보기</button>
            </div>
        </header>
        <nav class="tabs">
            <button class="tab-item active" onclick="showCards('delivery')">배달가능</button>
            <button class="tab-item" onclick="showCards('wait')">대기 4분</button>
            <button class="tab-item" onclick="showCards('group')">그룹주문</button>
        </nav>
        <main id="card-container" class="card-list">
            <div class="card">
                <div class="card-img" style="background-image: url('https://via.placeholder.com/100x100?text=Food1');"></div>
                <div class="card-info">
                    <h3 class="shop-name">마라탕 전문점 강남점</h3>
                    <p class="shop-desc">최소주문 12,000원 | 배달팁 2,000원</p>
                    <span class="tag">HOT</span>
                </div>
            </div>
            <div class="card">
                <div class="card-img" style="background-image: url('https://via.placeholder.com/100x100?text=Food2');"></div>
                <div class="card-info">
                    <h3 class="shop-name">푸르지오 수제버거</h3>
                    <p class="shop-desc">최소주문 15,000원 | 배달팁 0원</p>
                </div>
            </div>
        </main>
        <section class="input-form">
            <div class="input-group full">
                <label>주문 제목</label>
                <input type="text" placeholder="예: 푸르지오 파티 참여">
            </div>
            <div class="flex-row">
                <div class="input-group flex-1">
                    <label>도도착 예정 시간</label>
                    <input type="time" value="12:00">
                </div>
                <div class="input-group flex-1">
                    <label>참여 인원</label>
                    <input type="number" placeholder="명">
                </div>
            </div>
        </section>
        <footer class="footer-nav">
            <div class="nav-item">
                <div class="nav-icon">🏠</div>
                <span>홈</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon">📋</div>
                <span>주문내역</span>
            </div>
            <div class="nav-item active">
                <div class="nav-icon">👥</div>
                <span>그룹관리</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon">👤</div>
                <span>내정보</span>
            </div>
        </footer>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
