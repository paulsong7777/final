<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<th:block layout:fragment="css">
    <style>
        /* [필수] 지도 렌더링을 위한 물리적 높이값 */
        .moeats-map-wrapper { width: 100%; height: 800px; border-radius: 1rem; border: 2px solid var(--moeats-lime-green); overflow: hidden; }
        .order-status-scroll { max-height: 800px; overflow-y: auto; background-color: #fcfcfc; }
        .empty-state-container { min-height: 70vh; }
        
        /* [신호등 상태 컬러] 글로벌 가이드 반영 */
        .status-selecting { color: var(--status-red) !important; font-weight: bold; }
        .status-paying { color: var(--moeats-warm-orange) !important; font-weight: bold; }
        .status-done { color: var(--moeats-lime-green) !important; font-weight: bold; }
        
        /* 카드 상호작용 */
        .order-entry-card { transition: transform 0.2s ease; border: 1.5px solid #eee !important; cursor: pointer; }
        .order-entry-card:hover { transform: scale(1.01); border-color: var(--moeats-warm-orange) !important; }
    </style>
</th:block>

<main layout:fragment="content" class="container-fluid">

    <div id="coord-storage" class="d-none"
         th:attr="data-lat=${storeVo != null ? storeVo['latitude'] : 35.8714},
                 data-lng=${storeVo != null ? storeVo['longitude'] : 128.6014}"></div>

    <div th:if="${storeVo == null}" class="d-flex flex-column justify-content-center align-items-center empty-state-container">
        <div class="text-center animate-fade-in">
            <i class="bi bi-exclamation-triangle mb-3 fs-1 text-warning"></i>
            <h2 class="fw-bold mb-2 text-navy">등록된 매장 정보가 없습니다.</h2>
            <p class="text-muted mb-4">매장 정보를 등록해야 모이츠(MoEats) 서비스를 이용하실 수 있습니다.</p>
            <a th:href="@{/owner/store/setting}" class="btn btn-warning btn-lg fw-bold px-5 py-3 rounded-pill shadow text-white" 
               style="background-color: var(--moeats-warm-orange) !important; border: none;">
                매장 등록하러 가기
            </a>
        </div>
    </div>

    <div th:if="${storeVo != null}" class="row g-3">
        <div class="col-lg-4 col-xl-3">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white py-3 border-bottom">
                    <h5 class="fw-bold mb-0 text-navy">실시간 주문 현황</h5>
                </div>
                <div class="card-body order-status-scroll">
                    
                    <th:block th:if="${orderList != null and !orderList.isEmpty()}">
                        <div th:each="order : ${orderList}" 
                             class="card mb-3 shadow-sm order-entry-card" 
                             th:attr="data-idx=${order['roomIdx']}"
                             onclick="const idx=this.getAttribute('data-idx'); if(idx) location.href='/owner/order/detail?roomIdx='+idx;">
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="badge bg-dark" th:text="${order['orderCode'] ?: 'N/A'}">코드</span>
                                    
                                    <div th:switch="${order['roomStatus']}">
                                        <span th:case="'PENDING'" class="status-selecting">선택중</span>
                                        <span th:case="'ACCEPTED'" class="status-paying">결제완료</span>
                                        <span th:case="'COOKING'" class="status-done">조리중</span>
                                        <span th:case="'DELIVERING'" class="status-done">배달중</span>
                                        <span th:case="*" class="text-muted small">상태없음</span>
                                    </div>
                                </div>

                                <div class="fw-bold mb-1 fs-5 text-navy text-truncate" th:text="${order['menuName'] ?: '정보 없음'}">메뉴명</div>
                                <div class="small text-muted mb-3 text-truncate" th:text="${order['deliveryAddress1'] ?: '주소 없음'}">주소</div>

                                <div class="d-grid gap-2 border-top pt-3">
                                    <button th:if="${order['roomStatus'] == 'PENDING'}" class="btn btn-warning text-white fw-bold py-2" th:attr="data-idx=${order['roomIdx']}" onclick="handleStatusUpdate(event, this, 'ACCEPTED')">주문 수락</button>
                                    <button th:if="${order['roomStatus'] == 'ACCEPTED'}" class="btn btn-success text-white fw-bold py-2" th:attr="data-idx=${order['roomIdx']}" onclick="handleStatusUpdate(event, this, 'COOKING')">조리 시작</button>
                                    <button th:if="${order['roomStatus'] == 'COOKING'}" class="btn btn-primary text-white fw-bold py-2" th:attr="data-idx=${order['roomIdx']}" onclick="handleStatusUpdate(event, this, 'DELIVERING')">배달 시작</button>
                                    <button th:if="${order['roomStatus'] == 'DELIVERING'}" class="btn btn-dark text-white fw-bold py-2" th:attr="data-idx=${order['roomIdx']}" onclick="handleStatusUpdate(event, this, 'COMPLETED')">배달 완료</button>
                                </div>
                            </div>
                        </div>
                    </th:block>

                    <div th:if="${orderList == null or orderList.isEmpty()}" class="text-center py-5">
                        <i class="bi bi-chat-dots fs-1 text-light opacity-50"></i>
                        <p class="text-muted mt-2">새로운 주문이 없습니다.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8 col-xl-9">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-0">
                    <div id="moeats-map" class="moeats-map-wrapper"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3355be34fede739dcf93c2a5f3ec84f1&libraries=services&autoload=false"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        let kakaoMap;

        /**
         * [수정] 리다이렉트 로직 복구 완료
         * 상태 업데이트 성공 시 상세 페이지로 자동 이동합니다.
         */
        async function handleStatusUpdate(event, btnEl, nextStatus) {
            event.stopPropagation();
            const roomIdx = btnEl.getAttribute('data-idx');
            if(!roomIdx) return;
            
            btnEl.disabled = true;
            try {
                // AJAX: 상태 변경은 Fetch API 비동기 처리 
                const result = await moeatsFetch('/owner/status_update', { 
                    roomIdx: roomIdx, 
                    roomStatus: nextStatus 
                });

                if(result && result.success) {
                    showToast("상태가 성공적으로 변경되었습니다. 상세 페이지로 이동합니다.", "success");
                    // 리다이렉트 처리: 0.5초 후 상세 페이지로 이동 
                    setTimeout(() => {
                        location.href = `/owner/order/detail?roomIdx=${roomIdx}`;
                    }, 500);
                } else {
                    showToast(result.message || "처리에 실패했습니다.", "danger");
                    btnEl.disabled = false;
                }
            } catch(e) { 
                showToast("네트워크 연결을 확인해주세요.", "danger");
                btnEl.disabled = false; 
            }
        }

        function initMap() {
            const container = document.getElementById('moeats-map');
            const dataEl = document.getElementById('coord-storage');
            if(!container || !dataEl) return;

            const lat = parseFloat(dataEl.getAttribute('data-lat')) || 35.8714;
            const lng = parseFloat(dataEl.getAttribute('data-lng')) || 128.6014;

            const options = { center: new kakao.maps.LatLng(lat, lng), level: 3 };
            kakaoMap = new kakao.maps.Map(container, options);
            new kakao.maps.Marker({ position: new kakao.maps.LatLng(lat, lng), map: kakaoMap });
            
            // Map: relayout() 호출 표준화 준수 
            window.addEventListener('resize', () => { if(kakaoMap) kakaoMap.relayout(); });
        }

        window.addEventListener('load', () => { if(window.kakao) kakao.maps.load(initMap); });
        /*]]>*/
    </script>
</th:block>
</html>
