<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content" class="container-fluid px-4 h-100">

    <div class="row g-3 h-100">

        <div class="col-lg-4 col-xl-3 h-100 d-flex flex-column">

            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-2 pb-2" style="border-color: var(--moeats-navy) !important;">
                <h5 class="fw-bold mb-0 text-navy">
                    <i class="bi bi-megaphone-fill text-danger me-2"></i>실시간 주문
                </h5>
                <span class="badge bg-dark text-white rounded-pill"
                      th:text="|총 ${#lists.size(orderList ?: {})}건|">0건</span>
            </div>

            <div id="order-list-area" class="flex-grow-1 overflow-auto no-scrollbar">
                <th:block th:if="${not #lists.isEmpty(orderList ?: {})}">
                    <a th:each="order : ${orderList}"
                       th:href="@{/owner/order/detail(roomIdx=${order.roomIdx ?: 0})}"
                       class="order-card d-block mb-2 p-3 text-decoration-none text-dark border-start border-4 bg-white rounded shadow-sm"
                       th:classappend="${order.roomStatus == 'PENDING'} ? 'border-warning' :
                                       (${order.roomStatus == 'PREPARING'} ? 'border-primary' : 'border-success')">

                        <div class="d-flex justify-content-between mb-2">
                            <span class="small text-muted fw-bold"
                                  th:text="|${order.orderTime ?: '00:00'} 주문|"></span>

                            <span class="badge"
                                  th:classappend="${order.roomStatus == 'PENDING'} ? 'bg-warning text-dark' :
                                                  (${order.roomStatus == 'PREPARING'} ? 'bg-primary' : 'bg-success')"
                                  th:text="${order.roomStatus == 'PENDING'} ? '신규' :
                                          (${order.roomStatus == 'PREPARING'} ? '조리중' : '완료')">
                            </span>
                        </div>

                        <div class="fw-bold fs-5 mb-1 text-navy" th:text="${order.menuName ?: '메뉴 정보 없음'}"></div>
                        <div class="fw-bold text-orange mb-2" th:text="|${order.totalPrice ?: 0}원|">0원</div>
                        <p class="small text-muted mb-0 text-truncate" th:text="${order.deliveryAddress1 ?: '주소 정보 없음'}"></p>
                    </a>
                </th:block>

                <div th:if="${#lists.isEmpty(orderList ?: {})}" class="text-center py-5 bg-white rounded shadow-sm border border-dashed">
                    <i class="bi bi-inbox text-light fs-1 d-block mb-2"></i>
                    <p class="text-muted small fw-bold">접수된 주문이 없습니다.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-8 col-xl-9 h-100">
            <div class="h-100 w-100 rounded-4 overflow-hidden shadow-sm border">
                <div id="moeats-map" class="w-100 h-100 bg-light"></div>
            </div>
        </div>

    </div>
</div>

<th:block layout:fragment="script">

    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3355be34fede739dcf93c2a5f3ec84f1&autoload=false"></script>

    <script th:inline="javascript">
        let map;

        function createMap() {
            const container = document.getElementById('moeats-map');
            if (!container) return;

            // 6대원칙: Anti-Null JS 인라인 (기본값 할당)
            const lat = /*[[${storeVo?.latitude ?: 35.8714}]]*/ 35.8714;
            const lng = /*[[${storeVo?.longitude ?: 128.6014}]]*/ 128.6014;

            const center = new kakao.maps.LatLng(lat, lng);

            map = new kakao.maps.Map(container, {
                center: center,
                level: 3
            });

            new kakao.maps.Marker({
                position: center,
                map: map
            });

            // main-layout에 정의된 사이드바 연동 리레이아웃 바인딩
            if(typeof bindMapRelayout === 'function') {
                bindMapRelayout(map);
            }
        }

        function fixMapRender() {
            if (!map) return;
            setTimeout(() => {
                map.relayout();
                map.setCenter(map.getCenter());
            }, 300);
        }

        // 초기화 로직
        window.addEventListener('load', function () {
            if (window.kakao && kakao.maps) {
                kakao.maps.load(function () {
                    createMap();
                    fixMapRender();
                });
            }
        });
    </script>
</th:block>
</html>
