<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/main-layout}">
<div layout:fragment="content" class="container-fluid">

    <div th:if="${#maps.isEmpty(storeVo)}" class="d-flex flex-column justify-content-center align-items-center" style="min-height: 70vh;">
        <i class="bi bi-shop text-muted mb-3" style="font-size: 5rem;"></i>
        <h2 class="fw-bold mb-2">아직 등록된 매장이 없습니다.</h2>
        <p class="text-muted mb-4">매장 정보를 등록해야 모이츠(MoEats) 점주 서비스를 이용하실 수 있습니다.</p>
        <a th:href="@{/owner/store/setting}" class="btn btn-warning btn-lg text-white fw-bold px-5">
            매장 등록하러 가기
        </a>
    </div>

    <div th:if="${not #maps.isEmpty(storeVo)}" class="row">
        <div class="col-lg-4 col-xl-3">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="fw-bold mb-0">실시간 주문 관제</h5>
                </div>
                <div class="card-body overflow-auto" style="max-height: 800px; background-color: #f8f9fa;">
                    
                    <th:block th:if="${not #lists.isEmpty(orderList)}">
                        <div th:each="order : ${orderList}" class="card mb-3 border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="badge bg-dark" th:text="${order['orderDate']}">시간</span>
                                    <span class="fw-bold small" 
                                          th:classappend="${order['roomStatus'] == 'PENDING' ? 'text-danger' : (order['roomStatus'] == 'ACCEPTED' ? 'text-warning' : 'text-primary')}"
                                          th:text="| ${order['roomStatus']}|"></span>
                                </div>

                                <div class="fw-bold mb-1" th:text="${order['menuName']}">메뉴명</div>
                                <div class="small text-muted mb-3" th:text="${order['deliveryAddress1']}">주소</div>

                                <div class="d-grid gap-2 border-top pt-3">
                                    
                                    <button th:if="${order['roomStatus'] == 'PENDING'}" 
                                            class="btn btn-warning text-white fw-bold py-2" 
                                            th:onclick="handleStatusUpdate(event, [[${order['roomIdx']}]], 'ACCEPTED')">
                                        주문 수락 (상세이동)
                                    </button>
                                    
                                    <button th:if="${order['roomStatus'] == 'ACCEPTED'}" 
                                            class="btn btn-success text-white fw-bold py-2" 
                                            th:onclick="handleStatusUpdate(event, [[${order['roomIdx']}]], 'COOKING')">
                                        조리 시작
                                    </button>

                                    <button th:if="${order['roomStatus'] == 'COOKING'}" 
                                            class="btn btn-primary text-white fw-bold py-2" 
                                            th:onclick="handleStatusUpdate(event, [[${order['roomIdx']}]], 'DELIVERING')">
                                        배달 시작
                                    </button>

                                    <button th:if="${order['roomStatus'] == 'DELIVERING'}" 
                                            class="btn btn-dark text-white fw-bold py-2" 
                                            th:onclick="handleStatusUpdate(event, [[${order['roomIdx']}]], 'COMPLETED')">
                                        배달 완료
                                    </button>

                                    <a th:href="@{/owner/order/detail(roomIdx=${order['roomIdx']})}" 
                                       class="btn btn-outline-secondary btn-sm mt-1 border-0">상세내역 보기</a>
                                </div>
                            </div>
                        </div>
                    </th:block>

                    <div th:if="${#lists.isEmpty(orderList)}" class="text-center py-5 text-muted">주문이 없습니다.</div>
                </div>
            </div>
        </div>

        <div class="col-lg-8 col-xl-9">
            <div class="card border-0 shadow-sm h-100">
                <div id="moeats-map" style="width:100%; height:800px;"></div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3355be34fede739dcf93c2a5f3ec84f1&libraries=services&autoload=false"></script>

<script th:inline="javascript">
    /**
     * [6대원칙: AJAX] 비동기 상태 업데이트 (fetch 주소 유지)
     */
    async function handleStatusUpdate(event, roomIdx, nextStatus) {
        if(!roomIdx) return;
        const btn = event.currentTarget;
        btn.disabled = true;

        try {
            const result = await moeatsFetch('/owner/status_update', { roomIdx: roomIdx, roomStatus: nextStatus });
            if(result && result.success) {
                if(nextStatus === 'ACCEPTED') {
                    window.location.href = '/owner/order/detail?roomIdx=' + roomIdx;
                } else {
                    window.location.reload();
                }
            } else {
                alert("처리 실패");
                btn.disabled = false;
            }
        } catch(e) {
            btn.disabled = false;
        }
    }

    /**
     * [DB 동기화] StoreMapper.xml의 latitude, longitude 필드 매핑
     */
    function initMap() {
        const container = document.getElementById('moeats-map');
        if(!container) return;

        // [동기화] storeVo['latitude'], storeVo['longitude']
        const lat = /*[[${storeVo['latitude'] ?: 35.8714}]]*/ 35.8714;
        const lng = /*[[${storeVo['longitude'] ?: 128.6014}]]*/ 128.6014;

        const map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(lat, lng), level: 3 });
        new kakao.maps.Marker({ position: new kakao.maps.LatLng(lat, lng), map: map });
        
        // 레이아웃에 있는 사이드바 호환용 릴레이아웃 함수 호출!
        if(typeof bindMapRelayout === 'function') {
            bindMapRelayout(map);
        }
    }
    window.addEventListener('load', () => { if(window.kakao) kakao.maps.load(initMap); });
</script>
</th:block>
</html>
