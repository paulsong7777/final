<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">

<div layout:fragment="content">
    <h2>실시간 주문 관리</h2>
    <hr>

    <div style="margin-bottom: 20px;">
        <button type="button" onclick="location.href='?status=PENDING'" style="padding: 10px 20px;">접수대기</button>
        <button type="button" onclick="location.href='?status=COOKING'" style="padding: 10px 20px;">조리중</button>
        <button type="button" onclick="location.href='?status=DELIVERING'" style="padding: 10px 20px;">배달중</button>
        <button type="button" onclick="location.href='?status=COMPLETED'" style="padding: 10px 20px;">완료/취소</button>
    </div>

    <table border="1" style="width: 100%; border-collapse: collapse; text-align: center;">
        <thead style="background-color: #f4f4f4;">
            <tr>
                <th style="padding: 10px;">주문 번호</th>
                <th>주문 시간</th>
                <th>메뉴 및 수량</th>
                <th>결제 금액</th>
                <th>주문 상태</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${order_list}">
                <td style="padding: 10px;">
                    <a th:href="@{/owner/order/detail(order_idx=${order.order_idx})}" 
                       th:text="${order.order_idx}" style="font-weight: bold; color: blue;">1001</a>
                </td>
                <td th:text="${order.order_time}">2026-03-24 18:30</td>
                <td>
                    <span th:text="${order.menu_summary}">황금올리브 치킨 외 2건</span>
                </td>
                <td>
                    <span th:text="${#numbers.formatInteger(order.total_price, 3, 'COMMA')}">25,000</span>원
                </td>
                <td>
                    <span th:if="${order.order_status == 'PENDING'}" style="color: red; font-weight: bold;">신규 주문</span>
                    <span th:if="${order.order_status == 'COOKING'}" style="color: orange;">조리 중</span>
                    <span th:if="${order.order_status == 'COMPLETED'}" style="color: gray;">완료</span>
                </td>
                <td style="padding: 10px;">
                    <div th:if="${order.order_status == 'PENDING'}">
                        <form th:action="@{/owner/order/accept}" method="post" style="display: inline;">
                            <input type="hidden" name="order_idx" th:value="${order.order_idx}">
                            <button type="submit" style="background: #2ecc71; color: white;">주문 수락</button>
                        </form>
                        <form th:action="@{/owner/order/reject}" method="post" style="display: inline;">
                            <input type="hidden" name="order_idx" th:value="${order.order_idx}">
                            <button type="submit" style="background: #e74c3c; color: white;">거절</button>
                        </form>
                    </div>
                    
                    <div th:if="${order.order_status == 'COOKING'}">
                        <form th:action="@{/owner/order/complete_cook}" method="post">
                            <input type="hidden" name="order_idx" th:value="${order.order_idx}">
                            <button type="submit" style="background: #3498db; color: white;">조리 완료</button>
                        </form>
                    </div>

                    <div th:if="${order.order_status == 'COMPLETED'}">
                        <span>-</span>
                    </div>
                </td>
            </tr>
            
            <tr th:if="${#lists.isEmpty(order_list)}">
                <td colspan="6" style="padding: 50px; color: #999;">현재 들어온 주문이 없습니다.</td>
            </tr>
        </tbody>
    </table>

    <div style="margin-top: 20px; text-align: right;">
        <a th:href="@{/owner/dashboard}">[ 대시보드로 돌아가기 ]</a>
    </div>
</div>
</html>
