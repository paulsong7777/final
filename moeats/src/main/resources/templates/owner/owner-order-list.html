<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content" class="container-fluid">
    
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
        <h3 class="fw-bold mb-0 text-navy">주문 내역 조회</h3>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr class="table-light">
                        <th class="px-4">NO.</th>
                        <th>주문일시</th>
                        <th>주문번호(코드)</th>
                        <th>메뉴명</th>
                        <th>결제 금액</th>
                        <th class="text-center">상태</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:if="${not #lists.isEmpty(orderList)}">
                        <tr th:each="order, stat : ${orderList}">
                            <td class="px-4" th:text="${stat.count}">1</td>
                            <td th:text="${order['orderDate'] ?: '0000-00-00 00:00'}">2026-03-27 16:18</td>
                            <td>
                                <code th:text="${order['orderCode'] ?: 'CODE-NULL'}">ORD-001</code>
                            </td>
                            <td class="fw-bold" th:text="${order['menuName']}">황금올리브</td>
                            <td th:text="|${#numbers.formatInteger(order['totalPrice'] ?: 0, 0, 'COMMA')}원|">0원</td>
                            <td class="text-center">
                                <span class="badge" 
                                      th:classappend="${order['roomStatus'] == 'DELIVERING' ? 'bg-success' : 'bg-secondary'}"
                                      th:text="${order['roomStatus'] == 'DELIVERING' ? '완료' : '진행중'}">상태</span>
                            </td>
                        </tr>
                    </th:block>

                    <tr th:if="${#lists.isEmpty(orderList)}">
                        <td colspan="6" class="text-center py-5">데이터가 존재하지 않습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>
