<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content" class="container-fluid py-4">
    
    <div class="d-flex justify-content-between align-items-end mb-4 border-bottom border-2 pb-3" style="border-bottom-color: var(--moeats-navy) !important;">
        <div>
            <h2 class="fw-bold mb-0 text-navy"><i class="bi bi-clock-history me-2 text-orange"></i>주문 내역 관리</h2>
            <p class="text-secondary small mb-0 mt-1">매장에서 접수된 모든 주문을 상세히 조회합니다.</p>
        </div>
        <div class="bg-white border rounded-pill px-3 py-2 fw-bold text-secondary small shadow-sm d-none d-md-block">
             <i class="bi bi-calendar-event me-1 text-orange"></i>
             조회 기준: <span id="lastUpdateTime" th:text="${#calendars.format(#calendars.createNow(), 'yyyy-MM-dd HH:mm')}"></span>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="orderTable">
                <thead class="bg-light text-secondary small fw-bold text-center">
                    <tr>
                        <th class="py-3 ps-4 text-start">번호</th>
                        <th>주문일시</th>
                        <th>주문코드</th>
                        <th class="text-start">메뉴명</th>
                        <th class="text-end">결제금액</th>
                        <th>진행상태</th>
                        <th class="pe-4">상세</th>
                    </tr>
                </thead>
                <tbody class="text-center border-top-0" id="orderTableBody">
                    <th:block th:if="${not #lists.isEmpty(orderList)}">
                        <tr th:each="order, stat : ${orderList}" th:data-room-idx="${order['roomIdx']}">
                            <td class="ps-4 text-start text-muted small row-num" th:text="${stat.count}">1</td>
                            <td class="small text-secondary" th:text="${order['orderDate'] ?: '00:00'}">00:00</td>
                            <td>
                                <span class="fw-bold px-2 py-1 rounded border" 
                                      style="background-color: #f1f3f5; color: #252D59 !important; font-family: 'Courier New', monospace; font-size: 0.85rem; border-color: #dee2e6 !important;">
                                    <th:block th:text="${order['orderCode'] ?: 'N/A'}">ORD-001</th:block>
                                </span>
                            </td>
                            <td class="text-start fw-bold text-navy" th:text="${order['menuName']}">메뉴명</td>
                            <td class="text-end fw-bold text-orange" th:text="|${#numbers.formatInteger(order['totalPrice'] ?: 0, 0, 'COMMA')}원|">0원</td>
                            <td class="status-cell">
                                <span th:switch="${order['roomStatus']}">
                                    <span th:case="'PENDING'" class="badge bg-danger-subtle text-danger px-3 rounded-pill">대기중</span>
                                    <span th:case="'ACCEPTED'" class="badge bg-warning-subtle text-warning px-3 rounded-pill">접수완료</span>
                                    <span th:case="'COOKING'" class="badge bg-info-subtle text-info px-3 rounded-pill">조리중</span>
                                    <span th:case="'DELIVERING'" class="badge bg-primary-subtle text-primary px-3 rounded-pill">배달중</span>
                                    <span th:case="'COMPLETED'" class="badge bg-success-subtle text-success px-3 rounded-pill">완료</span>
                                    <span th:case="'CANCELLED'" class="badge bg-secondary-subtle text-secondary px-3 rounded-pill">취소</span>
                                    <span th:case="*" class="badge bg-dark-subtle text-dark px-3 rounded-pill">알수없음</span>
                                </span>
                            </td>
                            <td class="pe-4">
                                <a th:href="@{/owner/order/detail(roomIdx=${order['roomIdx']})}" 
                                   class="btn btn-sm btn-outline-navy rounded-pill px-3 border-0 bg-light fw-bold"
                                   style="font-size: 0.75rem; color: var(--moeats-navy);">보기</a>
                            </td>
                        </tr>
                    </th:block>
                    
                    <tr th:if="${#lists.isEmpty(orderList)}" id="emptyRow">
                        <td colspan="7" class="py-5 text-center text-muted">
                            <i class="bi bi-inbox d-block fs-1 mb-3 opacity-25"></i>
                            <p class="fw-bold mb-0">표시할 주문 내역이 없습니다.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <style>
        /* 신규 주문 알림 애니메이션 효과 */
        @keyframes highlightNewRow {
            0% { background-color: rgba(255, 128, 0, 0.2); transform: scale(1.02); }
            100% { background-color: transparent; transform: scale(1); }
        }
        .new-order-highlight {
            animation: highlightNewRow 2s ease-out;
            border-left: 5px solid var(--moeats-orange) !important;
        }
    </style>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            // 20초마다 동기화 실행 (신규 주문 감지 속도 향상)
            setInterval(syncOrderStatuses, 20000); 
        });

        async function syncOrderStatuses() {
            try {
                const response = await fetch('/owner/order/api/list');
                if (!response.ok) return;
                
                const latestOrders = await response.json(); 

                if (latestOrders && latestOrders.length > 0) {
                    processOrders(latestOrders);
                    updateLastRefreshTime();
                }
            } catch (error) {
                console.error("[실시간 갱신 실패]", error);
            }
        }

        function processOrders(orders) {
            const tbody = document.getElementById('orderTableBody');
            const emptyRow = document.getElementById('emptyRow');

            // 1. 역순으로 정렬하여 신규 주문부터 처리 (데이터가 내림차순일 경우)
            orders.reverse().forEach((order) => {
                let existingRow = document.querySelector(`tr[data-room-idx="${order.roomIdx}"]`);
                
                if (existingRow) {
                    // [기능 1] 기존 행은 상태 배지만 업데이트
                    const statusCell = existingRow.querySelector('.status-cell');
                    const newBadge = getStatusBadgeHtml(order.roomStatus);
                    
                    // 상태가 변했을 때만 HTML 교체 (깜빡임 방지)
                    if (statusCell.innerHTML.trim() !== newBadge.trim()) {
                        statusCell.innerHTML = newBadge;
                    }
                } else {
                    // [기능 2] 새로운 주문 코드가 감지되면 최상단에 행 삽입
                    if (emptyRow) emptyRow.remove();
                    prependNewOrderRow(tbody, order);
                }
            });
            
            // 번호 순서 재정렬
            reorderNumbers();
        }

        function prependNewOrderRow(tbody, order) {
            const newRow = document.createElement('tr');
            newRow.setAttribute('data-room-idx', order.roomIdx);
            newRow.className = 'new-order-highlight'; // 반짝이는 효과 추가

            newRow.innerHTML = `
                <td class="ps-4 text-start text-muted small row-num">-</td>
                <td class="small text-secondary">${order.orderDate || '방금 전'}</td>
                <td>
                    <span class="fw-bold px-2 py-1 rounded border" 
                          style="background-color: #f1f3f5; color: #252D59 !important; font-family: 'Courier New', monospace; font-size: 0.85rem; border-color: #dee2e6 !important;">
                        ${order.orderCode || 'N/A'}
                    </span>
                </td>
                <td class="text-start fw-bold text-navy">${order.menuName}</td>
                <td class="text-end fw-bold text-orange">${Number(order.totalPrice).toLocaleString()}원</td>
                <td class="status-cell">${getStatusBadgeHtml(order.roomStatus)}</td>
                <td class="pe-4">
                    <a href="/owner/order/detail?roomIdx=${order.roomIdx}" 
                       class="btn btn-sm btn-outline-navy rounded-pill px-3 border-0 bg-light fw-bold"
                       style="font-size: 0.75rem; color: var(--moeats-navy);">보기</a>
                </td>
            `;

            tbody.prepend(newRow); // 최상단 삽입
        }

        function reorderNumbers() {
            document.querySelectorAll('.row-num').forEach((el, idx) => {
                el.innerText = idx + 1;
            });
        }

        function getStatusBadgeHtml(status) {
            const badges = {
                'PENDING': '<span class="badge bg-danger-subtle text-danger px-3 rounded-pill">대기중</span>',
                'ACCEPTED': '<span class="badge bg-warning-subtle text-warning px-3 rounded-pill">접수완료</span>',
                'COOKING': '<span class="badge bg-info-subtle text-info px-3 rounded-pill">조리중</span>',
                'DELIVERING': '<span class="badge bg-primary-subtle text-primary px-3 rounded-pill">배달중</span>',
                'COMPLETED': '<span class="badge bg-success-subtle text-success px-3 rounded-pill">완료</span>',
                'CANCELLED': '<span class="badge bg-secondary-subtle text-secondary px-3 rounded-pill">취소</span>'
            };
            return badges[status] || '<span class="badge bg-dark-subtle text-dark px-3 rounded-pill">알수없음</span>';
        }

        function updateLastRefreshTime() {
            const now = new Date();
            document.getElementById('lastUpdateTime').innerText = 
                now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' +
                String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }
    </script>
</th:block>
</html>
