<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}"> 

<div layout:fragment="content" class="container py-5">
    <div class="card shadow-sm border-0 mx-auto rounded-4 bg-white" style="max-width: 600px;">
        <div class="card-body p-4 p-md-5">
            
            <div class="d-flex align-items-center mb-4 border-bottom border-2 pb-3" style="border-color: var(--moeats-navy) !important;">
                <h3 class="fw-bold mb-0" style="color: var(--moeats-navy);">신규 메뉴 등록</h3>
            </div>

            <form id="menuRegisterForm" enctype="multipart/form-data" onsubmit="return false;">
                
                <div class="mb-4" th:with="safeCats=${categoryList ?: {}}">
                    <div class="d-flex justify-content-between mb-2">
                        <label class="form-label small fw-bold text-secondary text-uppercase">카테고리</label>
                        <a th:href="@{/owner/category/setting}" class="text-decoration-none small fw-bold text-orange">+ 설정</a>
                    </div>
                    <select id="categoryIdx" name="categoryIdx" class="form-select py-3 border-0 bg-light shadow-none rounded-3 fw-bold text-navy" required>
                        <option value="">카테고리를 선택하세요</option>
                        <th:block th:if="${not #lists.isEmpty(safeCats)}">
                            <option th:each="cat : ${safeCats}" 
                                    th:value="${cat.categoryIdx ?: 0}" 
                                    th:text="${cat.categoryName ?: '미분류 카테고리'}"></option>
                        </th:block>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">메뉴 사진</label>
                    <input type="file" id="imageFile" name="menuFile" class="form-control d-none" accept="image/*" onchange="previewImage(this)">
                    
                    <div id="imageContainer" class="bg-light rounded-4 d-flex align-items-center justify-content-center position-relative overflow-hidden" 
                         onclick="document.getElementById('imageFile').click()" 
                         style="width: 100%; height: 220px; border: 2px dashed #ddd; cursor: pointer;">
                        
                        <button type="button" id="removeBtn" class="btn btn-danger btn-sm rounded-circle position-absolute shadow" 
                                style="display:none; top: 12px; right: 12px; z-index: 10; width: 35px; height: 35px;" 
                                onclick="clearImage(event)">&times;</button>
                        
                        <div id="guideMsg" class="text-center text-secondary">
                            <i class="bi bi-camera fs-1 d-block mb-2 text-muted"></i>
                            <span class="fw-bold small d-block">클릭하여 이미지 업로드</span>
                        </div>
                        <img id="preview" src="" class="d-none w-100 h-100" style="object-fit: cover;">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">메뉴명</label>
                    <input type="text" id="menuName" name="menuName" class="form-control py-3 border-0 bg-light shadow-none rounded-3 fw-bold" placeholder="메뉴 이름을 입력하세요" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">가격</label>
                    <div class="input-group">
                        <input type="number" id="menuPrice" name="menuPrice" class="form-control py-3 text-end border-0 bg-light shadow-none rounded-start-3 fw-bold" placeholder="0" required min="0">
                        <span class="input-group-text bg-light border-0 text-navy fw-bold rounded-end-3">원</span>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">메뉴 설명</label>
                    <textarea id="menuDescription" name="menuDescription" class="form-control py-3 border-0 bg-light shadow-none rounded-3 fw-bold" 
                              rows="3" placeholder="메뉴에 대한 설명을 입력하세요" style="resize: none;"></textarea>
                </div>

                <div class="d-grid gap-2 mt-5">
                    <button type="button" id="submitBtn" class="btn btn-warning text-white fw-bold py-3 fs-5 shadow-sm rounded-pill" 
                            style="background-color: var(--moeats-orange); border: none;"
                            onclick="handleMenuRegister()">등록 완료</button>
                    <button type="button" class="btn btn-link text-decoration-none text-muted small fw-bold" 
                            onclick="location.href='/owner/menu/management'">취소하고 돌아가기</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /**
         * [AJAX] Fetch API 비동기 처리
         */
        async function handleMenuRegister() {
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            
            const categoryIdx = document.getElementById('categoryIdx').value;
            const menuName = document.getElementById('menuName').value.trim();
            const menuPrice = document.getElementById('menuPrice').value;

            if (!categoryIdx) { alert("카테고리를 선택해 주세요."); return; }
            if (!menuName) { alert("메뉴명을 입력해 주세요."); return; }
            if (!menuPrice) { alert("가격을 입력해 주세요."); return; }

            if(!confirm("이 내용으로 메뉴를 등록하시겠습니까?")) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>처리 중...';

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            const formData = new FormData(document.getElementById('menuRegisterForm'));

            try {
                // [Rule] 데이터 변경은 POST 고정
                const response = await fetch('/owner/menu/register_proc', {
                    method: 'POST',
                    headers: {
                        ...(header && token ? { [header]: token } : {})
                    },
                    body: formData
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const result = await response.json();

                if (result.success) {
                    alert("성공적으로 등록되었습니다.");
                    location.href = '/owner/menu/management';
                } else {
                    alert(result.message || "등록 실패: 무결성 검증 오류");
                    resetBtn(submitBtn, originalText);
                }
            } catch (error) {
                console.error("[AJAX Error]:", error);
                alert("서버와 통신할 수 없습니다. 잠시 후 다시 시도해 주세요.");
                resetBtn(submitBtn, originalText);
            }
        }

        function resetBtn(btn, text) {
            btn.disabled = false;
            btn.innerText = text;
        }

        function previewImage(input) {
            const preview = document.getElementById('preview');
            const guideMsg = document.getElementById('guideMsg');
            const removeBtn = document.getElementById('removeBtn');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.classList.remove('d-none');
                    guideMsg.classList.add('d-none');
                    removeBtn.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearImage(e) {
            if(e) e.stopPropagation(); 
            document.getElementById('imageFile').value = "";
            document.getElementById('preview').src = "";
            document.getElementById('preview').classList.add('d-none');
            document.getElementById('guideMsg').classList.remove('d-none');
            document.getElementById('removeBtn').style.display = 'none';
        }
    </script>
</th:block>
</html>
