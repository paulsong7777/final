<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/main-layout}">

<head>
    <title>주문 상세 관리 - MoEats</title>
    </head>

<body>
<main layout:fragment="content" class="order-detail-page" th:with="safeOrder=${order ?: {}}">
    <div class="card shadow-sm border-0 rounded-4 overflow-hidden detail-main-card">
        <div class="card-header bg-white py-3 border-bottom detail-header-area">
            <h4 class="fw-bold mb-0 text-navy">
                <i class="bi bi-receipt me-2 text-orange"></i>주문 상세 관리
            </h4>
        </div>
        
        <div class="card-body p-4 p-md-5">
            <div class="row text-center order-step-container">
                <div class="order-step-line"></div>
                
                <div class="col-3 order-step-item">
                    <div class="rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center order-step-circle"
                         th:classappend="${(safeOrder['roomStatus'] ?: 'ACCEPTED') == 'ACCEPTED' ? 'state-active-accepted' : 'state-pending'}">
                        <i class="bi bi-check-lg fs-4"></i>
                    </div>
                    <div class="small fw-bold status-text" th:classappend="${safeOrder['roomStatus'] == 'ACCEPTED' ? 'text-warning' : 'text-muted'}">수락완료</div>
                </div>

                <div class="col-3 order-step-item">
                    <div class="rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center order-step-circle"
                         th:classappend="${safeOrder['roomStatus'] == 'COOKING' ? 'state-active-cooking' : 'state-pending'}">
                        <i class="bi bi-fire fs-4"></i>
                    </div>
                    <div class="small fw-bold status-text" th:classappend="${safeOrder['roomStatus'] == 'COOKING' ? 'text-success' : 'text-muted'}">조리중</div>
                </div>

                <div class="col-3 order-step-item">
                    <div class="rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center order-step-circle"
                         th:classappend="${safeOrder['roomStatus'] == 'DELIVERING' ? 'state-active-delivering' : 'state-pending'}">
                        <i class="bi bi-truck fs-4"></i>
                    </div>
                    <div class="small fw-bold status-text" th:classappend="${safeOrder['roomStatus'] == 'DELIVERING' ? 'text-primary' : 'text-muted'}">배달중</div>
                </div>

                <div class="col-3 order-step-item">
                    <div class="rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center order-step-circle"
                         th:classappend="${safeOrder['roomStatus'] == 'COMPLETED' ? 'state-active-completed' : 'state-pending'}">
                        <i class="bi bi-flag-fill fs-4"></i>
                    </div>
                    <div class="small fw-bold status-text" th:classappend="${safeOrder['roomStatus'] == 'COMPLETED' ? 'text-dark' : 'text-muted'}">배달완료</div>
                </div>
            </div>

            <div class="row g-3 mb-4 p-4 bg-light rounded-4 mx-0 shadow-none border order-summary-box">
                <div class="col-md-6">
                    <p class="text-muted small mb-1">주문 코드: <span class="fw-bold" th:text="${safeOrder['orderCode'] ?: 'N/A'}">ORD-000</span></p>
                    <h5 class="fw-bold mb-0 text-navy" th:text="${safeOrder['menuName'] ?: '정보 없음'}">메뉴 이름</h5>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-muted small mb-1">총 결제금액</p>
                    <h4 class="text-orange fw-bold mb-0" 
                        th:text="|${#numbers.formatInteger(safeOrder['totalPrice'] ?: 0, 0, 'COMMA')}원|">0원</h4>
                </div>
            </div>

            <div class="d-grid gap-3 pt-2 order-action-area">
                <button th:if="${(safeOrder['roomStatus'] ?: 'ACCEPTED') == 'ACCEPTED'}" 
                        class="btn btn-success btn-lg fw-bold py-3 shadow-sm rounded-pill status-update-btn"
                        th:onclick="handleStatusUpdate(event, [[${safeOrder['roomIdx'] ?: 0}]], 'COOKING')">
                    <i class="bi bi-play-fill me-1"></i> 조리 시작 (유저에게 알림)
                </button>
                
                <button th:if="${safeOrder['roomStatus'] == 'COOKING'}" 
                        class="btn btn-primary btn-lg fw-bold py-3 shadow-sm rounded-pill status-update-btn"
                        th:onclick="handleStatusUpdate(event, [[${safeOrder['roomIdx'] ?: 0}]], 'DELIVERING')">
                    <i class="bi bi-truck me-1"></i> 배달 시작 (라이더 호출)
                </button>
                
                <button th:if="${safeOrder['roomStatus'] == 'DELIVERING'}" 
                        class="btn btn-dark btn-lg fw-bold py-3 shadow-sm rounded-pill status-update-btn"
                        th:onclick="handleStatusUpdate(event, [[${safeOrder['roomIdx'] ?: 0}]], 'COMPLETED')">
                    <i class="bi bi-check-all me-1"></i> 배달 완료 처리
                </button>
                
                <div class="text-center mt-3">
                    <a th:href="@{/owner/dashboard}" class="btn btn-link text-decoration-none text-secondary fw-medium back-to-dash">
                        <i class="bi bi-arrow-left me-1"></i> 대시보드로 돌아가기
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        /**
         * 주문 상태 업데이트 비동기 처리
         */
        async function handleStatusUpdate(event, roomIdx, nextStatus) {
            // [디버깅] roomIdx가 0이거나 없을 경우 서버 에러를 미리 방지
            if(!roomIdx || roomIdx === 0 || roomIdx === '0') {
                showToast("주문 번호를 찾을 수 없습니다. (디버깅: 데이터 유입 확인 필요)", "danger");
                return;
            }

            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>처리 중...';

            try {
                const result = await moeatsFetch('/owner/status_update', { 
                    roomIdx: roomIdx, 
                    roomStatus: nextStatus 
                });

                if(result && result.success) {
                    showToast("상태가 성공적으로 변경되었습니다.", "success");
                    
                 // 알림 시간을 500 (0.5초)로 설정
                    if(nextStatus === 'COMPLETED') {
                        setTimeout(() => location.href = '/owner/dashboard', 500);
                    } else {
                        setTimeout(() => location.reload(), 300);
                    }
                } else {
                    showToast(result.message || "상태 변경에 실패했습니다.", "danger");
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                }
            } catch(e) {
                console.error("[Status Update Error]:", e);
                showToast("통신 중 오류가 발생했습니다.", "danger");
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }
        /*]]>*/
    </script>
</th:block>
</html>
