<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">

<th:block layout:fragment="css">
    <style>
        .register-page-wrapper { background-color: #F8F9FA; min-height: 100vh; padding: 40px 0; }
        .register-container { 
            max-width: 550px; margin: 0 auto; background: white; 
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); 
        }
        
        /* 이미지 업로드 박스 커스텀 */
        #imagePreview { 
            width: 100%; height: 280px; border: 2px dashed #eee; 
            border-radius: 25px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; 
            cursor: pointer; color: #adb5bd; overflow: hidden;
            background-size: cover; background-position: center;
            transition: 0.3s;
        }
        #imagePreview:hover { border-color: var(--mo-orange); background-color: #FFF8F0; }

        .form-label { color: var(--mo-navy); margin-bottom: 8px; font-weight: 700; }
        .form-control-mo {
            border: none; background-color: #F1F3F5; border-radius: 15px; 
            padding: 15px; font-size: 1rem; transition: 0.3s;
        }
        .form-control-mo:focus {
            background-color: #fff; box-shadow: 0 0 0 3px rgba(255, 128, 0, 0.1);
            outline: none; border: 1px solid var(--mo-orange);
        }

        .btn-mo-submit { 
            background: var(--mo-orange); color: white; border: none; 
            border-radius: 18px; padding: 18px; font-weight: 800; 
            width: 100%; transition: 0.3s; font-size: 1.1rem;
            margin-top: 20px;
        }
        .btn-mo-submit:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 128, 0, 0.2); }
    </style>
</th:block>

<div layout:fragment="content" class="register-page-wrapper">
    <div class="register-container">
        <div class="d-flex align-items-center mb-4">
            <i class="bi bi-chevron-left fs-4 me-3" onclick="history.back()" style="cursor:pointer"></i>
            <h3 class="fw-bold mb-0 text-navy">새 메뉴 등록</h3>
        </div>

        <form th:action="@{/owner/menu/register}" method="post" enctype="multipart/form-data" onsubmit="return validateForm(this)">
            
            <div class="mb-4">
                <label class="form-label">메뉴 사진</label>
                <input type="file" name="menu_file" id="menuImage" accept="image/*" style="display: none;" onchange="previewImg(this)">
                <div id="imagePreview" onclick="document.getElementById('menuImage').click();">
                    <i class="bi bi-camera-fill fs-1 mb-2"></i>
                    <span class="fw-medium">사진 추가하기</span>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">메뉴명</label>
                <input type="text" name="menu_name" class="form-control form-control-mo" placeholder="예: 불맛 볶음면" required>
            </div>

            <div class="mb-3">
                <label class="form-label">가격 (원)</label>
                <input type="number" name="menu_price" min="0" class="form-control form-control-mo" placeholder="숫자만 입력하세요" required>
            </div>

            <div class="mb-4">
                <label class="form-label">메뉴 설명</label>
                <textarea name="menu_desc" class="form-control form-control-mo" rows="3" placeholder="메뉴의 특징을 3줄 내외로 적어주세요"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="btn-mo-submit shadow-sm">
                메뉴 등록 완료
            </button>
        </form>
    </div>
</div>

<th:block layout:fragment="script">
    <script>
        // 이미지 미리보기 로직
        function previewImg(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.style.backgroundImage = `url(${e.target.result})`;
                    preview.innerHTML = ''; // 기존 아이콘 제거
                    preview.style.border = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 폼 유효성 검사 및 로딩 처리
        function validateForm(form) {
            const btn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('menuImage');

            if (!fileInput.files || fileInput.files.length === 0) {
                alert("메뉴 사진을 등록해주세요!");
                return false;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>등록 중...';
            return true;
        }
    </script>
</th:block>
</html>
