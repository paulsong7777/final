<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content" class="container-fluid px-4" style="max-width: 1000px;">

    <h2 class="fw-bold mb-4">카테고리 설정</h2>

    <!-- 등록 -->
    <div class="card p-3 mb-4">
        <div class="row g-2">
            <div class="col-9">
                <input type="text" id="newCategoryName" class="form-control" placeholder="카테고리명">
            </div>
            <div class="col-3">
                <button class="btn btn-primary w-100" onclick="addCategory()">등록</button>
            </div>
        </div>
    </div>

    <!-- 목록 -->
    <table class="table text-center">
        <thead>
        <tr>
            <th>#</th>
            <th class="text-start">이름</th>
            <th>관리</th>
        </tr>
        </thead>

        <tbody id="category-table-body">
        <tr th:each="cat, stat : ${categoryList}" th:id="|row-${cat.categoryIdx}|">
            <td th:text="${stat.count}"></td>
            <td class="text-start" th:text="${cat.categoryName}"></td>
            <td>
                <button class="btn btn-danger btn-sm"
                        th:onclick="|deleteCategory('${cat.categoryIdx}')|">
                    삭제
                </button>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<th:block layout:fragment="script">
<script>
    async function addCategory() {
        const name = document.getElementById('newCategoryName').value.trim();

        if (!name) {
            alert("입력하세요");
            return;
        }

        const res = await fetch('/owner/category/insert_proc', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ categoryName: name })
        });

        const result = await res.json();

        if (result.success) {
            alert("등록 완료");
            location.reload();
        } else {
            alert("실패");
        }
    }

    async function deleteCategory(idx) {
        if (!confirm("삭제?")) return;

        const res = await fetch('/owner/category/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ categoryIdx: idx })
        });

        const result = await res.json();

        if (result.success) {
            document.getElementById('row-' + idx).remove();
        } else {
            alert("삭제 실패");
        }
    }
</script>
</th:block>

</html>
