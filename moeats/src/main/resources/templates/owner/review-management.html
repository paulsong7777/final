<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<head>
    <title>리뷰 및 답변 관리 - MoEats</title>
    </head>

<body>
<main layout:fragment="content" class="review-page-wrapper">
    
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2 review-manage-header">
        <div>
            <h3 class="fw-bold mb-0 text-navy">
                <i class="bi bi-chat-right-text me-2 text-orange"></i>리뷰 및 답변 관리
            </h3>
            <p class="text-secondary small mb-0 mt-1">고객님의 소중한 리뷰에 정성스러운 답변을 남겨주세요.</p>
        </div>
    </div>

    <div class="review-container" th:with="safeReviews=${reviewList ?: {}}">
        
        <th:block th:if="${not #lists.isEmpty(safeReviews)}">
            <div th:each="rev : ${safeReviews}" class="card border-0 shadow-sm rounded-4 mb-4 overflow-hidden review-item-card">
                <div class="card-body p-4">
                    
                    <div class="d-flex justify-content-between align-items-start mb-3 review-info-header">
                        <div>
                            <span class="fw-bold text-navy fs-5 member-nickname" th:text="${rev['memberNickname'] ?: '익명 고객님'}">닉네임</span>
                            <span class="ms-2 text-muted small reg-date" th:text="${rev['regDate'] ?: '0000-00-00'}">날짜</span>
                            
                            <div class="star-rating-container mt-1">
                                <i th:each="num : ${#numbers.sequence(1, 5)}"
                                   class="bi"
                                   th:classappend="${num <= (rev['reviewRating'] ?: 0)} ? 'bi-star-fill active-star' : 'bi-star'"></i>
                            </div>
                        </div>
                        <div class="badge bg-light text-navy border px-3 py-2 fw-bold ordered-menu-name" th:text="${rev['menuName'] ?: '주문 메뉴'}">메뉴명</div>
                    </div>

                    <p class="text-dark mb-4 review-text-content" th:text="${rev['reviewContent'] ?: '내용이 없습니다.'}">리뷰 본문</p>

                    <hr class="review-divider">

                    <div th:id="|reply-section-${rev['reviewIdx']}|" class="rounded-4 p-3 store-reply-area">
                        <div th:if="${rev['replyContent'] != null and rev['replyContent'] != ''}" class="existing-reply">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-navy text-white me-2">사장님 답변</span>
                                <span class="text-muted small reply-date" th:text="${rev['replyRegDate'] ?: '방금 전'}">날짜</span>
                            </div>
                            <p class="text-secondary mb-0 small reply-text" th:text="${rev['replyContent']}">답변 내용</p>
                        </div>

                        <div th:unless="${rev['replyContent'] != null and rev['replyContent'] != ''}" class="reply-input-wrapper">
                            <div class="input-group">
                                <textarea th:id="|reply-input-${rev['reviewIdx']}|"
                                          class="form-control border-0 bg-white shadow-none rounded-start-3 reply-textarea"
                                          rows="2" placeholder="고객님께 따뜻한 답변을 남겨주세요."></textarea>
                                <button class="btn btn-orange text-white fw-bold px-4 rounded-end-3 reply-submit-btn"
                                        th:data-idx="${rev['reviewIdx']}">등록</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>

        <div th:if="${#lists.isEmpty(safeReviews)}" class="text-center py-5 empty-review-container">
            <i class="bi bi-chat-dots fs-1 text-light d-block mb-3 empty-icon"></i>
            <h5 class="fw-bold text-secondary">작성된 리뷰가 없습니다.</h5>
            <p class="text-muted small">첫 리뷰가 달리면 이곳에서 확인하고 답변하실 수 있습니다.</p>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        
        /**
         * 답글 등록 비동기 처리
         */
        async function handleReplySubmit(idx) {
            const inputElement = document.getElementById(`reply-input-${idx}`);
            if (!inputElement) return;
            
            const replyContent = inputElement.value.trim();

            if (!replyContent) {
                showToast("답변 내용을 입력해 주세요.", "danger");
                inputElement.focus();
                return;
            }

            try {
                // 레이아웃 공통 moeatsFetch 사용
                const result = await moeatsFetch('/owner/review/reply_proc', {
                    reviewIdx: idx,
                    replyContent: replyContent
                });

                if (result && result.success) {
                    showToast("답변이 성공적으로 등록되었습니다.", "success");
                    
                    // 성공 시 해당 영역만 HTML 교체 (클래스 기반 애니메이션 위임)
                    const section = document.getElementById(`reply-section-${idx}`);
                    section.innerHTML = `
                        <div class="d-flex align-items-center mb-2 new-reply-fade">
                            <span class="badge bg-navy text-white me-2">사장님 답변</span>
                            <span class="text-muted small">방금 전</span>
                        </div>
                        <p class="text-secondary mb-0 small new-reply-text">${replyContent}</p>
                    `;
                } else {
                    showToast(result.message || "답글 등록에 실패했습니다.", "danger");
                }
            } catch (error) {
                showToast("서버와 통신 중 오류가 발생했습니다.", "danger");
            }
        }

        /**
         * 이벤트 위임 바인딩
         */
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.querySelector(".review-container");
            if (container) {
                container.addEventListener("click", (e) => {
                    if (e.target.classList.contains("reply-submit-btn")) {
                        const idx = e.target.getAttribute("data-idx");
                        handleReplySubmit(idx);
                    }
                });
            }
        });
        /*]]>*/
    </script>
</th:block>
</html>
