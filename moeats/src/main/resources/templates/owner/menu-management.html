<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content" class="container-fluid px-4" style="max-width: 900px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-2 pb-3" style="border-color: var(--moeats-navy) !important;">
        <div>
            <h2 class="fw-bold mb-0 text-navy"><i class="bi bi-egg-fried me-2 text-orange"></i>메뉴 관리</h2>
            <p class="text-secondary small mb-0 mt-1">매장의 메뉴 현황을 실시간으로 관리합니다.</p>
        </div>
        <button class="btn btn-primary rounded-pill px-4 py-2 shadow-sm fw-bold" 
                style="background-color: var(--moeats-orange); border: none;"
                th:onclick="|location.href='/owner/menu/register'|">
            <i class="bi bi-plus-lg me-1"></i>신규 메뉴 등록
        </button>
    </div>

    <div class="d-flex gap-2 mb-4 overflow-auto pb-2 no-scrollbar" th:with="safeCats=${categoryList ?: {}}">
        <button class="btn btn-dark rounded-pill px-4 shadow-sm btn-sm fw-bold category-filter active" data-cat="all">전체</button>
        <button th:each="cat : ${safeCats}" 
                class="btn btn-outline-secondary rounded-pill px-4 bg-white text-dark shadow-sm btn-sm border fw-bold category-filter"
                th:data-cat="${cat['categoryName'] ?: '미분류'}"
                th:text="${cat['categoryName'] ?: '미분류'}">카테고리</button>
    </div>

    <div class="menu-list-container" th:with="safeList=${menuList ?: {}}">
        <th:block th:if="${not #lists.isEmpty(safeList)}">
            <div th:each="menu : ${safeList}" 
                 th:id="|menu-card-${menu['menuIdx'] ?: 0}|"
                 th:data-category="${menu['categoryName'] ?: '일반'}"
                 class="card mb-3 border-0 shadow-sm rounded-4 overflow-hidden bg-white menu-item-card" 
                 th:classappend="${menu['isSoldOut'] == 'Y'} ? 'sold-out-mode'">
                
                <div class="card-body d-flex align-items-center p-3">
                    <div class="flex-shrink-0">
                        <img th:src="${menu['menuImg'] ?: 'https://via.placeholder.com/150/FF8000/FFFFFF?text=No+Image'}" 
                             class="rounded-3 border shadow-sm" 
                             style="width: 85px; height: 85px; object-fit: cover;"
                             onerror="this.src='https://via.placeholder.com/150/FF8000/FFFFFF?text=No+Image'">
                    </div>
                    
                    <div class="flex-grow-1 ms-3">
                        <div class="badge bg-light text-navy mb-1 fw-bold border" th:text="${menu['categoryName'] ?: '일반'}">카테고리</div>
                        <h5 class="fw-bold mb-1 text-navy" th:text="${menu['menuName'] ?: '이름 없는 메뉴'}">메뉴명</h5>
                        <p class="fw-bold mb-0 text-orange" 
                           th:text="|${#numbers.formatInteger(menu['menuPrice'] ?: 0, 0, 'COMMA')}원|">0원</p>
                    </div>

                    <div class="text-center me-4 px-3 border-start border-end">
                        <label class="text-secondary d-block fw-bold mb-2" style="font-size: 0.75rem;">품절 설정</label>
                        <div class="form-check form-switch d-inline-block p-0 m-0">
                            <input class="form-check-input cursor-pointer" type="checkbox" role="switch" 
                                   style="width: 48px; height: 24px;"
                                   th:id="|soldout-switch-${menu['menuIdx'] ?: 0}|"
                                   th:checked="${menu['isSoldOut'] == 'Y'}"
                                   th:onchange="toggleMenuSoldOut([[${menu['menuIdx'] ?: 0}]], this.checked)">
                        </div>
                    </div>

                    <div class="d-flex flex-column gap-2">
                        <button class="btn btn-outline-dark btn-sm rounded-pill px-3 fw-bold" 
                                th:onclick="|location.href='/owner/menu/edit?menuIdx=' + ${menu['menuIdx'] ?: 0}|">
                            수정
                        </button>
                        <button class="btn btn-link text-danger btn-sm text-decoration-none p-0 fw-bold"
                                th:onclick="deleteMenu([[${menu['menuIdx'] ?: 0}]])">삭제</button>
                    </div>
                </div>
            </div>
        </th:block>

        <div th:if="${#lists.isEmpty(safeList)}" class="text-center py-5 bg-white rounded-4 shadow-sm border border-dashed">
            <i class="bi bi-egg-fried fs-1 text-light d-block mb-3 opacity-50"></i>
            <p class="text-muted fw-bold">등록된 메뉴가 없습니다.</p>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <style>
        .sold-out-mode { opacity: 0.5; filter: grayscale(1); background-color: #fcfcfc !important; }
        .category-filter.active { background-color: var(--moeats-navy) !important; color: white !important; }
    </style>
    <script th:inline="javascript">
        async function toggleMenuSoldOut(idx, isChecked) {
            if(!idx) return;
            const targetCard = document.getElementById(`menu-card-${idx}`);
            try {
                const result = await moeatsFetch('/owner/menu/toggle-soldout', {
                    menuIdx: idx,
                    isSoldOut: isChecked ? 'Y' : 'N'
                });
                if (result && result.success) {
                    isChecked ? targetCard.classList.add('sold-out-mode') : targetCard.classList.remove('sold-out-mode');
                } else {
                    alert("변경 실패");
                    location.reload();
                }
            } catch (e) { console.error(e); }
        }

        async function deleteMenu(idx) {
            if(!idx || !confirm("삭제하시겠습니까?")) return;
            const result = await moeatsFetch('/owner/menu/delete', { menuIdx: idx });
            if(result && result.success) location.reload();
        }

        // 필터 로직
        document.querySelectorAll('.category-filter').forEach(btn => {
            btn.addEventListener('click', function() {
                const cat = this.getAttribute('data-cat');
                document.querySelectorAll('.category-filter').forEach(b => b.classList.remove('active', 'btn-dark'));
                this.classList.add('active', 'btn-dark');
                document.querySelectorAll('.menu-item-card').forEach(card => {
                    card.style.display = (cat === 'all' || card.getAttribute('data-category') === cat) ? 'block' : 'none';
                });
            });
        });
    </script>
</th:block>
</html>
