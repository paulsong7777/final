<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">

<div layout:fragment="content">
    <h2>가게 영업 정보 설정</h2>
    <hr>

    <form th:action="@{/owner/store/update_proc}" th:object="${store_vo}" method="post">
        <table border="1" style="width: 100%; border-collapse: collapse;">
            <tr>
                <th style="width: 200px; padding: 10px;">가게 식별 번호(idx)</th>
                <td style="padding: 10px;">
                    <input type="text" name="store_idx" th:value="*{store_idx}" readonly style="background-color: #f0f0f0;">
                </td>
            </tr>
            <tr>
                <th style="padding: 10px;">가게명</th>
                <td style="padding: 10px;">
                    <input type="text" name="store_name" th:value="*{store_name}" required>
                </td>
            </tr>
            <tr>
                <th style="padding: 10px;">최소 주문 금액</th>
                <td style="padding: 10px;">
                    <input type="number" name="min_order_price" th:value="*{min_order_price}"> 원
                </td>
            </tr>
            <tr>
                <th style="padding: 10px;">영업 시간</th>
                <td style="padding: 10px;">
                    <input type="time" name="open_time" th:value="*{open_time}"> ~ 
                    <input type="time" name="close_time" th:value="*{close_time}">
                </td>
            </tr>
            <tr>
                <th style="padding: 10px;">정기 휴무일</th>
                <td style="padding: 10px;">
                    <input type="text" name="off_days" th:value="*{off_days}" placeholder="예: 매주 월요일">
                </td>
            </tr>
            <tr>
                <th style="padding: 10px;">가게 소개글</th>
                <td style="padding: 10px;">
                    <textarea name="store_desc" rows="5" style="width: 90%;" th:text="*{store_desc}"></textarea>
                </td>
            </tr>
        </table>
        
        <div style="margin-top: 20px; text-align: center;">
            <button type="submit" style="padding: 10px 40px; font-weight: bold; cursor: pointer;">설정 저장하기</button>
            <a th:href="@{/owner/dashboard}" style="margin-left: 20px;">[ 취소 ]</a>
        </div>
    </form>
</div>
</html>
