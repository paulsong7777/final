<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<head>
    <title>매장 설정 - MoEats</title>
    </head>

<body>
<main layout:fragment="content" class="store-setting-page">
    <div class="card shadow-sm border-0 mx-auto rounded-4 bg-white store-main-card">
        <div class="card-body p-4 p-md-5">
            
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-2 pb-3 store-header-area">
                <h2 class="fw-bold mb-0 text-navy"><i class="bi bi-shop me-2 text-orange"></i>매장 설정</h2>
                <a th:href="@{/owner/dashboard}" class="text-decoration-none text-secondary small fw-bold back-link">
                    <i class="bi bi-speedometer2 me-1"></i>대시보드 이동
                </a>
            </div>

            <form id="storeSettingForm" onsubmit="return false;" novalidate>
                
                <div class="mb-4 row align-items-center store-form-row">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase form-label-title">대표 사진</label>
                    <div class="col-md-9">
                        <div id="dropZone" class="bg-light rounded-3 p-4 text-center position-relative store-image-dropzone">
                            <input type="file" name="storeImg" id="storeImg" accept="image/*" 
                                   class="position-absolute w-100 h-100 opacity-0 top-0 start-0 input-file-cursor" 
                                   onchange="handleFiles(this.files)">
                            
                            <div id="uploadContent" class="py-2 upload-placeholder" th:classappend="${storeVo['storeImg'] != null} ? 'd-none' : ''">
                                <i class="bi bi-cloud-arrow-up text-muted fs-1 icon-upload"></i>
                                <p class="mt-2 mb-1 fw-bold text-navy upload-msg">클릭하거나 이미지를 드래그하여 업로드하세요</p>
                            </div>
                            
                            <div id="imagePreview" class="preview-wrapper" th:classappend="${storeVo['storeImg'] == null} ? 'd-none' : ''">
                                <div class="position-relative d-inline-block shadow-sm rounded-3 overflow-hidden border store-img-container">
                                    <img id="previewImg" th:src="${storeVo['storeImg']}" alt="미리보기" class="store-img-fit">
                                </div>
                                <p class="small text-orange fw-bold mt-2 mb-0 change-img-msg">클릭하여 사진 변경</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-4 row align-items-center store-form-row">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase form-label-title">매장 번호</label>
                    <div class="col-md-9">
                        <input type="text" name="storeIdx" th:value="${storeVo['storeIdx'] ?: 0}" 
                               class="form-control fw-bold py-2 rounded-3 custom-store-input readonly-input" readonly>
                    </div>
                </div>

                <div class="mb-4 row align-items-center store-form-row">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase form-label-title">매장명</label>
                    <div class="col-md-9">
                        <input type="text" name="storeName" th:value="${storeVo['storeName'] ?: ''}" 
                               class="form-control py-3 fw-bold text-navy rounded-3 custom-store-input" 
                               required placeholder="매장 이름을 입력하세요">
                    </div>
                </div>

                <div class="mb-4 row align-items-center store-form-row">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase form-label-title">최소 주문 금액</label>
                    <div class="col-md-9">
                        <div class="input-group store-input-group">
                            <input type="number" name="minimumOrderAmount" th:value="${storeVo['minimumOrderAmount'] ?: 0}" 
                                   class="form-control py-3 text-end fw-bold rounded-start-3 custom-store-input" required min="0">
                            <span class="input-group-text border-0 bg-light text-navy fw-bold rounded-end-3 unit-text">원</span>
                        </div>
                    </div>
                </div>

                <div class="mb-4 row align-items-center store-form-row">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase form-label-title">영업 시간</label>
                    <div class="col-md-9">
                        <div class="d-flex align-items-center gap-2 time-input-wrapper">
                            <input type="time" name="openTime" th:value="${storeVo['openTime'] ?: '09:00'}" 
                                   class="form-control py-3 text-center fw-bold rounded-3 custom-store-input">
                            <span class="fw-bold text-muted px-1 separator">~</span>
                            <input type="time" name="closeTime" th:value="${storeVo['closeTime'] ?: '22:00'}" 
                                   class="form-control py-3 text-center fw-bold rounded-3 custom-store-input">
                        </div>
                    </div>
                </div>

                <div class="mb-4 row align-items-center store-form-row">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase form-label-title">휴무일</label>
                    <div class="col-md-9">
                        <select id="offDaysSelect" name="offDays" class="form-select py-3 fw-bold text-navy rounded-3 mb-2 custom-store-input select-pointer" 
                                onchange="toggleDirectInput(this.value)">
                            <option value="연중무휴" th:selected="${storeVo['offDays'] == '연중무휴' or storeVo['offDays'] == null}">연중무휴</option>
                            <option value="월요일" th:selected="${storeVo['offDays'] == '월요일'}">월요일</option>
                            <option value="화요일" th:selected="${storeVo['offDays'] == '화요일'}">화요일</option>
                            <option value="수요일" th:selected="${storeVo['offDays'] == '수요일'}">수요일</option>
                            <option value="목요일" th:selected="${storeVo['offDays'] == '목요일'}">목요일</option>
                            <option value="금요일" th:selected="${storeVo['offDays'] == '금요일'}">금요일</option>
                            <option value="토요일" th:selected="${storeVo['offDays'] == '토요일'}">토요일</option>
                            <option value="일요일" th:selected="${storeVo['offDays'] == '일요일'}">일요일</option>
                            <option value="direct">직접 입력 (복수 선택 등)</option>
                        </select>
                        <input type="text" id="offDaysDirect" class="form-control py-3 fw-bold text-navy rounded-3 d-none custom-store-input" 
                               placeholder="예: 토요일, 일요일 또는 격주 화요일">
                    </div>
                </div>

                <div class="mb-4 row store-form-row">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase pt-2 form-label-title">매장 소개</label>
                    <div class="col-md-9">
                        <textarea name="storeDescription" rows="4" class="form-control py-3 fw-bold rounded-3 no-resize-area custom-store-input" 
                                  th:text="${storeVo['storeDescription'] ?: ''}" 
                                  placeholder="고객들에게 보여줄 매장 소개를 적어주세요"></textarea>
                    </div>
                </div>

                <div class="text-center mt-5 pt-3 border-top action-area">
                    <button type="button" id="saveBtn" class="btn btn-orange-action text-white fw-bold w-100 py-3 rounded-pill fs-5 shadow-sm"
                            onclick="handleStoreUpdate()">
                        매장 정보 저장하기
                    </button>
                    <a th:href="@{/owner/dashboard}" class="text-decoration-none text-muted small fw-bold d-block mt-3 cancel-link">취소하고 돌아가기</a>
                </div>
            </form>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        function toggleDirectInput(value) {
            const directInput = document.getElementById('offDaysDirect');
            if (value === 'direct') {
                directInput.classList.remove('d-none');
                directInput.focus();
            } else {
                directInput.classList.add('d-none');
                directInput.value = '';
            }
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('storeImg');

        if(dropZone) {
            dropZone.addEventListener('dragover', (e) => { 
                e.preventDefault(); 
                dropZone.classList.add('drag-over-active'); // 외부 CSS에서 정의
            });

            dropZone.addEventListener('dragleave', (e) => { 
                e.preventDefault(); 
                dropZone.classList.remove('drag-over-active');
            });

            dropZone.addEventListener('drop', (e) => { 
                e.preventDefault(); 
                dropZone.classList.remove('drag-over-active');
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) { 
                    fileInput.files = e.dataTransfer.files; 
                    handleFiles(e.dataTransfer.files); 
                } 
            });
        }

        function handleFiles(files) {
            if (files && files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('uploadContent').classList.add('d-none');
                    const previewArea = document.getElementById('imagePreview');
                    previewArea.classList.remove('d-none');
                    document.getElementById('previewImg').src = e.target.result;
                }
                reader.readAsDataURL(files[0]);
            }
        }

        async function handleStoreUpdate() {
            const form = document.getElementById('storeSettingForm');
            const storeName = form.querySelector('[name="storeName"]').value.trim();
            
            if(!storeName) { showToast("매장 이름을 입력해 주세요.", "danger"); return; }
            if(!confirm("매장 정보를 업데이트하시겠습니까?")) return;

            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.innerText;
            
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>처리 중...';

            const formData = new FormData(form);
            const offDaysSelect = document.getElementById('offDaysSelect');
            if(offDaysSelect.value === 'direct') {
                const directValue = document.getElementById('offDaysDirect').value.trim();
                formData.set('offDays', directValue || '요일 협의');
            }

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            try {
                const response = await fetch('/owner/store/update_proc', {
                    method: 'POST',
                    headers: { ...(header && { [header]: token }) },
                    body: formData
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const result = await response.json();

                if (result && result.success) {
                    showToast("매장 정보가 성공적으로 변경되었습니다.", "success");
                    setTimeout(() => location.href = '/owner/dashboard', 1000);
                } else {
                    showToast(result.message || "저장에 실패했습니다.", "danger");
                    resetBtn(saveBtn, originalText);
                }
            } catch (error) {
                showToast("통신 중 오류가 발생했습니다.", "danger");
                resetBtn(saveBtn, originalText);
            }
        }

        function resetBtn(btn, text) { 
            btn.disabled = false; 
            btn.innerText = text; 
        }
        /*]]>*/
    </script>
</th:block>
</html>
