<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>각자결제</title>
</head>
<body>
<section layout:fragment="pageContent">
    <section class="mo-section">
        <div class="mo-surface-card">
            <div class="mo-section-label">FE-07</div>
            <h1 class="mo-section-title">각자결제 진행</h1>
            <p class="text-secondary mb-4">내가 담은 메뉴 금액만 결제합니다.</p>

            <div class="d-grid gap-3">
                <div class="p-3 rounded-4 border bg-white">
                    <div class="small text-secondary mb-1">내 결제 금액</div>
                    <div class="fw-bold fs-4"
                         th:text="${#numbers.formatInteger(paymentShare.shareAmount, 0, 'COMMA')} + '원'">0원</div>
                </div>

                <div class="p-3 rounded-4 border bg-white">
                    <div class="small text-secondary mb-1">완료 인원</div>
                    <div class="fw-bold fs-5">
                        <span th:text="${completedCount}">0</span> /
                        <span th:text="${totalCount}">0</span>
                    </div>
                </div>

                <div class="p-3 rounded-4 border bg-white" th:if="${payment.paymentExpiresAt != null}">
                    <div class="small text-secondary mb-1">결제 만료 시각</div>
                    <div class="fw-bold" th:text="${payment.paymentExpiresAt}">만료시각</div>
                </div>

                <form th:action="@{/orders/{orderIdx}/payment/complete(orderIdx=${orderIdx})}" method="post">
                    <button type="submit" class="mo-btn mo-btn-primary w-100">내 금액 결제하기</button>
                </form>

                <div class="p-3 rounded-4 border bg-white">
                    <div class="small text-secondary mb-2">현재 결제 현황</div>
                    <div class="d-grid gap-2">
                        <div th:each="share : ${paymentShares}" class="d-flex justify-content-between align-items-center">
                            <span th:text="${'참여자 ' + share.memberIdx}">참여자</span>
                            <span class="fw-semibold" th:text="${share.shareStatus}">PENDING</span>
                        </div>
                    </div>
                </div>

                <a th:href="@{/orders/{orderIdx}(orderIdx=${orderIdx})}" class="mo-btn mo-btn-outline w-100">주문 상세로 이동</a>
            </div>
        </div>

        <input type="hidden" id="orderIdx" th:value="${orderIdx}">
        <input type="hidden" id="orderSsePageType" value="payment-individual">
    </section>
</section>

<th:block layout:fragment="pageScripts">
    <script th:src="@{/js/order/order-channel.js}"></script>
</th:block>
</body>
</html>
