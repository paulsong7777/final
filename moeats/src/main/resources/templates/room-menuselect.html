<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <meta charset="UTF-8">
    <title>가게 메뉴</title>

</head>

<body>
<section layout:fragment="pageContent">
    <div class="fe02-shell"
         th:with="
            firstMenu=${#lists.isEmpty(menuList) ? null : menuList[0]},
            currentStoreIdx=${firstMenu != null ? firstMenu.storeIdx : 0},
            totalCount=${#lists.size(menuList)},
            soldOutCount=${#aggregates.sum(menuList.![menuStatus == 'SOLD_OUT' ? 1 : 0])},
            availableCount=${totalCount - soldOutCount}
         "
         th:attr="data-store-idx=${currentStoreIdx}">

		<section class="fe02-store-hero">
		    <div class="fe02-store-hero__eyebrow">가게 상세 페이지</div>
		
		    <h1 class="fe02-store-hero__title"
		        th:text="${store != null and store.storeName != null and !#strings.isEmpty(store.storeName) ? store.storeName : '가게 정보'}">
		        가게명
		    </h1>
		
		    <p class="fe02-store-hero__desc"
		       th:text="${store != null and store.storeDescription != null and !#strings.isEmpty(store.storeDescription) ? store.storeDescription : '가게 소개가 아직 등록되지 않았습니다.'}">
		        가게 소개
		    </p>
		
		    <div class="fe02-store-hero__meta">
		        <div class="fe02-store-hero__meta-item">
		            <span class="fe02-store-hero__meta-label">최소주문금액</span>
		            <strong class="fe02-store-hero__meta-value"
		                    th:text="${store != null ? #numbers.formatInteger(store.minimumOrderAmount, 1, 'COMMA') + '원' : '정보 없음'}">
		                0원
		            </strong>
		        </div>
		
		        <div class="fe02-store-hero__meta-item">
		            <span class="fe02-store-hero__meta-label">가게 주소</span>
		            <strong class="fe02-store-hero__meta-value">
		                <span th:text="${store != null and store.storeAddress1 != null ? store.storeAddress1 : '주소 정보 없음'}">
		                    주소
		                </span>
		                <span th:if="${store != null and store.storeAddress2 != null and !#strings.isEmpty(store.storeAddress2)}">
		                    &nbsp;<span th:text="${store.storeAddress2}">상세주소</span>
		                </span>
		            </strong>
		        </div>
		    </div>
		</section>

        <section class="fe02-toolbar">
            <div class="fe02-search">
                <span class="fe02-search__icon">🔍</span>
                <input type="text"
                       id="menuSearchInput"
                       class="form-control"
                       placeholder="메뉴 이름 또는 설명으로 검색">
            </div>

            <div class="fe02-filter" id="menuStatusFilter">
                <button type="button" class="fe02-filter__btn is-active" data-filter="ALL">전체</button>
                <button type="button" class="fe02-filter__btn" data-filter="AVAILABLE">주문 가능</button>
                <button type="button" class="fe02-filter__btn" data-filter="SOLD_OUT">품절</button>
            </div>

            <div class="fe02-summary">
                <span class="mo-chip">노출 메뉴 <strong id="visibleMenuCount" class="ms-1"
                                              th:text="${totalCount}">0</strong></span>
            </div>
        </section>

        <section id="menuList" class="fe02-grid">
            <article class="fe02-card"
                     th:each="menu : ${menuList}"
                     th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? ' is-soldout' : ''"
                     th:attr="
                        data-menu-name=${menu.menuName},
                        data-menu-desc=${menu.menuDescription},
                        data-menu-status=${menu.menuStatus}">

                <div class="fe02-card__thumb">🍽️</div>

                <div class="fe02-card__body">
                    <div class="fe02-card__head">
                        <h2 class="fe02-card__name" th:text="${menu.menuName}">메뉴 이름</h2>

                        <span class="fe02-status fe02-status--available"
                              th:if="${menu.menuStatus == 'AVAILABLE'}">주문 가능</span>
                        <span class="fe02-status fe02-status--soldout"
                              th:if="${menu.menuStatus == 'SOLD_OUT'}">품절</span>
                        <span class="fe02-status fe02-status--available"
                              th:if="${menu.menuStatus != 'AVAILABLE' and menu.menuStatus != 'SOLD_OUT'}"
                              th:text="${menu.menuStatus}">상태</span>
                    </div>

                    <p class="fe02-card__desc"
                       th:text="${menu.menuDescription != null and !#strings.isEmpty(menu.menuDescription) ? menu.menuDescription : '메뉴 설명이 아직 등록되지 않았습니다.'}">
                        메뉴 설명
                    </p>

                    <div class="fe02-card__footer" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 10px;">
					    <strong class="fe02-card__price"
					            th:text="${#numbers.formatInteger(menu.menuPrice, 1, 'COMMA')} + '원'">
					        0원
					    </strong>
					
					    <div class="mo-action-group" th:if="${menu.menuStatus == 'AVAILABLE'}" style="display: flex; align-items: center; gap: 8px;">
					        <div class="mo-quantity-control" style="display: flex; align-items: center; border: 1px solid #ddd; border-radius: 4px; overflow: hidden;">
					            <button type="button" class="btn-qty-minus" th:attr="data-menu-idx=${menu.menuIdx}" style="border: none; background: #f8f9fa; width: 28px; height: 32px; cursor: pointer;">-</button>
					            <input type="number" class="input-qty" th:id="'qty-' + ${menu.menuIdx}" value="1" min="1" max="99" readonly style="width: 36px; height: 32px; border: none; text-align: center; font-weight: bold; outline: none;">
					            <button type="button" class="btn-qty-plus" th:attr="data-menu-idx=${menu.menuIdx}" style="border: none; background: #f8f9fa; width: 28px; height: 32px; cursor: pointer;">+</button>
					        </div>
					        
					        <button type="button"
					                class="mo-btn mo-btn-primary btn-add-cart"
					                style="height: 32px; padding: 0 12px; font-size: 14px;"
					                th:attr="data-menu-idx=${menu.menuIdx},
					                         data-menu-name=${menu.menuName},
					                         data-menu-price=${menu.menuPrice}">
					            담기
					        </button>
					    </div>
					
					    <button type="button"
					            class="mo-btn mo-btn-outline"
					            th:if="${menu.menuStatus == 'SOLD_OUT'}" disabled style="height: 32px;">
					        품절
					    </button>
					</div>
                </div>
            </article>
        </section>

        <div id="menuSearchEmpty" class="fe02-empty d-none">
            <div class="fe02-empty__icon">🍽️</div>
            <h2 class="fe02-empty__title">조건에 맞는 메뉴가 없습니다</h2>
            <p class="fe02-empty__desc">검색어 또는 상태 필터를 바꿔 다시 확인해 주세요.</p>
        </div>

        <div th:if="${#lists.isEmpty(menuList)}" class="fe02-empty">
            <div class="fe02-empty__icon">🍽️</div>
            <h2 class="fe02-empty__title">등록된 메뉴가 없습니다</h2>
            <p class="fe02-empty__desc">현재 가게에 등록된 메뉴가 없어 화면에 표시할 항목이 없습니다.</p>
        </div>
    </div>
    <div id="selectionSummaryBar" class="d-none" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #212529; color: white; padding: 16px 24px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 1050;">
	    <div>
	        <span style="font-size: 14px; opacity: 0.9;">선택한 메뉴 <strong id="totalQtyText" style="color: #ffc107;">0</strong>개</span>
	        <div style="font-size: 18px; font-weight: bold;"><span id="totalPriceText">0</span>원</div>
	    </div>
	    <button type="button" id="btnGoConfirm" style="background: #ffc107; color: #000; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer;">
	        주문 확인하기
	    </button>
	</div>
    
</section>

<th:block layout:fragment="pageScripts">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script th:src="@{/js/room/room-menuselect.js}"></script>    
</th:block>
</body>
</html>
