<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf?.token}">
    <meta name="_csrf_header" th:content="${_csrf?.headerName}">
    <title>MoEats 점주 서비스</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* [MoEats 글로벌 디자인 표준] */
        :root { 
            /* 브랜드 컬러 정의 (글로벌 벤치마킹 기준) */
            --moeats-warm-orange: #FF8000;   /* 메인 Primary */
            --moeats-deep-orange: #E67300;   /* 서브 Secondary */
            --moeats-lime-green: #32CD32;    /* Accent 컬러 (카드 및 포인트) */
            --moeats-bg-white: #FFFFFF;      /* 기본 배경 */
            
            /* UI 상태 컬러 (신호등 체계) */
            --status-red: #FF4D4D;      /* 선택중 / 경고 */
            --status-yellow: #FFD700;   /* 결제중 / 대기 */
            --status-green: #28A745;    /* 주문완료 / 성공 */
            
            --header-height: 65px; 
        }

        body { 
            background-color: var(--moeats-bg-white); 
            padding-top: var(--header-height); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; 
        }
        
        /* 헤더: Warm Orange 기반 */
        .navbar { 
            background-color: var(--moeats-warm-orange) !important; 
            border-bottom: 3px solid var(--moeats-deep-orange); 
            height: var(--header-height); 
            z-index: 1060; 
        }
        
        /* 사이드바: Lime Green 강조 포인트 적용 */
        .offcanvas { 
            background-color: #FFFFFF !important; 
            width: 280px !important; 
            border-right: 2px solid var(--moeats-lime-green); 
            z-index: 1070; 
        }
        .sidebar-divider { border-top: 1px solid #eee; margin: 15px 20px; }
        
        /* 메뉴 캡슐 스타일 */
        .nav-capsule { 
            display: flex !important; align-items: center; padding: 14px 20px; 
            border-radius: 12px; text-decoration: none !important; transition: all 0.2s ease-in-out; 
            margin: 0 15px 6px 15px; border: 1px solid transparent; cursor: pointer !important;
            color: #333 !important;
        }
        .nav-capsule i { color: var(--moeats-warm-orange) !important; font-size: 1.25rem; margin-right: 14px; pointer-events: none; }
        .nav-capsule span { font-size: 1.05rem; font-weight: 600; pointer-events: none; }
        
        /* 호버 시 라임그린 포인트 */
        .nav-capsule:hover { 
            background-color: rgba(50, 205, 50, 0.1) !important; 
            transform: translateX(5px); 
            border-left: 4px solid var(--moeats-lime-green);
        }
        
        /* 활성화 시: 오렌지 그라데이션 버튼 스타일 */
        .nav-capsule.active { 
            background: linear-gradient(135deg, var(--moeats-warm-orange), var(--moeats-deep-orange)) !important; 
            box-shadow: 0 4px 12px rgba(255, 128, 0, 0.3); 
            color: #ffffff !important;
        }
        .nav-capsule.active i, .nav-capsule.active span { color: #ffffff !important; }

        /* 토스트 및 기타 */
        .toast-container { z-index: 3000 !important; }
        #sidebarTrigger { z-index: 1100 !important; position: relative; }
        main[layout\:fragment="content"] { padding-top: 25px !important; }
    </style>
    <th:block layout:fragment="css"></th:block>
</head>
<body>

<nav class="navbar navbar-dark fixed-top">
    <div class="container-fluid">
        <button id="sidebarTrigger" class="navbar-toggler border-0 shadow-none" type="button" onclick="handleSidebarToggle()">
            <i class="bi bi-list fs-2 text-white"></i>
        </button>
        <a class="navbar-brand ms-3 fw-bold text-white" th:href="@{/owner/dashboard}">Mo-Eats</a>
        <div class="ms-auto d-flex align-items-center">
            <span class="text-white small fw-bold me-2 d-none d-md-inline" 
                  th:text="${session.ownerName ?: '관리자'} + '님 환영합니다'"></span>
            <i class="bi bi-person-circle fs-4 text-white"></i>
        </div>
    </div>
</nav>

<div class="offcanvas offcanvas-start" id="ownerSidebar" tabindex="-1">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title fw-bold" style="color: var(--moeats-warm-orange);">STORE ADMIN</h5>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0 pt-4">
        <div class="d-flex flex-column h-100">
            <a th:href="@{/owner/dashboard}" class="nav-capsule" th:classappend="${menu == 'dash'} ? 'active'">
                <i class="bi bi-grid-1x2-fill"></i> <span class="menu-text">실시간 주문 현황</span>
            </a>
            <a th:href="@{/owner/order/detail}" class="nav-capsule" th:classappend="${menu == 'order_detail'} ? 'active'">
                <i class="bi bi-search"></i> <span class="menu-text">주문 상세 관리</span>
            </a>
            <a th:href="@{/owner/order/history}" class="nav-capsule" th:classappend="${menu == 'history'} ? 'active'">
                <i class="bi bi-clock-history"></i> <span class="menu-text">주문 내역 조회</span>
            </a>

            <div class="sidebar-divider"></div>

            <a th:href="@{/owner/menu/management}" class="nav-capsule" th:classappend="${menu == 'menu_list'} ? 'active'">
                <i class="bi bi-journal-text"></i> <span class="menu-text">메뉴 목록 관리</span>
            </a>
            <a th:href="@{/owner/menu/register}" class="nav-capsule" th:classappend="${menu == 'menu_reg'} ? 'active'">
                <i class="bi bi-plus-circle-dotted"></i> <span class="menu-text">신규 메뉴 등록</span>
            </a>
            <a th:href="@{/owner/category/setting}" class="nav-capsule" th:classappend="${menu == 'category'} ? 'active'">
                <i class="bi bi-collection"></i> <span class="menu-text">카테고리 구성 설정</span>
            </a>

            <div class="sidebar-divider"></div>

            <a th:href="@{/owner/review/review-management}" class="nav-capsule" th:classappend="${menu == 'review'} ? 'active'">
                <i class="bi bi-chat-right-text"></i> <span class="menu-text">리뷰 및 답변 관리</span>
            </a>
            <a th:href="@{/owner/sales/report}" class="nav-capsule" th:classappend="${menu == 'report'} ? 'active'">
                <i class="bi bi-bar-chart-line"></i> <span class="menu-text">영업 리포트 분석</span>
            </a>

            <div class="sidebar-divider"></div>

            <a th:href="@{/owner/store/setting}" class="nav-capsule" th:classappend="${menu == 'store'} ? 'active'">
                <i class="bi bi-sliders"></i> <span class="menu-text">매장 설정</span>
            </a>
            
            <a th:href="@{/owner/support/notice}" class="nav-capsule" th:classappend="${menu == 'notice'} ? 'active'">
                <i class="bi bi-exclamation-triangle" style="color: var(--status-red) !important;"></i> 
                <span class="menu-text">등록된 매장이 없음</span>
            </a>

            <a href="/menu/register" class="nav-capsule" th:classappend="${menu == 'menu_none'} ? 'active'">
                <i class="bi bi-patch-question"></i> <span class="menu-text">메뉴 없음 테스트</span>
            </a>
        </div>
    </div>
</div>

<main layout:fragment="content" class="container-fluid px-4 pb-5"></main>

<div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
    <div id="moeatsToast" class="toast align-items-center text-white border-0 rounded-3 shadow" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-bold" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    let gToast, bsOffcanvas;

    function handleSidebarToggle() {
        const sidebarEl = document.getElementById('ownerSidebar');
        if (!sidebarEl) return;
        if (!bsOffcanvas) bsOffcanvas = new bootstrap.Offcanvas(sidebarEl);
        bsOffcanvas.toggle();
    }

    document.addEventListener('DOMContentLoaded', function() {
        const sidebarEl = document.getElementById('ownerSidebar');
        if (sidebarEl) bsOffcanvas = new bootstrap.Offcanvas(sidebarEl);
        
        const tEl = document.getElementById('moeatsToast');
        if(tEl) gToast = new bootstrap.Toast(tEl, { delay: 3000, autohide: true });
    });

    function showToast(msg, type = 'success') {
        const tEl = document.getElementById('moeatsToast');
        const mEl = document.getElementById('toastMessage');
        if(!tEl || !mEl || !gToast) return;
        tEl.className = `toast align-items-center text-white border-0 rounded-3 shadow bg-${type}`;
        mEl.innerText = msg;
        gToast.show();
    }

    async function moeatsFetch(url, data) {
        const token = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...(header && { [header]: token }) },
                body: JSON.stringify(data)
            });
            return await response.json();
        } catch (e) { return { success: false }; }
    }

    function relayout() {
        console.log("Map Relayout Called");
    }
</script>
<th:block layout:fragment="script"></th:block>
</body>
</html>
