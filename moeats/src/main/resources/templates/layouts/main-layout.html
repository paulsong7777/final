<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="_csrf" th:content="${_csrf?.token}">
    <meta name="_csrf_header" th:content="${_csrf?.headerName}">

    <title>MoEats 점주 서비스</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --moeats-navy: #1A1E3B;
            --moeats-orange: #FF8000;
            --header-height: 65px;
        }

        body {
            background-color: #F8F9FA;
            padding-top: var(--header-height);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
        }

        /* [Layout] 네비게이션 및 사이드바 스타일 고정 */
        .navbar {
            background-color: var(--moeats-navy) !important;
            border-bottom: 2px solid var(--moeats-orange);
            height: var(--header-height);
            z-index: 1060;
        }

        .offcanvas {
            background-color: var(--moeats-navy) !important;
            width: 280px !important;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1070;
        }

        /* 사이드바 캡슐 디자인 (Anti-Null 처리 포함) */
        .nav-capsule {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none !important;
            color: #ffffff !important;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .nav-capsule.active {
            background: linear-gradient(135deg, #FF8000, #FF6A00) !important;
            box-shadow: 0 4px 12px rgba(255, 128, 0, 0.3);
            font-weight: 700;
        }

        .nav-capsule i { color: var(--moeats-orange); margin-right: 12px; font-size: 1.2rem; }
        .nav-capsule.active i, .nav-capsule.active span { color: #fff !important; }

        /* [Map] 지도 컨테이너 표준 ID 및 초기 높이 확보 */
        #moeats-map {
            width: 100%;
            height: 100%;
            min-height: 550px;
            background: #eee;
            border-radius: 20px;
        }

        /* CSS 파서 오류 방지용 이스케이프 */
        main[layout\:fragment="content"] { padding-top: 25px !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark fixed-top">
    <div class="container-fluid">
        <button id="sidebarTrigger" class="navbar-toggler border-0 shadow-none" type="button">
            <i class="bi bi-list fs-2 text-white"></i>
        </button>

        <a class="navbar-brand ms-3 fw-bold text-orange" th:href="@{/owner/dashboard}">Mo-Eats</a>

        <div class="ms-auto d-flex align-items-center">
            <span class="text-white small fw-bold me-2 d-none d-md-inline" 
                  th:text="${session.ownerName ?: '관리자'} + '님 환영합니다'"></span>
            <i class="bi bi-person-circle fs-4 text-white"></i>
        </div>
    </div>
</nav>

<div class="offcanvas offcanvas-start" id="ownerSidebar" tabindex="-1" data-bs-backdrop="true">
    <div class="offcanvas-header border-bottom border-secondary border-opacity-25">
        <h5 class="offcanvas-title fw-bold text-orange">STORE ADMIN</h5>
        <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0 pt-4">
        <div th:replace="~{layouts/sidebar :: ownerSidebar}"></div>
    </div>
</div>

<main layout:fragment="content" class="container-fluid px-4 pb-5"></main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /* [작업 철칙] 테스트 데이터 스위치 보존 */
    const IS_EMPTY_DATA_TEST = /*[[${IS_EMPTY_DATA_TEST ?: false}]]*/ false;

    document.addEventListener('DOMContentLoaded', function() {
        // 1. 사이드바 트리거 강제 바인딩 (안 열리는 문제 해결)
        const trigger = document.getElementById('sidebarTrigger');
        const sidebarEl = document.getElementById('ownerSidebar');
        if (trigger && sidebarEl) {
            const bsOffcanvas = new bootstrap.Offcanvas(sidebarEl);
            trigger.addEventListener('click', () => bsOffcanvas.toggle());
        }
    });

    /**
     * [AJAX 원칙] 공통 Fetch API (CSRF 무결성)
     */
    async function moeatsFetch(url, data) {
        const token = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;
        try {
            const response = await fetch(url, {
                method: 'POST', // [Rule] POST 고정
                headers: { 
                    'Content-Type': 'application/json',
                    ...(header && { [header]: token })
                },
                body: JSON.stringify(data)
            });
            return await response.json();
        } catch (e) {
            console.error("[moeatsFetch Error]:", e);
            return { success: false, message: "통신 오류 발생" };
        }
    }

    /**
     * [Map 원칙] 지도 리레이아웃 표준화 (지도가 안 나오는 문제 해결 핵심)
     */
    function bindMapRelayout(map) {
        const sidebarEl = document.getElementById('ownerSidebar');
        if (!sidebarEl || !map) return;

        // 사이드바가 열릴 때 지도가 깨지는 현상 방지
        sidebarEl.addEventListener('shown.bs.offcanvas', function () {
            setTimeout(() => {
                console.log("[Map Sync] Executing relayout...");
                map.relayout();
                map.setCenter(map.getCenter());
            }, 300); // 애니메이션 대기
        });
    }
</script>

<th:block layout:fragment="script"></th:block>
</body>
</html>
