<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="ownerSidebar" id="moeats-sidebar-fragment" class="d-flex flex-column h-100">

    <div class="flex-grow-1" style="position: relative; z-index: 1050;">
        <div class="mb-2">
            <a th:href="@{/owner/dashboard}" class="nav-capsule" th:classappend="${menu == 'dash'} ? 'active'">
                <i class="bi bi-grid-1x2-fill"></i>
                <span class="menu-text">실시간 주문 현황</span>
            </a>
        </div>

        <div class="mb-2">
            <a th:href="@{/owner/order/detail}" class="nav-capsule" th:classappend="${menu == 'order_detail'} ? 'active'">
                <i class="bi bi-search"></i>
                <span class="menu-text">주문 상세 관리</span>
            </a>
        </div>

        <div class="mb-2">
            <a th:href="@{/owner/order/history}" class="nav-capsule" th:classappend="${menu == 'history'} ? 'active'">
                <i class="bi bi-clock-history"></i>
                <span class="menu-text">주문 내역 조회</span>
            </a>
        </div>

        <div class="my-3 border-top border-secondary border-opacity-25 mx-3"></div>

        <div class="mb-2">
            <a th:href="@{/owner/menu/management}" class="nav-capsule" th:classappend="${menu == 'menu_list'} ? 'active'">
                <i class="bi bi-journal-text"></i>
                <span class="menu-text">메뉴 목록 관리</span>
            </a>
        </div>

        <div class="mb-2">
            <a th:href="@{/owner/menu/register}" class="nav-capsule" th:classappend="${menu == 'menu_reg'} ? 'active'">
                <i class="bi bi-plus-circle-dotted"></i>
                <span class="menu-text">신규 메뉴 등록</span>
            </a>
        </div>

        <div class="mb-2">
            <a th:href="@{/owner/category/setting}" class="nav-capsule" th:classappend="${menu == 'category'} ? 'active'">
                <i class="bi bi-collection"></i>
                <span class="menu-text">카테고리 구성 설정</span>
            </a>
        </div>

        <div class="my-3 border-top border-secondary border-opacity-25 mx-3"></div>

        <div class="mb-2">
            <a th:href="@{/owner/review/review-management}" class="nav-capsule" th:classappend="${menu == 'review'} ? 'active'">
                <i class="bi bi-chat-right-text"></i>
                <span class="menu-text">리뷰 및 답변 관리</span>
            </a>
        </div>

        <div class="mb-2">
            <a th:href="@{/owner/sales/report}" class="nav-capsule" th:classappend="${menu == 'report'} ? 'active'">
                <i class="bi bi-bar-chart-line"></i>
                <span class="menu-text">영업 리포트 분석</span>
            </a>
        </div>

        <div class="my-3 border-top border-secondary border-opacity-25 mx-3"></div>

        <div class="mb-2">
            <a th:href="@{/owner/store/setting}" class="nav-capsule" th:classappend="${menu == 'store'} ? 'active'">
                <i class="bi bi-sliders"></i>
                <span class="menu-text">매장 등록 폼</span>
            </a>
        </div>

        <div class="mb-2">
            <a th:href="@{/owner/support/notice}" class="nav-capsule" th:classappend="${menu == 'notice'} ? 'active'">
                <i class="bi bi-exclamation-triangle"></i>
                <span class="menu-text">등록된 매장이 없음</span>
            </a>
        </div>

        <div class="mb-2">
            <a href="/menu/register" class="nav-capsule" th:classappend="${menu == 'menu_none'} ? 'active'">
                <i class="bi bi-patch-question"></i>
                <span class="menu-text">등록된 메뉴 없음</span>
            </a>
        </div>

    </div>
</div>

<style>
    /* [기존 고장 방지 스타일 유지] */
    #moeats-sidebar-fragment {
        pointer-events: auto !important;
    }

    #moeats-sidebar-fragment .nav-capsule {
        display: flex !important;
        align-items: center;
        padding: 14px 20px;
        border-radius: 12px;
        text-decoration: none !important;
        transition: all 0.2s ease-in-out;
        margin: 0 15px 6px 15px;
        border: 1px solid transparent;
        cursor: pointer !important;
        position: relative;
        z-index: 1100 !important; 
    }

    #moeats-sidebar-fragment .nav-capsule i,
    #moeats-sidebar-fragment .nav-capsule span {
        pointer-events: none; 
        user-select: none;
    }

    #moeats-sidebar-fragment .nav-capsule span {
        color: #FFFFFF !important;
        font-size: 1.05rem;
        font-weight: 600;
    }

    #moeats-sidebar-fragment .nav-capsule i {
        color: #FF8000 !important;
        font-size: 1.25rem;        
        margin-right: 14px;
    }

    #moeats-sidebar-fragment .nav-capsule:hover {
        background-color: rgba(255, 128, 0, 0.2) !important;
        transform: translateX(5px);
    }

    #moeats-sidebar-fragment .nav-capsule.active {
        background: linear-gradient(135deg, #FF8000, #FF6A00) !important;
        box-shadow: 0 4px 12px rgba(255, 128, 0, 0.3);
    }

    #moeats-sidebar-fragment .nav-capsule.active span,
    #moeats-sidebar-fragment .nav-capsule.active i {
        color: #ffffff !important;
    }

    #moeats-sidebar-fragment .menu-text {
        white-space: nowrap;
    }
</style>

</body>
</html>
