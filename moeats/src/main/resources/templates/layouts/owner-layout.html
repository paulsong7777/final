<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf?.token}">
    <meta name="_csrf_header" th:content="${_csrf?.headerName}">
    <title layout:title-pattern="$CONTENT_TITLE - MoEats Owner">MoEats 점주 서비스</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --moeats-orange: #FF8000; --moeats-green: #32CD32; --header-h: 70px; }
        body { background-color: #f4f7f6; padding-top: var(--header-h); font-family: 'Noto Sans KR', sans-serif; }
        .navbar { background-color: var(--moeats-orange) !important; height: var(--header-h); border-bottom: 4px solid #E67300; }
        .offcanvas { border-right: 4px solid var(--moeats-green); width: 280px !important; }
        .nav-capsule { display: flex; align-items: center; padding: 10px 20px; margin: 2px 15px; border-radius: 12px; text-decoration: none; color: #555 !important; font-weight: 600; transition: 0.2s; font-size: 0.92rem; }
        .nav-capsule i { color: var(--moeats-orange); margin-right: 12px; font-size: 1.1rem; width: 24px; text-align: center; }
        .nav-capsule:hover { background-color: rgba(50, 205, 50, 0.08); color: var(--moeats-orange) !important; }
        .nav-capsule.active { background: linear-gradient(135deg, var(--moeats-orange), #E67300) !important; color: white !important; }
        .nav-capsule.active i { color: white !important; }
        .sidebar-heading { font-size: 0.75rem; color: #bbb; padding: 12px 25px 5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark fixed-top shadow">
    <div class="container-fluid">
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#ownerSidebar">
            <i class="bi bi-list fs-2 text-white"></i>
        </button>
        <a class="navbar-brand ms-2 fw-bold fs-4" th:href="@{/members/dashboard}">MOEATS OWNER</a>
        <div class="ms-auto d-flex align-items-center">
            <span class="text-white me-3 fw-bold" th:text="${(session.member?.memberNickname ?: '사장님') + '님'}"></span>
            <form th:action="@{/logout}" method="post" class="m-0"><button type="submit" class="btn btn-sm bg-white text-orange rounded-pill px-3 fw-bold">로그아웃</button></form>
        </div>
    </div>
</nav>

<div class="offcanvas offcanvas-start shadow" id="ownerSidebar" tabindex="-1">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title fw-bold text-success">점주 핵심 관리</h5>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0 pt-2">
        
        <div class="sidebar-heading">Main & Orders</div>
        <a th:href="@{/members/dashboard}" class="nav-capsule" th:classappend="${menu == 'dash'} ? 'active'"><i class="bi bi-speedometer2"></i> 대시보드(신규)</a>
        
        <a th:href="@{/owners/dashboard-map}" class="nav-capsule" th:classappend="${menu == 'dash-map'} ? 'active'"><i class="bi bi-map"></i> 대시보드(지도)</a>
        
        <a th:href="@{/owner/order/detail}" class="nav-capsule" th:classappend="${menu == 'order-detail'} ? 'active'"><i class="bi bi-search"></i> 주문 상세 조회</a>
        <a th:href="@{/owner/order/list}" class="nav-capsule" th:classappend="${menu == 'order-list'} ? 'active'"><i class="bi bi-receipt"></i> 현재 주문 내역</a>

        <div class="sidebar-heading">Store Management</div>
        <a th:href="@{/owner/store/new}" class="nav-capsule" th:classappend="${menu == 'store-new'} ? 'active'"><i class="bi bi-shop"></i> 신규 매장 등록</a>
        <a th:href="@{/owner/store/setting}" class="nav-capsule" th:classappend="${menu == 'store'} ? 'active'"><i class="bi bi-pencil-square"></i> 매장 정보 수정</a>

        <div class="sidebar-heading">Menus & Reviews</div>
        
        <a th:href="@{/owners/all-image}" class="nav-capsule" th:classappend="${menu == 'all-img'} ? 'active'"><i class="bi bi-images"></i> 통합 이미지 보관함</a>
        
        <a th:href="@{/owner/menu/register}" class="nav-capsule" th:classappend="${menu == 'menu-reg'} ? 'active'"><i class="bi bi-plus-square"></i> 신규 메뉴 등록</a>

        <a th:href="@{/owner/menu/edit}" class="nav-capsule" th:classappend="${menu == 'menu-edit'} ? 'active'"><i class="bi bi-pencil-fill"></i> 메뉴 수정</a>
        
        <a th:href="@{/owner/menu/management}" class="nav-capsule" th:classappend="${menu == 'menu-mgmt'} ? 'active'"><i class="bi bi-toggle-on"></i> 메뉴 품절 관리</a>
        
        <a th:href="@{/owners/store-menu-category}" class="nav-capsule" th:classappend="${menu == 'category'} ? 'active'"><i class="bi bi-tags"></i> 카테고리 설정</a>
        
        <a th:href="@{/owners/store-menu-category/write}" class="nav-capsule" th:classappend="${menu == 'category-reg'} ? 'active'"><i class="bi bi-plus-circle-dotted"></i> 신규 카테고리 등록</a>
        
        <a th:href="@{/owner/review/management}" class="nav-capsule" th:classappend="${menu == 'review'} ? 'active'"><i class="bi bi-chat-right-text"></i> 리뷰 답변 관리</a>

        <div class="sidebar-heading">Reports</div>
        <a th:href="@{/owner/sales/report}" class="nav-capsule" th:classappend="${menu == 'report'} ? 'active'"><i class="bi bi-bar-chart-line"></i> 영업 리포트</a>

    </div>
</div>

<main layout:fragment="content" class="container-fluid px-4 pb-5 mt-4"></main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block layout:fragment="script"></th:block>
</body>
</html>
