<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf?.token}">
    <meta name="_csrf_header" th:content="${_csrf?.headerName}">
    <title layout:title-pattern="$CONTENT_TITLE - MoEats Owner">MoEats 점주 서비스</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { 
            --moeats-warm-orange: #FF8000; 
            --moeats-deep-orange: #E67300; 
            --moeats-lime-green: #32CD32;
            --header-height: 65px; 
        }
        body { background-color: #f8f9fa; padding-top: var(--header-height); font-family: 'Noto Sans KR', sans-serif; }
        .navbar { background-color: var(--moeats-warm-orange) !important; border-bottom: 3px solid var(--moeats-deep-orange); height: var(--header-height); }
        .offcanvas { border-right: 3px solid var(--moeats-lime-green); width: 280px !important; }
        .nav-capsule { 
            display: flex; align-items: center; padding: 12px 20px; margin: 0 15px 5px;
            border-radius: 10px; text-decoration: none; color: #333 !important; font-weight: 600; transition: 0.2s;
        }
        .nav-capsule i { color: var(--moeats-warm-orange); margin-right: 12px; font-size: 1.2rem; }
        .nav-capsule:hover { background-color: rgba(50, 205, 50, 0.1); border-left: 4px solid var(--moeats-lime-green); }
        .nav-capsule.active { background: linear-gradient(135deg, var(--moeats-warm-orange), var(--moeats-deep-orange)) !important; color: white !important; }
        .nav-capsule.active i { color: white !important; }
        .sidebar-divider { border-top: 1px solid #eee; margin: 15px 20px; }
        
        /* 안내 메뉴 전용 스타일 */
        .nav-guide { background-color: #fff9f0; border: 1px dashed var(--moeats-warm-orange); margin-top: 5px; }
        .nav-guide:hover { background-color: #fff0db; }
    </style>
    <th:block layout:fragment="css"></th:block>
</head>
<body>

<nav class="navbar navbar-dark fixed-top shadow-sm">
    <div class="container-fluid">
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#ownerSidebar">
            <i class="bi bi-list fs-2 text-white"></i>
        </button>
        <a class="navbar-brand ms-3 fw-bold" th:href="@{/owner/dashboard}">Mo-Eats 사장님</a>
        <div class="ms-auto d-flex align-items-center">
            <span class="text-white small fw-bold me-2" 
                  th:text="${storeVo != null ? storeVo['storeName'] : '사장님'} + '님'"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-sm btn-outline-light rounded-pill px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="offcanvas offcanvas-start" id="ownerSidebar" tabindex="-1">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title fw-bold text-orange">STORE ADMIN</h5>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0 pt-3">
        <a th:href="@{/owner/dashboard}" class="nav-capsule" th:classappend="${menu == 'dash'} ? 'active'">
            <i class="bi bi-speedometer2"></i> 대시보드
        </a>
        <a th:href="@{/owner/order/list}" class="nav-capsule" th:classappend="${menu == 'order'} ? 'active'">
            <i class="bi bi-clock-history"></i> 주문 내역 조회
        </a>
        <div class="sidebar-divider"></div>
        <a th:href="@{/owner/menu/management}" class="nav-capsule" th:classappend="${menu == 'menu'} ? 'active'">
            <i class="bi bi-journal-text"></i> 메뉴 관리
        </a>
        <a th:href="@{/owner/category/setting}" class="nav-capsule" th:classappend="${menu == 'category'} ? 'active'">
            <i class="bi bi-collection"></i> 카테고리 관리
        </a>
        <div class="sidebar-divider"></div>
        <a th:href="@{/owner/store/setting}" class="nav-capsule" th:classappend="${menu == 'store'} ? 'active'">
            <i class="bi bi-shop"></i> 매장 정보 수정
        </a>
        <a th:href="@{/owner/sales/report}" class="nav-capsule" th:classappend="${menu == 'report'} ? 'active'">
            <i class="bi bi-bar-chart-line"></i> 영업 리포트
        </a>
        <div class="sidebar-divider"></div>
        <a th:href="@{/owner/review/management}" class="nav-capsule" th:classappend="${menu == 'review'} ? 'active'">
            <i class="bi bi-chat-right-text"></i> 리뷰 답변 관리
        </a>

        <div th:if="${storeVo == null or #lists.isEmpty(menuList)}" class="sidebar-divider"></div>

        <a th:if="${storeVo == null}" th:href="@{/owner/dashboard}" class="nav-capsule nav-guide text-danger">
            <i class="bi bi-patch-exclamation-fill text-danger"></i> 매장 등록 안내
        </a>

        <a th:if="${#lists.isEmpty(menuList)}" th:href="@{/owner/menu/management}" class="nav-capsule nav-guide text-warning">
            <i class="bi bi-plus-square-fill text-warning"></i> 메뉴 등록 안내
        </a>
    </div>
</div>

<main layout:fragment="content" class="container-fluid px-4 pb-5 mt-4"></main>

<div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
    <div id="moeatsToast" class="toast align-items-center text-white border-0 shadow" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-bold" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
/*<![CDATA[*/
    async function moeatsFetch(url, data) {
        const token  = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    ...(header && { [header]: token }) 
                },
                body: JSON.stringify(data)
            });
            if (!response.ok) throw new Error("서버 응답 에러");
            return await response.json();
        } catch (e) { 
            console.error(e);
            return { success: false, message: "통신 오류가 발생했습니다." }; 
        }
    }

    function showToast(message, type = 'success') {
        const toastEl  = document.getElementById('moeatsToast');
        const toastMsg = document.getElementById('toastMessage');
        if (!toastEl || !toastMsg) return;
        toastMsg.innerText = message;
        toastEl.className  = `toast align-items-center text-white border-0 shadow bg-${type}`;
        new bootstrap.Toast(toastEl, { delay: 2000 }).show();
    }
/*]]>*/
</script>
<th:block layout:fragment="script"></th:block>
</body>
</html>
