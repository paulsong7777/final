<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

</head>

<body>

<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h2>주문방 생성</h2>
    <p>가게를 선택하고 주문방 설정을 완료하세요.</p>

    <!--
        [플로우]
        가게 상세(/stores/{idx}) → 여기서 생성 → POST /rooms → room-detail.html
    -->

    <form th:action="@{/rooms}" method="post" id="roomCreateForm">

        <!-- 가게 정보 (가게 상세에서 넘어올 때 hidden으로 전달) -->
        <input type="hidden" th:name="storeIdx" th:value="${store?.storeIdx}" id="storeIdx">

        <section>
            <h3>선택된 가게</h3>
            <p>
                가게명:
                <strong th:text="${store?.storeName}">테스트 가게</strong>
            </p>
            <p>
                최소 주문 금액:
                <span th:text="${#numbers.formatInteger(store?.minimumOrderAmount ?: 0, 1, 'COMMA')}">0</span>원
            </p>
            <!-- 테스트용: 가게 db가 없을 때 직접 선택하거나 직접 입력하라 -->
            <div th:if="${store == null}">
                <label for="storeIdxInput">가게 번호 직접 입력 (테스트용)</label>
                <input type="number" id="storeIdxInput" name="storeIdxDirect" placeholder="가게 IDX">
            </div>
        </section>

        <section>
            <h3>배송지 선택</h3>
            <!-- 배송지 목록은 컨트롤러에서 model에 addressList로 전달 -->
            <select name="deliveryAddressIdx" id="deliveryAddressIdx" required>
                <option value="">-- 배송지를 선택하세요 --</option>
                <option th:each="addr : ${addressList}"
                        th:value="${addr.deliveryAddressIdx}"
                        th:text="${addr.addressNickname} + ' - ' + ${addr.roadAddress}">
                    배송지 예시
                </option>
            </select>
            <br>
            <a th:href="@{/members/{idx}/addresses/new(idx=${session.loginMember?.memberIdx})}">
                + 새 배송지 추가
            </a>
        </section>

        <section>
            <h3>결제 방식</h3>
            <label>
                <input type="radio" name="paymentMode" value="REPRESENTATIVE" id="payRepresentative" required>
                대표결제 (방장이 전체 금액 일괄 결제)
            </label>
            <br>
            <label>
                <input type="radio" name="paymentMode" value="INDIVIDUAL" id="payIndividual">
                각자결제 (참여자 각자 본인 금액 결제 / 5분 타이머 적용)
            </label>
        </section>

        <section>
            <h3>인원 설정 (선택)</h3>
            <label for="maxParticipants">최대 참여 인원</label>
            <input type="number" id="maxParticipants" name="maxParticipants"
                   min="2" max="20" placeholder="제한 없음">
        </section>

        <section>
            <button type="submit" id="btnCreateRoom">주문방 생성하기</button>
            <button type="button" id="btnCancelCreate"
                    onclick="history.back()">취소</button>
        </section>

    </form>

    <!--
        [테스트용 네비게이션 버튼]
        실제 백엔드 연동 전 화면 이동 확인용
    -->
    <hr>
    <section id="testNav">
        <p><strong>[테스트] 페이지 이동 확인용</strong></p>
        <button type="button"
                onclick="location.href='/rooms/test-room/detail'">
            → 주문방 협업화면으로 이동 (방장)
        </button>
        <button type="button"
                onclick="location.href='/room/join'">
            → 주문방 참여화면으로 이동
        </button>
    </section>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:src="@{/js/room-create.js}"></script>

</body>
</html>
