<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
			xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
			layout:decorate="~{/layouts/main_layout}">

<div layout:fragment="content">
    <h2>주문방 생성</h2>
    <p>가게를 선택하고 주문방 설정을 완료하세요.</p>

    <!--
        [플로우] : 방장밖에 볼 수 없는 페이지이므로 바로 room-detail 직행. 분기없음
        가게 상세(/stores/{idx}) → 여기서 생성 → POST /room → room-detail.html
        [관계자]
        방장
    -->

    <form th:action="@{/rooms}" method="post" id="roomCreateForm">

        <!-- 가게 정보 (가게 상세에서 넘어올 때 hidden으로 전달) -->
        <input type="hidden" th:name="storeIdx" th:value="${store?.storeIdx}" id="storeIdx">
        <!-- 방장 정보는 session에 memberIdx가 저장되어 있으므로 별도로 주입할 필요가 없다 -->

        <section>
            <h3>선택된 가게</h3>
            <p>
                가게명:
                <strong th:text="${store?.storeName}">테스트 가게</strong>
            </p>
            <p>
                최소 주문 금액:
                <span th:text="${#numbers.formatInteger(store?.minimumOrderAmount ?: 0, 1, 'COMMA')}">0</span>원
            </p>
            <!-- 테스트용: 가게 db가 없을 때 직접 선택하거나 직접 입력하라. 넘어온 db 있는 정상 플로우에서는 안 뜨는 항목 -->
            <div th:if="${store == null}">
                <label for="storeIdxInput">가게 번호 직접 입력 (테스트용)</label>
                <input type="number" id="storeIdxInput" name="storeIdxDirect" placeholder="가게 IDX">
            </div>
        </section>

        <section>
            <h3>배송지 선택</h3>
            <!-- 배송지 목록은 컨트롤러에서 model에 addressList로 전달(변수명으로 별도생성)받아서 forEach형 반복문으로 option을 여러개 생성 -->
            <select name="deliveryAddressIdx" id="deliveryAddressIdx" required>
                <option value="">-- 배송지를 선택하세요 --</option>
                <!-- addressList에서 값을 하나씩 뽑아서 표기는 addressLabel로 하고 실제로 서버에는 deliveryAddressIdx값을 전송한다 -->
                <option th:each="addr : ${addressList}"
                        th:value="${addr.deliveryAddressIdx}"
                        th:text="${addr.addressLabel}">
                    배송지 예시
                </option>
            </select>
            <br>
            <!-- 새로 배송지를 추가하기 위해 링크를 보내면서 session상의 memberIdx를 같이 보내겠다.  -->
            <a th:href="@{/members/{idx}/addresses/new(idx=${session.loginMember?.memberIdx})}">
                + 새 배송지 추가
            </a>
        </section>

        <section>
            <h3>결제 방식</h3>
            <label>
                <input type="radio" name="paymentMode" value="REPRESENTATIVE" id="payRepresentative" checked required>
                대표결제 (방장이 전체 금액을 일괄 결제합니다)
            </label>
            <br>
            <label>
                <input type="radio" name="paymentMode" value="INDIVIDUAL" id="payIndividual">
                각자결제 (참여자 각자가 본인의 금액을 결제합니다 / 결제 제한시간 5분)
            </label>
        </section>

        <section>
            <h3>인원 설정 (선택)</h3>
            <label for="maxParticipants">최대 참여 인원</label>
            <input type="number" id="maxParticipants" name="maxParticipants"
                   min="2" max="20" placeholder="제한 없음">
        </section>

        <section>
            <button type="submit" id="btnCreateRoom">주문방 생성하기</button>
            <button type="button" id="btnCancelCreate"
                    onclick="history.back()">취소</button>
        </section>

    </form>

    <!--
        [테스트용 네비게이션 버튼]
        실제 백엔드 연동 전 화면 이동 확인용
    -->
    <hr>
    <section id="testNav">
        <p><strong>[테스트] 페이지 이동 확인용</strong></p>
        <button type="button" onclick="document.getElementById('roomCreateForm').submit();">
   			→ 주문방 생성 및 이동 (막힘. 그냥 실제 주문방 생성버튼 눌러)
		</button>
        <button type="button"
                onclick="location.href='/room/join'">
            → 주문방 참여화면으로 이동
        </button>
    </section>
	
	<!-- 	<script th:src="@{/js/room-create.js}"></script> 	
	<script th:src="@{/js/test/room-test-logic.js}"></script>	-->
	<script src="/js/jquery-3.7.1.min.js"></script>
	<script src="/js/room-create.js"></script> 
	<script src="/js/test/room-test-logic.js"></script>

</div>

</html>
