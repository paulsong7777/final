<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="siteFooter">
    <footer class="mo-footer mt-auto">
        <div class="container mo-footer__inner">
            <div class="mo-footer__brand-card">
                <div class="mo-brand mo-brand--footer">
                    <span class="mo-brand__symbol">M</span>
                    <span class="mo-brand__text">Mo-Eats</span>
                </div>
                <p class="mo-footer__brand-copy">
                    함께 주문을 모으고, 빠르게 확정하는 그룹 오더 서비스
                </p>
            </div>

            <div class="mo-footer__links row g-4">
                <div class="col-6 col-lg-3">
                    <div class="mo-footer__title">서비스</div>
                    <a th:href="@{/}" class="mo-footer__link">가게찾기</a>
                    <a th:href="@{/stores}" class="mo-footer__link">가게 상세</a>
                    <a th:href="@{/stores}" class="mo-footer__link">메뉴 탐색</a>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="mo-footer__title">주문</div>
                    <a th:href="@{/rooms/join}" class="mo-footer__link">주문방 참여</a>
                    <a th:href="@{/orders}" class="mo-footer__link">주문 진행</a>
                    <a th:href="@{/orders/history}" class="mo-footer__link">주문 내역</a>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="mo-footer__title">계정</div>
                    <a th:href="@{/login}" class="mo-footer__link">로그인</a>
                    <a th:href="@{/account/addresses}" class="mo-footer__link">주소록</a>
                    <a th:href="@{/orders}" class="mo-footer__link">내 주문</a>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="mo-footer__title">운영</div>
                    <a th:href="@{/owner/orders}" class="mo-footer__link">점주센터</a>
                    <span class="mo-footer__link mo-footer__link--muted">Tier 1 기준 운영 화면</span>
                    <span class="mo-footer__link mo-footer__link--muted">DELIVERY / ONSITE 정식 분기는 추후 확장</span>
                </div>
            </div>
        </div>
        <div class="mo-footer__bottom">
            <div class="container mo-footer__bottom-inner">
                <span>© 2026 Mo-Eats. All rights reserved.</span>
                <span>Bootstrap 5.3 / Thymeleaf Layout 기준</span>
            </div>
        </div>
    </footer>
</th:block>
</html>
