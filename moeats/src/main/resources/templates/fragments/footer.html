	  <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mo-Eats Footer - Subtle Line Version</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Mo-Eats 브랜드 컬러 적용 */
        #global-footer {
            background-color: #252D59; /* 요청하신 메인 네이비 */
            /* 얇은 선 적용: #2A3659 컬러로 1px 설정 */
            border-top: 1px solid #2A3659 !important; 
            color: #ffffff; 
        }

        .footer-text {
            font-size: 0.82rem;
            color: #b0b8c1; /* 가독성을 위한 부드러운 회색 */
            line-height: 1.8;
            letter-spacing: -0.01em;
        }

        /* 오렌지색 포인트 (전화번호나 브랜드명에만 살짝) */
        .point-color {
            color: #FF8C00;
            font-weight: 600;
        }

        .copyright {
            margin-top: 12px;
            display: block;
            font-size: 0.78rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container-fluid px-0">
        <footer class="row mt-5 mx-0" id="global-footer">
            <div class="col text-center py-4">
                <p class="footer-text mb-0">
                    <span class="point-color">고객상담 및 전화주문: 1234-5678</span> | 사업자등록번호: 111-11-123456<br>
                    대표이사: 유서윤 | <strong>모잇츠(Mo-Eats)</strong> | 통신판매업 서울 제 2026-000000호<br>
                    개인정보관리책임자: 임꺽정 | 분쟁조정기관표시: 소비자보호원, 전자거래분쟁중재위원회<br>
                    <span class="copyright">Copyright © 2026 Mo-Eats Corp. All Rights Reserved.</span>
                </p>
            </div>
        </footer>
    </div>
</body>
</html>
