<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Mo-Eats 회원가입</title>
</head>
<section layout:fragment="pageContent">
	<div class="mo-page-container container">
		
		<div class="mo-section" style="text-align: center; margin-bottom: 32px;">
			<span class="mo-section-label">Join Mo-Eats</span>
			<h2 class="mo-section-title">회원가입 유형 선택</h2>
			<p class="mo-helper-text mt-2">환영합니다! 어떤 서비스가 필요하신가요?</p>
		</div>
		
		<div class="row" style="row-gap: 20px; max-width: 800px; margin: 0 auto;">
			<div class="col-md-6">
				<div class="mo-surface-card d-flex flex-column" style="text-align: center; height: 100%;">
					<div style="font-size: 48px; margin-bottom: 16px;">🍔</div>
					<h3 class="mo-store-card__title">일반회원</h3>
					<ul style="list-style: none; padding: 0; margin: 16px 0 24px; color: var(--mo-text-soft); font-size: 14px; line-height: 1.8;">
						<li>✔️ 맛있는 음식 주문</li>
						<li>✔️ 편리한 배달 주소 관리</li>
						<li>✔️ 한눈에 보는 주문 내역</li>
					</ul>
					<div style="margin-top: auto;">
						<button type="button" class="mo-btn mo-btn-primary" style="width: 100%;" th:onclick="|location.href='@{/members/new-user}'|">
							일반회원으로 시작하기
						</button>
					</div>
				</div>
			</div>
		
			<div class="col-md-6">
				<div class="mo-surface-card d-flex flex-column" style="text-align: center; height: 100%;">
					<div style="font-size: 48px; margin-bottom: 16px;">🏪</div>
					<h3 class="mo-store-card__title">사업자회원</h3>
					<ul style="list-style: none; padding: 0; margin: 16px 0 24px; color: var(--mo-text-soft); font-size: 14px; line-height: 1.8;">
						<li>✔️ 우리 가게 등록</li>
						<li>✔️ 쉬운 메뉴 관리</li>
						<li>✔️ 실시간 주문 관리</li>
					</ul>
					<div style="margin-top: auto;">
						<button type="button" class="mo-btn mo-btn-outline" style="width: 100%;" th:onclick="|location.href='@{/members/new-owner}'|">
							사업자회원으로 시작하기
						</button>
					</div>
				</div>
			</div>
		</div>
		
		<div class="mo-section" style="text-align: center; margin-top: 40px;">
			<p style="color: var(--mo-navy-strong); font-size: 15px; font-weight: 700;">
				이미 계정이 있으신가요? 
				<a th:href="@{/login}" style="color: var(--mo-primary); text-decoration: underline; margin-left: 4px;">로그인</a>
			</p>
			
			<p class="mo-helper-text" style="margin-top: 16px; margin-bottom: 24px;">
				회원가입 시 이용약관 및 개인정보처리방침에 동의하게 됩니다.
			</p>
			
			<button type="button" class="mo-btn mo-btn-plain" th:onclick="|location.href='@{/main}'|">
				메인으로 돌아가기
			</button>
		</div>
		
	</div>
</section>
</html>
