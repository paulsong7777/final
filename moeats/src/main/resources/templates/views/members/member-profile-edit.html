<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
	
<head>
    <meta charset="UTF-8">
    <title>Mo-Eats 회원 정보 수정</title>
    <style>
        /* 가짜 비활성화 스타일 (비밀번호 확인 전까지 수정 버튼 비활성화 용도) */
        .fake-disabled {
            background-color: #e9ecef !important;
            border-color: #e9ecef !important;
            color: #adb5bd !important;
            cursor: not-allowed !important;
        }
    </style>
</head>

<section layout:fragment="pageContent">
    
    <div class="mo-page-container container" style="max-width: 680px; margin: 0 auto;">
		
        <div class="mo-section" style="text-align: center; margin-bottom: 32px;">
            <span class="mo-section-label">Edit Profile</span>
            <h2 class="mo-section-title">회원 정보 수정</h2>
            <p class="mo-helper-text mt-2">회원님의 소중한 정보를 안전하게 관리하세요.</p>
        </div>
		
        <div class="mo-surface-card">
            <form th:action="@{/members/me/edit}" method="post" id="memberUpdateForm">
                
                <div class="mb-4">
                    <label class="mo-form-label">* 별 명</label>
                    <input type="text" class="form-control mo-form-control mo-valid-name" name="memberNickname" th:value="${session.member.memberNickname}" readonly style="background-color: var(--mo-bg); color: var(--mo-text-soft);">
                </div>

                <div class="mb-4">
                    <label class="mo-form-label">* 아이디 (이메일)</label>
                    <input type="text" class="form-control mo-form-control" name="memberEmail" th:value="${session.member.memberEmail}" readonly style="background-color: var(--mo-bg); color: var(--mo-text-soft);">
                </div>

                <div class="mb-4">
                    <label class="mo-form-label">* 기존 비밀번호</label>
                    <div class="d-flex align-items-center gap-2">
                        <input type="password" class="form-control mo-form-control" name="memberPassword" id="memberPassword" style="flex: 1;" placeholder="기존 비밀번호를 입력하세요">
                        <button type="button" class="mo-btn mo-btn-outline" id="btnPassCheck" style="white-space: nowrap;">비밀번호 확인</button>
                    </div>
                </div>
                
                <hr style="border-color: var(--mo-line); margin: 32px 0;">

                <div class="row mb-4">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label for="pass1" class="mo-form-label">새 비밀번호</label>
                        <input type="password" class="form-control mo-form-control" name="pass1" id="pass1" placeholder="변경할 비밀번호">
                    </div>
                    <div class="col-md-6">
                        <label for="pass2" class="mo-form-label">새 비밀번호 확인</label>
                        <input type="password" class="form-control mo-form-control" name="pass2" id="pass2" placeholder="비밀번호 다시 입력">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="phone2" class="mo-form-label">* 휴대폰</label>
                    <div class="d-flex align-items-center gap-2">
                        <input type="hidden" id="originPhone" th:value="${session.member.memberPhone}">
                        <input type="text" name="phone1" id="phone1" maxlength="3" class="form-control mo-form-control text-center" style="width: 90px;">
                        <span style="color: var(--mo-line-strong); font-weight: 700;">-</span>
                        <input type="text" name="phone2" id="phone2" maxlength="4" class="form-control mo-form-control text-center" style="flex: 1;">
                        <span style="color: var(--mo-line-strong); font-weight: 700;">-</span>
                        <input type="text" name="phone3" id="phone3" maxlength="4" class="form-control mo-form-control text-center" style="flex: 1;">
                    </div>
                    <input type="hidden" name="memberPhone" id="memberPhone">
                </div>
                
                <div class="d-flex justify-content-center align-items-center gap-2 mt-5">
                    <input type="button" th:onclick="@{|location.href='/members/me'|}" value="취 소" class="mo-btn mo-btn-plain">
                    <button type="submit" class="mo-btn mo-btn-primary fake-disabled" id="submitBtn" style="min-width: 140px;">정보 수정하기</button>
                </div>
                
            </form>
        </div>
    </div>

    <div class="modal fade mo-auth-modal" id="passwordResultModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content mo-modal-card" style="border: none;">
                <div class="mo-modal-card__header d-flex justify-content-between align-items-center pb-2">
                    <div>
                        <span class="mo-modal-card__eyebrow">Security Check</span>
                        <h5 class="mo-modal-card__title mt-1" style="font-size: 20px;">보안 확인</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="mo-modal-card__footer pt-4 pb-4 text-center">
                    <p id="modalMessage" style="font-size: 15px; font-weight: 700; margin: 0; color: var(--mo-navy-strong);"></p>
                </div>
                <div class="px-4 pb-4">
                    <button type="button" class="mo-btn mo-btn-primary w-100" data-bs-dismiss="modal">확 인</button>
                </div>
            </div>
        </div>
    </div>

</section>

<th:block layout:fragment="pageScripts">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script th:src="@{/js/member.js}"></script>

    <script th:inline="javascript">
        $(function() {
            
        	// 1. 기존 전화번호 분리 세팅
        	const originPhone = $("#originPhone").val();

        	if(originPhone) {
        	    if(originPhone.includes("-")) {
        	        // 1) 하이픈(-)이 포함된 경우 (010-1234-5678)
        	        const phoneParts = originPhone.split("-");
        	        if(phoneParts.length === 3){
        	            $("#phone1").val(phoneParts[0]);
        	            $("#phone2").val(phoneParts[1]);
        	            $("#phone3").val(phoneParts[2]);
        	        }
        	    } else if(originPhone.length >= 10) {
        	        // 2) 하이픈 없이 숫자만 있는 경우 (01012345678)
        	        $("#phone1").val(originPhone.substring(0, 3)); // 010
        	        if(originPhone.length === 11) { // 11자리
        	            $("#phone2").val(originPhone.substring(3, 7));
        	            $("#phone3").val(originPhone.substring(7, 11));
        	        } else { // 10자리 (예전 번호)
        	            $("#phone2").val(originPhone.substring(3, 6));
        	            $("#phone3").val(originPhone.substring(6, 10));
        	        }
        	    }
        	}
        	
            // 2. 전화번호 실시간 입력 제한 (숫자만 입력 및 경고창)
            $("#phone1, #phone2, #phone3").on("input", function() {
                let currentVal = $(this).val();
                if (/[^0-9]/.test(currentVal)) {
                    alert("전화번호는 숫자만 입력 가능합니다.");
                    $(this).val(currentVal.replace(/[^0-9]/g, ''));
                }
            });

            // 모달 띄우기 함수
            function showModal(msg) {
                $("#modalMessage").html(msg);
                $("#passwordResultModal").modal("show");
            }

        	 // 3. 기존 비밀번호 확인 로직 (AJAX 연동)
            $("#btnPassCheck").on("click", function() {
                const password = $("#memberPassword").val();

                if (!password) {
                    showModal("기존 비밀번호를 입력해주세요.");
                    $("#memberPassword").focus();
                    return;
                }

                // 서버로 비밀번호 확인 요청
                $.ajax({
                    url: "/members/password-check", // 비밀번호 확인용 전용 경로 (아래 2번 참고)
                    type: "POST",
                    data: { memberPassword: password },
                    success: function(res) {
                        // res가 true(일치) 또는 false(불일치)로 온다고 가정
                        if (res === true) {
                            showModal('<span style="color: #28a745;">✔️ 인증되었습니다. 정보를 수정하실 수 있습니다.</span>');
                            
                            $("#memberPassword").prop("readonly", true).css("background-color", "var(--mo-bg)");
                            $("#btnPassCheck").prop("disabled", true)
                                              .text("확인완료")
                                              .removeClass("mo-btn-outline")
                                              .addClass("mo-btn-plain")
                                              .css("color", "#28a745");
                            
                            $("#submitBtn").removeClass("fake-disabled"); // 버튼 활성화
                        } else {
                            showModal('<span style="color: #dc3545;">❌ 비밀번호가 틀렸습니다. 다시 확인해주세요.</span>');
                            $("#memberPassword").val("").focus();
                            $("#submitBtn").addClass("fake-disabled"); // 버튼 다시 비활성화
                        }
                    },
                    error: function() {
                        alert("서버 통신 중 오류가 발생했습니다.");
                    }
                });
            });

            // 4. 폼 제출 시 유효성 검사
            $("#memberUpdateForm").on("submit", function(e) {
                // 기존 비밀번호 인증 여부 확인
                if ($("#submitBtn").hasClass("fake-disabled")) {
                    e.preventDefault();
                    showModal("먼저 기존 비밀번호 확인을 진행해주세요.");
                    $("#memberPassword").focus();
                    return false;
                }

                // 새 비밀번호 유효성 검사 (입력한 경우에만 체크)
                const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[\W_]).{8,20}$/;
                const pass1 = $("#pass1").val().trim();
                const pass2 = $("#pass2").val().trim();

                if (pass1 !== "") {
                    if (!passwordRegex.test(pass1)) {
                        e.preventDefault();
                        alert("새 비밀번호는 8~20자, 대소문자/숫자/특수문자를 포함해야 합니다.");
                        $("#pass1").focus();
                        return false;
                    }
                    if (pass1 !== pass2) {
                        e.preventDefault();
                        alert("새 비밀번호와 비밀번호 확인이 일치하지 않습니다.");
                        $("#pass2").focus();
                        return false;
                    }
                }

                // 전화번호 유효성 검사
                const p1 = $("#phone1").val().trim();
                const p2 = $("#phone2").val().trim();
                const p3 = $("#phone3").val().trim();

                if(p1.length !== 3 || p2.length !== 4 || p3.length !== 4){
                    e.preventDefault();
                    alert("전화번호 형식을 확인해주세요 (예: 010-1234-5678)");
                    return false;
                }

                if(!/^\d+$/.test(p1+p2+p3)){
                    e.preventDefault();
                    alert("전화번호는 숫자만 입력해주세요");
                    return false;
                }

                // 유효성 검사 통과 시 히든 input에 전화번호 병합하여 저장
                $("#memberPhone").val(p1 + "-" + p2 + "-" + p3);
            });
        });
    </script>
</th:block>
</html>
