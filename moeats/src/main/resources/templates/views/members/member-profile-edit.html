

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>member-profile-edit/members/me/edit</title>
<style>
body {
	font-family: Arial, sans-serif;
	margin: 40px;
	background: #f7f7f7;
}

.wrap {
	max-width: 720px;
	margin: 0 auto;
	background: #fff;
	padding: 32px;
	border-radius: 16px;
}

h1 {
	margin-top: 0;
}

.path {
	color: #666;
	margin-top: 8px;
}
</style>
</head>
<body>

			<!--
새로운 5자리 우편번호로 회원 주소를 입력 받기 위해 daum.net에서
제공하는 우편번호 찾기 API를 사용하였다.
참고 사이트 : http://postcode.map.daum.net/guide
-->
			<script
				src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
			<div class="row my-5" id="global-content">
				<div class="col">
					<div class="row my-3 text-center">
						<div class="col">
							<h2 class="fs-3 fw-bold">회원 정보 수정</h2>
						</div>
					</div>
					<form th:action="@{/members/me/edit}" method="post" id="memberUpdateForm">
						<div class="row mt-5 mb-3">
							<div class="col-8 offset-2">
								<label for="memberNickname" class="form-label">* 이 름 : </label> <input
									type="text" class="form-control" name="memberNickname" 
									th:value="${session.member.memberNickname}" readonly>
							</div>
						</div>
						<div class="row my-3">
							<div class="col-8 offset-2">
								<label for="memberEmail" class="form-label">* 아이디 : </label>
								<div class="row">
									<div class="col">
										<input type="text" class="form-control" name="memberEmail" 
											th:value="${session.member.memberEmail}" readonly>
									</div>
								</div>
							</div>
						</div>
						<div class="row my-3">
							<div class="col-8 offset-2">
								<label for="memberPassword" class="form-label">* 기존 비밀번호 : </label>
								<div class="row">
									<div class="col-6">
										 <input type="memberPassword" class="form-control"
											name="memberPassword" >
									</div>
									<div class="col-4">
										<input type="button" class="btn btn-warning" id="btnPassCheck"
											value="비밀번호 확인">
									</div>
								</div>
							</div>
						</div>
						<div class="row my-3">
							<div class="col-8 offset-2">
								<label for="pass1" class="form-label">* 새 비밀번호 : </label> <input
									type="password" class="form-control" name="pass1" id="pass1">
							</div>
						</div>
						<div class="row my-3">
							<div class="col-8 offset-2">
								<label for="pass2" class="form-label">* 새 비밀번호 확인 : </label> <input
									type="password" class="form-control" name="pass2" id="pass2">
							</div>
						</div>
					<!-- 	<div class="row my-3">
							<div class="col-8 offset-2">
								<label for="zipcode" class="form-label">* 우편번호 : </label>
								<div class="row">
									<div class="col-4">
										<input type="text" class="form-control" name="zipcode"
											id="zipcode" maxlength="5" readonly
											th:value="${session.member.zipcode}"> -->
									</div>
									<div class="col-4">
										<input type="button" class="btn btn-warning" id="btnZipcode"
											value="우편번호 찾기">
									</div>
								</div>
							</div>
						</div>
						<div class="row my-3">
							<div class="col-8 offset-2">
								<label for="address1" class="form-label">* 자택주소 : </label> 
								<input
									type="text" class="form-control" name="address1" id="address1"
									readonly >
							</div>
						</div>
					
						<div class="row my-3">
							<div class="col-8 offset-2">
								<label for="address2" class="form-label">상세주소 : </label> <input
									type="text" class="form-control" name="address2" id="address2"
									>
							</div>
						</div>
						<div class="row my-3">
							<div class="col-8 offset-2">
								<label for="memberPhone" class="form-label">* 휴 대 폰 : </label> 
								<div class="row">
									<div class="col-md-3">
										<select class="form-select" name="memberPhone">
										<option th:selected="${session.member.memberPhone.split('-')[0] == '010'}">
										010</option>
										<option th:selected="${session.member.memberPhone.split('-')[0] == '011'}">
										011</option>
										<option th:selected="${session.member.memberPhone.split('-')[0] == '016'}">
										016</option>
										<option th:selected="${session.member.memberPhone.split('-')[0] == '017'}">
										017</option>
										<option th:selected="${session.member.memberPhone.split('-')[0] == '018'}">
										018</option>
										<option th:selected="${session.member.memberPhone.split('-')[0] == '019'}">
										019</option>
										</select>
									
									</div>
								</div>
								<input
									type="text" class="form-control" name="memberPhone" 
									>
							</div>
						</div>
						
						
				</div>
				</div>
				</th:block>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Member Profile Edit</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; }
    .wrap { max-width: 720px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 16px; }
    h1 { margin-top: 0; }
    .path { color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Member Profile Edit</h1>
    <p>현재 통합 브랜치 백엔드 검증용 최소 화면입니다.</p>
    <p class="path">template: views/members/member-profile-edit</p>
    <p><a href="/main">메인으로</a></p>
  </div>

</body>
</html>
