<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<head>
    <title>Mo-Eats 마이페이지</title>
    <title>Mo-Eats 마이페이지</title>
</head>
	<th:block layout:fragment="content">
	<div class="row">
		<div class="col">
			
			<div class="row">
				<div class="col">
					<h2>프로필 관리</h2>
				</div>
			</div>
			
			<div class="row">
				<div class="col">
					<div class="row">
						<div class="col">
							이메일
						</div>
					</div>
					<div class="row">
						<div class="col">
							<input type="text" th:value="${session.member.memberEmail}" readonly>
						</div>
					</div>
				</div>
			</div>
			
			
			<div class="row">
				<div class="col">
					<div class="row">
						<div class="col">
							전화번호
						</div>
					</div>
					<div class="row">
						<div class="col">
							<input type="text" th:value="${session.member.memberPhone}" readonly>
						</div>
					</div>
				</div>
			</div>
			
			
			<div class="row">
				<div class="col">
					<div class="row">
						<div class="col">
							닉네임
						</div>
					</div>
					<div class="row">
						<div class="col">
							<input type="text" th:value="${session.member.memberNickname}" readonly>
						</div>
					</div>
				</div>
			</div>
			
			<th:block th:if="${session.member.memberRoleType == 'USER'}">
				<div class="row">
					<div class="col">
						<div class="row">
							<div class="col">
								배달 주소 관리
							</div>
							<div class="col">
								<input type="button" th:onclick="@{location.href='/members/me/addresses'}" value="추가">
							</div>
						</div>
						<div class="row">
							<div class="col">
							<b>기본 주소 : </b>
							<span th:text="${deliveryAddress != null ? deliveryAddress.deliveryLabel: '등록된 주소 없음'}"></span>
								<input type="text" name="deliveryAddress"
								       th:value="${deliveryAddress != null 
								           ? deliveryAddress.deliveryAddress1 
								             + (deliveryAddress.deliveryAddress2 != null ? ' ' + deliveryAddress.deliveryAddress2 : '') 
								           : '등록된 기본 주소 없음'}"
								       readonly>
							</div>
						</div>
						
						<div class="row">
							<div class="col">
								<th:block th:if="${ !#lists.isEmpty(addressList) }">
								<table>
									<thead>
										<tr>
											<th>배달지 명칭</th>
											<th>주소</th>
										</tr>
									</thead>
									<tbody>
										<tr th:block th:each="address : ${addressList}">
											<td th:text="${address.deliveryLabel}"></td>
											<td th:text="${address.deliveryAddress1 + '	' + address.deliveryAddress2}"></td>
										    <td>
										        <input type="button"
										               th:onclick="|location.href='/members/me/addresses/${address.deliveryAddressIdx}/edit'|"
										               value="수정">
										
										        <input type="button"
										               th:onclick="|location.href='/members/me/addresses/${address.deliveryAddressIdx}/delete'|"
										               value="삭제">
											    <!-- 기본주소 표시 -->
											    <span th:if="${address.isActive}">[기본주소]</span>
											
											    <!-- 기본주소 설정 버튼 (기본 아닐 때만) -->
											    <form th:if="${!address.isActive}"
											          th:action="@{/members/me/addresses/{id}/default(id=${address.deliveryAddressIdx})}"
											          method="post"
											          style="display:inline">
											          <input type="hidden" name="redirectUrl" value="/members/me"/>
											        <button type="submit">기본 주소로 변경</button>
											    </form>
										    </td>
										</tr>
									</tbody>
								</th:block>
								</table>
							</div>
						</div>
						
					</div>
				</div>
			</th:block>

			<th:block th:if="${session.member.memberRoleType == 'OWNER'}">
				<div class="row">
					<div class="col">
						<div class="row">
							<div class="col">
								가게 주소 관리
								<input type="button" th:onclick="@{location.href='/owners/store/new'}" value="추가"  style="display:inline">
							</div>
							<div class="col">
							</div>
						</div>
						<div class="row">
							<div class="col">
								<span th:text="${store != null ? store.storeName : '가게 없음'}"></span>
								<input type="text" name="store"
								       th:value="${store != null 
								           ? store.storeAddress1 
								             + (store.storeAddress2!= null ? ' ' + store.storeAddress2 : '') 
								           : '등록된 가게 없음'}"
								       readonly>
									<input type="button" th:onclick="@{location.href='/owners/store/edit'}" value="수정"  style="display:inline">
									
									<!-- 상태 변경 폼 -->
									<th:block th:if="${store.storeStatus == 'INACTIVE'}">
					                    <form th:action="@{/owners/store/status}" method="post" style="display:inline">
					                        <input type="hidden" name="storeIdx" th:value="${store.storeIdx}" />
					                        <input type="hidden" name="storeStatus" value="ACTIVE" />
					                        <input type="hidden" name="redirectUrl" value="/members/me" />
					                        <button type="submit">활성화</button>
					                    </form>
				                    </th:block>
				                    
				                    <th:block th:if="${store.storeStatus == 'ACTIVE'}">
					                    <form th:action="@{/owners/store/status}" method="post" style="display:inline">
					                        <input type="hidden" name="storeIdx" th:value="${store.storeIdx}" />
					                        <input type="hidden" name="storeStatus" value="INACTIVE" />
					                        <input type="hidden" name="redirectUrl" value="/members/me" />
					                        <button type="submit">비활성화</button>
					                    </form>
				                    </th:block>
							</div>
						</div>
					</div>
				</div>
			</th:block>
			
			<div class="row">
				<div class="col">
					<input type="button" th:onclick="@{location.href='/members/me/edit'}" value="회원정보수정">
				</div>
			</div>
			
			<div class="row">
				<div class="col">
					<input type="button" th:onclick="@{|location.href='/main'|}" value="메인으로" class="btn">
					<a href="#">회원탈퇴</a>&nbsp;·&nbsp;
					<a href="/logout">로그아웃</a>
				</div>
			</div>
			
			
		</div>
	</div>
	</th:block>
</html>
