<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
	
<head>
    <title>Mo-Eats 마이페이지</title>
</head>
<section layout:fragment="pageContent">
	<div class="mo-page-container container" style="max-width: 720px; margin: 0 auto;">
		
		<div class="mo-section" style="text-align: center; margin-bottom: 32px;">
			<span class="mo-section-label">My Page</span>
			<h2 class="mo-section-title">마이페이지</h2>
		</div>
		
		<div class="mo-surface-card mb-4" style="padding: 20px 24px;">
			<div class="d-flex justify-content-between align-items-center">
				<h3 class="mo-store-card__title m-0" style="font-size: 18px;">
					<span th:text="${session.member.memberNickname}" style="color: var(--mo-primary);">닉네임</span>님 환영합니다! 👋
				</h3>
                <input type="button" onclick="location.href='/members/me/edit'" value="정보 수정" class="mo-btn mo-btn-outline" style="min-height: 36px; padding: 0 16px; font-size: 13px; border-radius: 999px;">
			</div>
		</div>

		<div class="mo-surface-card mb-4" th:if="${session.member.memberRoleType == 'USER'}">
		    <div class="d-flex justify-content-between align-items-center mb-4">
		        <h3 class="mo-store-card__title m-0">최근 주문 내역</h3>
		        <a href="/members/me/orders" class="mo-btn mo-btn-plain p-0" style="font-size: 13px; color: var(--mo-primary);">전체보기 ></a>
		    </div>
		
		    <th:block th:if="${not #lists.isEmpty(orderList)}">
		        <div class="d-flex flex-column gap-3">
                    <div th:each="order : ${orderList}" 
		                 class="p-3 border rounded-4 shadow-sm" 
		                 style="background: #fff; cursor: pointer;" 
		                 th:data-idx="${order.groupOrder.orderIdx}"
                         th:data-name="${order.groupOrder.storeName}"
                         onclick="openOrderDetail(this.getAttribute('data-idx'), this.getAttribute('data-name'))">
		                
		                <div class="d-flex justify-content-between align-items-start mb-2">
		                    <div>
		                        <span class="text-secondary" style="font-size: 13px;" 
		                              th:with="baseTime=${order.groupOrder.paymentConfirmedAt ?: order.groupOrder.createdAt}"
		                              th:text="${#temporals.format(baseTime.toLocalDateTime().plusHours(9), 'yyyy-MM-dd HH:mm')}">시간</span>
		                        
		                        <h4 class="fw-bold mb-1 mt-1" style="font-size: 16px; color: var(--mo-navy-strong);" 
		                            th:text="${order.groupOrder.storeName}">가게이름</h4>
		                    </div>
		                    
							<div th:switch="${order.groupOrder.orderStatus}">
							    <span th:case="'PAYMENT_PENDING'" class="mo-address-item__badge" style="margin:0; background:#eee; color:#666;">결제대기</span>
							    <span th:case="'PAID'" class="mo-address-item__badge" style="margin:0; background:rgba(220,53,69,0.1); color:#dc3545;">결제완료</span>
							    <span th:case="'ACCEPTED'" class="mo-address-item__badge" style="margin:0; background:rgba(255,128,0,0.1); color:var(--mo-primary);">주문확인</span>
							    <span th:case="'PREPARING'" class="mo-address-item__badge" style="margin:0; background:rgba(40,167,69,0.1); color:#28a745;">조리 중</span>
							    <span th:case="'READY'" class="mo-address-item__badge" style="margin:0; background:rgba(23,162,184,0.1); color:#17a2b8;">조리완료</span>
							    <span th:case="'DELIVERING'" class="mo-address-item__badge" style="margin:0; background:rgba(13,110,253,0.1); color:#0d6efd;">배달 중</span>
							    <span th:case="'COMPLETED'" class="mo-address-item__badge" style="margin:0; background:rgba(42,54,89,0.1); color:var(--mo-navy-strong);">배달완료</span>
							    <span th:case="'CANCELLED'" class="mo-address-item__badge" style="margin:0; background:rgba(108,117,125,0.1); color:#6c757d;">주문취소</span>
							</div>
		                </div>
		            
		                <div class="d-flex justify-content-between align-items-center">
		                    <div class="text-truncate text-secondary" style="font-size: 14px; max-width: 70%;">
		                        <span th:text="${order.groupOrderItems[0].menuNameSnapshot}">메뉴명</span>
		                        <span th:if="${#lists.size(order.groupOrderItems) > 1}" 
		                              th:text="' 외 ' + (${#lists.size(order.groupOrderItems)} - 1) + '개'"> 외 N개</span>
		                    </div>
		                    <div class="fw-bold" style="color: var(--mo-primary); font-size: 15px;" 
		                         th:text="${#numbers.formatInteger(order.groupOrder.orderTotalAmount, 0, 'COMMA')} + '원'">
		                        0원
		                    </div>
		                </div>
		            </div> 
                </div>
		    </th:block>
		
		    <th:block th:if="${#lists.isEmpty(orderList)}">
		        <div class="mo-empty-state mo-empty-state--compact py-4">
		            <p class="mo-empty-state__desc" style="font-size: 13px;">최근 주문한 내역이 없습니다.</p>
		        </div>
		    </th:block>
		</div>

		<th:block th:if="${session.member.memberRoleType == 'USER'}">
			<div class="mo-surface-card mb-4">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h3 class="mo-store-card__title m-0">배달 주소 관리</h3>
                    <input type="button" onclick="location.href='/members/me/addresses'" value="+ 주소 추가" class="mo-btn mo-btn-primary" style="min-height: 36px; padding: 0 14px; font-size: 13px;">
				</div>
				
				<div style="background: rgba(255,128,0,0.05); border: 1px solid rgba(255,128,0,0.2); border-radius: 12px; padding: 16px; margin-bottom: 24px;">
					<div class="d-flex align-items-center gap-2 mb-2">
						<span class="mo-address-item__badge" style="margin: 0;">기본 주소</span>
						<span style="font-weight: 800; color: var(--mo-navy-strong);" th:text="${deliveryAddress != null ? deliveryAddress.deliveryLabel: '등록된 주소 없음'}"></span>
					</div>
					<div style="color: var(--mo-text); font-size: 14px;">
						<span th:text="${deliveryAddress != null ? deliveryAddress.deliveryAddress1 + (deliveryAddress.deliveryAddress2 != null ? ' ' + deliveryAddress.deliveryAddress2 : '') : '등록된 기본 주소가 없습니다.'}"></span>
					</div>
				</div>
				
				<th:block th:if="${ !#lists.isEmpty(addressList) }">
					<div class="mo-address-list">
						<div th:block th:each="address : ${addressList}" class="mo-address-item">
							<div class="mo-address-item__head">
								<div class="d-flex align-items-center gap-2">
									<span class="mo-address-item__label" th:text="${address.deliveryLabel}"></span>
									<span th:if="${address.isActive}" class="mo-address-item__badge" style="margin: 0; min-height: 24px; font-size: 11px;">기본</span>
								</div>
							</div>
							<div class="mo-address-item__text mb-3" th:text="${address.deliveryAddress1 + ' ' + (address.deliveryAddress2 != null ? address.deliveryAddress2 : '')}"></div>
							
							<div class="d-flex gap-2">
                                <input type="button" th:data-url="|/members/me/addresses/${address.deliveryAddressIdx}/edit|" onclick="location.href=this.getAttribute('data-url')" value="수정" class="mo-btn mo-btn-outline" style="min-height: 32px; padding: 0 12px; font-size: 12px;">
								<input type="button" th:data-url="|/members/me/addresses/${address.deliveryAddressIdx}/delete|" onclick="location.href=this.getAttribute('data-url')" value="삭제" class="mo-btn mo-btn-plain" style="min-height: 32px; padding: 0 12px; font-size: 12px; color: #dc3545;">
								
								<form th:if="${!address.isActive}" th:action="@{/members/me/addresses/{id}/default(id=${address.deliveryAddressIdx})}" method="post" style="margin: 0; margin-left: auto;">
									<input type="hidden" name="redirectUrl" value="/members/me"/>
									<button type="submit" class="mo-btn mo-btn-outline" style="min-height: 32px; padding: 0 12px; font-size: 12px; color: var(--mo-primary); border-color: rgba(255,128,0,0.3);">
										기본 주소로 설정
									</button>
								</form>
							</div>
						</div>
					</div>
				</th:block>
				<th:block th:if="${ #lists.isEmpty(addressList) }">
					<div class="mo-empty-state mo-empty-state--compact">
						<p class="mo-empty-state__desc">등록된 배달 주소가 없습니다.<br>새로운 주소를 추가해 주세요.</p>
					</div>
				</th:block>
			</div>
		</th:block>

		<th:block th:if="${session.member.memberRoleType == 'OWNER'}">
			<div class="mo-surface-card mb-4">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h3 class="mo-store-card__title m-0">가게 관리</h3>
				</div>
				
				<th:block th:if="${store != null}">
				    <div class="mo-address-item" style="border-color: rgba(42, 54, 89, 0.15); transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#fafafa'" onmouseout="this.style.backgroundColor='transparent'">
				        
                        <div style="cursor: pointer;" onclick="location.href='/owners/store'">
				            <div class="mo-address-item__head">
				                <div class="d-flex align-items-center gap-2">
				                    <span class="mo-address-item__label" style="font-size: 18px;" th:text="${store.storeName}"></span>
				                    
				                    <span th:if="${store.storeStatus == 'ACTIVE' or store.storeStatus == 'OPEN'}" class="mo-address-item__badge" style="background: rgba(40, 167, 69, 0.1); color: #28a745; margin: 0;">영업중</span>
				                    <span th:if="${store.storeStatus == 'INACTIVE' or store.storeStatus == 'CLOSED'}" class="mo-address-item__badge" style="background: rgba(107, 114, 128, 0.1); color: #6B7280; margin: 0;">영업 종료</span>
				                    <span th:if="${store.storeStatus == 'PAUSED' or store.storeStatus == 'BREAK'}" class="mo-address-item__badge" style="background: rgba(255, 193, 7, 0.1); color: #d39e00; margin: 0;">브레이크 타임</span>
				                </div>
				            </div>
				            <div class="mo-address-item__text mb-4" th:text="${store.storeAddress1 + (store.storeAddress2 != null ? ' ' + store.storeAddress2 : '')}"></div>
				        </div>
				        <div class="d-flex flex-wrap gap-2">
                            <input type="button" onclick="location.href='/owners/store/edit?redirectUrl=/members/me'" value="정보 수정" class="mo-btn mo-btn-outline" style="flex: 1; min-width: 100px;">
				            
				            <form th:if="${store.storeStatus == 'INACTIVE' or store.storeStatus == 'CLOSED' or store.storeStatus == 'PAUSED' or store.storeStatus == 'BREAK'}" th:action="@{/owners/store/status}" method="post" style="margin: 0; flex: 1; min-width: 100px;">
				                <input type="hidden" name="storeIdx" th:value="${store.storeIdx}" />
				                <input type="hidden" name="storeStatus" value="ACTIVE" />
				                <input type="hidden" name="redirectUrl" value="/members/me" />
				                <button type="submit" class="mo-btn mo-btn-primary w-100" th:text="${store.storeStatus == 'PAUSED' or store.storeStatus == 'BREAK' ? '영업 재개' : '영업 시작'}">영업 시작</button>
				            </form>
				            
				            <form th:if="${store.storeStatus == 'ACTIVE' or store.storeStatus == 'OPEN'}" th:action="@{/owners/store/status}" method="post" style="margin: 0; flex: 1; min-width: 100px;">
				                <input type="hidden" name="storeIdx" th:value="${store.storeIdx}" />
				                <input type="hidden" name="storeStatus" value="PAUSED" />
				                <input type="hidden" name="redirectUrl" value="/members/me" />
				                <button type="submit" class="mo-btn w-100" style="background: #FFC107; color: var(--mo-navy-strong); border: none; font-weight: 700;">브레이크</button>
				            </form>
				
				            <form th:if="${store.storeStatus == 'ACTIVE' or store.storeStatus == 'OPEN' or store.storeStatus == 'PAUSED' or store.storeStatus == 'BREAK'}" th:action="@{/owners/store/status}" method="post" style="margin: 0; flex: 1; min-width: 100px;">
				                <input type="hidden" name="storeIdx" th:value="${store.storeIdx}" />
				                <input type="hidden" name="storeStatus" value="INACTIVE" />
				                <input type="hidden" name="redirectUrl" value="/members/me" />
				                <button type="submit" class="mo-btn w-100" style="background: #6B7280; color: #fff; border: none;">영업 종료</button>
				            </form>
				        </div>
				    </div>
				</th:block>
				
				<th:block th:if="${store == null}">
					<div class="mo-empty-state mo-empty-state--compact">
						<p class="mo-empty-state__desc">아직 등록된 가게가 없습니다.<br>사장님의 가게를 추가해 보세요!</p>
					</div>
				</th:block>
			</div>
		</th:block>
		
		<div class="d-flex justify-content-between align-items-center mt-5 mb-4 pl-2 pr-2">
            <input type="button" onclick="location.href='/main'" value="메인으로" class="mo-btn mo-btn-plain">
			
			<div style="font-size: 13px;">
				<a href="#" style="color: var(--mo-text-soft); text-decoration: none;">회원탈퇴</a>
				<span style="color: var(--mo-line-strong); margin: 0 8px;">|</span>
				<a href="/logout" style="color: var(--mo-text-soft); text-decoration: none; font-weight: 700;">로그아웃</a>
			</div>
		</div>
		
	</div>
	
	<div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 24px;">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="fw-bold m-0" style="color: var(--mo-navy-strong);">주문 상세 정보</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="modalContent">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="mo-btn mo-btn-outline w-100" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="pageScripts">
<script th:inline="javascript">
async function openOrderDetail(orderIdx, storeName) {
    const myModal = new bootstrap.Modal(document.getElementById('orderDetailModal'));
    const contentDiv = document.getElementById('modalContent');
    myModal.show();
    
    try {
        const response = await fetch(`/members/me/api/orders/${orderIdx}`);
        const data = await response.json(); 
        
        let itemsHtml = data.groupOrderItems.map(item => `
            <div class="d-flex justify-content-between mb-2 small">
                <span>${item.menuNameSnapshot} x ${item.itemQuantity}</span>
                <span class="fw-bold">${item.itemTotalAmount.toLocaleString()}원</span>
            </div>
        `).join('');

        contentDiv.innerHTML = `
            <div class="mb-3 border-bottom pb-3">
                <div class="small text-secondary mb-1">가게명</div>
                <div class="fw-bold fs-5">${storeName}</div>
            </div>
            <div class="mb-3">
                <div class="small text-secondary mb-2">주문 메뉴</div>
                ${itemsHtml}
            </div>
            <div class="pt-3 border-top d-flex justify-content-between align-items-center">
                <span class="fw-bold">총 결제금액</span>
                <span class="fs-5 fw-bold text-danger">${data.groupOrder.orderTotalAmount.toLocaleString()}원</span>
            </div>
        `;
    } catch (error) {
        contentDiv.innerHTML = `<p class="text-center text-danger">정보를 불러오지 못했습니다.</p>`;
    }
}

 // 🌟 실시간 주문 상태 변경 수신 SSE 🌟
    function initUserSSE() {
        // 화면에 떠있는 최근 주문들의 번호(orderIdx)를 모두 수집합니다.
        const orderElements = document.querySelectorAll('[data-idx]');
        const orderIdxSet = new Set();
        
        orderElements.forEach(el => {
            const idx = el.getAttribute('data-idx');
            if(idx) orderIdxSet.add(idx);
        });

        // 화면에 있는 각 주문 번호마다 파이프를 연결합니다.
        orderIdxSet.forEach(orderIdx => {
            const eventSource = new EventSource(`/members/api/sse/orders/${orderIdx}`);
            
            // 사장님이 상태를 변경하면 SSEService가 'change'라는 이름으로 이벤트를 쏩니다!
            eventSource.addEventListener('change', function(event) {
                // event.data 안에는 바뀐 상태값(예: 'ACCEPTED', 'DELIVERING')이 들어있습니다.
                console.log("주문 상태 변경됨: ", event.data);
                
                // 화면을 새로고침하여 바뀐 상태(배지)를 즉시 보여줍니다.
                window.location.reload();
            });
            
            eventSource.onerror = function() {
                eventSource.close();
            };
        });
    }

    // 화면이 로딩되면 SSE 연결 시작!
    window.addEventListener('load', initUserSSE);

</script>
</th:block>
</html>
