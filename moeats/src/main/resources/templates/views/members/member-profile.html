<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/default}">
<head>
<title>Mo-Eats 마이페이지</title>
<style>
    /* 우측 상단 플로팅 카드 스타일 */
    .floating-order-card {
        position: fixed !important; 
        z-index: 9999 !important; 
        top: 120px !important;  /* 상단 여백을 살짝 늘림 */
        right: 40px !important; /* 오른쪽 여백을 살짝 늘림 */
        width: 300px !important; /* 230px -> 300px로 확대 */
        transition: all 0.3s ease;
        box-shadow: 0 12px 40px rgba(0,0,0,0.15) !important;
        border: 1px solid rgba(0,0,0,0.05) !important;
    }

    /* 반응형: 태블릿/모바일에서는 기존처럼 하단 바 유지 */
    @media (max-width: 991px) {
        .floating-order-card {
            top: auto !important;
            bottom: 15px !important;
            right: 15px !important;
            left: 15px !important;
            width: auto !important;
        }
    }
</style>
</head>
<body>
<div layout:fragment="pageContent" class="container py-5">
    <div class="row">
        <div class="col-lg-12">

            <div class="row">
                <div class="col">
                    <h2>프로필 관리</h2>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="row">
                        <div class="col">이메일</div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <input type="text" th:value="${session.member.memberEmail}"
                                readonly>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="row">
                        <div class="col">전화번호</div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <input type="text" th:value="${session.member.memberPhone}"
                                readonly>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="row">
                        <div class="col">닉네임</div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <input type="text" th:value="${session.member.memberNickname}"
                                readonly>
                        </div>
                    </div>
                </div>
            </div>

            <th:block th:if="${session.member.memberRoleType == 'USER'}">
                <div class="row">
                    <div class="col">
                        <div class="row">
                            <div class="col">배달 주소 관리</div>
                            <div class="col">
                                <input type="button"
                                    th:onclick="@{location.href='/members/me/addresses'}"
                                    value="추가">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col">
                                <b>기본 주소 : </b> <span
                                    th:text="${deliveryAddress != null ? deliveryAddress.deliveryLabel: '등록된 주소 없음'}"></span>
                                <input type="text" name="deliveryAddress"
                                    th:value="${deliveryAddress != null 
                                       ? deliveryAddress.deliveryAddress1 
                                         + (deliveryAddress.deliveryAddress2 != null ? ' ' + deliveryAddress.deliveryAddress2 : '') 
                                       : '등록된 기본 주소 없음'}"
                                    readonly>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col">
                                <th:block th:if="${ !#lists.isEmpty(addressList) }">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>배달지 명칭</th>
                                                <th>주소</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:block th:each="address : ${addressList}">
                                                <td th:text="${address.deliveryLabel}"></td>
                                                <td
                                                    th:text="${address.deliveryAddress1 + '	' + address.deliveryAddress2}"></td>
                                                <td><input type="button"
                                                    th:onclick="|location.href='/members/me/addresses/${address.deliveryAddressIdx}/edit'|"
                                                    value="수정"> <input type="button"
                                                    th:onclick="|location.href='/members/me/addresses/${address.deliveryAddressIdx}/delete'|"
                                                    value="삭제"> <span
                                                    th:if="${address.isActive}">[기본주소]</span> <form th:if="${!address.isActive}"
                                                        th:action="@{/members/me/addresses/{id}/default(id=${address.deliveryAddressIdx})}"
                                                        method="post" style="display: inline">
                                                        <input type="hidden" name="redirectUrl"
                                                            value="/members/me" />
                                                        <button type="submit">기본 주소로 변경</button>
                                                    </form></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </th:block>
                            </div>
                        </div>

                    </div>
                </div>
            </th:block>

            <th:block th:if="${session.member.memberRoleType == 'OWNER'}">
                <div class="row">
                    <div class="col">
                        <div class="row">
                            <div class="col">
                                가게 주소 관리 <input type="button"
                                    th:onclick="@{location.href='/owners/store/new'}" value="추가"
                                    style="display: inline">
                            </div>
                            <div class="col"></div>
                        </div>
                        <div class="row">
                            <div class="col">
                                <span th:text="${store != null ? store.storeName : '가게 없음'}"></span>
                                <input type="text" name="store"
                                    th:value="${store != null 
                                       ? store.storeAddress1 
                                         + (store.storeAddress2!= null ? ' ' + store.storeAddress2 : '') 
                                       : '등록된 가게 없음'}"
                                    readonly> <input type="button"
                                    th:onclick="@{location.href='/owners/store/edit'}" value="수정"
                                    style="display: inline">

                                <th:block th:if="${store.storeStatus == 'INACTIVE'}">
                                    <form th:action="@{/owners/store/status}" method="post"
                                        style="display: inline">
                                        <input type="hidden" name="storeIdx"
                                            th:value="${store.storeIdx}" /> <input type="hidden"
                                            name="storeStatus" value="ACTIVE" /> <input type="hidden"
                                            name="redirectUrl" value="/members/me" />
                                        <button type="submit">활성화</button>
                                    </form>
                                </th:block>

                                <th:block th:if="${store.storeStatus == 'ACTIVE'}">
                                    <form th:action="@{/owners/store/status}" method="post"
                                        style="display: inline">
                                        <input type="hidden" name="storeIdx"
                                            th:value="${store.storeIdx}" /> <input type="hidden"
                                            name="storeStatus" value="INACTIVE" /> <input type="hidden"
                                            name="redirectUrl" value="/members/me" />
                                        <button type="submit">비활성화</button>
                                    </form>
                                </th:block>
                            </div>
                        </div>
                    </div>
                </div>
            </th:block>

            <div class="row">
                <div class="col">
                    <input type="button"
                        th:onclick="@{location.href='/members/me/edit'}" value="회원정보수정">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <input type="button" th:onclick="@{|location.href='/main'|}"
                        value="메인으로" class="btn"> <a href="#">회원탈퇴</a>&nbsp;·&nbsp;
                    <a href="/logout">로그아웃</a>
                </div>
            </div>

        </div> </div> <div class="card border-0 shadow-lg rounded-4 overflow-hidden floating-order-card">
        <div class="card-header border-0 py-3" style="background-color: #252D59; color: white;">
            <h6 class="mb-0 fw-bold"><i class="bi bi-receipt-cutoff me-2"></i>실시간 주문 현황</h6>
        </div>
        <div class="card-body p-4"> <div class="d-flex justify-content-between align-items-center mb-2">
                <strong style="color: #252D59; font-size: 1.1rem;">태산만두</strong>
                <span class="badge" style="background-color: #FF8000; font-size: 0.8rem;">진행중</span>
            </div>
            <p class="card-text text-secondary mb-3" style="font-size: 0.9rem; line-height: 1.5;">
                현재 <strong>3명</strong> 모집 중입니다.<br>
                (목표 인원: 5명)
            </p>
            <a th:href="@{/members/me/orders}" class="btn btn-md w-100 fw-bold"
               style="background-color: #252D59; color: white; border-radius: 8px; padding: 10px 0;">
                자세히 보기
            </a>
        </div>
    </div>
</div> </body>
</html>
