<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
	
<head>
    <title>Mo-Eats 마이페이지</title>
</head>
<section layout:fragment="pageContent">
	<div class="mo-page-container container" style="max-width: 720px; margin: 0 auto;">
		
		<div class="mo-section" style="text-align: center; margin-bottom: 32px;">
			<span class="mo-section-label">My Page</span>
			<h2 class="mo-section-title">마이페이지</h2>
		</div>
		
		<div class="mo-surface-card mb-4" style="padding: 20px 24px;">
			<div class="d-flex justify-content-between align-items-center">
				<h3 class="mo-store-card__title m-0" style="font-size: 18px;">
					<span th:text="${session.member.memberNickname}" style="color: var(--mo-primary);">닉네임</span>님 환영합니다! 👋
				</h3>
				<input type="button" th:onclick="@{location.href='/members/me/edit'}" value="정보 수정" class="mo-btn mo-btn-outline" style="min-height: 36px; padding: 0 16px; font-size: 13px; border-radius: 999px;">
			</div>
		</div>
		
		<th:block th:if="${session.member.memberRoleType == 'USER'}">
			<div class="mo-surface-card mb-4">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h3 class="mo-store-card__title m-0">배달 주소 관리</h3>
					<input type="button" th:onclick="@{location.href='/members/me/addresses'}" value="+ 주소 추가" class="mo-btn mo-btn-primary" style="min-height: 36px; padding: 0 14px; font-size: 13px;">
				</div>
				
				<div style="background: rgba(255,128,0,0.05); border: 1px solid rgba(255,128,0,0.2); border-radius: 12px; padding: 16px; margin-bottom: 24px;">
					<div class="d-flex align-items-center gap-2 mb-2">
						<span class="mo-address-item__badge" style="margin: 0;">기본 주소</span>
						<span style="font-weight: 800; color: var(--mo-navy-strong);" th:text="${deliveryAddress != null ? deliveryAddress.deliveryLabel: '등록된 주소 없음'}"></span>
					</div>
					<div style="color: var(--mo-text); font-size: 14px;">
						<span th:text="${deliveryAddress != null ? deliveryAddress.deliveryAddress1 + (deliveryAddress.deliveryAddress2 != null ? ' ' + deliveryAddress.deliveryAddress2 : '') : '등록된 기본 주소가 없습니다.'}"></span>
					</div>
				</div>
				
				<th:block th:if="${ !#lists.isEmpty(addressList) }">
					<div class="mo-address-list">
						<div th:block th:each="address : ${addressList}" class="mo-address-item">
							<div class="mo-address-item__head">
								<div class="d-flex align-items-center gap-2">
									<span class="mo-address-item__label" th:text="${address.deliveryLabel}"></span>
									<span th:if="${address.isActive}" class="mo-address-item__badge" style="margin: 0; min-height: 24px; font-size: 11px;">기본</span>
								</div>
							</div>
							<div class="mo-address-item__text mb-3" th:text="${address.deliveryAddress1 + ' ' + (address.deliveryAddress2 != null ? address.deliveryAddress2 : '')}"></div>
							
							<div class="d-flex gap-2">
								<input type="button" th:onclick="|location.href='/members/me/addresses/${address.deliveryAddressIdx}/edit'|" value="수정" class="mo-btn mo-btn-outline" style="min-height: 32px; padding: 0 12px; font-size: 12px;">
								<input type="button" th:onclick="|location.href='/members/me/addresses/${address.deliveryAddressIdx}/delete'|" value="삭제" class="mo-btn mo-btn-plain" style="min-height: 32px; padding: 0 12px; font-size: 12px; color: #dc3545;">
								
								<form th:if="${!address.isActive}" th:action="@{/members/me/addresses/{id}/default(id=${address.deliveryAddressIdx})}" method="post" style="margin: 0; margin-left: auto;">
									<input type="hidden" name="redirectUrl" value="/members/me"/>
									<button type="submit" class="mo-btn mo-btn-outline" style="min-height: 32px; padding: 0 12px; font-size: 12px; color: var(--mo-primary); border-color: rgba(255,128,0,0.3);">
										기본 주소로 설정
									</button>
								</form>
							</div>
						</div>
					</div>
				</th:block>
				<th:block th:if="${ #lists.isEmpty(addressList) }">
					<div class="mo-empty-state mo-empty-state--compact">
						<p class="mo-empty-state__desc">등록된 배달 주소가 없습니다.<br>새로운 주소를 추가해 주세요.</p>
					</div>
				</th:block>
			</div>
		</th:block>

		<th:block th:if="${session.member.memberRoleType == 'OWNER'}">
			<div class="mo-surface-card mb-4">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h3 class="mo-store-card__title m-0">가게 관리</h3>
				</div>
				
				<th:block th:if="${store != null}">
				    <div class="mo-address-item" style="border-color: rgba(42, 54, 89, 0.15); transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#fafafa'" onmouseout="this.style.backgroundColor='transparent'">
				        
				        <div style="cursor: pointer;" th:onclick="|location.href='@{/owners/store}'|">
				            <div class="mo-address-item__head">
				                <div class="d-flex align-items-center gap-2">
				                    <span class="mo-address-item__label" style="font-size: 18px;" th:text="${store.storeName}"></span>
				                    
				                    <span th:if="${store.storeStatus == 'ACTIVE' or store.storeStatus == 'OPEN'}" class="mo-address-item__badge" style="background: rgba(40, 167, 69, 0.1); color: #28a745; margin: 0;">영업중</span>
				                    <span th:if="${store.storeStatus == 'INACTIVE' or store.storeStatus == 'CLOSED'}" class="mo-address-item__badge" style="background: rgba(107, 114, 128, 0.1); color: #6B7280; margin: 0;">영업 종료</span>
				                    <span th:if="${store.storeStatus == 'PAUSED' or store.storeStatus == 'BREAK'}" class="mo-address-item__badge" style="background: rgba(255, 193, 7, 0.1); color: #d39e00; margin: 0;">브레이크 타임</span>
				                </div>
				            </div>
				            <div class="mo-address-item__text mb-4" th:text="${store.storeAddress1 + (store.storeAddress2 != null ? ' ' + store.storeAddress2 : '')}"></div>
				        </div>
				        <div class="d-flex flex-wrap gap-2">
				            <input type="button" th:onclick="|location.href='@{/owners/store/edit(redirectUrl='/members/me')}'|" value="정보 수정" class="mo-btn mo-btn-outline" style="flex: 1; min-width: 100px;">
				            
				            <form th:if="${store.storeStatus == 'INACTIVE' or store.storeStatus == 'CLOSED' or store.storeStatus == 'PAUSED' or store.storeStatus == 'BREAK'}" th:action="@{/owners/store/status}" method="post" style="margin: 0; flex: 1; min-width: 100px;">
				                <input type="hidden" name="storeIdx" th:value="${store.storeIdx}" />
				                <input type="hidden" name="storeStatus" value="ACTIVE" />
				                <input type="hidden" name="redirectUrl" value="/members/me" />
				                <button type="submit" class="mo-btn mo-btn-primary w-100" th:text="${store.storeStatus == 'PAUSED' or store.storeStatus == 'BREAK' ? '영업 재개' : '영업 시작'}">영업 시작</button>
				            </form>
				            
				            <form th:if="${store.storeStatus == 'ACTIVE' or store.storeStatus == 'OPEN'}" th:action="@{/owners/store/status}" method="post" style="margin: 0; flex: 1; min-width: 100px;">
				                <input type="hidden" name="storeIdx" th:value="${store.storeIdx}" />
				                <input type="hidden" name="storeStatus" value="PAUSED" />
				                <input type="hidden" name="redirectUrl" value="/members/me" />
				                <button type="submit" class="mo-btn w-100" style="background: #FFC107; color: var(--mo-navy-strong); border: none; font-weight: 700;">브레이크</button>
				            </form>
				
				            <form th:if="${store.storeStatus == 'ACTIVE' or store.storeStatus == 'OPEN' or store.storeStatus == 'PAUSED' or store.storeStatus == 'BREAK'}" th:action="@{/owners/store/status}" method="post" style="margin: 0; flex: 1; min-width: 100px;">
				                <input type="hidden" name="storeIdx" th:value="${store.storeIdx}" />
				                <input type="hidden" name="storeStatus" value="INACTIVE" />
				                <input type="hidden" name="redirectUrl" value="/members/me" />
				                <button type="submit" class="mo-btn w-100" style="background: #6B7280; color: #fff; border: none;">영업 종료</button>
				            </form>
				        </div>
				    </div>
				</th:block>
				
				<th:block th:if="${store == null}">
					<div class="mo-empty-state mo-empty-state--compact">
						<p class="mo-empty-state__desc">아직 등록된 가게가 없습니다.<br>사장님의 가게를 추가해 보세요!</p>
					</div>
				</th:block>
			</div>
		</th:block>
		
		<div class="d-flex justify-content-between align-items-center mt-5 mb-4 pl-2 pr-2">
			<input type="button" th:onclick="@{|location.href='/main'|}" value="메인으로" class="mo-btn mo-btn-plain">
			
			<div style="font-size: 13px;">
				<a href="#" style="color: var(--mo-text-soft); text-decoration: none;">회원탈퇴</a>
				<span style="color: var(--mo-line-strong); margin: 0 8px;">|</span>
				<a href="/logout" style="color: var(--mo-text-soft); text-decoration: none; font-weight: 700;">로그아웃</a>
			</div>
		</div>
		
	</div>
</section>
</html>
