<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>대시보드 - Mo-Eats</title>
    <style>
        /* 커스텀 스크롤바 (Mo-Eats 테마 적용) */
        .order-status-scroll { 
            overflow-y: auto; 
            scrollbar-width: thin; 
            scrollbar-color: rgba(42, 54, 89, 0.2) transparent;
        }
        .order-status-scroll::-webkit-scrollbar { width: 6px; }
        .order-status-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(42, 54, 89, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body>
<section layout:fragment="pageContent">
    <div class="mo-page-container container-fluid" style="max-width: 1400px;">
        
        <div class="mo-section mb-4">
            <div class="mo-section-head d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 border-bottom pb-4">
                <div>
                    <span class="mo-section-label">DASHBOARD</span>
                    <div class="d-flex align-items-center gap-3 flex-wrap mt-1">
                        <h2 class="mo-section-title m-0">사장님 대시보드</h2>
                        
                        <div th:if="${store != null}" class="fs-5 fw-bold" style="color: var(--mo-text-soft);">
                            <i class="bi bi-shop me-1 text-primary"></i>
                            <span th:text="${session.member.memberNickname}">닉네임</span>님의 
                            <span class="text-decoration-underline" style="color: var(--mo-navy-strong); text-underline-offset: 4px;" th:text="${store['storeName']}">매장명</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${store != null}" class="row g-4">
            <input type="hidden" id="store-lat" th:value="${store['latitude'] ?: 35.8714}">
            <input type="hidden" id="store-lng" th:value="${store['longitude'] ?: 128.6014}">

            <div class="col-12 col-xl-4">
                <div class="mo-surface-card d-flex flex-column p-0 overflow-hidden" style="height: 750px;">
                    <div class="p-4 d-flex justify-content-between align-items-center border-bottom bg-white sticky-top z-1">
                        <h3 class="fw-bold m-0 fs-5" style="color: var(--mo-navy-strong);">실시간 주문 현황</h3>
                        <span class="mo-chip border-0 fw-bold" style="background: rgba(255, 128, 0, 0.1); color: var(--mo-primary);" 
                              th:text="${(orderList != null ? #lists.size(orderList) : 0) + '건'}">0건</span>
                    </div>
                    
                    <div class="order-status-scroll flex-grow-1 p-4 bg-light bg-opacity-10">
                        <th:block th:if="${not #lists.isEmpty(orderList)}">
                            
                            <div th:each="order : ${orderList}" 
							     class="mo-address-item mb-3 bg-white p-4 border rounded-4 shadow-sm" 
							     th:data-idx="${order.groupOrder.roomIdx}"
							     onclick="handleCardClick(event, this)"
							     style="cursor: pointer; transition: transform 0.2s ease;">
							    
							    <div class="d-flex justify-content-between align-items-center mb-3">
								    <div class="fw-bold" style="font-size: 14px; color: var(--mo-text-soft);">
									<div class="mb-1">
									    <span class="text-dark" th:text="${leaderNameMap[order.groupOrder.leaderMemberIdx]} + ' 님'">홍길동 님</span>
									</div>
								        
										<div class="mt-2 fw-bold" style="font-size: 15px; color: var(--mo-navy-strong);">
										    주문시각 : 
										    <span th:with="targetDate=${order.groupOrder.paymentConfirmedAt ?: order.groupOrder.createdAt}"
										          th:text="${#temporals.format(targetDate.toLocalDateTime().plusHours(9), 'yyyy-MM-dd HH:mm:ss')}">
										        13:15:24
										    </span>
										</div>
								    </div>
								    
									<div th:switch="${order.groupOrder.orderStatus}">
									    <span th:case="'PAID'" class="fw-bold fs-6 text-danger">신규 주문</span>
									    <span th:case="'ACCEPTED'" class="fw-bold fs-6" style="color: var(--mo-primary);">접수완료</span>
									    <span th:case="'PREPARING'" class="fw-bold fs-6 text-success">조리 중</span>
									    <span th:case="'READY'" class="fw-bold fs-6 text-info">준비완료</span>
									    <span th:case="'DELIVERING'" class="fw-bold fs-6 text-primary">배달 중</span>
									    <span th:case="'COMPLETED'" class="fw-bold fs-6 text-secondary">주문완료</span>
									    <span th:case="'CANCELLED'" class="fw-bold fs-6 text-muted">주문취소</span>
									</div>
								</div>
							
							    <h4 class="fw-bold mb-2 text-truncate" style="color: var(--mo-navy-strong); font-size: 18px;" 
							        th:text="${!order.groupOrderItems.isEmpty() ? order.groupOrderItems[0].menuNameSnapshot + (order.groupOrderItems.size() > 1 ? ' 외 ' + (order.groupOrderItems.size() - 1) + '건' : '') : '신규 주문'}">
							        메뉴명
							    </h4>
							    
							    <div class="text-secondary mb-4" style="font-size: 14px; line-height: 1.4;">
							        <i class="bi bi-geo-alt-fill me-1 text-primary"></i> 
							        <span class="fw-bold text-dark">배달 주소 :</span>
							        <span th:text="${order.orderDelivery.deliveryAddress1}">지번/도로명 주소</span>
							        <span th:if="${order.orderDelivery.deliveryAddress2 != null}" th:text="${' ' + order.orderDelivery.deliveryAddress2}">상세주소</span>
							    </div>
							
								<th:block th:switch="${order.groupOrder.orderStatus}">
								    <button th:case="'PAID'" type="button" class="mo-btn mo-btn-primary w-100 rounded-3 shadow-sm fw-bold" style="min-height: 42px;" 
								            th:onclick="handleStatusUpdate(event, [[${order.groupOrder.roomIdx}]], 'ACCEPTED')">주문 접수하기</button>
								    
								    <button th:case="'ACCEPTED'" type="button" class="btn w-100 rounded-3 shadow-sm text-white fw-bold border-0" style="min-height: 42px; background-color: #ff9800;" 
								            th:onclick="handleStatusUpdate(event, [[${order.groupOrder.roomIdx}]], 'PREPARING')">조리 시작하기</button>
								    
								    <button th:case="'PREPARING'" type="button" class="btn btn-success w-100 rounded-3 shadow-sm text-white fw-bold border-0" style="min-height: 42px;" 
								            th:onclick="handleStatusUpdate(event, [[${order.groupOrder.roomIdx}]], 'READY')">조리 완료처리</button>

								    <button th:case="'READY'" type="button" class="btn btn-info w-100 rounded-3 shadow-sm text-white fw-bold border-0" style="min-height: 42px;" 
								            th:onclick="handleStatusUpdate(event, [[${order.groupOrder.roomIdx}]], 'DELIVERING')">준비 완료 처리</button>
								            
								    <button th:case="'DELIVERING'" type="button" class="btn w-100 rounded-3 shadow-sm text-white fw-bold border-0" style="min-height: 42px; background-color: var(--mo-navy-strong);" 
								            th:onclick="handleStatusUpdate(event, [[${order.groupOrder.roomIdx}]], 'COMPLETED')">주문 완료 처리</button>
								            
								    <button th:case="'COMPLETED'" type="button" class="btn btn-secondary w-100 rounded-3 shadow-sm text-white fw-bold border-0" style="min-height: 42px;" disabled>처리가 완료된 주문입니다</button>
								</th:block>
							</div>
                        </th:block>
                        
                        <div th:if="${#lists.isEmpty(orderList)}" class="mo-empty-state mo-empty-state--compact h-100 border-0 shadow-none bg-transparent">
                            <div class="mb-2" style="font-size: 48px;">🧾</div>
                            <p class="mo-empty-state__desc fw-bold text-secondary">현재 접수된 주문이 없습니다.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-xl-8">
                <div class="mo-surface-card p-0 rounded-4 shadow-sm border overflow-hidden" style="height: 750px; border-color: rgba(42, 54, 89, 0.1) !important;">
                    <div id="moeats-map" class="w-100 h-100 bg-light"></div>
                </div>
            </div>
        </div>

        <div th:unless="${store != null}" class="py-5 mt-4">
            <div class="mo-empty-state mx-auto border-0 shadow-none bg-transparent" style="max-width: 560px;">
                <div class="mb-2" style="font-size: 64px;">🏪</div>
                <h2 class="mo-empty-state__title mb-3 fs-3">환영합니다, 사장님!</h2>
                <p class="mo-empty-state__desc mb-4 fw-bold text-secondary">
                    아직 등록된 매장이 없습니다.<br>
                    모이츠 서비스를 시작하기 위해 매장 정보를 먼저 등록해 주세요.
                </p>
                <a th:href="@{/owner/store/new}" class="mo-btn mo-btn-primary rounded-pill px-5" style="min-height: 52px; font-size: 16px;">
                    내 매장 등록하기
                </a>
            </div>
        </div>

    </div>
</section>

<th:block layout:fragment="pageScripts">
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3355be34fede739dcf93c2a5f3ec84f1&libraries=services&autoload=false"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        
        function handleCardClick(event, el) {
            if (event.target.closest('button')) return;
            const roomIdx = el.getAttribute('data-idx');
            if (roomIdx) location.href = '/owners/order/detail?roomIdx=' + roomIdx;
        }

        async function handleStatusUpdate(event, roomIdx, nextStatus) {
            event.preventDefault();
            event.stopPropagation();
            
            const confirmMessageMap = {
            	    ACCEPTED: '주문을 접수하시겠습니까?',
            	    PREPARING: '조리를 시작하시겠습니까?',
            	    READY: '준비 완료 상태로 변경하시겠습니까?',
            	    COMPLETED: '주문 완료 상태로 변경하시겠습니까?'
            	};
            
            if (!roomIdx || !confirm(confirmMessageMap[nextStatus] || '상태를 변경하시겠습니까?')) {
                return;
            }
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            try {
                const response = await fetch('/owners/order/status_update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(header && { [header]: token })
                    },
                    body: JSON.stringify({
                        roomIdx: Number(roomIdx),
                        nextStatus: String(nextStatus)
                    })
                });

                if(response.ok) {
                	// 옵션 1: 대시보드 화면에 그대로 남아서 변경된 상태를 바로 확인하고 싶을 때 (추천!)
                    location.reload();
                } else {
                    alert("처리 중 오류가 발생했습니다.");
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch(err) {
                console.error("Fetch Error:", err);
                alert("네트워크 오류가 발생했습니다.");
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function initDashboardMap() {
            const latEl = document.getElementById('store-lat');
            if(!latEl) return; 

            const lat = parseFloat(latEl.value);
            const lng = parseFloat(document.getElementById('store-lng').value);
            const container = document.getElementById('moeats-map');

            kakao.maps.load(function() {
                try {
                    const map = new kakao.maps.Map(container, {
                        center: new kakao.maps.LatLng(lat, lng),
                        level: 3
                    });
                    new kakao.maps.Marker({ position: new kakao.maps.LatLng(lat, lng), map: map });
                    
                    window.addEventListener('resize', () => map.relayout());
                    // 탭이나 모달 등 전환 시 지도 깨짐 방지
                    setTimeout(() => map.relayout(), 300);
                } catch (e) { console.error("Map Error:", e); }
            });
        }

        window.onload = initDashboardMap;
        
     // 🌟 실시간 SSE 연결 함수 추가 🌟
        function initSSE() {
            // 1. 방금 만든 컨트롤러 주소로 SSE 연결 (EventSource 객체 생성)
            const eventSource = new EventSource('/owners/api/sse/connect');

            // 2. 서버와 연결이 성공했을 때 (SSEService의 "connect" 이벤트)
            eventSource.addEventListener('connect', function(event) {
                console.log("🟢 실시간 주문 알림(SSE) 연결 완료!");
            });

            // 3. 🚨 새 주문이 들어왔을 때! (SSEService의 "new" 이벤트)
            eventSource.addEventListener('new', function(event) {
                // event.data 안에는 넘어온 새 주문 정보 JSON이 들어있습니다.
                // const newOrderData = JSON.parse(event.data); 
                
                // 알림창 띄우기 (또는 예쁜 Toast 알림으로 대체 가능)
                alert("🔔 띵동! 새로운 주문이 들어왔습니다!");

                // 화면을 새로고침하여 타임리프가 최신 데이터를 다시 그려주도록 합니다.
                // (자바스크립트로 HTML 태그를 일일이 만드는 것보다 가장 깔끔하고 버그가 없는 방식입니다.)
                window.location.reload();
            });

            // 4. 에러 발생 시 연결 종료 (재연결 방지 및 자원 낭비 방지)
            eventSource.onerror = function(err) {
                console.error("🔴 SSE 연결 오류:", err);
                eventSource.close();
            };
        }

        // 창이 로드될 때 지도 초기화와 SSE 연결을 같이 실행합니다.
        window.addEventListener('load', () => {
            initDashboardMap();
            initSSE(); // SSE 구독 시작!
        });
        /*]]>*/
    </script>
</th:block>
</body>
</html>
