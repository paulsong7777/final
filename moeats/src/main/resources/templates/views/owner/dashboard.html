<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/owner-layout}">
<head>
    <title>대시보드 - MoEats</title>
    <style>
        .moeats-map-wrapper { width: 100%; height: 750px; border-radius: 1rem; border: 2px solid #82d13d; background-color: #f1f1f1; position: relative; }
        #moeats-map { width: 100%; height: 100%; min-height: 750px; }
        .order-status-scroll { max-height: 750px; overflow-y: auto; }
        .order-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: white; }
    </style>
</head>
<body>
<main layout:fragment="content" class="container-fluid">
    <input type="hidden" id="store-lat" th:value="${storeVo != null ? storeVo['latitude'] : 35.8714}">
    <input type="hidden" id="store-lng" th:value="${storeVo != null ? storeVo['longitude'] : 128.6014}">

    <div class="row g-3">
        <div class="col-lg-4 col-xl-3">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="fw-bold mb-0">주문 현황</h5>
                </div>
                <div class="card-body order-status-scroll">
                    <div th:each="order : ${orderList}" class="order-card">
                        <div class="fw-bold" th:text="${order['menuName'] ?: '신규 주문'}">주문</div>
                        <div class="small text-muted" th:text="${order['deliveryAddress1'] ?: '주소 없음'}">주소</div>
                    </div>
                    <div th:if="${orderList == null or #lists.isEmpty(orderList)}" class="text-center py-5 text-muted">주문 없음</div>
                </div>
            </div>
        </div>
        <div class="col-lg-8 col-xl-9">
            <div class="moeats-map-wrapper">
                <div id="moeats-map"></div>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script type="text/javascript" src="http://dapi.kakao.com/v2/maps/sdk.js?appkey=3355be34fede739dcf93c2a5f3ec84f1&libraries=services&autoload=false"></script>
    
    <script>
        function forceLoadMap() {
            console.log("지도 로딩 시작...");
            
            // 🚩 진단 1: API 로드 여부 확인
            if (typeof kakao === 'undefined') {
                alert("카카오 지도 API 스크립트 자체가 로드되지 않았습니다. 인터넷 연결이나 AppKey를 확인하세요.");
                return;
            }

            var lat = parseFloat(document.getElementById('store-lat').value) || 35.8714;
            var lng = parseFloat(document.getElementById('store-lng').value) || 128.6014;
            var container = document.getElementById('moeats-map');

            kakao.maps.load(function() {
                console.log("카카오 API 콜백 성공. 객체 생성을 시작합니다.");
                try {
                    var options = {
                        center: new kakao.maps.LatLng(lat, lng),
                        level: 3
                    };
                    var map = new kakao.maps.Map(container, options);
                    var marker = new kakao.maps.Marker({
                        position: new kakao.maps.LatLng(lat, lng),
                        map: map
                    });

                    // 🚩 해결 2: 레이아웃 렌더링 후 지도가 깨지는 현상 방지
                    setTimeout(function() {
                        map.relayout();
                        map.setCenter(new kakao.maps.LatLng(lat, lng));
                    }, 500);

                    console.log("지도 생성 완료");
                } catch (e) {
                    console.error("지도 생성 중 오류 발생:", e);
                    alert("지도 생성 오류: " + e.message);
                }
            });
        }

        // 페이지 로드 후 실행
        window.onload = forceLoadMap;
    </script>
</th:block>
</body>
</html>
