<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/owner-layout}">
<head><title>메뉴 사진 관리 - MoEats</title></head>
<body>
<main layout:fragment="content" class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2">
        <h3 class="fw-bold mb-0 text-navy"><i class="bi bi-image-fill me-2 text-orange"></i>메뉴 사진 관리</h3>
        <a th:href="@{/owners/menus/{idx}/images/new(idx=${menuIdx})}" class="btn btn-warning text-white fw-bold px-4 rounded-pill shadow-sm">사진 등록</a>
    </div>

    <div class="row g-3">
        <th:block th:if="${imageList != null and not #lists.isEmpty(imageList)}">
            <div th:each="img : ${imageList}" class="col-md-4 col-lg-3" th:id="|img-card-${img.menuImageIdx}|">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden position-relative">
                    <span th:if="${img.isPrimary}" class="position-absolute top-0 start-0 m-2 badge bg-orange shadow">대표</span>
                    
                    <img th:src="${img.imageUrl ?: 'https://via.placeholder.com/200'}" style="height: 200px; object-fit: cover;">
                    
                    <div class="card-body p-3 text-center">
                        <button class="btn btn-sm btn-outline-warning w-100 mb-2 fw-bold" 
                                th:onclick="changePrimary([[${menuIdx}]], [[${img.menuImageIdx}]])"
                                th:classappend="${img.isPrimary} ? 'active' : ''">
                            <i class="bi" th:classappend="${img.isPrimary} ? 'bi-star-fill' : 'bi-star'"></i> 대표 설정
                        </button>
                        <div class="d-flex gap-2">
                            <a th:href="@{/owners/menus/{mIdx}/images/{iIdx}/edit(mIdx=${menuIdx}, iIdx=${img.menuImageIdx})}" class="btn btn-sm btn-light border w-100">수정</a>
                            <button class="btn btn-sm btn-outline-danger w-100" th:onclick="deleteImage([[${menuIdx}]], [[${img.menuImageIdx}]])">삭제</button>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        async function changePrimary(mIdx, iIdx) {
            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;
            await fetch(`/owners/menus/${mIdx}/images/${iIdx}/primary`, {
                method: 'POST',
                headers: { ...(header && { [header]: token }) }
            });
            location.reload();
        }

        async function deleteImage(mIdx, iIdx) {
            if(!confirm("이 메뉴 사진을 삭제할까요?")) return;
            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;
            const response = await fetch(`/owners/menus/${mIdx}/images/${iIdx}/delete`, {
                method: 'POST',
                headers: { ...(header && { [header]: token }) }
            });
            if(response.ok) document.getElementById(`img-card-${iIdx}`).remove();
        }
    </script>
</th:block>
</body>
</html>
