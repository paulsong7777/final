<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/owner-layout}">
<head>
    <title>메뉴 이미지 매칭 - MoEats</title>
</head>
<body>
<main layout:fragment="content" class="py-4">
    <div class="mb-4 pb-3 border-bottom border-2">
        <h3 class="fw-bold text-navy">
            <i class="bi bi-image-fill me-2 text-orange"></i>메뉴 이미지 매칭 관리
        </h3>
        <p class="text-secondary small mb-0 mt-1">보관함의 이미지를 각 메뉴에 연결하여 메뉴판을 완성합니다.</p>
    </div>

    <div class="row g-4">
        <th:block th:if="${not #lists.isEmpty(menuList)}">
            <div th:each="menu : ${menuList}" class="col-md-6 col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-3 h-100">
                    <div class="d-flex align-items-center mb-3">
                        <img th:src="${menu.menuImg ?: 'https://via.placeholder.com/150/FF8000/FFFFFF?text=No+Image'}" 
                             class="rounded-3 border" 
                             style="width: 70px; height: 70px; object-fit: cover;"
                             th:alt="${menu.menuName}">
                        
                        <div class="ms-3 overflow-hidden">
                            <h6 class="fw-bold mb-1 text-navy text-truncate" th:text="${menu.menuName}">메뉴명</h6>
                            <span class="small text-muted d-block">현재 설정된 이미지</span>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <a th:href="@{/owners/menus/{idx}/images(idx=${menu.menuIdx})}" 
                           class="btn btn-sm btn-outline-orange rounded-pill fw-bold">
                            이미지 교체 및 관리
                        </a>
                        
                        <a th:href="@{/owners/menus/{idx}/images/new(idx=${menu.menuIdx})}" 
                           class="btn btn-sm btn-light rounded-pill fw-bold border">
                            <i class="bi bi-plus-lg me-1"></i>새 사진 등록
                        </a>
                    </div>
                </div>
            </div>
        </th:block>

        <div th:if="${#lists.isEmpty(menuList)}" class="col-12 text-center py-5">
            <div class="text-muted mb-3 opacity-25"><i class="bi bi-egg-fried display-1"></i></div>
            <p class="text-secondary fw-bold">등록된 메뉴가 없습니다.<br>먼저 메뉴를 등록해 주세요!</p>
            <a th:href="@{/owners/menu/write}" class="btn btn-warning text-white rounded-pill px-4 fw-bold mt-2">메뉴 등록하러 가기</a>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /* 사이드바 활성화를 위한 메뉴 식별자 */
        // 레이아웃의 menu == 'img-match'와 매칭
    </script>
</th:block>
</body>
</html>
