<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/owner-layout}"> <head>
    <title>메뉴 목록 관리 - MoEats</title>
    <style>
        .menu-img-thumb { width: 80px; height: 80px; object-fit: cover; transition: 0.3s; }
        .img-grayscale-effect { filter: grayscale(100%) blur(1px); }
        .is-sold-out { background-color: #f8f9fa; border: 1px solid #dee2e6 !important; opacity: 0.8; }
        .text-orange { color: #ff6b00 !important; }
        .btn-orange { background-color: #ff6b00; border-color: #ff6b00; }
        .btn-orange:hover { background-color: #e66000; color: white; }
        .fade-out-animation { opacity: 0; transform: translateY(10px); transition: 0.3s; }
        .text-navy { color: #001f3f; }
        .text-truncate-custom { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>

<body>
<main layout:fragment="content" class="menu-page-wrapper">
    
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2">
        <div>
            <h3 class="fw-bold mb-0 text-navy">
                <i class="bi bi-journal-text me-2 text-orange"></i>
                <span th:text="${not #lists.isEmpty(menuList)} ? '메뉴 목록 관리' : '등록된 메뉴가 없습니다.'">메뉴 관리</span>
            </h3>
            <p class="text-secondary small mb-0 mt-1">등록된 메뉴의 판매 상태와 정보를 관리합니다.</p>
        </div>
        <a th:href="@{/owner/menu/register}" class="btn btn-orange text-white fw-bold px-4 rounded-pill shadow-sm">
            <i class="bi bi-plus-lg me-1"></i> 신규 메뉴 등록
        </a>
    </div>

    <div class="row g-4" id="menu-grid">
        <th:block th:if="${not #lists.isEmpty(menuList)}">
            <div th:each="menu : ${menuList}" class="col-md-6 col-lg-4" th:id="|menu-wrapper-${menu.menuIdx ?: 0}|">
                <div th:id="|menu-card-${menu.menuIdx ?: 0}|" 
                     class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden"
                     th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? 'is-sold-out' : ''">
                    
                    <div class="card-body p-3 d-flex align-items-center">
                        <div class="flex-shrink-0 position-relative">
                            <img th:id="|menu-img-${menu.menuIdx ?: 0}|"
                                 th:src="${menu.menuImg ?: 'https://via.placeholder.com/150/FF8000/FFFFFF?text=No+Image'}" 
                                 class="rounded-3 border menu-img-thumb" 
                                 th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? 'img-grayscale-effect' : ''"
                                 alt="메뉴이미지">
                            
                            <div th:id="|soldout-badge-${menu.menuIdx ?: 0}|" 
                                 class="position-absolute top-50 start-50 translate-middle badge bg-dark opacity-75 px-3 py-2 fw-bold"
                                 th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? 'd-block' : 'd-none'">품절</div>
                        </div>

                        <div class="flex-grow-1 ms-3 overflow-hidden">
                            <div class="small text-muted mb-1" th:text="${menu.categoryName ?: '기본'}">카테고리</div>
                            <h5 class="fw-bold mb-1 text-navy text-truncate-custom" th:text="${menu.menuName ?: '이름 없음'}">메뉴명</h5>
                            <div class="fw-bold text-orange fs-5" 
                                 th:text="${#numbers.formatInteger(menu.menuPrice ?: 0, 0, 'COMMA')} + '원'">0원</div>
                        </div>
                    </div>

                    <div class="card-footer bg-white border-0 p-3 pt-0 d-flex justify-content-between align-items-center">
                        <div class="form-check form-switch m-0 d-flex align-items-center gap-2">
                            <input class="form-check-input" type="checkbox" role="switch"
                                   th:checked="${menu.menuStatus == 'AVAILABLE'}"
                                   th:onchange="handleToggleSoldOut([[${menu.menuIdx ?: 0}]], this.checked)">
                            <label th:id="|status-label-${menu.menuIdx ?: 0}|" 
                                   class="form-check-label small fw-bold" 
                                   th:classappend="${menu.menuStatus == 'AVAILABLE'} ? 'text-success' : 'text-danger'"
                                   th:text="${menu.menuStatus == 'AVAILABLE' ? '판매중' : '품절중'}">상태</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-bold" 
                                    th:onclick="|location.href='/owner/menu/edit?menuIdx=' + [[${menu.menuIdx ?: 0}]]|">수정</button>
                            <button class="btn btn-link text-danger btn-sm text-decoration-none p-0 fw-bold" 
                                    th:onclick="handleDeleteMenu([[${menu.menuIdx ?: 0}]])">삭제</button>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>

        <div th:if="${#lists.isEmpty(menuList)}" class="col-12 text-center py-5">
            <i class="bi bi-inbox fs-1 text-light d-block mb-3 opacity-50"></i>
            <p class="text-muted fw-bold">등록된 메뉴가 없습니다.</p>
            <a th:href="@{/owner/menu/register}" class="btn btn-sm btn-outline-warning rounded-pill px-4">메뉴 등록하러 가기</a>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        /**
         * [AJAX] 품절 상태 토글
         * Rule: 상태 변경은 POST 고정, moeatsFetch 표준 사용
         */
        async function handleToggleSoldOut(idx, isChecked) {
            if(!idx || idx === 0) return;

            const result = await moeatsFetch('/owner/menu/toggle-soldout', {
                menuIdx: idx,
                menuStatus: isChecked ? 'AVAILABLE' : 'SOLD_OUT'
            });

            if(result && result.success) {
                const card = document.getElementById(`menu-card-${idx}`);
                const img = document.getElementById(`menu-img-${idx}`);
                const badge = document.getElementById(`soldout-badge-${idx}`);
                const label = document.getElementById(`status-label-${idx}`);
                
                if(isChecked) {
                    card.classList.remove('is-sold-out');
                    img.classList.remove('img-grayscale-effect');
                    badge.classList.replace('d-block', 'd-none');
                    label.innerText = "판매중";
                    label.className = "form-check-label small fw-bold text-success";
                } else {
                    card.classList.add('is-sold-out');
                    img.classList.add('img-grayscale-effect');
                    badge.classList.replace('d-none', 'd-block');
                    label.innerText = "품절중";
                    label.className = "form-check-label small fw-bold text-danger";
                }
            } else {
                alert("상태 업데이트에 실패했습니다.");
                location.reload();
            }
        }

        /**
         * [AJAX] 메뉴 삭제 처리
         */
        async function handleDeleteMenu(idx) {
            if(!idx || idx === 0) return;
            if(!confirm("정말로 이 메뉴를 완전히 삭제하시겠습니까?")) return;

            const result = await moeatsFetch('/owner/menu/delete', { menuIdx: idx });
            
            if(result && result.success) {
                const wrapper = document.getElementById(`menu-wrapper-${idx}`);
                if(wrapper) {
                    wrapper.classList.add('fade-out-animation');
                    setTimeout(() => {
                        wrapper.remove();
                        // 모두 삭제 시 새로고침하여 빈 목록 UI 표시
                        if(document.querySelectorAll('#menu-grid > div[id^="menu-wrapper"]').length === 0) {
                            location.reload();
                        }
                    }, 300);
                }
            } else {
                alert("삭제 처리에 실패했습니다.");
            }
        }
        /*]]>*/
    </script>
</th:block>
</html>
