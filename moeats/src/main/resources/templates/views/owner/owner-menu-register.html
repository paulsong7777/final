<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/owner-layout}">

<head>
    <title>메뉴 목록 관리 - MoEats</title>
</head>

<body>
<main layout:fragment="content" class="menu-page-wrapper py-4">
    
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2">
        <div>
            <h3 class="fw-bold mb-0 text-navy">
                <i class="bi bi-journal-text me-2 text-orange"></i>
                <span th:text="${not #lists.isEmpty(menuList)} ? '메뉴 목록 관리' : '등록된 메뉴가 없습니다.'">메뉴 관리</span>
            </h3>
            <p class="text-secondary small mb-0 mt-1">등록된 메뉴의 판매 상태와 정보를 관리합니다.</p>
        </div>
        <a th:href="@{/owners/menu/write}" class="btn btn-moeats text-white fw-bold px-4 rounded-pill shadow-sm">
            <i class="bi bi-plus-lg me-1"></i> 신규 메뉴 등록
        </a>
    </div>

    <div class="row g-4" id="menu-grid">
        <th:block th:if="${not #lists.isEmpty(menuList)}">
            <div th:each="menu : ${menuList}" class="col-md-6 col-lg-4" th:id="|menu-wrapper-${menu.menuIdx}|">
                <div th:id="|menu-card-${menu.menuIdx}|" 
                     class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden transition-all"
                     th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? 'bg-light opacity-75 border' : ''">
                    
                    <div class="card-body p-3 d-flex align-items-center">
                        <div class="flex-shrink-0 position-relative">
                            <img th:id="|menu-img-${menu.menuIdx}|"
                                 th:src="${menu.menuImg ?: 'https://via.placeholder.com/150/FF8000/FFFFFF?text=No+Image'}" 
                                 class="rounded-3 border shadow-sm" 
                                 style="width: 80px; height: 80px; object-fit: cover;"
                                 th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? 'grayscale-blur' : ''"
                                 alt="메뉴이미지">
                            
                            <div th:id="|soldout-badge-${menu.menuIdx}|" 
                                 class="position-absolute top-50 start-50 translate-middle badge bg-dark opacity-75 px-3 py-2 fw-bold"
                                 th:style="${menu.menuStatus == 'SOLD_OUT'} ? 'display:block;' : 'display:none;'">품절</div>
                        </div>

                        <div class="flex-grow-1 ms-3 overflow-hidden">
                            <div class="small text-muted mb-1" th:text="${menu.menuCategoryName ?: '기본'}">카테고리</div>
                            <h5 class="fw-bold mb-1 text-navy text-truncate" th:text="${menu.menuName ?: '이름 없음'}">메뉴명</h5>
                            <div class="fw-bold text-orange fs-5" 
                                 th:text="${#numbers.formatInteger(menu.menuPrice ?: 0, 0, 'COMMA')} + '원'">0원</div>
                        </div>
                    </div>

                    <div class="card-footer bg-white border-0 p-3 pt-0 d-flex justify-content-between align-items-center">
                        <div class="form-check form-switch m-0 d-flex align-items-center gap-2">
                            <input class="form-check-input shadow-none" type="checkbox" role="switch"
                                   th:checked="${menu.menuStatus == 'AVAILABLE'}"
                                   th:onchange="handleToggleSoldOut([[${menu.menuIdx}]], this.checked)"
                                   style="cursor: pointer;">
                            <label th:id="|status-label-${menu.menuIdx}|" 
                                   class="form-check-label small fw-bold" 
                                   th:classappend="${menu.menuStatus == 'AVAILABLE'} ? 'text-success' : 'text-danger'"
                                   th:text="${menu.menuStatus == 'AVAILABLE' ? '판매중' : '품절중'}">상태</label>
                        </div>

                        <div class="d-flex gap-2 align-items-center">
                            <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-bold" 
                                    th:onclick="|location.href='/owners/menu/' + [[${menu.menuIdx}]] + '/edit'|">수정</button>
                            <button class="btn btn-link text-danger btn-sm text-decoration-none p-0 fw-bold ms-1" 
                                    th:onclick="handleDeleteMenu([[${menu.menuIdx}]])">삭제</button>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>

        <div th:if="${#lists.isEmpty(menuList)}" class="col-12 text-center py-5">
            <div class="text-muted mb-3 opacity-25"><i class="bi bi-inbox display-1"></i></div>
            <p class="text-secondary fw-bold">등록된 메뉴가 없습니다.<br>사장님의 맛있는 메뉴를 먼저 등록해 주세요!</p>
            <a th:href="@{/owners/menu/write}" class="btn btn-sm btn-outline-warning rounded-pill px-4 fw-bold mt-2">메뉴 등록하러 가기</a>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        
        /**
         * [Rule 2] AJAX: 품절 상태 토글 (Fetch API)
         * [Rule 6] 상태 변경은 POST 고정, 새로고침 금지
         */
        async function handleToggleSoldOut(idx, isChecked) {
            if(!idx) return;

            // [Rule 4] Security: 레이아웃 표준 CSRF 토큰 추출
            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            // 백엔드 StoreMenuService 상태 규격: AVAILABLE / SOLD_OUT
            const nextStatus = isChecked ? 'AVAILABLE' : 'SOLD_OUT';

            try {
                // [교정] 백엔드 StoreMenuController.updateStatus 매핑 주소와 연동
                const response = await fetch('/owners/menu/status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        ...(header && { [header]: token })
                    },
                    body: new URLSearchParams({
                        menuIdx: idx,
                        menuStatus: nextStatus
                    })
                });

                if(response.ok) {
                    const card = document.getElementById(`menu-card-${idx}`);
                    const img = document.getElementById(`menu-img-${idx}`);
                    const badge = document.getElementById(`soldout-badge-${idx}`);
                    const label = document.getElementById(`status-label-${idx}`);
                    
                    // [Rule 2] 새로고침 없이 UI 즉시 변경 (UX 향상)
                    if(isChecked) {
                        card.classList.remove('bg-light', 'opacity-75', 'border');
                        img.classList.remove('grayscale-blur');
                        badge.style.display = "none";
                        label.innerText = "판매중";
                        label.className = "form-check-label small fw-bold text-success";
                    } else {
                        card.classList.add('bg-light', 'opacity-75', 'border');
                        img.classList.add('grayscale-blur');
                        badge.style.display = "block";
                        label.innerText = "품절중";
                        label.className = "form-check-label small fw-bold text-danger";
                    }
                } else {
                    alert("상태 업데이트에 실패했습니다.");
                    location.reload();
                }
            } catch(e) {
                console.error("Status Toggle Error:", e);
                alert("통신 오류가 발생했습니다.");
            }
        }

        /**
         * [AJAX] 메뉴 삭제 처리
         * [Rule 6] 식별자 roomIdx(여기선 menuIdx), POST 고정
         */
        async function handleDeleteMenu(idx) {
            if(!idx) return;
            if(!confirm("정말로 이 메뉴를 완전히 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.")) return;

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            try {
                // [교정] 백엔드 삭제 API 매핑 규격 (상황 보고서 근거 /owners/.../delete)
                const response = await fetch(`/owners/menu/${idx}/delete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(header && { [header]: token })
                    }
                });
                
                if(response.ok) {
                    const wrapper = document.getElementById(`menu-wrapper-${idx}`);
                    if(wrapper) {
                        // [Rule 2] 부드러운 삭제 효과
                        wrapper.style.opacity = '0';
                        wrapper.style.transform = 'scale(0.95)';
                        wrapper.style.transition = '0.3s ease';
                        
                        setTimeout(() => {
                            wrapper.remove();
                            // 만약 카드가 하나도 안 남았다면 빈 화면 렌더링을 위해 리로드
                            if(document.querySelectorAll('#menu-grid > div[id^="menu-wrapper"]').length === 0) {
                                location.reload();
                            }
                        }, 300);
                    }
                } else {
                    alert("삭제 처리에 실패했습니다. (코드: " + response.status + ")");
                }
            } catch(e) {
                console.error("Delete Error:", e);
                alert("삭제 중 통신 오류가 발생했습니다.");
            }
        }
        /*]]>*/
    </script>
</th:block>
</body>
</html>
