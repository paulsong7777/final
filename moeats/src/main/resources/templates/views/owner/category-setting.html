<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/owner-layout}"> 
<head>
    <title>카테고리 설정 - MoEats</title>
    <style>
        .fade-out { opacity: 0; transition: opacity 0.3s ease; }
        .btn-orange { background-color: #FF8000 !important; border-color: #FF8000 !important; color: white !important; }
        .btn-orange:hover { background-color: #E67300 !important; }
        .text-navy { color: #001f3f !important; }
    </style>
</head>

<body>
<main layout:fragment="content" class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2">
        <div>
            <h3 class="fw-bold mb-1 text-navy">
                <i class="bi bi-collection me-2 text-orange"></i>카테고리 구성 설정
            </h3>
            <p class="text-secondary small mb-0">매장의 메뉴 카테고리를 효율적으로 관리하세요.</p>
        </div>
        <span class="badge bg-dark px-3 py-2" th:text="'총 ' + ${#lists.size(categoryList ?: {})} + '개'">0개</span>
    </div>

    <div class="card border-0 shadow-sm mb-4 rounded-4">
        <div class="card-body p-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-9">
                    <label for="newCategoryName" class="form-label small fw-bold text-secondary">신규 카테고리명</label>
                    <input type="text" id="newCategoryName" class="form-control form-control-lg border-2 shadow-none" 
                           placeholder="예: 인기메뉴, 사이드, 음료 등" maxlength="20">
                </div>
                <div class="col-md-3">
                    <button type="button" class="btn btn-orange w-100 btn-lg fw-bold" onclick="addCategory()">
                        <i class="bi bi-plus-lg me-2"></i>등록하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden rounded-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="py-3" style="width: 80px;">번호</th>
                        <th class="text-start py-3">카테고리 명칭</th>
                        <th class="py-3" style="width: 120px;">메뉴 수</th>
                        <th class="py-3" style="width: 150px;">관리</th>
                    </tr>
                </thead>
                <tbody id="category-table-body">
                    <tr th:each="cat, stat : ${categoryList}" 
                        th:if="${not #lists.isEmpty(categoryList)}" 
                        th:id="|row-${cat['categoryIdx'] ?: 0}|">
                        
                        <td class="fw-bold text-secondary" th:text="${stat.count}">1</td>
                        <td class="text-start">
                            <span class="fw-bold text-navy" th:text="${cat['categoryName'] ?: '이름 없음'}">카테고리</span>
                        </td>
                        <td>
                            <span class="badge rounded-pill bg-light text-dark border" 
                                  th:text="${(cat['menuCount'] ?: 0) + '개'}">0개</span>
                        </td>
                        <td>
                            <button class="btn btn-outline-danger btn-sm px-3 rounded-pill fw-bold"
                                    th:onclick="deleteCategory([[${cat['categoryIdx'] ?: 0}]])">
                                <i class="bi bi-trash3 me-1"></i>삭제
                            </button>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(categoryList)}">
                        <td colspan="4" class="py-5 text-center">
                            <div class="text-muted mb-3 opacity-25"><i class="bi bi-folder-x display-1"></i></div>
                            <p class="text-secondary mb-0 fw-bold">등록된 카테고리가 없습니다.<br>상단에서 새 카테고리를 추가해 보세요.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/
    /**
     * [AJAX] 카테고리 등록 (register_proc 표준)
     */
    async function addCategory() {
        const nameInput = document.getElementById('newCategoryName');
        const name = nameInput.value.trim();
        if (!name) { alert("카테고리명을 입력해주세요."); return; }

        // [Rule 6] 명칭은 register_proc으로 통일 (이전 insert_proc에서 수정됨)
        const result = await moeatsFetch('/owner/category/register_proc', { categoryName: name });
        
        if (result.success) {
            showToast("등록되었습니다.");
            nameInput.value = ""; // 입력란 비우기
            setTimeout(() => location.reload(), 800);
        } else {
            alert(result.message || "등록 실패");
        }
    }

    /**
     * [AJAX] 카테고리 삭제 (POST 고정)
     */
    async function deleteCategory(idx) {
        if (!confirm("해당 카테고리를 삭제하시겠습니까?")) return;
        
        // [Rule 6] 식별자는 categoryIdx, 상태 변경은 POST 고정
        const result = await moeatsFetch('/owner/category/delete_proc', { categoryIdx: idx });
        
        if (result.success) {
            showToast("삭제되었습니다.", "danger");
            setTimeout(() => location.reload(), 800);
        } else {
            alert("삭제 실패");
        }
    }
/*]]>*/
</script>
</th:block>
</body>
</html>
