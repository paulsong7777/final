<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/owner-layout}">
<head>
    <title>신규 메뉴 등록 - MoEats</title>
</head>

<body>
<main layout:fragment="content" class="py-4">
    <div class="card shadow-sm border-0 mx-auto rounded-4 bg-white" style="max-width: 600px;">
        <div class="card-body p-4 p-md-5">
            
            <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                <a th:href="@{/owner/menu/management}" class="text-dark text-decoration-none fw-bold me-3">
                    <i class="bi bi-arrow-left"></i> 목록으로
                </a>
                <h3 class="fw-bold mb-0 text-navy">신규 메뉴 등록</h3>
            </div>

            <form id="menuRegisterForm" enctype="multipart/form-data">
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Category</label>
                    <div class="input-group">
                        <select id="categorySelect" name="menuCategoryIdx" class="form-select py-3 rounded-start-3 fw-bold text-navy border-2 shadow-none" required>
                            <option value="">카테고리를 선택하세요</option>
                            <option th:each="cat : ${categoryList}" 
                                    th:value="${cat.menuCategoryIdx}" 
                                    th:text="${cat.menuCategoryName}"></option>
                        </select>
                        <button class="btn btn-outline-success border-2 fw-bold px-3 rounded-end-3" type="button" 
                                data-bs-toggle="modal" data-bs-target="#categoryQuickModal">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Menu Image</label>
                    <input type="file" id="imageFile" name="menuFile" class="d-none" accept="image/*" onchange="previewImage(this)">
                    
                    <div id="imageContainer" class="bg-light rounded-4 d-flex align-items-center justify-content-center position-relative overflow-hidden" 
                         style="height: 220px; border: 2px dashed #dee2e6; cursor: pointer;"
                         onclick="document.getElementById('imageFile').click()">
                        
                        <div id="guideMsg" class="text-center text-secondary">
                            <i class="bi bi-camera fs-1 d-block mb-2"></i>
                            <span class="fw-bold small d-block">클릭하여 사진 업로드</span>
                        </div>
                        <img id="preview" src="" class="d-none w-100 h-100" style="object-fit: cover;" alt="미리보기">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Menu Name</label>
                    <input type="text" name="menuName" class="form-control py-3 rounded-3 fw-bold border-2 shadow-none" placeholder="메뉴 이름을 입력하세요" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Price</label>
                    <div class="input-group">
                        <input type="number" name="menuPrice" class="form-control py-3 text-end fw-bold border-2 shadow-none" placeholder="0" required>
                        <span class="input-group-text bg-light fw-bold border-2">원</span>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Description</label>
                    <textarea name="menuDescription" class="form-control py-3 rounded-3 border-2 shadow-none no-resize" rows="3" placeholder="메뉴 설명을 입력하세요"></textarea>
                </div>

                <div class="d-grid gap-2 mt-5">
                    <button type="button" id="submitBtn" class="btn btn-warning text-white fw-bold py-3 fs-5 rounded-pill shadow-sm" 
                            onclick="handleMenuRegister()">등록 완료</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal fade" id="categoryQuickModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold mb-0">새 카테고리</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-4">
                    <input type="text" id="newCategoryName" class="form-control py-3 rounded-3 fw-bold border-2 shadow-none" placeholder="카테고리 명칭 (예: 치킨)">
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-success w-100 py-3 rounded-pill fw-bold" onclick="handleCategoryQuickAdd()">즉시 등록</button>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/

        /**
         * [Quick Add] 카테고리 비동기 등록
         */
        async function handleCategoryQuickAdd() {
            const catNameInput = document.getElementById('newCategoryName');
            const catName = catNameInput.value.trim();
            if(!catName) { alert("이름을 입력하세요."); return; }

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            try {
                // 컨트롤러의 /category/register_proc API 호출
                const response = await fetch('/owner/category/register_proc', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        ...(header && { [header]: token }) 
                    },
                    body: JSON.stringify({ "menuCategoryName": catName })
                });

                if(response.ok) {
                    const data = await response.json();
                    if(data.success) {
                        // Select 박스에 즉시 추가
                        const select = document.getElementById('categorySelect');
                        const newOption = new Option(catName, data.newIdx || Date.now()); // 서버에서 준 idx 사용
                        select.add(newOption);
                        newOption.selected = true; // 새로 추가한 걸로 자동 선택

                        // 모달 닫기 및 입력값 초기화
                        const modal = bootstrap.Modal.getInstance(document.getElementById('categoryQuickModal'));
                        modal.hide();
                        catNameInput.value = "";
                        alert("카테고리가 추가되었습니다.");
                    }
                }
            } catch(e) {
                alert("카테고리 등록 중 에러 발생");
            }
        }

        /**
         * 메뉴 등록 로직
         */
        async function handleMenuRegister() {
            const form = document.getElementById('menuRegisterForm');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!form.menuCategoryIdx.value) { alert("카테고리를 선택해 주세요."); return; }
            if (!form.menuName.value.trim()) { alert("메뉴 이름을 입력해 주세요."); return; }
            if (!form.menuPrice.value) { alert("가격을 입력해 주세요."); return; }

            if(!confirm("새 메뉴를 등록하시겠습니까?")) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>등록 중...';

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;
            
            const formData = new FormData(form);

            try {
                const response = await fetch('/owner/menu/register', { // 경로 수정
                    method: 'POST',
                    headers: { ...(header && { [header]: token }) },
                    body: formData
                });

                if (response.ok) {
                    alert("성공적으로 등록되었습니다.");
                    location.href = '/owner/menu/management'; 
                } else {
                    alert("등록 실패");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "등록 완료";
                }
            } catch (error) {
                alert("통신 에러");
                submitBtn.disabled = false;
                submitBtn.innerText = "등록 완료";
            }
        }

        function previewImage(input) {
            const preview = document.getElementById('preview');
            const guideMsg = document.getElementById('guideMsg');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.classList.remove('d-none');
                    guideMsg.classList.add('d-none');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        /*]]>*/
    </script>
</th:block>
</body>
</html>
