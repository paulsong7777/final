<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/owner-layout}">
<head>
    <title>주문 상세 관리 - MoEats</title>
</head>
<body>
<main layout:fragment="content" class="py-4" th:with="safeOrder=${orderRoom ?: (order ?: {}) }">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 800px;">
        <div class="card-header bg-white py-3 border-bottom text-center">
            <h4 class="fw-bold mb-0 text-navy">주문 상세 관리</h4>
        </div>
        
        <div class="card-body p-4">
            <div class="row text-center mb-4">
                <div class="col-3" th:each="status : ${ {'ACCEPTED', 'COOKING', 'DELIVERING', 'COMPLETED'} }">
                    <div th:classappend="${safeOrder.roomStatus == status} ? 'text-orange fw-bold' : 'text-muted'" 
                         style="border-bottom: 3px solid; border-color: inherit;">
                        <span th:text="${status == 'ACCEPTED' ? '접수완료' : (status == 'COOKING' ? '조리중' : (status == 'DELIVERING' ? '배달중' : '배달완료'))}"></span>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-light rounded mb-4">
                <p>주문 번호: <span class="fw-bold" th:text="${safeOrder.roomIdx}">0</span></p>
                <p>매장 이름: <span class="fw-bold" th:text="${safeOrder.storeName}">매장명</span></p>
            </div>

            <div class="d-grid gap-2">
                <button th:if="${safeOrder.roomStatus == 'ACCEPTED'}" class="btn btn-success btn-lg py-3"
                        th:onclick="moveStatus([[${safeOrder.roomIdx}]], 'COOKING')">조리 시작</button>
                
                <button th:if="${safeOrder.roomStatus == 'COOKING'}" class="btn btn-primary btn-lg py-3"
                        th:onclick="moveStatus([[${safeOrder.roomIdx}]], 'DELIVERING')">배달 시작</button>
                
                <button th:if="${safeOrder.roomStatus == 'DELIVERING'}" class="btn btn-dark btn-lg py-3"
                        th:onclick="moveStatus([[${safeOrder.roomIdx}]], 'COMPLETED')">배달 완료</button>
                
                <div th:if="${safeOrder.roomStatus == 'COMPLETED'}" class="alert alert-secondary text-center">배달 완료된 주문</div>

                <div class="text-center mt-3">
                    <a th:href="@{/owner/dashboard}" class="text-muted text-decoration-none small">대시보드로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="statusToast" class="toast align-items-center text-white bg-dark border-0" role="alert">
            <div class="d-flex"><div class="toast-body fw-bold">상태를 변경합니다...</div></div>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        function moveStatus(roomIdx, nextStatus) {
            // 토스트 보여주기
            const toastEl = document.getElementById('statusToast');
            const bsToast = new bootstrap.Toast(toastEl);
            bsToast.show();

            // 0.8초 후 경로 이동 (AJAX 대신 URL 이동 방식)
            setTimeout(() => {
                location.href = `/owner/order/status_move?roomIdx=${roomIdx}&nextStatus=${nextStatus}`;
            }, 800);
        }
    </script>
</th:block>
</body>
</html>
