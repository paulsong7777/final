<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/owner-layout}">
<head>
    <title>리뷰 및 답변 관리 - MoEats</title>
    <style>
        .text-navy { color: #001f3f !important; }
        .text-orange { color: #ff6b00 !important; }
        .bg-navy { background-color: #001f3f !important; }
        .btn-orange { background-color: #ff6b00 !important; color: white !important; }
        .active-star { color: #ffc107 !important; }
        .store-reply-area { background-color: #f8f9fa; }
        .new-reply-fade { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body>
<main layout:fragment="content" class="review-page-wrapper py-4">

    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2">
        <div>
            <h3 class="fw-bold mb-0 text-navy">
                <i class="bi bi-chat-right-text me-2 text-orange"></i>리뷰 및 답변 관리
            </h3>
            <p class="text-secondary small mb-0 mt-1">고객님의 소중한 리뷰에 정성스러운 답변을 남겨주세요.</p>
        </div>
    </div>

    <div class="review-container">

        <th:block th:if="${not #lists.isEmpty(reviewList)}">
            <div th:each="rev : ${reviewList}" class="card border-0 shadow-sm rounded-4 mb-4 overflow-hidden">
                <div class="card-body p-4">

                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <span class="fw-bold text-navy fs-5"
                                  th:text="${rev['memberNickname'] ?: '익명 고객님'}">닉네임</span>
                            <span class="ms-2 text-muted small"
                                  th:text="${rev['regDate'] ?: '0000-00-00'}">날짜</span>
                            <div class="star-rating-container mt-1">
                                <i th:each="num : ${#numbers.sequence(1, 5)}"
                                   class="bi"
                                   th:classappend="${num <= (rev['reviewRating'] ?: 0)} ? 'bi-star-fill active-star' : 'bi-star text-light'"></i>
                            </div>
                        </div>
                        <div class="badge bg-light text-navy border px-3 py-2 fw-bold"
                             th:text="${rev['menuName'] ?: '-'}">메뉴명</div>
                    </div>

                    <p class="text-dark mb-4"
                       th:text="${rev['reviewContent'] ?: '내용이 없습니다.'}">리뷰 본문</p>

                    <hr class="opacity-10">

                    <div th:id="|reply-section-${rev['reviewIdx']}|" class="rounded-4 p-3 store-reply-area">
                        <div th:if="${rev['replyContent'] != null and rev['replyContent'] != ''}" class="existing-reply">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-navy text-white me-2 px-3 rounded-pill">사장님 답변</span>
                                <span class="text-muted small"
                                      th:text="${rev['replyRegDate'] ?: '방금 전'}">날짜</span>
                            </div>
                            <p class="text-secondary mb-0 small"
                               th:text="${rev['replyContent']}">답변 내용</p>
                        </div>

                        <div th:unless="${rev['replyContent'] != null and rev['replyContent'] != ''}"
                             class="reply-input-wrapper">
                            <div class="input-group shadow-sm rounded-3 overflow-hidden">
                                <textarea th:id="|reply-input-${rev['reviewIdx']}|"
                                          class="form-control border-0 bg-white shadow-none p-3"
                                          rows="2" placeholder="고객님께 따뜻한 답변을 남겨주세요."></textarea>
                                <button class="btn btn-orange fw-bold px-4"
                                        th:onclick="submitReply([[${rev['reviewIdx']}]])">등록</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </th:block>

        <div th:if="${#lists.isEmpty(reviewList)}" class="text-center py-5">
            <i class="bi bi-chat-dots fs-1 text-light d-block mb-3 opacity-50"></i>
            <h5 class="fw-bold text-secondary">작성된 리뷰가 없습니다.</h5>
            <p class="text-muted small">첫 리뷰가 달리면 이곳에서 확인하고 답변하실 수 있습니다.</p>
        </div>

    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        async function submitReply(reviewIdx) {
            const inputArea = document.getElementById(`reply-input-${reviewIdx}`);
            const content = inputArea.value.trim();

            if (!content) {
                alert("답변 내용을 입력해 주세요.");
                inputArea.focus();
                return;
            }

            try {
                const response = await fetch('/owners/review/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        'reviewIdx': reviewIdx,
                        'replyContent': content
                    })
                });

                if (response.ok) {
                    const section = document.getElementById(`reply-section-${reviewIdx}`);
                    const now = new Date().toLocaleString('ko-KR');
                    section.innerHTML = `
                        <div class="existing-reply new-reply-fade">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-navy text-white me-2 px-3 rounded-pill">사장님 답변</span>
                                <span class="text-muted small">${now}</span>
                            </div>
                            <p class="text-secondary mb-0 small">${content}</p>
                        </div>
                    `;
                } else {
                    alert("답변 등록 중 오류가 발생했습니다.");
                }
            } catch (error) {
                console.error("Reply Error:", error);
                alert("서버와 통신할 수 없습니다.");
            }
        }
        /*]]>*/
    </script>
</th:block>
</html>
