<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layout/default}">
<head>
    <title>리뷰 및 답변 관리 - Mo-Eats</title>
    <style>
        /* 필수 커스텀 속성 및 상태 제어(Hover)용 CSS */
        .review-img-thumb { 
            width: 100px; height: 100px; 
            object-fit: cover; border-radius: 12px; 
            cursor: pointer; transition: 0.2s; 
            border: 1px solid var(--mo-line);
        }
        .review-img-thumb:hover { transform: scale(1.05); filter: brightness(0.9); }
        
        .reply-textarea { transition: height 0.2s; overflow: hidden; resize: none; min-height: 52px; padding-top: 15px; }
        
        .review-star { color: var(--mo-primary); font-size: 16px; margin-right: 2px; }
        .review-star-empty { color: #d1d5db; font-size: 16px; margin-right: 2px; }
        
        .reply-box { background-color: #fafafa; border: 1px solid var(--mo-line); }
    </style>
</head>

<body th:data-api-base="@{/owners}">
<section layout:fragment="pageContent">
    <div class="mo-page-container container">

        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">

                <div class="mo-section mb-4">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 border-bottom pb-4">
                        <div>
                            <span class="mo-section-label">REVIEW MANAGEMENT</span>
                            <h2 class="mo-section-title">리뷰 및 답변 관리</h2>
                            <p class="mo-helper-text mt-2 mb-0">고객님의 소중한 리뷰에 정성스러운 답변을 남겨주세요.</p>
                        </div>
                    </div>
                </div>

                <div class="review-container">
                    <th:block th:if="${not #lists.isEmpty(reviewList)}">
                        
                        <div th:each="rev : ${reviewList}" class="mo-surface-card p-4 p-md-5 mb-4">
                            
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <div class="d-flex align-items-center gap-2 mb-1">
                                        <span class="fw-bold fs-5" style="color: var(--mo-navy-strong);" th:text="${rev['memberNickname'] ?: '익명 고객님'}">닉네임</span>
                                        <span class="fw-bold text-secondary" style="font-size: 13px;" th:text="${rev['createdAt'] != null ? #dates.format(rev['createdAt'], 'yyyy-MM-dd') : '날짜정보없음'}">날짜</span>
                                    </div>
                                    <div class="mt-1 d-flex">
                                        <i th:each="num : ${#numbers.sequence(1, 5)}"
                                           class="bi"
                                           th:classappend="${num <= (rev['reviewRating'] ?: 0)} ? 'bi-star-fill review-star' : 'bi-star-fill review-star-empty'"></i>
                                    </div>
                                </div>
                                <span class="mo-chip border-0 fw-bold" style="background: rgba(42, 54, 89, 0.05); color: var(--mo-navy);" th:text="${rev['menuName'] ?: '전체 메뉴'}">메뉴명</span>
                            </div>

                            <div th:if="${rev['reviewImg'] != null}" class="mb-3">
                                <img th:src="${rev['reviewImg']}" class="review-img-thumb" alt="리뷰사진">
                            </div>

                            <p class="mb-4" style="font-size: 15px; color: var(--mo-text); line-height: 1.6;" th:text="${rev['reviewContent'] ?: '내용이 없습니다.'}">리뷰 본문</p>

                            <div class="border-top border-dashed my-4 mx-n4 mx-md-n5" style="border-style: dashed !important; border-color: var(--mo-line) !important;"></div>

                            <div th:id="|reply-section-${rev['reviewIdx']}|">
                                
                                <div th:if="${not #strings.isEmpty(rev['replyContent'])}" class="reply-box p-3 rounded-3">
                                    <div class="d-flex align-items-center mb-2 gap-2">
                                        <span class="mo-badge" style="background: var(--mo-navy-strong); color: #fff; border: none;">사장님 답변</span>
                                        <span class="fw-bold text-secondary" style="font-size: 12px;" th:text="${rev['replyCreatedAt'] != null ? #dates.format(rev['replyCreatedAt'], 'yyyy-MM-dd HH:mm') : '답변 완료'}">날짜</span>
                                    </div>
                                    <p class="mb-0 text-secondary" style="font-size: 14px; line-height: 1.6;" th:text="${rev['replyContent']}">답변 내용</p>
                                </div>

                                <div th:unless="${not #strings.isEmpty(rev['replyContent'])}" class="reply-input-wrapper">
                                    <div class="d-flex gap-2 align-items-end">
                                        <textarea th:id="|reply-input-${rev['reviewIdx']}|"
                                                  class="form-control mo-form-control reply-textarea flex-grow-1" style="border-radius: 16px;"
                                                  rows="1" placeholder="고객님께 따뜻한 답변을 남겨주세요. (Enter로 등록)"
                                                  th:onkeydown="|handleKeydown(event, ${rev['reviewIdx']})|"
                                                  oninput="autoResize(this)"></textarea>
                                        
                                        <button type="button" class="mo-btn mo-btn-primary flex-shrink-0" style="height: 52px; padding: 0 24px; border-radius: 16px;"
                                                th:id="|reply-btn-${rev['reviewIdx']}|"
                                                th:onclick="submitReply([[${rev['reviewIdx']}]])">등록</button>
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                    </th:block>

                    <div th:if="${#lists.isEmpty(reviewList)}" class="py-5">
                        <div class="mo-empty-state mx-auto border-0 shadow-none bg-transparent" style="max-width: 560px;">
                            <div class="mb-2" style="font-size: 64px;">💬</div>
                            <h3 class="mo-empty-state__title mb-3">작성된 리뷰가 없습니다</h3>
                            <p class="mo-empty-state__desc fw-bold">고객님들이 정성스러운 리뷰를 남겨주실 때까지 조금만 기다려주세요!</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</section>

<th:block layout:fragment="pageScripts">
    <script th:inline="javascript">
        /*<![CDATA[*/

        document.addEventListener('DOMContentLoaded', () => {
            // 이미지 클릭 시 원본 보기 (새 창)
            document.querySelectorAll('.review-img-thumb').forEach(img => {
                img.onclick = () => window.open(img.src, '_blank');
            });
        });

        function resetButton(btn) {
            if (!btn) return;
            btn.disabled = false;
            btn.innerText = "등록";
        }

        // 텍스트에어리어 자동 높이 조절
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function handleKeydown(e, reviewIdx) {
            // 엔터 치면 등록 (Shift+Enter는 줄바꿈)
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitReply(reviewIdx);
            }
        }

        async function submitReply(reviewIdx) {
            const inputArea = document.getElementById(`reply-input-${reviewIdx}`);
            const submitBtn = document.getElementById(`reply-btn-${reviewIdx}`);
            const content = inputArea.value.trim();

            if (!content) {
                alert("답변 내용을 입력해 주세요.");
                inputArea.focus();
                return;
            }

            // 버튼 로딩 상태
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;
            const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
            if (header && token) headers[header] = token;

            try {
                const apiBase = document.body.dataset.apiBase || '/owners';
                const response = await fetch(`${apiBase}/review/reply`, {
                    method: 'POST',
                    headers: headers,
                    body: new URLSearchParams({ 'reviewIdx': reviewIdx, 'replyContent': content })
                });

                if (!response.ok) {
                    throw new Error(`HTTP 오류: ${response.status}`);
                }

                let result;
                try {
                    result = await response.json();
                } catch (e) {
                    throw new Error("서버 응답이 올바르지 않습니다.");
                }

                if (result.success) {
                    const section = document.getElementById(`reply-section-${reviewIdx}`);
                    // 작성된 시간을 포맷팅 (예: 2026-00-00 00:00)
                    const dateStr = new Date().toLocaleString('ko-KR', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit'
                    }).replace(/\./g, '-').replace(' -', ' ');
                    
                    // 작성 창을 '작성 완료 뷰'로 교체 (Mo-Eats 스타일)
                    section.innerHTML = `
                        <div class="reply-box p-3 rounded-3">
                            <div class="d-flex align-items-center mb-2 gap-2">
                                <span class="mo-badge" style="background: var(--mo-navy-strong); color: #fff; border: none;">사장님 답변</span>
                                <span class="fw-bold text-secondary" style="font-size: 12px;">${dateStr}</span>
                            </div>
                            <p class="mb-0 text-secondary" style="font-size: 14px; line-height: 1.6;">${content}</p>
                        </div>
                    `;

                } else {
                    throw new Error(result.message || "등록 실패");
                }
            } catch (error) {
                alert(error.message || "통신 중 오류가 발생했습니다.");
                resetButton(submitBtn);
            }
        }
        /*]]>*/
    </script>
</th:block>
</body>
</html>
