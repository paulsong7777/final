<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>신규 매장 등록 - Mo-Eats</title>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        .image-upload-box { transition: all 0.2s ease; border: 2px dashed var(--mo-line-strong); }
        .image-upload-box:hover, .image-upload-box.dragover { border-color: var(--mo-primary); background-color: rgba(255, 128, 0, 0.04) !important; }
        .holiday-chip-label { transition: all 0.2s ease; border: 1px solid var(--mo-line-strong); cursor: pointer; }
        .holiday-chip-input:checked + .holiday-chip-label { background: var(--mo-primary) !important; border-color: var(--mo-primary); color: #fff !important; box-shadow: 0 4px 12px rgba(255, 128, 0, 0.24); }
        .all-year-input:checked + .holiday-chip-label { background: var(--mo-navy-strong) !important; border-color: var(--mo-navy-strong); color: #fff !important; }
    </style>
</head>

<body>
<section layout:fragment="pageContent">
    <div class="mo-page-container container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-8">
                <div class="mo-section text-center mb-5">
                    <span class="mo-section-label">NEW STORE</span>
                    <h2 class="mo-section-title">신규 매장 등록</h2>
                </div>

                <div class="mo-surface-card p-4 p-md-5">
                    <form id="storeCreateForm" th:action="@{/owners/store}" method="post" enctype="multipart/form-data">
                        
                        <input type="hidden" name="longitude" id="longitude" value="126.9780">
                        <input type="hidden" name="latitude" id="latitude" value="37.5665">
                        <input type="hidden" name="storeStatus" value="ACTIVE">

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="mo-form-label">매장명</label>
                                <input type="text" name="storeName" class="form-control mo-form-control fw-bold" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="mo-form-label">가게 카테고리</label>
                                <select name="storeCategory" class="form-select mo-form-control fw-bold" required>
                                    <option value="" disabled selected>선택하세요</option>
                                    <option value="KOREAN">한식</option>
                                    <option value="CHINESE">중식</option>
                                    <option value="CHICKEN">치킨</option>
                                    <option value="PIZZA">피자/양식</option>
                                    <option value="CAFE">카페/디저트</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="mo-form-label">매장 주소</label>
                                <div class="input-group mb-2">
                                    <input type="text" name="storeAddress1" id="storeAddress1" class="form-control mo-form-control" placeholder="주소 검색을 이용해 주세요" readonly required>
                                    <button class="mo-btn mo-btn-outline px-3" type="button" onclick="execDaumPostcode()">주소 검색</button>
                                </div>
                                <input type="text" name="storeAddress2" id="storeAddress2" class="form-control mo-form-control" placeholder="상세 주소를 입력하세요 (건물명, 동/호수 등)" required>
                            </div>

                            <div class="col-md-6">
                                <label class="mo-form-label">연락처</label>
                                <input type="text" name="storePhone" class="form-control mo-form-control" placeholder="053-000-0000" required>
                            </div>

                            <div class="col-md-6">
                                <label class="mo-form-label">최소 주문 금액</label>
                                <input type="number" name="minimumOrderAmount" class="form-control mo-form-control" value="0" min="0">
                            </div>

                            <div class="col-md-6">
                                <label class="mo-form-label">배달 가능 여부</label>
                                <select name="supportsDelivery" class="form-select mo-form-control">
                                    <option value="true">가능</option>
                                    <option value="false">불가능</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="mo-form-label">현장 식사 가능 여부</label>
                                <select name="supportsOnsite" class="form-select mo-form-control">
                                    <option value="true">가능</option>
                                    <option value="false">불가능</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="mo-form-label">매장 소개</label>
                                <textarea name="storeDescription" rows="4" class="form-control mo-form-control pt-3" style="resize: none;" placeholder="사장님의 매장을 소개해 주세요."></textarea>
                            </div>
                        </div>

                        <div class="mt-5 pt-3 border-top">
                            <button type="submit" class="mo-btn mo-btn-primary w-100 fs-6 py-2" style="min-height: 52px;">
                                <i class="bi bi-check-lg me-2"></i> 매장 등록 완료
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="pageScripts">
    <script th:inline="javascript">
        /*<![CDATA[*/
        // 카카오 주소 API 함수
        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    // 도로명 주소 변수
                    var addr = data.roadAddress; 
                    // 주소 정보를 해당 필드에 넣는다.
                    document.getElementById("storeAddress1").value = addr;
                    // 커서를 상세주소 필드로 이동한다.
                    document.getElementById("storeAddress2").focus();
                }
            }).open();
        }

        // 기존 이미지 미리보기 및 기타 JS 로직 유지...
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('uploadContent').classList.add('d-none');
                    document.getElementById('imagePreview').classList.remove('d-none');
                    document.getElementById('previewImg').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 1. [실시간 제어] 연락처: 숫자, 하이픈 외 문자 제거 + 15자 제한 + 하이픈 개수 제한
        document.querySelector('input[name="storePhone"]').addEventListener('input', function(e) {
            // 숫자와 하이픈이 아닌 문자 즉시 제거
            this.value = this.value.replace(/[^0-9-]/g, '');

            // 하이픈(-) 개수 제어 (최대 2개)
            const hyphenCount = (this.value.match(/-/g) || []).length;
            if (hyphenCount > 2) {
                alert("전화번호 형식이 올바르지 않습니다.\n예: 000-0000-0000");
                // 마지막으로 입력한 하이픈 제거
                const lastIndex = this.value.lastIndexOf('-');
                this.value = this.value.substring(0, lastIndex) + this.value.substring(lastIndex + 1);
            }

            // 길이 제한 (최대 15자)
            if (this.value.length > 15) {
                alert("전화번호 형식이 올바르지 않습니다.\n예: 000-0000-0000");
                this.value = this.value.substring(0, 15);
            }
        });

        // 2. [포커스 아웃] 매장명: 입력을 마친 후(포커스를 잃었을 때) 자모음 분리 검사
        document.querySelector('input[name="storeName"]').addEventListener('blur', function(e) {
            const nameRegex = /^[a-zA-Z0-9가-힣\s]*$/;
            
            if (this.value.trim() !== "" && !nameRegex.test(this.value)) {
                alert("매장명은 영어, 숫자, 완성된 한글만 입력 가능합니다.\n자음/모음만 있는 글자는 허용되지 않습니다.");
                // 잘못된 문자 제거 (필요 시)
                this.value = this.value.replace(/[^a-zA-Z0-9가-힣\s]/g, '');
            }
        });

        // 3. 폼 전송 시 최종 유효성 검사
        document.getElementById('storeCreateForm').onsubmit = function(e) {
            const storeName = this.storeName.value;
            const storePhone = this.storePhone.value;
            const nameFinalRegex = /^[a-zA-Z0-9가-힣\s]+$/;

            // 매장명 최종 체크
            if (!nameFinalRegex.test(storeName)) {
                alert("매장명을 올바른 형식(영어, 숫자, 완성된 한글)으로 입력해 주세요.");
                this.storeName.focus();
                return false;
            }

            // 연락처 하이픈 개수 최종 체크
            const finalHyphenCount = (storePhone.match(/-/g) || []).length;
            if (finalHyphenCount > 2) {
                alert("전화번호 형식이 올바르지 않습니다.\n예: 000-0000-0000");
                this.storePhone.focus();
                return false;
            }

            // 주소 체크
            if (!this.storeAddress1.value) {
                alert("주소 검색을 통해 매장 주소를 입력해 주세요.");
                return false;
            }

            return confirm("입력하신 정보로 매장을 등록하시겠습니까?");
        };
        // 드래그 앤 드롭 등 기존 스크립트 생략...
        /*]]>*/
    </script>
</th:block>
</body>
</html>
