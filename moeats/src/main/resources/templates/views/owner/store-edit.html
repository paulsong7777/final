<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>매장 정보 수정 - Mo-Eats</title>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        .image-upload-box { transition: all 0.2s ease; border: 2px dashed var(--mo-line-strong); }
        .image-upload-box:hover, .image-upload-box.dragover { border-color: var(--mo-primary); background-color: rgba(255, 128, 0, 0.04) !important; }
        
        .upload-overlay { opacity: 0; transition: 0.3s ease; background: rgba(37, 45, 89, 0.5); }
        .image-upload-box:hover .upload-overlay { opacity: 1; }
    </style>
</head>

<body>
<section layout:fragment="pageContent">
    <div class="mo-page-container container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-8">
                
                <div class="mo-section text-center mb-5">
                    <span class="mo-section-label">EDIT STORE</span>
                    <h2 class="mo-section-title">매장 정보 수정</h2>
                    <p class="mo-store-card__desc mt-2">고객에게 보여질 매장의 상세 정보를 관리합니다.</p>
                </div>

                <div class="mo-surface-card p-4 p-md-5">
                    
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                        <h3 class="mo-store-card__title m-0 fs-5">상세 정보 입력</h3>
						<a th:href="${redirectUrl}" class="text-decoration-none fw-bold text-secondary" style="font-size: 13px;">
						    <i class="bi bi-arrow-left me-1"></i> 이전으로
						</a>
                    </div>

                    <form id="storeUpdateForm" th:action="@{/owners/store/edit}" method="post" enctype="multipart/form-data">
                        
                        <input type="hidden" name="storeIdx" th:value="${store?.storeIdx ?: 0}">
                        <input type="hidden" name="longitude" id="longitude" th:value="${store?.longitude ?: 126.9780}">
                        <input type="hidden" name="latitude" id="latitude" th:value="${store?.latitude ?: 37.5665}">
                        <input type="hidden" name="storeStatus" th:value="${store?.storeStatus ?: 'ACTIVE'}">
                        
                        <input type="hidden" name="redirectUrl" th:value="${redirectUrl}">



                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="mo-form-label">매장명</label>
                                <input type="text" name="storeName" th:value="${store?.storeName}" class="form-control mo-form-control fw-bold mo-valid-name" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="mo-form-label">가게 카테고리</label>
                                <select name="storeCategory" class="form-select mo-form-control fw-bold" required>
                                    <option value="" disabled>선택하세요</option>
                                    <option value="KOREAN" th:selected="${store?.storeCategory == 'KOREAN'}">한식</option>
                                    <option value="CHINESE" th:selected="${store?.storeCategory == 'CHINESE'}">중식</option>
                                    <option value="CHICKEN" th:selected="${store?.storeCategory == 'CHICKEN'}">치킨</option>
                                    <option value="PIZZA" th:selected="${store?.storeCategory == 'PIZZA'}">피자/양식</option>
                                    <option value="CAFE" th:selected="${store?.storeCategory == 'CAFE'}">카페/디저트</option>
                                </select>
                            </div>

                            <div class="col-12 mt-4">
                                <label class="mo-form-label">매장 주소</label>
                                <div class="input-group mb-2">
                                    <input type="text" name="storeAddress1" id="storeAddress1" th:value="${store?.storeAddress1}" class="form-control mo-form-control" placeholder="주소 검색을 이용해 주세요" readonly required>
                                    <button class="mo-btn mo-btn-outline px-3" type="button" onclick="execDaumPostcode()">주소 검색</button>
                                </div>
                                <input type="text" name="storeAddress2" id="storeAddress2" th:value="${store?.storeAddress2}" class="form-control mo-form-control" placeholder="상세 주소를 입력하세요 (건물명, 동/호수 등)" required>
                            </div>

                            <div class="col-md-6 mt-4">
                                <label class="mo-form-label">연락처</label>
                                <input type="text" name="storePhone" th:value="${store?.storePhone}" class="form-control mo-form-control" placeholder="053-000-0000" required>
                            </div>

                            <div class="col-md-6 mt-4">
                                <label class="mo-form-label">최소 주문 금액</label>
                                <input type="number" name="minimumOrderAmount" th:value="${store?.minimumOrderAmount ?: 0}" class="form-control mo-form-control" min="0">
                            </div>

                            <div class="col-md-6 mt-4">
                                <label class="mo-form-label">배달 가능 여부</label>
                                <select name="supportsDelivery" class="form-select mo-form-control">
                                    <option value="true" th:selected="${store?.supportsDelivery == true}">가능</option>
                                    <option value="false" th:selected="${store?.supportsDelivery == false}">불가능</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mt-4">
                                <label class="mo-form-label">현장 식사 가능 여부</label>
                                <select name="supportsOnsite" class="form-select mo-form-control">
                                    <option value="true" th:selected="${store?.supportsOnsite == true}">가능</option>
                                    <option value="false" th:selected="${store?.supportsOnsite == false}">불가능</option>
                                </select>
                            </div>

                            <div class="col-12 mt-4">
                                <label class="mo-form-label">매장 소개</label>
                                <textarea name="storeDescription" rows="5" class="form-control mo-form-control pt-3" style="resize: none;" placeholder="사장님의 매장을 소개해 주세요." th:text="${store?.storeDescription}"></textarea>
                            </div>
                        </div>

                        <div class="mt-5 pt-3 border-top">
                            <button type="submit" class="mo-btn mo-btn-primary w-100 fs-6 py-2" style="min-height: 52px;">
                                <i class="bi bi-check-lg me-2"></i> 설정 저장하기
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="pageScripts">
    <script th:inline="javascript">
        /*<![CDATA[*/
        // 1. 카카오 주소 API 함수
        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    var addr = data.roadAddress; 
                    document.getElementById("storeAddress1").value = addr;
                    document.getElementById("storeAddress2").focus();
                }
            }).open();
        }

        // 2. 이미지 미리보기 및 드래그 앤 드롭
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('storeImg');

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('uploadContent').classList.add('d-none');
                    document.getElementById('imagePreview').classList.remove('d-none');
                    document.getElementById('previewImg').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        dropZone.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            dropZone.classList.add('dragover'); 
        });
        dropZone.addEventListener('dragleave', () => { 
            dropZone.classList.remove('dragover'); 
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); 
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                previewImage(fileInput);
            }
        });

        // 3. 유효성 검사 (연락처, 매장명)
        document.querySelector('input[name="storePhone"]').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9-]/g, '');
            const hyphenCount = (this.value.match(/-/g) || []).length;
            if (hyphenCount > 2) {
                alert("전화번호 형식이 올바르지 않습니다.\n예: 000-0000-0000");
                const lastIndex = this.value.lastIndexOf('-');
                this.value = this.value.substring(0, lastIndex) + this.value.substring(lastIndex + 1);
            }
            if (this.value.length > 15) {
                alert("전화번호 형식이 올바르지 않습니다.\n예: 000-0000-0000");
                this.value = this.value.substring(0, 15);
            }
        });

        document.querySelector('input[name="storeName"]').addEventListener('blur', function(e) {
            const nameRegex = /^[a-zA-Z0-9가-힣\s]*$/;
            if (this.value.trim() !== "" && !nameRegex.test(this.value)) {
                alert("매장명은 영어, 숫자, 완성된 한글만 입력 가능합니다.");
                this.value = this.value.replace(/[^a-zA-Z0-9가-힣\s]/g, '');
            }
        });

        // 4. 폼 제출 시 최종 확인
        document.getElementById('storeUpdateForm').onsubmit = function(e) {
            const storeName = this.storeName.value;
            const storePhone = this.storePhone.value;
            const nameFinalRegex = /^[a-zA-Z0-9가-힣\s]+$/;

            if (!nameFinalRegex.test(storeName)) {
                alert("매장명을 올바른 형식(영어, 숫자, 완성된 한글)으로 입력해 주세요.");
                this.storeName.focus();
                return false;
            }

            const finalHyphenCount = (storePhone.match(/-/g) || []).length;
            if (finalHyphenCount > 2) {
                alert("전화번호 형식이 올바르지 않습니다.\n예: 000-0000-0000");
                this.storePhone.focus();
                return false;
            }

            if (!this.storeAddress1.value) {
                alert("주소 검색을 통해 매장 주소를 입력해 주세요.");
                return false;
            }

            return confirm("입력하신 정보로 매장 정보를 수정하시겠습니까?");
        };
        /*]]>*/
    </script>
</th:block>
</body>
</html>
