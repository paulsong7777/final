<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/owner-layout}">
<head>
    <title>매장 정보 수정 - MoEats</title>
</head>

<body>
<main layout:fragment="content" class="store-setting-page py-4">
    <div class="card shadow-sm border-0 mx-auto rounded-4 bg-white edit-card-limit">
        <div class="card-body p-4 p-md-5">
            
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-2 pb-3">
                <h2 class="fw-bold mb-0 text-navy"><i class="bi bi-shop me-2 text-orange"></i>매장 정보 수정</h2>
                <a th:href="@{/owners/store-manage}" class="text-decoration-none text-secondary small fw-bold">
                    <i class="bi bi-arrow-left me-1"></i>이전으로
                </a>
            </div>

            <form id="storeSettingForm" th:action="@{/owners/store-manage/update_proc}" method="post" enctype="multipart/form-data">
                
                <input type="hidden" name="storeIdx" th:value="${storeVo != null ? storeVo['storeIdx'] : 0}">

                <div class="mb-4 row align-items-center">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase text-start">대표 사진</label>
                    <div class="col-md-9">
                        <div id="dropZone" class="rounded-3 upload-box" onclick="document.getElementById('storeImg').click()">
                            <input type="file" name="storeImgFile" id="storeImg" accept="image/*" class="d-none" onchange="previewImage(this)">
                            
                            <div id="uploadContent" th:classappend="${storeVo != null and storeVo['storeImg'] != null} ? 'd-none' : ''">
                                <i class="bi bi-cloud-arrow-up text-muted fs-1"></i>
                                <p class="mt-2 mb-0 fw-bold text-navy">클릭하여 사진을 업로드하세요</p>
                            </div>
                            
                            <div id="imagePreview" th:classappend="${storeVo == null or storeVo['storeImg'] == null} ? 'd-none' : ''" class="w-100 h-100">
                                <img id="previewImg" th:src="${storeVo != null ? storeVo['storeImg'] : ''}" alt="미리보기" class="preview-img shadow-sm">
                                <div class="upload-overlay">
                                    <span class="small fw-bold text-white">사진 변경하기</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-4 row align-items-center">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase text-start">매장명</label>
                    <div class="col-md-9">
                        <input type="text" name="storeName" th:value="${storeVo != null ? storeVo['storeName'] : ''}" 
                               class="form-control py-3 fw-bold text-navy rounded-3 border-2 shadow-none" required>
                    </div>
                </div>

                <div class="mb-4 row align-items-center">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase text-start">영업 상태</label>
                    <div class="col-md-9">
                        <select name="storeStatus" class="form-select py-3 fw-bold text-navy rounded-3 border-2 shadow-none">
                            <option value="OPEN" th:selected="${storeVo != null and storeVo['storeStatus'] == 'OPEN'}">영업 중 (주문 가능)</option>
                            <option value="CLOSED" th:selected="${storeVo != null and storeVo['storeStatus'] == 'CLOSED'}">영업 종료 (준비 중)</option>
                            <option value="BREAK" th:selected="${storeVo != null and storeVo['storeStatus'] == 'BREAK'}">브레이크 타임</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4 row align-items-center">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase text-start">연락처</label>
                    <div class="col-md-9">
                        <input type="text" name="storePhone" th:value="${storeVo != null ? storeVo['storePhone'] : ''}" 
                               class="form-control py-3 fw-bold text-navy rounded-3 border-2 shadow-none" placeholder="010-0000-0000">
                    </div>
                </div>

                <div class="mb-4 row">
                    <label class="col-md-3 fw-bold small text-secondary text-uppercase text-start pt-2">매장 소개</label>
                    <div class="col-md-9">
                        <textarea name="storeDescription" rows="5" class="form-control py-3 fw-bold rounded-3 border-2 no-resize shadow-none" 
                                  th:text="${storeVo != null ? storeVo['storeDescription'] : ''}" placeholder="매장 소개글을 입력하세요"></textarea>
                    </div>
                </div>

                <div class="text-center mt-5 pt-3 border-top">
                    <button type="submit" class="btn btn-moeats w-100 py-3 rounded-pill fs-5 shadow-sm">
                        <i class="bi bi-check-lg me-2"></i>설정 저장하기
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const uploadContent = document.getElementById('uploadContent');
                    const imagePreview = document.getElementById('imagePreview');
                    const previewImg = document.getElementById('previewImg');
                    
                    if(uploadContent) uploadContent.classList.add('d-none');
                    if(imagePreview) imagePreview.classList.remove('d-none');
                    if(previewImg) previewImg.src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('storeSettingForm').onsubmit = function() {
            return confirm("입력하신 정보로 매장 정보를 수정하시겠습니까?");
        };
        /*]]>*/
    </script>
</th:block>
</body>
</html>
