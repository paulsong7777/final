<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/owner-layout}"> <head>
    <title>주문 내역 관리 - MoEats</title>
    <style>
        .order-list-header-line { border-color: #eee !important; }
        .text-orange { color: #ff6b00 !important; }
        .text-navy { color: #001f3f !important; }
        .order-code-badge-custom { background-color: #f8f9fa; color: #333; font-size: 0.85rem; }
        .btn-table-view:hover { background-color: #ff6b00 !important; color: white !important; }
        /* 신규 주문 강조 애니메이션 */
        @keyframes highlight {
            0% { background-color: #fff9f5; }
            100% { background-color: transparent; }
        }
        .new-order-highlight-animation { animation: highlight 2s ease-out; }
    </style>
</head>

<body>
<main layout:fragment="content" class="order-list-page py-4">
    
    <div class="d-flex justify-content-between align-items-end mb-4 pb-3 border-bottom border-2 order-list-header-line">
        <div>
            <h2 class="fw-bold mb-0 text-navy"><i class="bi bi-clock-history me-2 text-orange"></i>주문 내역 관리</h2>
            <p class="text-secondary small mb-0 mt-1">매장에서 접수된 모든 주문을 상세히 조회합니다.</p>
        </div>
        <div class="bg-white border rounded-pill px-3 py-2 fw-bold text-secondary small shadow-sm d-none d-md-block">
             <i class="bi bi-calendar-event me-1 text-orange"></i>
             조회 기준: <span id="lastUpdateTime" th:text="${#calendars.format(#calendars.createNow(), 'yyyy-MM-dd HH:mm')}"></span>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="orderTable">
                <thead class="bg-light text-secondary small fw-bold text-center">
                    <tr>
                        <th class="py-3 ps-4 text-start" style="width: 80px;">번호</th>
                        <th style="width: 120px;">주문일시</th>
                        <th style="width: 150px;">주문코드</th>
                        <th class="text-start">메뉴명</th>
                        <th class="text-end" style="width: 150px;">결제금액</th>
                        <th style="width: 130px;">진행상태</th>
                        <th class="pe-4" style="width: 100px;">상세</th>
                    </tr>
                </thead>
                <tbody class="text-center border-top-0" id="orderTableBody">
                    <th:block th:if="${not #lists.isEmpty(orderList)}">
                        <tr th:each="order, stat : ${orderList}" th:data-room-idx="${order.roomIdx ?: 0}" class="order-row">
                            <td class="ps-4 text-start text-muted small row-num" th:text="${stat.count}">1</td>
                            <td class="small text-secondary" th:text="${order.orderTime ?: '00:00'}">00:00</td>
                            <td>
                                <span class="fw-bold px-2 py-1 rounded border order-code-badge-custom" 
                                      th:text="${order.orderCode ?: 'N/A'}">ORD-001</span>
                            </td>
                            <td class="text-start fw-bold text-navy" th:text="${order.menuName ?: '정보 없음'}">메뉴명</td>
                            <td class="text-end fw-bold text-orange" 
                                th:text="${#numbers.formatInteger(order.totalPrice ?: 0, 0, 'COMMA')} + '원'">0원</td>
                            <td class="status-cell">
                                <div th:switch="${order.roomStatus}" class="status-badge-wrapper">
                                    <span th:case="'PENDING'" class="badge bg-danger-subtle text-danger px-3 rounded-pill">대기중</span>
                                    <span th:case="'ACCEPTED'" class="badge bg-warning-subtle text-warning px-3 rounded-pill">접수완료</span>
                                    <span th:case="'COOKING'" class="badge bg-info-subtle text-info px-3 rounded-pill">조리중</span>
                                    <span th:case="'DELIVERING'" class="badge bg-primary-subtle text-primary px-3 rounded-pill">배달중</span>
                                    <span th:case="'COMPLETED'" class="badge bg-success-subtle text-success px-3 rounded-pill">완료</span>
                                    <span th:case="*" class="badge bg-secondary-subtle text-secondary px-3 rounded-pill">알수없음</span>
                                </div>
                            </td>
                            <td class="pe-4">
                                <a th:href="@{/owner/order/detail(roomIdx=${order.roomIdx ?: 0})}" 
                                   class="btn btn-sm btn-outline-navy rounded-pill px-3 border-0 bg-light fw-bold btn-table-view">보기</a>
                            </td>
                        </tr>
                    </th:block>
                    
                    <tr th:if="${#lists.isEmpty(orderList)}" id="emptyRow">
                        <td colspan="7" class="py-5 text-center text-muted">
                            <i class="bi bi-inbox d-block fs-1 mb-3 opacity-25"></i>
                            <p class="fw-bold mb-0">표시할 주문 내역이 없습니다.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        /*<![CDATA[*/
        /**
         * [AJAX] 실시간 주문 동기화 (주기적 폴링)
         */
        document.addEventListener('DOMContentLoaded', function() {
            // 실제 프로젝트 시 SSE나 WebSocket으로 교체 권장하지만, 현재는 Fetch API로 유지
            setInterval(syncOrderStatuses, 30000); 
        });

        async function syncOrderStatuses() {
            try {
                // [Rule] 목업 데이터 대신 실제 API 호출 시 경로 확인 필요
                const response = await fetch('/owner/order/api/list'); 
                if (!response.ok) return;
                
                const latestOrders = await response.json(); 
                if (latestOrders && latestOrders.length > 0) {
                    processOrders(latestOrders);
                    updateLastRefreshTime();
                }
            } catch (error) {
                // 동기화 실패 시 로깅만 수행
                console.debug("[Sync Skip] API endpoint not ready yet.");
            }
        }

        function processOrders(orders) {
            const tbody = document.getElementById('orderTableBody');
            const emptyRow = document.getElementById('emptyRow');
            
            orders.reverse().forEach((order) => {
                let existingRow = document.querySelector(`tr[data-room-idx="${order.roomIdx}"]`);
                if (existingRow) {
                    // 상태 변경 감지 및 배지 업데이트
                    const statusCell = existingRow.querySelector('.status-cell');
                    const newBadge = getStatusBadgeHtml(order.roomStatus);
                    if (statusCell.innerHTML.trim() !== newBadge.trim()) {
                        statusCell.innerHTML = newBadge;
                    }
                } else {
                    if (emptyRow) emptyRow.remove();
                    prependNewOrderRow(tbody, order);
                }
            });
            reorderNumbers();
        }

        function prependNewOrderRow(tbody, order) {
            const newRow = document.createElement('tr');
            newRow.setAttribute('data-room-idx', order.roomIdx);
            newRow.className = 'new-order-highlight-animation order-row';

            const price = Number(order.totalPrice || 0).toLocaleString();

            newRow.innerHTML = `
                <td class="ps-4 text-start text-muted small row-num">-</td>
                <td class="small text-secondary">${order.orderTime || '방금 전'}</td>
                <td><span class="fw-bold px-2 py-1 rounded border order-code-badge-custom">${order.orderCode || 'N/A'}</span></td>
                <td class="text-start fw-bold text-navy">${order.menuName}</td>
                <td class="text-end fw-bold text-orange">${price}원</td>
                <td class="status-cell">${getStatusBadgeHtml(order.roomStatus)}</td>
                <td class="pe-4">
                    <a href="/owner/order/detail?roomIdx=${order.roomIdx}" 
                       class="btn btn-sm btn-outline-navy rounded-pill px-3 border-0 bg-light fw-bold btn-table-view">보기</a>
                </td>
            `;
            tbody.prepend(newRow); 
        }

        function reorderNumbers() {
            document.querySelectorAll('.row-num').forEach((el, idx) => {
                el.innerText = idx + 1;
            });
        }

        function getStatusBadgeHtml(status) {
            const badges = {
                'PENDING': '<span class="badge bg-danger-subtle text-danger px-3 rounded-pill">대기중</span>',
                'ACCEPTED': '<span class="badge bg-warning-subtle text-warning px-3 rounded-pill">접수완료</span>',
                'COOKING': '<span class="badge bg-info-subtle text-info px-3 rounded-pill">조리중</span>',
                'DELIVERING': '<span class="badge bg-primary-subtle text-primary px-3 rounded-pill">배달중</span>',
                'COMPLETED': '<span class="badge bg-success-subtle text-success px-3 rounded-pill">완료</span>'
            };
            return badges[status] || '<span class="badge bg-secondary-subtle text-secondary px-3 rounded-pill">알수없음</span>';
        }

        function updateLastRefreshTime() {
            const now = new Date();
            const timeStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' +
                           String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const timeEl = document.getElementById('lastUpdateTime');
            if(timeEl) timeEl.innerText = timeStr;
        }
        /*]]>*/
    </script>
</th:block>
</html>
