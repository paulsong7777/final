<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"

<head>
    <title>메뉴 목록 관리 - MoEats</title>
    <style>
        .text-navy { color: #001f3f !important; }
        .text-orange { color: #FF8000 !important; }

<th:block layout:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/

/**
 * 메뉴 상태 비동기 변경 (Fetch API)
 * 규칙: 상태변경은 POST 고정, 새로고침 금지
 */
async function toggleMenuStatus(menuIdx) {
    if (!menuIdx) return;

    const btn = document.getElementById(`status-btn-${menuIdx}`);
    const overlay = document.getElementById(`soldout-overlay-${menuIdx}`);
    const img = document.getElementById(`menu-img-${menuIdx}`);
    
    // 현재 UI 상태를 기반으로 다음 상태 결정
    const isCurrentlySoldOut = btn.textContent.trim() === '판매 활성화';
    const nextStatus = isCurrentlySoldOut ? 'ON_SALE' : 'SOLDOUT';

    try {
        const response = await fetch('/owner/menu/status', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                // Security: CSRF 토큰 필수
                'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]')?.content
            },
            body: JSON.stringify({
                menuIdx: menuIdx,
                menuStatus: nextStatus
            })
        });

        const result = await response.json();

        if (response.ok && result.success) {
            // 규칙: 새로고침 없이 상태 UI 즉시 변경
            if (nextStatus === 'SOLDOUT') {
                btn.textContent = '판매 활성화';
                overlay.style.display = 'flex';
                img.classList.add('grayscale-blur');
            } else {
                btn.textContent = '품절 처리';
                overlay.style.display = 'none';
                img.classList.remove('grayscale-blur');
            }
        } else {
            alert(result.message || '상태 변경에 실패했습니다.');
        }
    } catch (error) {
        console.error('Fetch Error:', error);
        alert('서버와 통신 중 오류가 발생했습니다.');
    }
}

/*]]>*/
</script>
</th:block>
</body>
</html>
