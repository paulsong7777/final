<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/owner-layout}">

<head>
    <title>메뉴 목록 관리 - MoEats</title>
</head>

<body>
<main layout:fragment="content" class="py-4">

    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2">
        <div>
            <h3 class="fw-bold mb-0 text-navy">
                <i class="bi bi-journal-text me-2 text-orange"></i>메뉴 목록 관리
            </h3>
            <p class="text-secondary small mb-0 mt-1">등록된 메뉴의 판매 상태와 정보를 관리합니다.</p>
        </div>
        <a th:href="@{/owners/menu/write}" class="btn btn-moeats px-4 rounded-pill shadow-sm">
            <i class="bi bi-plus-lg me-1"></i> 신규 메뉴 등록
        </a>
    </div>

    <div class="row g-4">
        <th:block th:if="${not #lists.isEmpty(menuList)}">
            <div th:each="menu : ${menuList}" class="col-md-6 col-lg-4" th:id="|menu-wrapper-${menu.menuIdx}|">
                <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden position-relative">
                    
                    <div class="position-relative">
                        <img th:id="|menu-img-${menu.menuIdx}|"
                             th:src="${menu.menuImg ?: 'https://via.placeholder.com/300/FF8000/FFFFFF?text=No+Image'}"
                             class="card-img-top preview-img" 
                             style="height: 200px; object-fit: cover;"
                             th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? 'grayscale-blur' : ''">
                        
                        <div th:id="|soldout-overlay-${menu.menuIdx}|"
                             class="soldout-overlay"
                             th:style="${menu.menuStatus == 'SOLD_OUT'} ? 'display:flex;' : 'display:none;'">
                            품절중
                        </div>
                    </div>

                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="fw-bold text-navy mb-0" th:text="${menu.menuName ?: '이름 없는 메뉴'}">메뉴명</h5>
                            <span class="badge bg-light text-dark border small" th:text="${menu.menuCategoryName ?: '미분류'}">카테고리</span>
                        </div>
                        
                        <h5 class="fw-bold text-orange mb-4" 
                            th:text="|${#numbers.formatInteger(menu.menuPrice ?: 0, 0, 'COMMA')}원|">0원</h5>

                        <div class="d-flex gap-2">
                            <button type="button" 
                                    class="btn btn-outline-secondary w-100 rounded-pill fw-bold"
                                    th:id="|status-btn-${menu.menuIdx}|"
                                    th:text="${menu.menuStatus == 'SOLD_OUT'} ? '판매 활성화' : '품절 처리'"
                                    th:onclick="toggleMenuStatus([[${menu.menuIdx}]])">
                                상태변경
                            </button>
                            <a th:href="@{/owners/menu/{idx}/edit(idx=${menu.menuIdx})}"
                               class="btn btn-light w-100 rounded-pill fw-bold border">정보 수정</a>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>

        <div th:if="${#lists.isEmpty(menuList)}" class="col-12 text-center py-5">
            <div class="text-muted mb-3 opacity-25"><i class="bi bi-egg-fried display-1"></i></div>
            <p class="text-secondary fw-bold">등록된 메뉴가 없습니다.<br>새로운 맛을 추가해 보세요!</p>
        </div>
    </div>

</main>

<th:block layout:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/

/**
 * [Rule 2] AJAX: 상태 변경은 Fetch API 비동기 처리
 * [Rule 6] 변경은 POST 고정, 새로고침 금지
 */
async function toggleMenuStatus(menuIdx) {
    if (!menuIdx) return;

    const btn = document.getElementById(`status-btn-${menuIdx}`);
    const overlay = document.getElementById(`soldout-overlay-${menuIdx}`);
    const img = document.getElementById(`menu-img-${menuIdx}`);
    
    // 백엔드 StoreMenuService 상태값 규격: AVAILABLE, SOLD_OUT
    const isCurrentlySoldOut = btn.textContent.trim() === '판매 활성화';
    const nextStatus = isCurrentlySoldOut ? 'AVAILABLE' : 'SOLD_OUT';

    try {
        // [교정] 백엔드 StoreMenuController.updateStatus 매핑 주소(/owners/menu/status)와 연동
        const response = await fetch('/owners/menu/status', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                // [Rule 4] Security: CSRF 필수 (레이아웃 표준)
                'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]')?.content
            },
            body: new URLSearchParams({
                menuIdx: menuIdx,
                menuStatus: nextStatus
            })
        });

        if (response.ok) {
            // [Rule 2] 새로고침 없이 DOM 즉시 조작
            if (nextStatus === 'SOLD_OUT') {
                btn.textContent = '판매 활성화';
                btn.classList.replace('btn-outline-secondary', 'btn-warning');
                overlay.style.display = 'flex';
                img.classList.add('grayscale-blur');
            } else {
                btn.textContent = '품절 처리';
                btn.classList.replace('btn-warning', 'btn-outline-secondary');
                overlay.style.display = 'none';
                img.classList.remove('grayscale-blur');
            }
        } else {
            alert('상태 변경에 실패했습니다. (코드: ' + response.status + ')');
        }
    } catch (error) {
        console.error('Fetch Error:', error);
        alert('서버와 통신 중 오류가 발생했습니다.');
    }
}

/*]]>*/
</script>
</th:block>
</body>
</html>
