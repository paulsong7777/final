<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <meta charset="UTF-8">
    <title>가게 메뉴</title>

    <th:block layout:fragment="pageStyles">
        <style>
		    .fe02-shell {
		        display: flex;
		        flex-direction: column;
		        gap: 20px;
		        padding-bottom: 120px;
		    }
		
		    .fe02-store-hero {
		        padding: 24px;
		        border-radius: 24px;
		        background: #fff;
		        border: 1px solid rgba(42, 54, 89, 0.08);
		        box-shadow: var(--mo-shadow-soft);
		    }
		
		    .fe02-store-hero__eyebrow {
		        color: var(--mo-accent);
		        font-size: 12px;
		        font-weight: 800;
		        letter-spacing: 0.14em;
		        text-transform: uppercase;
		    }
		
		    .fe02-store-hero__title {
		        margin: 10px 0 0;
		        color: var(--mo-navy-strong);
		        font-size: 32px;
		        font-weight: 800;
		        line-height: 1.2;
		        letter-spacing: -0.03em;
		    }
		
		    .fe02-store-hero__desc {
		        margin: 12px 0 0;
		        color: var(--mo-text-soft);
		        font-size: 15px;
		        line-height: 1.7;
		    }
		
		    .fe02-store-hero__meta {
		        display: grid;
		        grid-template-columns: repeat(2, minmax(0, 1fr));
		        gap: 14px;
		        margin-top: 18px;
		    }
		
		    .fe02-store-hero__meta-item {
		        padding: 16px 18px;
		        border-radius: 18px;
		        background: #f8f9fb;
		        border: 1px solid rgba(42, 54, 89, 0.06);
		    }
		
		    .fe02-store-hero__meta-label {
		        display: block;
		        margin-bottom: 6px;
		        color: var(--mo-text-soft);
		        font-size: 12px;
		        font-weight: 700;
		    }
		
		    .fe02-store-hero__meta-value {
		        color: var(--mo-navy-strong);
		        font-size: 16px;
		        font-weight: 800;
		        line-height: 1.5;
		        word-break: keep-all;
		    }
		
		    .fe02-toolbar {
			    display: flex;
			    align-items: center;
			    gap: 12px;
			    padding: 16px 18px;
			    border-radius: 20px;
			    background: #fff;
			    border: 1px solid rgba(42, 54, 89, 0.08);
			    box-shadow: var(--mo-shadow-soft);
			}
			
			.fe02-search {
			    position: relative;
			    flex: 1 1 auto;
			    min-width: 0;
			}
					
		    .fe02-search__icon {
		        position: absolute;
		        top: 50%;
		        left: 14px;
		        transform: translateY(-50%);
		        color: #94A3B8;
		        pointer-events: none;
		    }
		
		    .fe02-search .form-control {
		        min-height: 46px;
		        padding-left: 40px;
		        border-radius: 14px;
		        border-color: rgba(42, 54, 89, 0.12);
		    }
		
		    .fe02-filter {
		        display: flex;
		        flex-wrap: wrap;
		        gap: 8px;
		    }
		
		    .fe02-filter__btn {
		        min-height: 38px;
		        padding: 0 14px;
		        border-radius: 999px;
		        border: 1px solid rgba(42, 54, 89, 0.12);
		        background: #fff;
		        color: var(--mo-navy);
		        font-size: 13px;
		        font-weight: 700;
		        transition: .2s ease;
		    }
		
		    .fe02-filter__btn:hover {
		        border-color: rgba(255, 128, 0, 0.4);
		        color: var(--mo-primary);
		    }
		
		    .fe02-filter__btn.is-active {
		        background: var(--mo-primary);
		        border-color: var(--mo-primary);
		        color: #fff;
		        box-shadow: 0 10px 22px rgba(255, 128, 0, 0.16);
		    }
		
		    .fe02-summary {
		        display: flex;
		        flex-wrap: wrap;
		        gap: 8px;
		        align-items: center;
		    }
		
		    .fe02-grid {
			    display: grid;
			    grid-template-columns: repeat(4, minmax(0, 1fr));
			    gap: 16px;
			}
		
		 	.fe02-card {
			    display: flex;
			    flex-direction: column;
			    gap: 12px;
			    padding: 16px;
			    border-radius: 20px;
			    background: #fff;
			    border: 1px solid rgba(42, 54, 89, 0.08);
			    box-shadow: var(--mo-shadow-soft);
			    transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
			    min-height: 0;
			}
			
			.fe02-card__thumb {
			    width: 100%;
			    aspect-ratio: 1 / 1;
			    border-radius: 16px;
			    overflow: hidden;
			    background: #F7F7F8;
			    display: flex;
			    align-items: center;
			    justify-content: center;
			}
			
			.fe02-card__thumb img {
			    width: 100%;
			    height: 100%;
			    object-fit: cover;
			    display: block;
			}
			
			.fe02-card__body {
			    flex: 1;
			    min-width: 0;
			}

			.fe02-card__head {
			    display: flex;
			    align-items: flex-start;
			    justify-content: space-between;
			    gap: 8px;
			}
		
			.fe02-card__name {
			    margin: 0;
			    color: var(--mo-navy-strong);
			    font-size: 18px;
			    font-weight: 800;
			    line-height: 1.35;
			    letter-spacing: -0.02em;
			}
			
			.fe02-card__desc {
			    margin: 6px 0 0;
			    color: var(--mo-text-soft);
			    font-size: 13px;
			    line-height: 1.5;
			    display: -webkit-box;
			    -webkit-line-clamp: 2;
			    -webkit-box-orient: vertical;
			    overflow: hidden;
			}
			
			.fe02-card__footer {
			    display: flex;
			    align-items: center;
			    justify-content: space-between;
			    gap: 10px;
			    margin-top: 10px;
			}
			
			.fe02-card__price {
			    color: var(--mo-navy-strong);
			    font-size: 18px;
			    font-weight: 800;
			    letter-spacing: -0.02em;
			}
			
		    .fe02-status {
		        display: inline-flex;
		        align-items: center;
		        justify-content: center;
		        min-height: 30px;
		        padding: 0 12px;
		        border-radius: 999px;
		        font-size: 12px;
		        font-weight: 800;
		    }
		
		    .fe02-status--available {
		        background: rgba(42, 54, 89, 0.08);
		        color: var(--mo-navy);
		    }
		
		    .fe02-status--soldout {
		        background: rgba(248, 94, 40, 0.12);
		        color: var(--mo-accent);
		    }
		
		    .fe02-empty {
		        padding: 56px 20px;
		        border-radius: 24px;
		        background: #fff;
		        border: 1px solid rgba(42, 54, 89, 0.08);
		        box-shadow: var(--mo-shadow-soft);
		        text-align: center;
		    }
		
		    .fe02-empty__icon {
		        font-size: 40px;
		        margin-bottom: 12px;
		    }
		
		    .fe02-empty__title {
		        margin: 0;
		        color: var(--mo-navy-strong);
		        font-size: 22px;
		        font-weight: 800;
		    }
		
		    .fe02-empty__desc {
		        margin: 10px 0 0;
		        color: var(--mo-text-soft);
		        font-size: 14px;
		        line-height: 1.6;
		    }
		
		    .fe02-order-fab {
		        position: fixed;
		        right: 28px;
		        bottom: 28px;
		        z-index: 1040;
		        min-width: 180px;
		        min-height: 58px;
		        padding: 0 28px;
		        border: none;
		        border-radius: 999px;
		        background: var(--mo-primary);
		        color: #fff;
		        font-size: 16px;
		        font-weight: 800;
		        box-shadow: 0 18px 40px rgba(255, 128, 0, 0.28);
		        transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
		    }
		
		    .fe02-order-fab:hover {
		        transform: translateY(-2px);
		        box-shadow: 0 22px 44px rgba(255, 128, 0, 0.32);
		    }
		
		    .fe02-order-fab:disabled {
		        opacity: 0.6;
		        cursor: not-allowed;
		    }
		
		    @media (max-width: 1199.98px) {
				    .fe02-grid {
				        grid-template-columns: repeat(3, minmax(0, 1fr));
				    }
				}
				
				@media (max-width: 991.98px) {
				    .fe02-grid {
				        grid-template-columns: repeat(2, minmax(0, 1fr));
				    }
				}
						
		  @media (max-width: 575.98px) {
			    .fe02-shell {
			        padding-bottom: 96px;
			    }
			
			    .fe02-store-hero,
			    .fe02-toolbar,
			    .fe02-empty {
			        padding: 16px;
			    }
			
			    .fe02-grid {
			        grid-template-columns: 1fr;
			        gap: 12px;
			    }
			
			    .fe02-card {
			        flex-direction: row;
			        align-items: flex-start;
			        gap: 12px;
			        padding: 14px;
			        border-radius: 18px;
			    }
			
			    .fe02-card__thumb {
			        width: 88px;
			        min-width: 88px;
			        aspect-ratio: 1 / 1;
			        border-radius: 14px;
			    }
			
			    .fe02-card__head,
			    .fe02-card__footer {
			        flex-direction: column;
			        align-items: flex-start;
			        gap: 6px;
			    }
			
			    .fe02-card__name {
			        font-size: 17px;
			    }
			
			    .fe02-card__desc {
			        font-size: 12px;
			        -webkit-line-clamp: 1;
			    }
			
			    .fe02-card__price {
			        font-size: 16px;
			    }
			
			    .fe02-order-fab {
			        left: 16px;
			        right: 16px;
			        bottom: 16px;
			        width: auto;
			        min-width: 0;
			        border-radius: 18px;
			    }
			}
		</style>
    </th:block>
</head>

<body>
<section layout:fragment="pageContent">
    <div class="fe02-shell"
         th:with="
            firstMenu=${#lists.isEmpty(menuList) ? null : menuList[0]},
            currentStoreIdx=${firstMenu != null ? firstMenu.storeIdx : 0},
            totalCount=${#lists.size(menuList)},
            soldOutCount=${#aggregates.sum(menuList.![menuStatus == 'SOLD_OUT' ? 1 : 0])},
            availableCount=${totalCount - soldOutCount}
         "
         th:attr="data-store-idx=${currentStoreIdx}">

		<section class="fe02-store-hero">
		    <div class="fe02-store-hero__eyebrow">가게 상세 페이지</div>
		
		    <h1 class="fe02-store-hero__title"
		        th:text="${store != null and store.storeName != null and !#strings.isEmpty(store.storeName) ? store.storeName : '가게 정보'}">
		        가게명
		    </h1>
		
		    <p class="fe02-store-hero__desc"
		       th:text="${store != null and store.storeDescription != null and !#strings.isEmpty(store.storeDescription) ? store.storeDescription : '가게 소개가 아직 등록되지 않았습니다.'}">
		        가게 소개
		    </p>
		
		    <div class="fe02-store-hero__meta">
		        <div class="fe02-store-hero__meta-item">
		            <span class="fe02-store-hero__meta-label">최소주문금액</span>
		            <strong class="fe02-store-hero__meta-value"
		                    th:text="${store != null ? #numbers.formatInteger(store.minimumOrderAmount, 1, 'COMMA') + '원' : '정보 없음'}">
		                0원
		            </strong>
		        </div>
		
		        <div class="fe02-store-hero__meta-item">
		            <span class="fe02-store-hero__meta-label">가게 주소</span>
		            <strong class="fe02-store-hero__meta-value">
		                <span th:text="${store != null and store.storeAddress1 != null ? store.storeAddress1 : '주소 정보 없음'}">
		                    주소
		                </span>
		                <span th:if="${store != null and store.storeAddress2 != null and !#strings.isEmpty(store.storeAddress2)}">
		                    &nbsp;<span th:text="${store.storeAddress2}">상세주소</span>
		                </span>
		            </strong>
		        </div>
		    </div>
		</section>

        <section class="fe02-toolbar">
		    <div class="fe02-search">
		        <span class="fe02-search__icon">🔍</span>
		        <input type="text"
		               id="menuSearchInput"
		               class="form-control"
		               placeholder="메뉴 이름 또는 설명으로 검색">
		    </div>
		</section>

        <section id="menuList" class="fe02-grid">
            <article class="fe02-card"
                     th:each="menu : ${menuList}"
                     th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? ' is-soldout' : ''"
                     th:attr="
                        data-menu-name=${menu.menuName},
                        data-menu-desc=${menu.menuDescription},
                        data-menu-status=${menu.menuStatus}">

                <div class="fe02-card__thumb">
				    <img th:if="${menu.imageUrl != null and !#strings.isEmpty(menu.imageUrl)}"
				         th:src="${menu.imageUrl}"
				         th:alt="${menu.menuName}">
				    <span th:unless="${menu.imageUrl != null and !#strings.isEmpty(menu.imageUrl)}">🍽️</span>
				</div>

                <div class="fe02-card__body">
                    <div class="fe02-card__head">
                        <h2 class="fe02-card__name" th:text="${menu.menuName}">메뉴 이름</h2>

                        <span class="fe02-status fe02-status--available"
                              th:if="${menu.menuStatus == 'AVAILABLE'}">주문 가능</span>
                        <span class="fe02-status fe02-status--soldout"
                              th:if="${menu.menuStatus == 'SOLD_OUT'}">품절</span>
                        <span class="fe02-status fe02-status--available"
                              th:if="${menu.menuStatus != 'AVAILABLE' and menu.menuStatus != 'SOLD_OUT'}"
                              th:text="${menu.menuStatus}">상태</span>
                    </div>

                    <p class="fe02-card__desc"
                       th:text="${menu.menuDescription != null and !#strings.isEmpty(menu.menuDescription) ? menu.menuDescription : '메뉴 설명이 아직 등록되지 않았습니다.'}">
                        메뉴 설명
                    </p>

                    <div class="fe02-card__footer">
                        <strong class="fe02-card__price"
                                th:text="${#numbers.formatInteger(menu.menuPrice, 1, 'COMMA')} + '원'">
                            0원
                        </strong>

                        <button type="button"
                                class="mo-btn mo-btn-outline fe02MenuActionBtn"
                                th:disabled="${menu.menuStatus == 'SOLD_OUT'}">
                            <span th:text="${menu.menuStatus == 'SOLD_OUT' ? '품절' : '메뉴 보기'}">메뉴 보기</span>
                        </button>
                    </div>
                </div>
            </article>
        </section>

        <div id="menuSearchEmpty" class="fe02-empty d-none">
            <div class="fe02-empty__icon">🍽️</div>
            <h2 class="fe02-empty__title">조건에 맞는 메뉴가 없습니다</h2>
            <p class="fe02-empty__desc">검색어 또는 상태 필터를 바꿔 다시 확인해 주세요.</p>
        </div>

        <div th:if="${#lists.isEmpty(menuList)}" class="fe02-empty">
            <div class="fe02-empty__icon">🍽️</div>
            <h2 class="fe02-empty__title">등록된 메뉴가 없습니다</h2>
            <p class="fe02-empty__desc">현재 가게에 등록된 메뉴가 없어 화면에 표시할 항목이 없습니다.</p>
        </div>
    </div>
    <button type="button"
	        class="fe02-order-fab"
	        id="fe02CreateRoomBtn"
	        th:attr="
	            data-store-idx=${store != null ? store.storeIdx : currentStoreIdx},
	            data-store-name=${store != null ? store.storeName : ''},
	            data-minimum-order-amount=${store != null ? store.minimumOrderAmount : ''}">
	    주문하기
	</button>
    
</section>

<th:block layout:fragment="pageScripts">
    <script th:src="@{/js/store/menu-list.js}"></script>
</th:block>
</body>
</html>
