<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <meta charset="UTF-8">
    <title>가게 메뉴</title>

    <th:block layout:fragment="pageStyles">
        <style>
            .fe02-shell {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .fe02-hero {
                padding: 24px;
                border-radius: 24px;
                background: #fff;
                border: 1px solid rgba(42, 54, 89, 0.08);
                box-shadow: var(--mo-shadow-soft);
            }

            .fe02-hero__eyebrow {
                color: var(--mo-accent);
                font-size: 12px;
                font-weight: 800;
                letter-spacing: 0.14em;
                text-transform: uppercase;
            }

            .fe02-hero__title {
                margin: 8px 0 0;
                color: var(--mo-navy-strong);
                font-size: 30px;
                font-weight: 800;
                line-height: 1.2;
                letter-spacing: -0.03em;
            }

            .fe02-hero__desc {
                margin: 10px 0 0;
                color: var(--mo-text-soft);
                font-size: 14px;
                line-height: 1.6;
            }

            .fe02-hero__meta {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 16px;
            }

            .fe02-chip {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 34px;
                padding: 0 14px;
                border-radius: 999px;
                background: rgba(42, 54, 89, 0.06);
                color: var(--mo-navy);
                font-size: 13px;
                font-weight: 700;
            }

            .fe02-toolbar {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                align-items: center;
                justify-content: space-between;
                padding: 18px 20px;
                border-radius: 20px;
                background: #fff;
                border: 1px solid rgba(42, 54, 89, 0.08);
                box-shadow: var(--mo-shadow-soft);
            }

            .fe02-search {
                position: relative;
                flex: 1 1 320px;
                min-width: 0;
            }

            .fe02-search__icon {
                position: absolute;
                top: 50%;
                left: 14px;
                transform: translateY(-50%);
                color: #94A3B8;
                pointer-events: none;
            }

            .fe02-search .form-control {
                min-height: 46px;
                padding-left: 40px;
                border-radius: 14px;
                border-color: rgba(42, 54, 89, 0.12);
            }

            .fe02-filter {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .fe02-filter__btn {
                min-height: 38px;
                padding: 0 14px;
                border-radius: 999px;
                border: 1px solid rgba(42, 54, 89, 0.12);
                background: #fff;
                color: var(--mo-navy);
                font-size: 13px;
                font-weight: 700;
                transition: .2s ease;
            }

            .fe02-filter__btn:hover {
                border-color: rgba(255, 128, 0, 0.4);
                color: var(--mo-primary);
            }

            .fe02-filter__btn.is-active {
                background: var(--mo-primary);
                border-color: var(--mo-primary);
                color: #fff;
                box-shadow: 0 10px 22px rgba(255, 128, 0, 0.16);
            }

            .fe02-summary {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: center;
            }

            .fe02-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 16px;
            }

            .fe02-card {
                display: flex;
                gap: 16px;
                padding: 18px;
                border-radius: 20px;
                background: #fff;
                border: 1px solid rgba(42, 54, 89, 0.08);
                box-shadow: var(--mo-shadow-soft);
                transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
            }

            .fe02-card:hover {
                transform: translateY(-2px);
                box-shadow: var(--mo-shadow-strong);
            }

            .fe02-card.is-soldout {
                opacity: 0.78;
                background: rgba(255, 255, 255, 0.92);
            }

            .fe02-card__thumb {
                width: 88px;
                height: 88px;
                flex-shrink: 0;
                border-radius: 18px;
                background:
                    linear-gradient(135deg, rgba(255,128,0,0.12), rgba(248,94,40,0.16)),
                    #F7F7F8;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 28px;
            }

            .fe02-card__body {
                flex: 1;
                min-width: 0;
            }

            .fe02-card__head {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 12px;
            }

            .fe02-card__name {
                margin: 0;
                color: var(--mo-navy-strong);
                font-size: 18px;
                font-weight: 800;
                line-height: 1.3;
                letter-spacing: -0.02em;
            }

            .fe02-card__desc {
                margin: 8px 0 0;
                color: var(--mo-text-soft);
                font-size: 14px;
                line-height: 1.6;
            }

            .fe02-card__footer {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                margin-top: 14px;
            }

            .fe02-card__price {
                color: var(--mo-navy-strong);
                font-size: 18px;
                font-weight: 800;
                letter-spacing: -0.02em;
            }

            .fe02-status {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 30px;
                padding: 0 12px;
                border-radius: 999px;
                font-size: 12px;
                font-weight: 800;
            }

            .fe02-status--available {
                background: rgba(42, 54, 89, 0.08);
                color: var(--mo-navy);
            }

            .fe02-status--soldout {
                background: rgba(248, 94, 40, 0.12);
                color: var(--mo-accent);
            }

            .fe02-actions {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 18px;
            }

            .fe02-empty {
                padding: 56px 20px;
                border-radius: 24px;
                background: #fff;
                border: 1px solid rgba(42, 54, 89, 0.08);
                box-shadow: var(--mo-shadow-soft);
                text-align: center;
            }

            .fe02-empty__icon {
                font-size: 40px;
                margin-bottom: 12px;
            }

            .fe02-empty__title {
                margin: 0;
                color: var(--mo-navy-strong);
                font-size: 22px;
                font-weight: 800;
            }

            .fe02-empty__desc {
                margin: 10px 0 0;
                color: var(--mo-text-soft);
                font-size: 14px;
                line-height: 1.6;
            }

            @media (max-width: 991.98px) {
                .fe02-grid {
                    grid-template-columns: 1fr;
                }

                .fe02-hero__title {
                    font-size: 26px;
                }
            }

            @media (max-width: 575.98px) {
                .fe02-hero,
                .fe02-toolbar,
                .fe02-card,
                .fe02-empty {
                    padding: 16px;
                }

                .fe02-card {
                    gap: 12px;
                }

                .fe02-card__thumb {
                    width: 72px;
                    height: 72px;
                    border-radius: 16px;
                    font-size: 24px;
                }

                .fe02-card__head,
                .fe02-card__footer {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .fe02-hero__title {
                    font-size: 22px;
                }
            }
        </style>
    </th:block>
</head>

<body>
<section layout:fragment="pageContent">
    <div class="fe02-shell"
         th:with="
            firstMenu=${#lists.isEmpty(menuList) ? null : menuList[0]},
            currentStoreIdx=${firstMenu != null ? firstMenu.storeIdx : 0},
            totalCount=${#lists.size(menuList)},
            soldOutCount=${#aggregates.sum(menuList.![menuStatus == 'SOLD_OUT' ? 1 : 0])},
            availableCount=${totalCount - soldOutCount}
         "
         th:attr="data-store-idx=${currentStoreIdx}">

        <section class="fe02-hero">
            <div class="fe02-hero__eyebrow">FE-02 MENU</div>
            <h1 class="fe02-hero__title">메뉴를 확인하고 주문을 시작하세요</h1>
            <p class="fe02-hero__desc">
                현재 브랜치 기준으로 메뉴 목록을 안정적으로 확인하고,
                여기서 방 생성 진입과 헤더 동작까지 함께 점검할 수 있도록 맞춘 화면입니다.
            </p>

            <div class="fe02-hero__meta">
                <span class="fe02-chip"
                      th:text="'가게 번호 ' + ${currentStoreIdx}">가게 번호</span>
                <span class="fe02-chip"
                      th:text="'전체 메뉴 ' + ${totalCount} + '개'">전체 메뉴</span>
                <span class="fe02-chip"
                      th:text="'주문 가능 ' + ${availableCount} + '개'">주문 가능</span>
                <span class="fe02-chip"
                      th:text="'품절 ' + ${soldOutCount} + '개'">품절</span>
            </div>

            <div class="fe02-actions">
                <button type="button"
                        class="mo-btn mo-btn-primary"
                        id="fe02CreateRoomBtn"
                        th:attr="data-store-idx=${currentStoreIdx}">
                    주문방 만들기
                </button>

                <button type="button"
                        class="mo-btn mo-btn-outline"
                        data-mo-open-join>
                    방 참여
                </button>
            </div>
        </section>

        <section class="fe02-toolbar">
            <div class="fe02-search">
                <span class="fe02-search__icon">🔍</span>
                <input type="text"
                       id="menuSearchInput"
                       class="form-control"
                       placeholder="메뉴 이름 또는 설명으로 검색">
            </div>

            <div class="fe02-filter" id="menuStatusFilter">
                <button type="button" class="fe02-filter__btn is-active" data-filter="ALL">전체</button>
                <button type="button" class="fe02-filter__btn" data-filter="AVAILABLE">주문 가능</button>
                <button type="button" class="fe02-filter__btn" data-filter="SOLD_OUT">품절</button>
            </div>

            <div class="fe02-summary">
                <span class="mo-chip">노출 메뉴 <strong id="visibleMenuCount" class="ms-1"
                                              th:text="${totalCount}">0</strong></span>
            </div>
        </section>

        <section id="menuList" class="fe02-grid">
            <article class="fe02-card"
                     th:each="menu : ${menuList}"
                     th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? ' is-soldout' : ''"
                     th:attr="
                        data-menu-name=${menu.menuName},
                        data-menu-desc=${menu.menuDescription},
                        data-menu-status=${menu.menuStatus}">

                <div class="fe02-card__thumb">🍽️</div>

                <div class="fe02-card__body">
                    <div class="fe02-card__head">
                        <h2 class="fe02-card__name" th:text="${menu.menuName}">메뉴 이름</h2>

                        <span class="fe02-status fe02-status--available"
                              th:if="${menu.menuStatus == 'AVAILABLE'}">주문 가능</span>
                        <span class="fe02-status fe02-status--soldout"
                              th:if="${menu.menuStatus == 'SOLD_OUT'}">품절</span>
                        <span class="fe02-status fe02-status--available"
                              th:if="${menu.menuStatus != 'AVAILABLE' and menu.menuStatus != 'SOLD_OUT'}"
                              th:text="${menu.menuStatus}">상태</span>
                    </div>

                    <p class="fe02-card__desc"
                       th:text="${menu.menuDescription != null and !#strings.isEmpty(menu.menuDescription) ? menu.menuDescription : '메뉴 설명이 아직 등록되지 않았습니다.'}">
                        메뉴 설명
                    </p>

                    <div class="fe02-card__footer">
                        <strong class="fe02-card__price"
                                th:text="${#numbers.formatInteger(menu.menuPrice, 1, 'COMMA')} + '원'">
                            0원
                        </strong>

                        <button type="button"
                                class="mo-btn mo-btn-outline fe02MenuActionBtn"
                                th:disabled="${menu.menuStatus == 'SOLD_OUT'}">
                            <span th:text="${menu.menuStatus == 'SOLD_OUT' ? '품절' : '메뉴 보기'}">메뉴 보기</span>
                        </button>
                    </div>
                </div>
            </article>
        </section>

        <div id="menuSearchEmpty" class="fe02-empty d-none">
            <div class="fe02-empty__icon">🍽️</div>
            <h2 class="fe02-empty__title">조건에 맞는 메뉴가 없습니다</h2>
            <p class="fe02-empty__desc">검색어 또는 상태 필터를 바꿔 다시 확인해 주세요.</p>
        </div>

        <div th:if="${#lists.isEmpty(menuList)}" class="fe02-empty">
            <div class="fe02-empty__icon">🍽️</div>
            <h2 class="fe02-empty__title">등록된 메뉴가 없습니다</h2>
            <p class="fe02-empty__desc">현재 가게에 등록된 메뉴가 없어 화면에 표시할 항목이 없습니다.</p>
        </div>
    </div>
</section>

<th:block layout:fragment="pageScripts">
    <script th:src="@{/js/store/menu-list.js}"></script>
</th:block>
</body>
</html>
