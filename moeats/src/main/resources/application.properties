spring.application.name=moeats
spring.profiles.active=dev

spring.thymeleaf.cache=false

mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=com.moeats.domain
mybatis.configuration.map-underscore-to-camel-case=true

server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


# 파일 하나당 최대 업로드 용량
spring.servlet.multipart.max-file-size=10MB
# 한 번의 요청(여러 파일 합침)당 최대 업로드 용량
spring.servlet.multipart.max-request-size=10MB

# DB 연결 시 한국 시간대 강제 지정
spring.datasource.url=jdbc:mysql://localhost:3306/데이터베이스명?serverTimezone=Asia/Seoul&useLegacyDatetimeCode=false