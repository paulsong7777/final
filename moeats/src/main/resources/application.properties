spring.application.name=moeats
spring.profiles.active=dev

# MySQL 드라이버 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# DB 연결 URL (localhost:3306/뒤에는 Workbench에서 만든 'Schema 이름'을 쓰세요)
spring.datasource.url=jdbc:mysql://localhost:3306/moeats?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true

# MySQL Workbench 계정 정보
spring.datasource.username=root
spring.datasource.password=12345678

# JPA/Hibernate 설정 (선택사항: 테이블 자동 생성 및 SQL 로그 확인)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.thymeleaf.cache=false

mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=com.moeats
mybatis.configuration.map-underscore-to-camel-case=true

server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true