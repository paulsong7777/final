<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <meta charset="UTF-8">
    <title>메뉴 추가</title>

    <th:block layout:fragment="pageStyles">
        <style>
            .rc-shell {
                display: flex;
                flex-direction: column;
                gap: 20px;
                padding-bottom: 120px;
            }

            .rc-store-hero {
                position: relative;
                overflow: hidden;
                min-height: 236px;
                padding: 22px 24px;
                border-radius: 24px;
                background: #fff;
                border: 1px solid rgba(42, 54, 89, 0.08);
                box-shadow: var(--mo-shadow-soft);
                display: flex;
                align-items: flex-end;
            }

            .rc-store-hero__bg {
                position: absolute;
                inset: 0;
                background-position: center;
                background-size: cover;
                background-repeat: no-repeat;
                transform: scale(1.02);
            }

            .rc-store-hero__bg::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(180deg, rgba(18, 24, 38, 0.12) 0%, rgba(18, 24, 38, 0.62) 100%);
            }

            .rc-store-hero__content {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 680px;
            }

            .rc-store-hero__eyebrow {
                color: #FFD7B0;
                font-size: 11px;
                font-weight: 800;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            .rc-store-hero__title {
                margin: 8px 0 0;
                color: #fff;
                font-size: 32px;
                font-weight: 800;
                line-height: 1.08;
                letter-spacing: -0.03em;
            }

            .rc-store-hero__desc {
                margin: 8px 0 0;
                color: rgba(255, 255, 255, 0.92);
                font-size: 13px;
                line-height: 1.38;
                max-width: 480px;
            }

            .rc-store-hero__meta {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 10px;
                align-items: stretch;
            }

            .rc-store-hero__meta-item {
                min-width: 0;
                height: 52px;
                padding: 6px 12px;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.90);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.24);
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .rc-store-hero__meta-item--minimum {
                flex: 0 0 116px;
                max-width: 116px;
            }

            .rc-store-hero__meta-item--address {
                flex: 1 1 380px;
                max-width: 420px;
            }

            .rc-store-hero__meta-label {
                display: block;
                margin-bottom: 2px;
                color: var(--mo-text-soft);
                font-size: 8px;
                font-weight: 700;
                line-height: 1.1;
            }

            .rc-store-hero__meta-value {
                color: var(--mo-navy-strong);
                font-size: 11px;
                font-weight: 800;
                line-height: 1.2;
                word-break: keep-all;
            }

            .rc-store-hero__meta-value--address {
                display: block;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .rc-toolbar {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 16px 18px;
                border-radius: 20px;
                background: #fff;
                border: 1px solid rgba(42, 54, 89, 0.08);
                box-shadow: var(--mo-shadow-soft);
            }

            .rc-search {
                position: relative;
                flex: 1 1 auto;
                min-width: 0;
            }

            .rc-search__icon {
                position: absolute;
                top: 50%;
                left: 14px;
                transform: translateY(-50%);
                color: #94A3B8;
                pointer-events: none;
            }

            .rc-search .form-control {
                min-height: 46px;
                padding-left: 40px;
                border-radius: 14px;
                border-color: rgba(42, 54, 89, 0.12);
            }

            .rc-guide {
                padding: 16px 18px;
                border-radius: 20px;
                background: rgba(255, 128, 0, 0.08);
                border: 1px solid rgba(255, 128, 0, 0.16);
                color: var(--mo-navy-strong);
                font-size: 14px;
                font-weight: 700;
                line-height: 1.6;
            }

            .rc-section-list {
                display: grid;
                gap: 20px;
            }

            .rc-section {
                display: grid;
                gap: 12px;
            }

            .rc-section__head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }

            .rc-section__title {
                margin: 0;
                color: var(--mo-navy-strong);
                font-size: 20px;
                font-weight: 800;
                letter-spacing: -0.02em;
            }

            .rc-section__count {
                color: var(--mo-text-soft);
                font-size: 13px;
                font-weight: 700;
            }

            .rc-grid {
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 16px;
            }

            .rc-card {
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding: 16px;
                border-radius: 20px;
                background: #fff;
                border: 1px solid rgba(42, 54, 89, 0.08);
                box-shadow: var(--mo-shadow-soft);
                transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
                min-height: 0;
            }

            .rc-card__thumb {
                width: 100%;
                aspect-ratio: 1 / 1;
                border-radius: 16px;
                overflow: hidden;
                background: #F7F7F8;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .rc-card__thumb img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .rc-card__body {
                flex: 1;
                min-width: 0;
            }

            .rc-card__head {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 8px;
            }

            .rc-card__name {
                margin: 0;
                color: var(--mo-navy-strong);
                font-size: 18px;
                font-weight: 800;
                line-height: 1.35;
                letter-spacing: -0.02em;
            }

            .rc-card__desc {
                margin: 6px 0 0;
                color: var(--mo-text-soft);
                font-size: 13px;
                line-height: 1.5;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .rc-card__footer {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                margin-top: 10px;
            }

            .rc-card__price {
                color: var(--mo-navy-strong);
                font-size: 18px;
                font-weight: 800;
                letter-spacing: -0.02em;
            }

            .rc-card__controls {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-left: auto;
            }

            .rc-qty {
                display: inline-flex;
                align-items: center;
                gap: 0;
                border: 1px solid rgba(42, 54, 89, 0.12);
                border-radius: 14px;
                overflow: hidden;
                background: #fff;
            }

            .rc-qty__btn {
                width: 38px;
                height: 40px;
                border: none;
                background: transparent;
                color: var(--mo-navy-strong);
                font-size: 18px;
                font-weight: 800;
            }

            .rc-qty__btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .rc-qty__value {
                min-width: 36px;
                text-align: center;
                color: var(--mo-navy-strong);
                font-size: 14px;
                font-weight: 800;
            }

            .rc-status {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 30px;
                padding: 0 12px;
                border-radius: 999px;
                font-size: 12px;
                font-weight: 800;
                white-space: nowrap;
            }

            .rc-status--available {
                background: rgba(42, 54, 89, 0.08);
                color: var(--mo-navy);
            }

            .rc-status--soldout {
                background: rgba(248, 94, 40, 0.12);
                color: var(--mo-accent);
            }

            .rc-empty {
                padding: 56px 20px;
                border-radius: 24px;
                background: #fff;
                border: 1px solid rgba(42, 54, 89, 0.08);
                box-shadow: var(--mo-shadow-soft);
                text-align: center;
            }

            .rc-bottom-bar {
                position: fixed;
                left: 16px;
                right: 16px;
                bottom: 16px;
                z-index: 1040;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                padding: 14px 16px;
                border-radius: 20px;
                background: rgba(37, 45, 89, 0.96);
                color: #fff;
                box-shadow: 0 18px 40px rgba(22, 28, 46, 0.24);
            }

            .rc-bottom-bar__meta {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }

            .rc-bottom-bar__count {
                font-size: 12px;
                font-weight: 700;
                opacity: 0.82;
            }

            .rc-bottom-bar__amount {
                font-size: 18px;
                font-weight: 800;
                letter-spacing: -0.02em;
            }

            .rc-bottom-bar__cta {
                min-width: 148px;
                white-space: nowrap;
            }

            @media (max-width: 1199.98px) {
                .rc-grid {
                    grid-template-columns: repeat(3, minmax(0, 1fr));
                }
            }

            @media (max-width: 991.98px) {
                .rc-store-hero {
                    min-height: 214px;
                    padding: 18px 20px;
                }

                .rc-store-hero__title {
                    font-size: 28px;
                }

                .rc-grid {
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                }
            }

            @media (max-width: 575.98px) {
                .rc-shell {
                    padding-bottom: 110px;
                }

                .rc-store-hero {
                    min-height: 188px;
                    padding: 14px 16px;
                    border-radius: 22px;
                }

                .rc-store-hero__title {
                    font-size: 24px;
                    line-height: 1.06;
                }

                .rc-store-hero__desc {
                    margin-top: 6px;
                    font-size: 12px;
                    line-height: 1.32;
                    max-width: none;
                }

                .rc-store-hero__meta {
                    gap: 6px;
                    margin-top: 8px;
                }

                .rc-store-hero__meta-item {
                    height: 46px;
                    padding: 5px 10px;
                    border-radius: 10px;
                }

                .rc-store-hero__meta-item--minimum {
                    flex: 0 0 102px;
                    max-width: 102px;
                }

                .rc-store-hero__meta-item--address {
                    flex: 1 1 0;
                    max-width: none;
                }

                .rc-store-hero__meta-label {
                    font-size: 7px;
                    margin-bottom: 2px;
                }

                .rc-store-hero__meta-value {
                    font-size: 10px;
                    line-height: 1.18;
                }

                .rc-store-hero__meta-value--address {
                    white-space: normal;
                    overflow: hidden;
                    text-overflow: unset;
                    display: -webkit-box;
                    -webkit-line-clamp: 2;
                    -webkit-box-orient: vertical;
                }

                .rc-toolbar,
                .rc-guide,
                .rc-empty {
                    padding: 16px;
                }

                .rc-grid {
                    grid-template-columns: 1fr;
                    gap: 12px;
                }

                .rc-card {
                    flex-direction: row;
                    align-items: center;
                    gap: 12px;
                    padding: 14px;
                    border-radius: 18px;
                }

                .rc-card__thumb {
                    width: 84px;
                    min-width: 84px;
                    aspect-ratio: 1 / 1;
                    border-radius: 14px;
                    align-self: flex-start;
                }

                .rc-card__body {
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    min-width: 0;
                    width: 100%;
                }

                .rc-card__head {
                    align-items: flex-start;
                    gap: 8px;
                }

                .rc-card__name {
                    font-size: 17px;
                    line-height: 1.25;
                }

                .rc-card__desc {
                    font-size: 12px;
                    -webkit-line-clamp: 1;
                    margin-top: 4px;
                }

                .rc-card__footer {
                    margin-top: 8px;
                    align-items: flex-start;
                    gap: 8px;
                    flex-direction: column;
                }

                .rc-card__price {
                    font-size: 16px;
                }

                .rc-card__controls {
                    width: 100%;
                    justify-content: space-between;
                    margin-left: 0;
                }

                .rc-status {
                    min-height: 26px;
                    padding: 0 10px;
                    font-size: 11px;
                }

                .rc-bottom-bar {
                    align-items: stretch;
                    flex-direction: column;
                }

                .rc-bottom-bar__cta {
                    width: 100%;
                }
            }
        </style>
    </th:block>
</head>

<body>
<section layout:fragment="pageContent"
         id="roomCartRoot"
         th:attr="data-room-code=${orderRoom.roomCode}">

    <div class="rc-shell"
         th:with="
            firstMenu=${#lists.isEmpty(menuList) ? null : menuList[0]},
            currentStoreIdx=${store != null ? store.storeIdx : (firstMenu != null ? firstMenu.storeIdx : 0)},
            totalCount=${#lists.size(menuList)},
            soldOutCount=${#aggregates.sum(menuList.![menuStatus == 'SOLD_OUT' ? 1 : 0])},
            availableCount=${totalCount - soldOutCount}
         "
         th:attr="data-store-idx=${currentStoreIdx}">

        <section class="rc-store-hero">
            <div class="rc-store-hero__bg"
                 th:if="${store != null and store.heroImageUrl != null and !#strings.isEmpty(store.heroImageUrl)}"
                 th:style="|background-image:url('${store.heroImageUrl}');|">
            </div>

            <div class="rc-store-hero__bg"
                 th:unless="${store != null and store.heroImageUrl != null and !#strings.isEmpty(store.heroImageUrl)}"
                 style="background-image:linear-gradient(135deg, #252D59 0%, #2A3659 45%, #FF8000 100%);">
            </div>

            <div class="rc-store-hero__content">
                <div class="rc-store-hero__eyebrow">메뉴 추가 화면</div>

                <h1 class="rc-store-hero__title"
                    th:text="${store != null and store.storeName != null and !#strings.isEmpty(store.storeName) ? store.storeName : '가게 정보'}">
                    가게명
                </h1>

                <p class="rc-store-hero__desc"
                   th:text="${store != null and store.storeDescription != null and !#strings.isEmpty(store.storeDescription) ? store.storeDescription : '메뉴를 담고 주문 확인 단계로 넘어갈 수 있습니다.'}">
                    가게 소개
                </p>

                <div class="rc-store-hero__meta">
                    <div class="rc-store-hero__meta-item rc-store-hero__meta-item--minimum">
                        <span class="rc-store-hero__meta-label">최소주문금액</span>
                        <strong class="rc-store-hero__meta-value"
                                th:text="${store != null ? #numbers.formatInteger(store.minimumOrderAmount, 1, 'COMMA') + '원' : '정보 없음'}">
                            0원
                        </strong>
                    </div>

                    <div class="rc-store-hero__meta-item rc-store-hero__meta-item--address">
                        <span class="rc-store-hero__meta-label">가게 주소</span>
                        <strong class="rc-store-hero__meta-value rc-store-hero__meta-value--address">
                            <span th:text="${store != null and store.storeAddress1 != null ? store.storeAddress1 : '주소 정보 없음'}">
                                주소
                            </span>
                            <span th:if="${store != null and store.storeAddress2 != null and !#strings.isEmpty(store.storeAddress2)}">
                                &nbsp;<span th:text="${store.storeAddress2}">상세주소</span>
                            </span>
                        </strong>
                    </div>
                </div>
            </div>
        </section>

        <section class="rc-guide">
            메뉴를 먼저 담고, 하단의 <strong>주문 확인하기</strong>에서 내 주문을 최종 확인한 뒤 선택 완료로 넘어갑니다.
        </section>

        <section class="rc-toolbar">
            <div class="rc-search">
                <span class="rc-search__icon">🔍</span>
                <input type="text"
                       id="roomCartSearchInput"
                       class="form-control"
                       placeholder="메뉴 이름 또는 설명으로 검색">
            </div>
        </section>

        <section id="roomCartMenuList" class="rc-section-list">
            <article class="rc-card"
                     th:each="menu : ${menuList}"
                     th:with="
                        cartItem=${myCartItemMap != null ? myCartItemMap[menu.menuIdx] : null},
                        resolvedCategory=${menu.categoryName != null and !#strings.isEmpty(menu.categoryName) ? menu.categoryName : '기타 메뉴'}
                     "
                     th:classappend="${menu.menuStatus == 'SOLD_OUT'} ? ' is-soldout' : ''"
                     th:attr="
                        data-menu-idx=${menu.menuIdx},
                        data-menu-name=${menu.menuName},
                        data-menu-desc=${menu.menuDescription},
                        data-menu-status=${menu.menuStatus},
                        data-menu-price=${menu.menuPrice},
                        data-category-name=${resolvedCategory},
                        data-cart-item-idx=${cartItem != null ? cartItem.cartItemIdx : ''},
                        data-initial-quantity=${cartItem != null ? cartItem.itemQuantity : 0}">

                <div class="rc-card__thumb">
                    <img th:if="${menu.imageUrl != null and !#strings.isEmpty(menu.imageUrl)}"
                         th:src="${menu.imageUrl}"
                         th:alt="${menu.menuName}">
                    <span th:unless="${menu.imageUrl != null and !#strings.isEmpty(menu.imageUrl)}">🍽️</span>
                </div>

                <div class="rc-card__body">
                    <div class="rc-card__head">
                        <h2 class="rc-card__name" th:text="${menu.menuName}">메뉴 이름</h2>

                        <span class="rc-status rc-status--available"
                              th:if="${menu.menuStatus == 'AVAILABLE'}">주문 가능</span>
                        <span class="rc-status rc-status--soldout"
                              th:if="${menu.menuStatus == 'SOLD_OUT'}">품절</span>
                    </div>

                    <p class="rc-card__desc"
                       th:text="${menu.menuDescription != null and !#strings.isEmpty(menu.menuDescription) ? menu.menuDescription : '메뉴 설명이 아직 등록되지 않았습니다.'}">
                        메뉴 설명
                    </p>

                    <div class="rc-card__footer">
                        <strong class="rc-card__price"
                                th:text="${#numbers.formatInteger(menu.menuPrice, 1, 'COMMA')} + '원'">
                            0원
                        </strong>

                        <div class="rc-card__controls"
                             th:if="${menu.menuStatus != 'SOLD_OUT'}">
                            <div class="rc-qty">
                                <button type="button" class="rc-qty__btn rcQtyBtn" data-delta="-1">-</button>
                                <span class="rc-qty__value rcQtyValue"
                                      th:text="${cartItem != null ? cartItem.itemQuantity : 0}">0</span>
                                <button type="button" class="rc-qty__btn rcQtyBtn" data-delta="1">+</button>
                            </div>

                            <button type="button"
                                    class="mo-btn mo-btn-primary rcAddBtn"
                                    th:text="${cartItem != null and cartItem.itemQuantity > 0} ? '변경 저장' : '추가'">
                                추가
                            </button>
                        </div>
                    </div>
                </div>
            </article>
        </section>

        <div id="roomCartSearchEmpty" class="rc-empty d-none">
            <div class="rc-empty__icon">🍽️</div>
            <h2 class="rc-empty__title">조건에 맞는 메뉴가 없습니다</h2>
            <p class="rc-empty__desc">검색어를 바꿔 다시 확인해 주세요.</p>
        </div>

        <div th:if="${#lists.isEmpty(menuList)}" class="rc-empty">
            <div class="rc-empty__icon">🍽️</div>
            <h2 class="rc-empty__title">등록된 메뉴가 없습니다</h2>
            <p class="rc-empty__desc">현재 가게에 등록된 메뉴가 없어 화면에 표시할 항목이 없습니다.</p>
        </div>
    </div>

    <div class="rc-bottom-bar" id="roomCartBottomBar">
        <div class="rc-bottom-bar__meta">
            <span class="rc-bottom-bar__count" id="roomCartBottomCount">0개 담김</span>
            <strong class="rc-bottom-bar__amount"
                    id="roomCartBottomAmount"
                    th:text="${#numbers.formatInteger(myCartTotal, 0, 'COMMA')} + '원'">0원</strong>
        </div>

        <button type="button"
                class="mo-btn mo-btn-primary rc-bottom-bar__cta"
                id="roomCartConfirmBtn"
                th:disabled="${myCartTotal == 0}">
            주문 확인하기
        </button>
    </div>
</section>

<th:block layout:fragment="pageScripts">
    <script th:src="@{/js/room/room-cart.js}"></script>
</th:block>
</body>
</html>
