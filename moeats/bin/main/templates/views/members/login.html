<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mo-Eats Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; }
        .wrap { max-width: 420px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 14px; }
        input { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
        button { margin-top: 18px; width: 100%; padding: 12px; cursor: pointer; }
        .error { margin-top: 12px; color: #c62828; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>로그인</h1>
        <form method="post" th:action="@{/login}">
            <label for="memberEmail">이메일</label>
            <input type="email" id="memberEmail" name="memberEmail" required>

            <label for="memberPassword">비밀번호</label>
            <input type="password" id="memberPassword" name="memberPassword" required>

            <button type="submit">로그인</button>
        </form>

        <div class="error" th:if="${error}" th:text="${error}"></div>

        <p style="margin-top:16px;">
            <a th:href="@{/main}">메인으로</a> | 
            <a th:href="@{/members/new-user}">회원가입하기</a>
        </p>
    </div>
</body>
</html>
