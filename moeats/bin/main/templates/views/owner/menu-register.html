<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>신규 메뉴 등록 - Mo-Eats</title>
    <style>
        .image-upload-box { border: 2px dashed var(--mo-line-strong); transition: all 0.2s ease; }
        .image-upload-box:hover { border-color: var(--mo-primary); background-color: rgba(255, 128, 0, 0.04) !important; }
        .image-preview-wrapper { background-color: var(--mo-bg); z-index: 5; }
        .image-upload-badge { background: rgba(37, 45, 89, 0.75); border-radius: 10px; }
    </style>
</head>

<body>
<section layout:fragment="pageContent">
    <div class="mo-page-container container">
        
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-7">
                
                <div class="mo-section text-center mb-5">
                    <span class="mo-section-label">NEW MENU</span>
                    <h2 class="mo-section-title">신규 메뉴 등록</h2>
                    <p class="mo-store-card__desc mt-2">매장의 맛있는 메뉴를 새롭게 추가합니다.</p>
                </div>

                <div class="mo-surface-card p-4 p-md-5">
                    
                    <div class="mb-4 pb-3 border-bottom">

                        <a th:href="@{/owners/menu}" class="text-decoration-none fw-bold" style="color: var(--mo-text-soft);">

                            <i class="bi bi-arrow-left me-1"></i> 목록으로 돌아가기
                        </a>
                    </div>

                    <form id="menuRegisterForm" enctype="multipart/form-data">
                        
                        <div class="mb-4">
                            <label class="mo-form-label">카테고리</label>
                            <div class="d-flex gap-2">
                                <select id="categorySelect" name="menuCategoryIdx" class="form-select mo-form-control flex-grow-1" required>
                                    <option value="">카테고리를 선택하세요</option>
                                    <option th:each="cat : ${storeMenuCategories}" 
                                            th:value="${cat.menuCategoryIdx}" 
                                            th:text="${cat.categoryName}"></option>
                                </select>
                                <button class="mo-btn mo-btn-outline px-3" type="button" data-bs-toggle="modal" data-bs-target="#categoryQuickModal">
                                    <i class="bi bi-plus-lg me-1"></i> 새 카테고리
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="mo-form-label">메뉴 이미지</label>
                            <input type="file" id="imageFile" name="menuFile" class="d-none" accept="image/*" onchange="previewImage(this)">
                            
                            <div id="imageContainer" class="image-upload-box position-relative d-flex align-items-center justify-content-center overflow-hidden rounded-4 bg-light" 
                                 style="height: 220px; cursor: pointer;"
                                 onclick="document.getElementById('imageFile').click()">
                                
                                <div id="guideMsg" class="text-center text-secondary">
                                    <div class="mb-2" style="font-size: 36px;">📷</div>
                                    <span class="fw-bold" style="color: var(--mo-text-soft);">클릭하여 사진 업로드</span>
                                </div>
                                
                                <div id="previewWrapper" class="image-preview-wrapper position-absolute top-0 start-0 w-100 h-100 d-none">
                                    <img id="preview" src="" class="w-100 h-100 object-fit-cover" alt="미리보기">
                                    <div class="image-upload-badge position-absolute bottom-0 end-0 m-3 px-3 py-1 text-white fw-bold" style="font-size: 13px;">
                                        <i class="bi bi-pencil-fill me-1"></i> 변경
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="mo-form-label">메뉴 이름</label>
                            <input type="text" name="menuName" class="form-control mo-form-control fw-bold mo-valid-name" placeholder="메뉴 이름을 입력하세요" required>
                        </div>

                        <div class="mb-4">
                            <label class="mo-form-label">가격</label>
                            <div class="d-flex align-items-center gap-2">
                                <input type="number" name="menuPrice" class="form-control mo-form-control text-end flex-grow-1 fw-bold" placeholder="0" required>
                                <span class="fw-bold" style="color: var(--mo-navy-strong); width: 24px;">원</span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="mo-form-label">메뉴 설명</label>
                            <textarea name="menuDescription" class="form-control mo-form-control pt-3" style="min-height: 120px; resize: none;" rows="3" placeholder="메뉴의 특징이나 들어가는 재료 등을 소개해 주세요."></textarea>
                        </div>

                        <div class="mt-5 pt-3 border-top">
                            <button type="button" id="submitBtn" class="mo-btn mo-btn-primary w-100 py-3 fs-6" onclick="handleMenuRegister()">등록 완료</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade mo-auth-modal" id="categoryQuickModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content mo-modal-card">
                <div class="mo-modal-card__header d-flex justify-content-between align-items-start">
                    <div>
                        <span class="mo-modal-card__eyebrow">Category</span>
                        <h5 class="mo-modal-card__title m-0 fw-bold" style="font-size: 22px;">새 카테고리 등록</h5>
                    </div>
                    <button type="button" class="btn-close mt-1" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="mo-modal-form mt-4">
                    <label class="mo-form-label">카테고리 명칭</label>
                    <input type="text" id="newCategoryName" class="form-control mo-form-control fw-bold" placeholder="예: 메인메뉴, 사이드, 음료">
                </div>
                <div class="mo-modal-card__footer d-flex gap-2 mt-2">
                    <button type="button" class="mo-btn mo-btn-plain flex-fill" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="mo-btn mo-btn-primary flex-fill" onclick="handleCategoryQuickAdd()">등록하기</button>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="pageScripts">
    <script th:inline="javascript">
        /*<![CDATA[*/

        /**
         * [Quick Add] 카테고리 비동기 등록
         */
        async function handleCategoryQuickAdd() {
            const catNameInput = document.getElementById('newCategoryName');
            const catName = catNameInput.value.trim();
            if(!catName) { alert("카테고리 이름을 입력하세요."); return; }

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            // 컨트롤러 형식에 맞게 파라미터 조립
            const params = new URLSearchParams();
            params.append('categoryName', catName);

            try {

                // 컨트롤러의 카테고리 등록 주소로 통신
                const response = await fetch('/owners/category/write', {

                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/x-www-form-urlencoded',
                        ...(header && { [header]: token }) 
                    },
                    body: params
                });

                if(response.ok) {
                    const data = await response.json();
                    if(data.result) {
                        alert("카테고리가 추가되었습니다. 목록을 갱신합니다.");
                        // 안전하게 새로고침하여 셀렉트박스 갱신
                        location.reload();
                    } else {
                        alert("카테고리 등록 실패");
                    }
                }
            } catch(e) {
                alert("카테고리 등록 중 에러 발생");
            }
        }

        /**
         * 메뉴 등록 로직
         */
        async function handleMenuRegister() {
            const form = document.getElementById('menuRegisterForm');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!form.menuCategoryIdx.value) { alert("카테고리를 선택해 주세요."); return; }
            if (!form.menuName.value.trim()) { alert("메뉴 이름을 입력해 주세요."); return; }
            if (!form.menuPrice.value) { alert("가격을 입력해 주세요."); return; }

            if(!confirm("새 메뉴를 등록하시겠습니까?")) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>등록 중...';

            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;
            
            const formData = new FormData(form);

            try {

                const response = await fetch('/owners/menu', { 

                    method: 'POST',
                    headers: { ...(header && { [header]: token }) },
                    body: formData
                });

                if (response.ok) {
                    alert("성공적으로 등록되었습니다.");
             // 등록 성공 시 정상적인 메뉴 관리 경로로 이동
                    location.href = '/owners/menu'; 

                } else {
                    alert("등록 실패");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "등록 완료";
                }
            } catch (error) {
                alert("통신 에러");
                submitBtn.disabled = false;
                submitBtn.innerText = "등록 완료";
            }
        }

        function previewImage(input) {
            const previewWrapper = document.getElementById('previewWrapper');
            const preview = document.getElementById('preview');
            const guideMsg = document.getElementById('guideMsg');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    previewWrapper.classList.remove('d-none');
                    guideMsg.classList.add('d-none');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        /*]]>*/
    </script>
</th:block>
</body>
</html>
