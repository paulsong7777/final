<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>주문 상세</title>
</head>
<body>
<section layout:fragment="pageContent">
    <section class="mo-section">
        <div class="mo-surface-card">
            <div class="mo-section-label">FE-08</div>
            <h1 class="mo-section-title">주문 상세</h1>
            <p class="text-secondary mb-4">점주 상태 변경이 있으면 이 화면이 실시간으로 갱신됩니다.</p>

            <div class="d-grid gap-3 mb-4">
                <div class="p-3 rounded-4 border bg-white">
                    <div class="small text-secondary mb-1">주문 상태</div>
                    <div class="fw-bold fs-5" th:text="${groupOrder.orderStatus}">PAID</div>
                </div>

                <div class="p-3 rounded-4 border bg-white">
                    <div class="small text-secondary mb-1">결제 방식</div>
                    <div class="fw-bold fs-5" th:text="${groupOrder.paymentMode}">REPRESENTATIVE</div>
                </div>

                <div class="p-3 rounded-4 border bg-white">
                    <div class="small text-secondary mb-1">총 주문 금액</div>
                    <div class="fw-bold fs-4"
                         th:text="${#numbers.formatInteger(groupOrder.orderTotalAmount, 0, 'COMMA')} + '원'">0원</div>
                </div>
            </div>

            <div class="d-grid gap-3">
                <div th:if="${#lists.isEmpty(memberItems)}" class="p-3 rounded-4 border bg-white text-secondary">
                    현재 표시할 주문 항목이 없습니다.
                </div>

                <div th:each="memberItem : ${memberItems}" class="p-3 rounded-4 border bg-white">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <strong th:text="${memberItem.member.memberNickname}">참여자</strong>
                        <span th:text="${memberItem.roomParticipant.participantRole}">PARTICIPANT</span>
                    </div>

                    <div th:if="${#lists.isEmpty(memberItem.items)}" class="text-secondary">
                        주문한 메뉴가 없습니다.
                    </div>

                    <ul th:unless="${#lists.isEmpty(memberItem.items)}" class="mb-0">
                        <li th:each="item : ${memberItem.items}"
                            th:text="${item.menuNameSnapshot} + ' × ' + ${item.itemQuantity}">
                            메뉴
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <input type="hidden" id="orderIdx" th:value="${orderIdx}">
        <input type="hidden" id="orderSsePageType" value="order-detail">
    </section>
</section>

<th:block layout:fragment="pageScripts">
    <script th:src="@{/js/order/order-channel.js}"></script>
</th:block>
</body>
</html>
