<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">

<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .register-page-container { min-height: 95vh; background-color: #F8F9FA; padding-bottom: 80px; }
        
        /* [일관성 핵심] 모든 입력 필드 디자인 통일 */
        .form-group { margin-bottom: 1.5rem; width: 100%; }
        
        .form-label { 
            display: block; font-size: 0.85rem; font-weight: 700; 
            color: var(--mo-navy); margin-bottom: 10px; margin-left: 4px; 
        }

        /* 모든 input과 textarea의 가로 세로 및 스타일을 강제 통일 */
        .form-control { 
            width: 100% !important;
            height: 54px !important; 
            border: 1px solid #E9ECEF !important; 
            border-radius: 16px !important; 
            padding: 0 18px !important; 
            background-color: #FFFFFF !important; 
            transition: all 0.2s ease;
            box-sizing: border-box; /* 테두리 포함 크기 계산 */
            font-size: 1rem;
        }

        /* 설명 칸(textarea)만 높이 가변, 나머지는 동일 */
        textarea.form-control {
            height: auto !important;
            padding: 18px !important;
            min-height: 120px;
        }

        .form-control:focus { 
            border-color: var(--mo-orange) !important; 
            box-shadow: 0 0 0 4px rgba(255, 128, 0, 0.1) !important; 
            outline: none; 
        }

        /* 사진 업로드 영역 - 입력창들과 너비 일치 */
        .image-upload-zone {
            width: 100%; height: 220px; border: 2px dashed #D1D5DB; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; overflow: hidden; background-color: #FFFFFF; transition: 0.3s;
            margin-bottom: 2rem;
        }
        .image-upload-zone:hover { border-color: var(--mo-orange); background-color: #FFFAF5; }
        #imagePreview { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* 대기 리스트 아이템 디자인 */
        .pending-item { 
            display: flex; align-items: center; gap: 15px; background: white; 
            border-radius: 20px; padding: 15px; margin-bottom: 12px;
            border: 1px solid #EEE; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            animation: slideIn 0.3s ease-out;
        }
        .pending-img { width: 60px; height: 60px; border-radius: 14px; object-fit: cover; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sticky-side { position: sticky; top: 20px; }
    </style>
</th:block>

<div layout:fragment="content" class="register-page-container">
    <div class="container py-4">
        
        <div class="mb-5 d-flex justify-content-between align-items-center">
            <div>
                <a th:href="@{/owner/dashboard}" class="text-decoration-none text-muted small mb-1 d-inline-block">
                    <i class="bi bi-chevron-left"></i> 대시보드로 돌아가기
                </a>
                <h3 class="fw-bold mb-0" style="color: var(--mo-navy);">메뉴 구성하기</h3>
            </div>
            <div class="text-end">
                <span class="badge bg-white text-dark border rounded-pill px-3 py-2 shadow-sm">
                    대기 중 <b class="text-orange" id="totalCount">0</b>건
                </span>
            </div>
        </div>

        <div class="row g-5 justify-content-center">
            <div class="col-lg-5 order-2 order-lg-1">
                <div class="soft-card shadow-sm h-100 d-flex flex-column">
                    <h5 class="fw-bold mb-4"> 등록 예정 리스트</h5>
                    <div id="tempMenuList" class="flex-grow-1" style="max-height: 600px; overflow-y: auto;">
                        <div class="text-center py-5" id="emptyMsg">
                            <div class="display-1 text-light mb-3"></div>
                            <p class="text-muted">우측 폼을 작성하여<br>리스트에 메뉴를 추가해주세요.</p>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-top">
                        <button type="button" class="btn-primary-mo w-100 py-3 shadow-lg" onclick="submitFinal()">
                            서버에 일괄 등록하기
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 order-1 order-lg-2">
                <div class="sticky-side">
                    <div class="soft-card shadow-sm border-0">
                        <h5 class="fw-bold mb-4"> 메뉴 정보 입력</h5>
                        
                        <div class="image-upload-zone" onclick="document.getElementById('menuImage').click()">
                            <div id="uploadPlaceholder" class="text-center">
                                <i class="bi bi-camera fs-1 text-muted"></i>
                                <p class="small text-muted mb-0 mt-2">메뉴 사진 업로드 (필수)</p>
                            </div>
                            <img id="imagePreview" src="">
                            <input type="file" id="menuImage" accept="image/*" style="display: none;" onchange="previewImage(this)">
                        </div>

                        <div class="form-group">
                            <label class="form-label">메뉴 이름</label>
                            <input type="text" id="menuName" class="form-control" placeholder="예: 매운 찜갈비">
                        </div>

                        <div class="form-group">
                            <label class="form-label">판매 가격</label>
                            <input type="number" id="menuPrice" class="form-control" placeholder="숫자만 입력 (원)">
                        </div>

                        <div class="form-group">
                            <label class="form-label">메뉴 상세 설명</label>
                            <textarea id="menuContent" class="form-control" placeholder="손님들에게 메뉴를 소개해주세요."></textarea>
                        </div>

                        <button type="button" class="btn-outline-mo w-100 py-3 mt-2" onclick="addMenuToList()">
                            <i class="bi bi-plus-lg me-2"></i>리스트에 추가하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        let menuArray = [];

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('uploadPlaceholder');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addMenuToList() {
            const name = document.getElementById('menuName').value;
            const price = document.getElementById('menuPrice').value;
            const content = document.getElementById('menuContent').value;
            const fileInput = document.getElementById('menuImage');
            const previewSrc = document.getElementById('imagePreview').src;

            if(!name || !price || !fileInput.files[0]) {
                alert("사진, 이름, 가격은 필수 항목입니다! ");
                return;
            }

            const menuData = {
                name: name,
                price: price,
                content: content,
                imgSrc: previewSrc,
                file: fileInput.files[0]
            };

            menuArray.push(menuData);
            renderList();
            resetForm();
        }

        function renderList() {
            const listDiv = document.getElementById('tempMenuList');
            const totalCount = document.getElementById('totalCount');

            listDiv.innerHTML = '';
            totalCount.innerText = menuArray.length;

            if (menuArray.length === 0) {
                listDiv.innerHTML = '<div class="text-center py-5" id="emptyMsg"><div class="display-1 text-light mb-3"></div><p class="text-muted">우측 폼을 작성하여<br>리스트에 메뉴를 추가해주세요.</p></div>';
                return;
            }

            menuArray.forEach((item, index) => {
                const itemHtml = `
                    <div class="pending-item">
                        <img src="${item.imgSrc}" class="pending-img">
                        <div class="flex-grow-1">
                            <div class="fw-bold text-dark">${item.name}</div>
                            <div class="small text-orange">${Number(item.price).toLocaleString()}원</div>
                        </div>
                        <button type="button" class="btn btn-sm text-danger" onclick="removeItem(${index})">
                            <i class="bi bi-trash fs-5"></i>
                        </button>
                    </div>
                `;
                listDiv.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        function removeItem(index) {
            menuArray.splice(index, 1);
            renderList();
        }

        function resetForm() {
            document.getElementById('menuName').value = '';
            document.getElementById('menuPrice').value = '';
            document.getElementById('menuContent').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('uploadPlaceholder').style.display = 'block';
            document.getElementById('menuImage').value = '';
        }

        function submitFinal() {
            if (menuArray.length === 0) {
                alert("등록 대기 중인 메뉴가 없습니다! 메뉴를 먼저 추가해 주세요.");
                return;
            }
            alert("확인! 총 " + menuArray.length + "개의 메뉴가 준비되었습니다. 서버 전송 로직을 시작합니다.");
            console.log("전송 데이터:", menuArray);
        }
    </script>
</th:block>
</html>
