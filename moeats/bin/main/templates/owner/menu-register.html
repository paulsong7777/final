<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mo-Eats | 메뉴 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #F8F9FA; font-family: 'Pretendard', sans-serif; padding-top: 50px; }
        .register-container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .btn-mo { background: #FF8000; color: white; border: none; border-radius: 15px; padding: 15px; font-weight: 800; width: 100%; }
        .img-placeholder { width: 100%; height: 250px; border: 2px dashed #ddd; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #adb5bd; }
    </style>
</head>
<body>
    <div class="register-container">
        <h3 class="fw-bold mb-4"><i class="bi bi-arrow-left me-2" onclick="history.back()" style="cursor:pointer"></i> 메뉴 등록</h3>
        <form>
            <div class="mb-4">
                <label class="form-label fw-bold">메뉴 사진</label>
                <div class="img-placeholder"><i class="bi bi-camera-fill fs-1"></i></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">메뉴명</label>
                <input type="text" class="form-control form-control-lg border-0 bg-light rounded-3" placeholder="예: 훈제치킨">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">가격</label>
                <input type="number" class="form-control form-control-lg border-0 bg-light rounded-3" placeholder="원 단위로 입력">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">메뉴 설명</label>
                <textarea class="form-control border-0 bg-light rounded-3" rows="3" placeholder="맛있는 설명을 적어주세요"></textarea>
            </div>
            <button type="button" class="btn-mo" onclick="alert('등록 완료! (연동 전)')">메뉴 등록하기</button>
        </form>
    </div>
</body>
</html>
